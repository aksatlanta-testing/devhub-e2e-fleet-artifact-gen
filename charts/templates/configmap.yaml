apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-echoaa0c3fd9-c6e9-4bf7-86b1-afc23e73435d.fullname" . }}-config
  labels:
    {{- include "go-echoaa0c3fd9-c6e9-4bf7-86b1-afc23e73435d.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
  {{ $key }}: {{ $value }}
{{- end }}
