apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-echoa2ff3a5b-8c5e-444c-9223-deb8ab6c7ea6.fullname" . }}-config
  labels:
    {{- include "go-echoa2ff3a5b-8c5e-444c-9223-deb8ab6c7ea6.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
  {{ $key }}: {{ $value }}
{{- end }}
