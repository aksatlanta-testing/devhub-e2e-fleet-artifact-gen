apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-echofcc9e0e9-cd0f-4e13-bde5-2c8e3b5e702d.fullname" . }}-config
  labels:
    {{- include "go-echofcc9e0e9-cd0f-4e13-bde5-2c8e3b5e702d.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
  {{ $key }}: {{ $value }}
{{- end }}
