apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-echob2010164-fd20-44c4-ac2c-23b624fe8bbb.fullname" . }}-config
  labels:
    {{- include "go-echob2010164-fd20-44c4-ac2c-23b624fe8bbb.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
  {{ $key }}: {{ $value }}
{{- end }}
