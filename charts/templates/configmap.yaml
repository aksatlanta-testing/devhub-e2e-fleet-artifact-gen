apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-echobfce6ed8-ea2d-42dc-bd1b-fff0f209fffe.fullname" . }}-config
  labels:
    {{- include "go-echobfce6ed8-ea2d-42dc-bd1b-fff0f209fffe.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
  {{ $key }}: {{ $value }}
{{- end }}
