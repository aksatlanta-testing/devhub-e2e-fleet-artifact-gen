apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-echoac4d4d5e-e8c3-4bb2-a204-f32bef0c2fbd.fullname" . }}-config
  labels:
    {{- include "go-echoac4d4d5e-e8c3-4bb2-a204-f32bef0c2fbd.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
