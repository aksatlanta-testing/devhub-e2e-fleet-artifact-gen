apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-echofc0da1fd-4ab5-4af2-adac-fdb1cbb110d3.fullname" . }}-config
  labels:
    {{- include "go-echofc0da1fd-4ab5-4af2-adac-fdb1cbb110d3.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
  {{ $key }}: {{ $value }}
{{- end }}
