apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-echof64fc5aa-eb34-40a6-a6d0-f00fdc0e4e3c.fullname" . }}-config
  labels:
    {{- include "go-echof64fc5aa-eb34-40a6-a6d0-f00fdc0e4e3c.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
  {{ $key }}: {{ $value }}
{{- end }}
