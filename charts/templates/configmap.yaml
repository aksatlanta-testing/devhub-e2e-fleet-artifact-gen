apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-echobd9db91a-cf8d-4be7-a7ef-5d8ce53fcec2.fullname" . }}-config
  labels:
    {{- include "go-echobd9db91a-cf8d-4be7-a7ef-5d8ce53fcec2.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
  {{ $key }}: {{ $value }}
{{- end }}
