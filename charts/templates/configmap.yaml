apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-echobe28064f-8cc6-4571-b100-b19784bb8caa.fullname" . }}-config
  labels:
    {{- include "go-echobe28064f-8cc6-4571-b100-b19784bb8caa.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
  {{ $key }}: {{ $value }}
{{- end }}
