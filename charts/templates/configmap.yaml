apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-echoecfcd2ba-f8bf-4810-a15f-3ae426734f3c.fullname" . }}-config
  labels:
    {{- include "go-echoecfcd2ba-f8bf-4810-a15f-3ae426734f3c.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
  {{ $key }}: {{ $value }}
{{- end }}
