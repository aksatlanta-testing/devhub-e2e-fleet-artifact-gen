apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-echob209fd86-17c5-414d-bd6a-944d22a3c46a.fullname" . }}-config
  labels:
    {{- include "go-echob209fd86-17c5-414d-bd6a-944d22a3c46a.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
  {{ $key }}: {{ $value }}
{{- end }}
