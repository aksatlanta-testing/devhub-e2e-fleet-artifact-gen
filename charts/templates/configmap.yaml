apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-echob6bf4df6-6b9f-45f5-941c-aa4d19e8ec2e.fullname" . }}-config
  labels:
    {{- include "go-echob6bf4df6-6b9f-45f5-941c-aa4d19e8ec2e.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
