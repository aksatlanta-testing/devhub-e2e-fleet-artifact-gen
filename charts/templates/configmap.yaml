apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-echofa22e3ad-bdc6-43a3-945d-9dd391001ef2.fullname" . }}-config
  labels:
    {{- include "go-echofa22e3ad-bdc6-43a3-945d-9dd391001ef2.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
  {{ $key }}: {{ $value }}
{{- end }}
