  labels:
    {{- include "go-echof15ce953-fc4b-4fb2-8ddb-c8df3ff9aeba.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
