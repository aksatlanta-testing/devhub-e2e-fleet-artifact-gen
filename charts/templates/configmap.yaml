  labels:
    {{- include "go-echo9f13ad2e-6f29-417f-bac1-afdd7ea8fc8d.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
