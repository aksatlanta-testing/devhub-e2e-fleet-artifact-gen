apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof31d6e50-6f71-4e9b-bb13-613531418815.fullname" . }}
  labels:
    {{- include "go-echof31d6e50-6f71-4e9b-bb13-613531418815.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof31d6e50-6f71-4e9b-bb13-613531418815.selectorLabels" . | nindent 6 }}
