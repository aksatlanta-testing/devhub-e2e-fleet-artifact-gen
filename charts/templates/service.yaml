apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo83eb11a5-7e6b-456e-8cdf-f0a2336e7773.fullname" . }}
  labels:
    {{- include "go-echo83eb11a5-7e6b-456e-8cdf-f0a2336e7773.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo83eb11a5-7e6b-456e-8cdf-f0a2336e7773.selectorLabels" . | nindent 6 }}
