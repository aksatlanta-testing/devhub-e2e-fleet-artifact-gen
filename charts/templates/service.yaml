apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo273f1e6c-cf0e-4be9-96ec-821da91b4070.fullname" . }}
  labels:
    {{- include "go-echo273f1e6c-cf0e-4be9-96ec-821da91b4070.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo273f1e6c-cf0e-4be9-96ec-821da91b4070.selectorLabels" . | nindent 6 }}
