apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob9164ad9-c199-46b9-8e32-a471380ccf9c.fullname" . }}
  labels:
    {{- include "go-echob9164ad9-c199-46b9-8e32-a471380ccf9c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob9164ad9-c199-46b9-8e32-a471380ccf9c.selectorLabels" . | nindent 6 }}
