apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodd131106-5792-40c3-a79e-995a73d657b0.fullname" . }}
  labels:
    {{- include "go-echodd131106-5792-40c3-a79e-995a73d657b0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodd131106-5792-40c3-a79e-995a73d657b0.selectorLabels" . | nindent 6 }}
