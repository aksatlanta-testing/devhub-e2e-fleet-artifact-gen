apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7d6b95f8-a68a-4b0c-94ff-3f35371b93b0.fullname" . }}
  labels:
    {{- include "go-echo7d6b95f8-a68a-4b0c-94ff-3f35371b93b0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7d6b95f8-a68a-4b0c-94ff-3f35371b93b0.selectorLabels" . | nindent 6 }}
