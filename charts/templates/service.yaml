apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3d2fb13a-f9f6-4c61-901c-f9ed2661a4bf.fullname" . }}
  labels:
    {{- include "go-echo3d2fb13a-f9f6-4c61-901c-f9ed2661a4bf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3d2fb13a-f9f6-4c61-901c-f9ed2661a4bf.selectorLabels" . | nindent 6 }}
