apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodaccc5f2-4dbb-4277-b10b-ee0b1c74efc5.fullname" . }}
  labels:
    {{- include "go-echodaccc5f2-4dbb-4277-b10b-ee0b1c74efc5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodaccc5f2-4dbb-4277-b10b-ee0b1c74efc5.selectorLabels" . | nindent 6 }}
