apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9b608714-da98-4f1f-9168-43c04f584a7b.fullname" . }}
  labels:
    {{- include "go-echo9b608714-da98-4f1f-9168-43c04f584a7b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9b608714-da98-4f1f-9168-43c04f584a7b.selectorLabels" . | nindent 6 }}
