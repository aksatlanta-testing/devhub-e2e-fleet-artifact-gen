apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3e659fba-d82d-4f3a-acaa-b8cb3ea358db.fullname" . }}
  labels:
    {{- include "go-echo3e659fba-d82d-4f3a-acaa-b8cb3ea358db.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3e659fba-d82d-4f3a-acaa-b8cb3ea358db.selectorLabels" . | nindent 6 }}
