apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo124bea7e-e508-49a7-a921-22b5de19f18a.fullname" . }}
  labels:
    {{- include "go-echo124bea7e-e508-49a7-a921-22b5de19f18a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo124bea7e-e508-49a7-a921-22b5de19f18a.selectorLabels" . | nindent 6 }}
