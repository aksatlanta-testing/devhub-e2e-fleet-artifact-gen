apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoead6a429-36a9-4093-8054-c44e082f8a75.fullname" . }}
  labels:
    {{- include "go-echoead6a429-36a9-4093-8054-c44e082f8a75.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoead6a429-36a9-4093-8054-c44e082f8a75.selectorLabels" . | nindent 6 }}
