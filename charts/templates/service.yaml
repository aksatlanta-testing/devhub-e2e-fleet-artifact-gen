apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaede6234-7ee0-4a6d-9136-88d23ff34df1.fullname" . }}
  labels:
    {{- include "go-echoaede6234-7ee0-4a6d-9136-88d23ff34df1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaede6234-7ee0-4a6d-9136-88d23ff34df1.selectorLabels" . | nindent 6 }}
