apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe61e7eab-66cc-4397-8316-4713424ebbd3.fullname" . }}
  labels:
    {{- include "go-echoe61e7eab-66cc-4397-8316-4713424ebbd3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe61e7eab-66cc-4397-8316-4713424ebbd3.selectorLabels" . | nindent 6 }}
