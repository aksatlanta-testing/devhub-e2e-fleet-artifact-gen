apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof0cfdb3d-f0ee-4785-b4aa-e220580f666b.fullname" . }}
  labels:
    {{- include "go-echof0cfdb3d-f0ee-4785-b4aa-e220580f666b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof0cfdb3d-f0ee-4785-b4aa-e220580f666b.selectorLabels" . | nindent 6 }}
