apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7b5a3e71-0e21-4af7-a250-c7aed051e55b.fullname" . }}
  labels:
    {{- include "go-echo7b5a3e71-0e21-4af7-a250-c7aed051e55b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7b5a3e71-0e21-4af7-a250-c7aed051e55b.selectorLabels" . | nindent 6 }}
