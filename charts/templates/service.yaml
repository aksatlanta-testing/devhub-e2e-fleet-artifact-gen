apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo04e65c0f-a6c7-41ee-8b08-510bc363b56e.fullname" . }}
  labels:
    {{- include "go-echo04e65c0f-a6c7-41ee-8b08-510bc363b56e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo04e65c0f-a6c7-41ee-8b08-510bc363b56e.selectorLabels" . | nindent 6 }}
