apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoac44732b-b6c1-436f-b19f-94f9ab05eba8.fullname" . }}
  labels:
    {{- include "go-echoac44732b-b6c1-436f-b19f-94f9ab05eba8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoac44732b-b6c1-436f-b19f-94f9ab05eba8.selectorLabels" . | nindent 6 }}
