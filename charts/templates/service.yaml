apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo37332579-3e74-447c-a5fe-8fd98cafb073.fullname" . }}
  labels:
    {{- include "go-echo37332579-3e74-447c-a5fe-8fd98cafb073.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo37332579-3e74-447c-a5fe-8fd98cafb073.selectorLabels" . | nindent 6 }}
