apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9ece4c43-d155-4c50-907d-3ec7eb1b4d92.fullname" . }}
  labels:
    {{- include "go-echo9ece4c43-d155-4c50-907d-3ec7eb1b4d92.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9ece4c43-d155-4c50-907d-3ec7eb1b4d92.selectorLabels" . | nindent 6 }}
