apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo56c1fb4c-5f1a-4d23-a8dd-2d040e355d83.fullname" . }}
  labels:
    {{- include "go-echo56c1fb4c-5f1a-4d23-a8dd-2d040e355d83.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo56c1fb4c-5f1a-4d23-a8dd-2d040e355d83.selectorLabels" . | nindent 6 }}
