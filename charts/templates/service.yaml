apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5694dbc1-c30d-4eed-b84a-88005725fafd.fullname" . }}
  labels:
    {{- include "go-echo5694dbc1-c30d-4eed-b84a-88005725fafd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5694dbc1-c30d-4eed-b84a-88005725fafd.selectorLabels" . | nindent 6 }}
