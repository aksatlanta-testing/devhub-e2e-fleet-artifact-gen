apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6c4ba76a-10be-4762-ae17-00a6c05c366e.fullname" . }}
  labels:
    {{- include "go-echo6c4ba76a-10be-4762-ae17-00a6c05c366e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6c4ba76a-10be-4762-ae17-00a6c05c366e.selectorLabels" . | nindent 6 }}
