apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7d6d60ab-132b-4860-8276-c5046ad71204.fullname" . }}
  labels:
    {{- include "go-echo7d6d60ab-132b-4860-8276-c5046ad71204.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7d6d60ab-132b-4860-8276-c5046ad71204.selectorLabels" . | nindent 6 }}
