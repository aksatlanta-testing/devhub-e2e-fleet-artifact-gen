apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4a8cc547-ac8f-498f-89cb-3471a72343f5.fullname" . }}
  labels:
    {{- include "go-echo4a8cc547-ac8f-498f-89cb-3471a72343f5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4a8cc547-ac8f-498f-89cb-3471a72343f5.selectorLabels" . | nindent 6 }}
