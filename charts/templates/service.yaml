apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc8832be5-49e2-46ad-bbcf-e567e3965e05.fullname" . }}
  labels:
    {{- include "go-echoc8832be5-49e2-46ad-bbcf-e567e3965e05.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc8832be5-49e2-46ad-bbcf-e567e3965e05.selectorLabels" . | nindent 6 }}
