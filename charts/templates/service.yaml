apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo64410ad1-02b2-4d75-a96a-30847cafcdd6.fullname" . }}
  labels:
    {{- include "go-echo64410ad1-02b2-4d75-a96a-30847cafcdd6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo64410ad1-02b2-4d75-a96a-30847cafcdd6.selectorLabels" . | nindent 6 }}
