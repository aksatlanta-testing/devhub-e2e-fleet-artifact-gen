apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo19f72620-ee1d-4896-ac72-8a5369de9b1b.fullname" . }}
  labels:
    {{- include "go-echo19f72620-ee1d-4896-ac72-8a5369de9b1b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo19f72620-ee1d-4896-ac72-8a5369de9b1b.selectorLabels" . | nindent 6 }}
