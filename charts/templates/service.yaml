apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4e4ab572-1cd4-4f46-ab07-a284979a61a5.fullname" . }}
  labels:
    {{- include "go-echo4e4ab572-1cd4-4f46-ab07-a284979a61a5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4e4ab572-1cd4-4f46-ab07-a284979a61a5.selectorLabels" . | nindent 6 }}
