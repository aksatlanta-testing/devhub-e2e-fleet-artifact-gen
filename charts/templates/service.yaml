apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo14b261cf-f081-4aae-b4d9-72f9569cd39f.fullname" . }}
  labels:
    {{- include "go-echo14b261cf-f081-4aae-b4d9-72f9569cd39f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo14b261cf-f081-4aae-b4d9-72f9569cd39f.selectorLabels" . | nindent 6 }}
