apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5a4f7a60-e4c8-4e60-9a95-e5dfcb8b2a5f.fullname" . }}
  labels:
    {{- include "go-echo5a4f7a60-e4c8-4e60-9a95-e5dfcb8b2a5f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5a4f7a60-e4c8-4e60-9a95-e5dfcb8b2a5f.selectorLabels" . | nindent 6 }}
