apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod467b7e0-eefe-456a-a12b-e49cb755517b.fullname" . }}
  labels:
    {{- include "go-echod467b7e0-eefe-456a-a12b-e49cb755517b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod467b7e0-eefe-456a-a12b-e49cb755517b.selectorLabels" . | nindent 6 }}
