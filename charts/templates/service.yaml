apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo11cff6ef-764c-4c95-bc7c-853f120df965.fullname" . }}
  labels:
    {{- include "go-echo11cff6ef-764c-4c95-bc7c-853f120df965.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo11cff6ef-764c-4c95-bc7c-853f120df965.selectorLabels" . | nindent 6 }}
