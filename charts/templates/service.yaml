apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod908bab8-bafe-49b7-af7a-5956fd29ddc3.fullname" . }}
  labels:
    {{- include "go-echod908bab8-bafe-49b7-af7a-5956fd29ddc3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod908bab8-bafe-49b7-af7a-5956fd29ddc3.selectorLabels" . | nindent 6 }}
