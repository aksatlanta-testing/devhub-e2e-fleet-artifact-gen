apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobb2fb56b-d23e-453e-9da2-5e6e0ba374f7.fullname" . }}
  labels:
    {{- include "go-echobb2fb56b-d23e-453e-9da2-5e6e0ba374f7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobb2fb56b-d23e-453e-9da2-5e6e0ba374f7.selectorLabels" . | nindent 6 }}
