apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa4e4b57a-5c4d-4f1c-a358-964cfd00973e.fullname" . }}
  labels:
    {{- include "go-echoa4e4b57a-5c4d-4f1c-a358-964cfd00973e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa4e4b57a-5c4d-4f1c-a358-964cfd00973e.selectorLabels" . | nindent 6 }}
