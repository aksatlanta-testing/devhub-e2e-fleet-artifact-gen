apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoeae380c1-92eb-41a9-88fe-a5c73b1ba09e.fullname" . }}
  labels:
    {{- include "go-echoeae380c1-92eb-41a9-88fe-a5c73b1ba09e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoeae380c1-92eb-41a9-88fe-a5c73b1ba09e.selectorLabels" . | nindent 6 }}
