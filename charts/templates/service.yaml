apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1760b123-280d-4925-a430-13c55ea6e1ec.fullname" . }}
  labels:
    {{- include "go-echo1760b123-280d-4925-a430-13c55ea6e1ec.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1760b123-280d-4925-a430-13c55ea6e1ec.selectorLabels" . | nindent 6 }}
