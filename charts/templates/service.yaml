apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo57dbc849-8f0d-4a18-b5df-355fd8ffd455.fullname" . }}
  labels:
    {{- include "go-echo57dbc849-8f0d-4a18-b5df-355fd8ffd455.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo57dbc849-8f0d-4a18-b5df-355fd8ffd455.selectorLabels" . | nindent 6 }}
