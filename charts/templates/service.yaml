apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo515dd95d-3719-4cb9-b61b-621ebd49cde3.fullname" . }}
  labels:
    {{- include "go-echo515dd95d-3719-4cb9-b61b-621ebd49cde3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo515dd95d-3719-4cb9-b61b-621ebd49cde3.selectorLabels" . | nindent 6 }}
