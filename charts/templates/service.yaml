apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3d5b10cc-4869-4bb2-87b6-3afcce5643ed.fullname" . }}
  labels:
    {{- include "go-echo3d5b10cc-4869-4bb2-87b6-3afcce5643ed.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3d5b10cc-4869-4bb2-87b6-3afcce5643ed.selectorLabels" . | nindent 6 }}
