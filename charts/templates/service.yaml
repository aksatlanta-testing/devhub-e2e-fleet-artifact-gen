apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo56f79843-1ee1-4548-81a2-46613a6b80c8.fullname" . }}
  labels:
    {{- include "go-echo56f79843-1ee1-4548-81a2-46613a6b80c8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo56f79843-1ee1-4548-81a2-46613a6b80c8.selectorLabels" . | nindent 6 }}
