apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4d25bca5-e875-4985-8a32-4cd911ab4d8e.fullname" . }}
  labels:
    {{- include "go-echo4d25bca5-e875-4985-8a32-4cd911ab4d8e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4d25bca5-e875-4985-8a32-4cd911ab4d8e.selectorLabels" . | nindent 6 }}
