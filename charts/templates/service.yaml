apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo208ece03-e700-42bc-8fc8-b7dcf4c1f7ae.fullname" . }}
  labels:
    {{- include "go-echo208ece03-e700-42bc-8fc8-b7dcf4c1f7ae.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo208ece03-e700-42bc-8fc8-b7dcf4c1f7ae.selectorLabels" . | nindent 6 }}
