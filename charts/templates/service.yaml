apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3fcd596c-64f1-4254-b3b8-d32c45e4d0c1.fullname" . }}
  labels:
    {{- include "go-echo3fcd596c-64f1-4254-b3b8-d32c45e4d0c1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3fcd596c-64f1-4254-b3b8-d32c45e4d0c1.selectorLabels" . | nindent 6 }}
