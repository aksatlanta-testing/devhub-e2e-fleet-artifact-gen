apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo42827100-52ee-411b-b19b-f9aeb371a47e.fullname" . }}
  labels:
    {{- include "go-echo42827100-52ee-411b-b19b-f9aeb371a47e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo42827100-52ee-411b-b19b-f9aeb371a47e.selectorLabels" . | nindent 6 }}
