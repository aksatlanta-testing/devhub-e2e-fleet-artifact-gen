apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoffd92281-1143-4e2a-a5f1-3bbc09db1f0a.fullname" . }}
  labels:
    {{- include "go-echoffd92281-1143-4e2a-a5f1-3bbc09db1f0a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoffd92281-1143-4e2a-a5f1-3bbc09db1f0a.selectorLabels" . | nindent 6 }}
