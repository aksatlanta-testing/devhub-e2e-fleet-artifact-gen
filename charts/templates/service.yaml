apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0a5d8c01-c887-4b7e-91d4-883d5309430c.fullname" . }}
  labels:
    {{- include "go-echo0a5d8c01-c887-4b7e-91d4-883d5309430c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0a5d8c01-c887-4b7e-91d4-883d5309430c.selectorLabels" . | nindent 6 }}
