apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo95343e22-5d3f-4c55-8d26-f9b27678962b.fullname" . }}
  labels:
    {{- include "go-echo95343e22-5d3f-4c55-8d26-f9b27678962b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo95343e22-5d3f-4c55-8d26-f9b27678962b.selectorLabels" . | nindent 6 }}
