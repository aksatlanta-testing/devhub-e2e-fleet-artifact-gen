apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5670cadf-f7d1-4e75-a5ed-c41fa3080f32.fullname" . }}
  labels:
    {{- include "go-echo5670cadf-f7d1-4e75-a5ed-c41fa3080f32.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5670cadf-f7d1-4e75-a5ed-c41fa3080f32.selectorLabels" . | nindent 6 }}
