apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoed0a047b-c59e-4f57-a46d-e60d82e802ef.fullname" . }}
  labels:
    {{- include "go-echoed0a047b-c59e-4f57-a46d-e60d82e802ef.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoed0a047b-c59e-4f57-a46d-e60d82e802ef.selectorLabels" . | nindent 6 }}
