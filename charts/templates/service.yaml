apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo22a96680-41a8-4cb9-b7fc-5a9538ebb195.fullname" . }}
  labels:
    {{- include "go-echo22a96680-41a8-4cb9-b7fc-5a9538ebb195.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo22a96680-41a8-4cb9-b7fc-5a9538ebb195.selectorLabels" . | nindent 6 }}
