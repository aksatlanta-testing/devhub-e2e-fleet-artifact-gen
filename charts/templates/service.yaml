apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7c440d57-edf1-4aa5-8855-feb37756900c.fullname" . }}
  labels:
    {{- include "go-echo7c440d57-edf1-4aa5-8855-feb37756900c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7c440d57-edf1-4aa5-8855-feb37756900c.selectorLabels" . | nindent 6 }}
