apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1d64d429-4928-4b18-b70e-8b3a4ceb7c19.fullname" . }}
  labels:
    {{- include "go-echo1d64d429-4928-4b18-b70e-8b3a4ceb7c19.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1d64d429-4928-4b18-b70e-8b3a4ceb7c19.selectorLabels" . | nindent 6 }}
