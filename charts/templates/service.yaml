apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoae9ba407-c447-4d97-9e3b-5edc7c8d3a12.fullname" . }}
  labels:
    {{- include "go-echoae9ba407-c447-4d97-9e3b-5edc7c8d3a12.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoae9ba407-c447-4d97-9e3b-5edc7c8d3a12.selectorLabels" . | nindent 6 }}
