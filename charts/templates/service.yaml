apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9c9c26c2-c778-416b-9826-5471649c158a.fullname" . }}
  labels:
    {{- include "go-echo9c9c26c2-c778-416b-9826-5471649c158a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9c9c26c2-c778-416b-9826-5471649c158a.selectorLabels" . | nindent 6 }}
