apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8173edaa-9c13-44fe-8285-b70d2c1a7fe2.fullname" . }}
  labels:
    {{- include "go-echo8173edaa-9c13-44fe-8285-b70d2c1a7fe2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8173edaa-9c13-44fe-8285-b70d2c1a7fe2.selectorLabels" . | nindent 6 }}
