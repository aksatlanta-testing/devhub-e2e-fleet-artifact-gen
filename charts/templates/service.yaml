apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8d08797e-447f-4982-ba8c-c02ef3f4419c.fullname" . }}
  labels:
    {{- include "go-echo8d08797e-447f-4982-ba8c-c02ef3f4419c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8d08797e-447f-4982-ba8c-c02ef3f4419c.selectorLabels" . | nindent 6 }}
