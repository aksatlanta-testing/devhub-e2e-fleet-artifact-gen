apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8f07ebd7-3da6-4bac-8811-10ce590c2800.fullname" . }}
  labels:
    {{- include "go-echo8f07ebd7-3da6-4bac-8811-10ce590c2800.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8f07ebd7-3da6-4bac-8811-10ce590c2800.selectorLabels" . | nindent 6 }}
