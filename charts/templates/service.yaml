apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod13a3431-277f-4a41-83ef-772b29a67e18.fullname" . }}
  labels:
    {{- include "go-echod13a3431-277f-4a41-83ef-772b29a67e18.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod13a3431-277f-4a41-83ef-772b29a67e18.selectorLabels" . | nindent 6 }}
