apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6a5b15aa-1894-41e8-b181-554108a26e96.fullname" . }}
  labels:
    {{- include "go-echo6a5b15aa-1894-41e8-b181-554108a26e96.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6a5b15aa-1894-41e8-b181-554108a26e96.selectorLabels" . | nindent 6 }}
