apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod8ac2b2e-3877-42aa-b295-525dcfc0255d.fullname" . }}
  labels:
    {{- include "go-echod8ac2b2e-3877-42aa-b295-525dcfc0255d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod8ac2b2e-3877-42aa-b295-525dcfc0255d.selectorLabels" . | nindent 6 }}
