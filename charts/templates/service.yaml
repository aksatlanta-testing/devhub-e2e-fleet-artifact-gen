apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo102940b9-d541-45e7-900e-71e86d06fbb2.fullname" . }}
  labels:
    {{- include "go-echo102940b9-d541-45e7-900e-71e86d06fbb2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo102940b9-d541-45e7-900e-71e86d06fbb2.selectorLabels" . | nindent 6 }}
