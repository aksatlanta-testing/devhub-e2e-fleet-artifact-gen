apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo63fc3537-3d3f-4630-8c28-ae81672cdf03.fullname" . }}
  labels:
    {{- include "go-echo63fc3537-3d3f-4630-8c28-ae81672cdf03.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo63fc3537-3d3f-4630-8c28-ae81672cdf03.selectorLabels" . | nindent 6 }}
