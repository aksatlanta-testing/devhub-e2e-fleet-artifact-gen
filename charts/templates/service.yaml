apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa03345ba-9123-437a-8fa0-7447b7438277.fullname" . }}
  labels:
    {{- include "go-echoa03345ba-9123-437a-8fa0-7447b7438277.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa03345ba-9123-437a-8fa0-7447b7438277.selectorLabels" . | nindent 6 }}
