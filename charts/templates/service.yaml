apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3859cdc8-e0e0-451f-b789-8ce1f37917e3.fullname" . }}
  labels:
    {{- include "go-echo3859cdc8-e0e0-451f-b789-8ce1f37917e3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3859cdc8-e0e0-451f-b789-8ce1f37917e3.selectorLabels" . | nindent 6 }}
