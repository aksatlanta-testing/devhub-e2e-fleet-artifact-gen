apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2e9e7e8b-b245-4816-9934-43092334e8ee.fullname" . }}
  labels:
    {{- include "go-echo2e9e7e8b-b245-4816-9934-43092334e8ee.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2e9e7e8b-b245-4816-9934-43092334e8ee.selectorLabels" . | nindent 6 }}
