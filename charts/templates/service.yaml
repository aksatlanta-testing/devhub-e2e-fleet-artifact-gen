apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo511bac78-2a3c-49a2-bcc6-a625502db033.fullname" . }}
  labels:
    {{- include "go-echo511bac78-2a3c-49a2-bcc6-a625502db033.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo511bac78-2a3c-49a2-bcc6-a625502db033.selectorLabels" . | nindent 6 }}
