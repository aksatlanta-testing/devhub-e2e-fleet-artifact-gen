apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo790d3787-0ede-49ef-a5bd-ad189dd62912.fullname" . }}
  labels:
    {{- include "go-echo790d3787-0ede-49ef-a5bd-ad189dd62912.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo790d3787-0ede-49ef-a5bd-ad189dd62912.selectorLabels" . | nindent 6 }}
