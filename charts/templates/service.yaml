apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo795ebe71-4dc5-4524-bb8e-b3e9ba717246.fullname" . }}
  labels:
    {{- include "go-echo795ebe71-4dc5-4524-bb8e-b3e9ba717246.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo795ebe71-4dc5-4524-bb8e-b3e9ba717246.selectorLabels" . | nindent 6 }}
