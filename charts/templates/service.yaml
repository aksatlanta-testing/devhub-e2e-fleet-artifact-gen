apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoff21e782-a201-48f5-9b0c-5e24ec106dc1.fullname" . }}
  labels:
    {{- include "go-echoff21e782-a201-48f5-9b0c-5e24ec106dc1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoff21e782-a201-48f5-9b0c-5e24ec106dc1.selectorLabels" . | nindent 6 }}
