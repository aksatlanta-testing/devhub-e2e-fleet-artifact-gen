apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodd78a624-487e-4704-8cdf-c6af24023a6b.fullname" . }}
  labels:
    {{- include "go-echodd78a624-487e-4704-8cdf-c6af24023a6b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodd78a624-487e-4704-8cdf-c6af24023a6b.selectorLabels" . | nindent 6 }}
