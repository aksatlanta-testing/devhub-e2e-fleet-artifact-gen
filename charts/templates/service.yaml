apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof3456baa-44ca-4239-b6f2-c0f71f5eb59d.fullname" . }}
  labels:
    {{- include "go-echof3456baa-44ca-4239-b6f2-c0f71f5eb59d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof3456baa-44ca-4239-b6f2-c0f71f5eb59d.selectorLabels" . | nindent 6 }}
