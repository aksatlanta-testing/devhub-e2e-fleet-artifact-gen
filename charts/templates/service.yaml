apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8eeda659-3e48-4167-8529-0dcae49fe8ea.fullname" . }}
  labels:
    {{- include "go-echo8eeda659-3e48-4167-8529-0dcae49fe8ea.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8eeda659-3e48-4167-8529-0dcae49fe8ea.selectorLabels" . | nindent 6 }}
