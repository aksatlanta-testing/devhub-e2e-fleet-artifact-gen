apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo888561a0-30ed-44e7-a027-e22ece8552ab.fullname" . }}
  labels:
    {{- include "go-echo888561a0-30ed-44e7-a027-e22ece8552ab.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo888561a0-30ed-44e7-a027-e22ece8552ab.selectorLabels" . | nindent 6 }}
