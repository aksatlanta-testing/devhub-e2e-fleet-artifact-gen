apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe35ca931-0aec-48bb-ac3e-88a3ce49cc86.fullname" . }}
  labels:
    {{- include "go-echoe35ca931-0aec-48bb-ac3e-88a3ce49cc86.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe35ca931-0aec-48bb-ac3e-88a3ce49cc86.selectorLabels" . | nindent 6 }}
