apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo49f29ee8-bcc4-42b5-a7a3-9a96bda074d0.fullname" . }}
  labels:
    {{- include "go-echo49f29ee8-bcc4-42b5-a7a3-9a96bda074d0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo49f29ee8-bcc4-42b5-a7a3-9a96bda074d0.selectorLabels" . | nindent 6 }}
