apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo99b9c1e9-a0f3-4823-9b68-b401d9f42ab5.fullname" . }}
  labels:
    {{- include "go-echo99b9c1e9-a0f3-4823-9b68-b401d9f42ab5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo99b9c1e9-a0f3-4823-9b68-b401d9f42ab5.selectorLabels" . | nindent 6 }}
