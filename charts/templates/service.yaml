apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo83067606-d0dc-4ee6-b644-4a6024854558.fullname" . }}
  labels:
    {{- include "go-echo83067606-d0dc-4ee6-b644-4a6024854558.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo83067606-d0dc-4ee6-b644-4a6024854558.selectorLabels" . | nindent 6 }}
