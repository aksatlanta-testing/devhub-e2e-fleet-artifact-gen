apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1757b391-3f11-4ca8-95af-ec7cfcc4dded.fullname" . }}
  labels:
    {{- include "go-echo1757b391-3f11-4ca8-95af-ec7cfcc4dded.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1757b391-3f11-4ca8-95af-ec7cfcc4dded.selectorLabels" . | nindent 6 }}
