apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodf75e019-0c48-44a8-9b34-3e64098a0be2.fullname" . }}
  labels:
    {{- include "go-echodf75e019-0c48-44a8-9b34-3e64098a0be2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodf75e019-0c48-44a8-9b34-3e64098a0be2.selectorLabels" . | nindent 6 }}
