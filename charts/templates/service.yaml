apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo18e99cd0-c72e-4b9f-8e3b-2b5babdb631a.fullname" . }}
  labels:
    {{- include "go-echo18e99cd0-c72e-4b9f-8e3b-2b5babdb631a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo18e99cd0-c72e-4b9f-8e3b-2b5babdb631a.selectorLabels" . | nindent 6 }}
