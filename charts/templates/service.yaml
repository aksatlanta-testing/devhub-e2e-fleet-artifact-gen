apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob42b9680-b76b-43c6-8ca9-0cf7a21f4227.fullname" . }}
  labels:
    {{- include "go-echob42b9680-b76b-43c6-8ca9-0cf7a21f4227.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob42b9680-b76b-43c6-8ca9-0cf7a21f4227.selectorLabels" . | nindent 6 }}
