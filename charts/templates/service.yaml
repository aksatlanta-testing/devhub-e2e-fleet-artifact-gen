apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo65f40338-0f0e-43b5-a6c1-4e717c026eb0.fullname" . }}
  labels:
    {{- include "go-echo65f40338-0f0e-43b5-a6c1-4e717c026eb0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo65f40338-0f0e-43b5-a6c1-4e717c026eb0.selectorLabels" . | nindent 6 }}
