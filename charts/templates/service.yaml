apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo12fb21d0-cfae-44f0-85db-a81cb2e890d7.fullname" . }}
  labels:
    {{- include "go-echo12fb21d0-cfae-44f0-85db-a81cb2e890d7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo12fb21d0-cfae-44f0-85db-a81cb2e890d7.selectorLabels" . | nindent 6 }}
