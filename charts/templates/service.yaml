apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob2ccf38d-f9a7-4ca8-99e4-48d11f755181.fullname" . }}
  labels:
    {{- include "go-echob2ccf38d-f9a7-4ca8-99e4-48d11f755181.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob2ccf38d-f9a7-4ca8-99e4-48d11f755181.selectorLabels" . | nindent 6 }}
