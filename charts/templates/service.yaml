apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob6a8832b-0de0-46c1-b541-9b7493a34d9f.fullname" . }}
  labels:
    {{- include "go-echob6a8832b-0de0-46c1-b541-9b7493a34d9f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob6a8832b-0de0-46c1-b541-9b7493a34d9f.selectorLabels" . | nindent 6 }}
