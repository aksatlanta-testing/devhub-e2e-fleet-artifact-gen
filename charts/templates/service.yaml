apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe39adefe-9ded-463c-a02a-a525ed5e3879.fullname" . }}
  labels:
    {{- include "go-echoe39adefe-9ded-463c-a02a-a525ed5e3879.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe39adefe-9ded-463c-a02a-a525ed5e3879.selectorLabels" . | nindent 6 }}
