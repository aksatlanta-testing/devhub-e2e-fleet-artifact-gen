apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc8bdd0f9-b85b-44dc-ac4f-e950fcbd2bed.fullname" . }}
  labels:
    {{- include "go-echoc8bdd0f9-b85b-44dc-ac4f-e950fcbd2bed.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc8bdd0f9-b85b-44dc-ac4f-e950fcbd2bed.selectorLabels" . | nindent 6 }}
