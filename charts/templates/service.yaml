apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod664154a-f7f7-43e7-9bb6-4b342af0c15a.fullname" . }}
  labels:
    {{- include "go-echod664154a-f7f7-43e7-9bb6-4b342af0c15a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod664154a-f7f7-43e7-9bb6-4b342af0c15a.selectorLabels" . | nindent 6 }}
