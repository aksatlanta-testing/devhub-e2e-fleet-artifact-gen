apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3aa6840b-3acb-45df-a09c-905682d81324.fullname" . }}
  labels:
    {{- include "go-echo3aa6840b-3acb-45df-a09c-905682d81324.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3aa6840b-3acb-45df-a09c-905682d81324.selectorLabels" . | nindent 6 }}
