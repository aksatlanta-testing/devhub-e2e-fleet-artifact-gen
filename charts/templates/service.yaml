apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo23349105-a43d-470f-928a-c1b3cb271d4a.fullname" . }}
  labels:
    {{- include "go-echo23349105-a43d-470f-928a-c1b3cb271d4a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo23349105-a43d-470f-928a-c1b3cb271d4a.selectorLabels" . | nindent 6 }}
