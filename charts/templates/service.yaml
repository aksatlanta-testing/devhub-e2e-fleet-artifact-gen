apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo55aeec84-8ac1-4a90-888a-321dfd85abb6.fullname" . }}
  labels:
    {{- include "go-echo55aeec84-8ac1-4a90-888a-321dfd85abb6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo55aeec84-8ac1-4a90-888a-321dfd85abb6.selectorLabels" . | nindent 6 }}
