apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo60c477f2-1a08-45b9-b86d-2820b428f44b.fullname" . }}
  labels:
    {{- include "go-echo60c477f2-1a08-45b9-b86d-2820b428f44b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo60c477f2-1a08-45b9-b86d-2820b428f44b.selectorLabels" . | nindent 6 }}
