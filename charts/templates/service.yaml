apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocc96917e-cd19-4030-b082-ea31e605fc0d.fullname" . }}
  labels:
    {{- include "go-echocc96917e-cd19-4030-b082-ea31e605fc0d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocc96917e-cd19-4030-b082-ea31e605fc0d.selectorLabels" . | nindent 6 }}
