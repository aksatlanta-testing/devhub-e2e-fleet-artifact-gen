apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa0cf1207-87a8-45a9-a863-c6132eab06b2.fullname" . }}
  labels:
    {{- include "go-echoa0cf1207-87a8-45a9-a863-c6132eab06b2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa0cf1207-87a8-45a9-a863-c6132eab06b2.selectorLabels" . | nindent 6 }}
