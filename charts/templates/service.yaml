apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa47f045f-dd13-41db-8484-788ef9ae4bea.fullname" . }}
  labels:
    {{- include "go-echoa47f045f-dd13-41db-8484-788ef9ae4bea.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa47f045f-dd13-41db-8484-788ef9ae4bea.selectorLabels" . | nindent 6 }}
