apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofcb8c1a8-8699-4be1-a1b1-75c5d3f32ce7.fullname" . }}
  labels:
    {{- include "go-echofcb8c1a8-8699-4be1-a1b1-75c5d3f32ce7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofcb8c1a8-8699-4be1-a1b1-75c5d3f32ce7.selectorLabels" . | nindent 6 }}
