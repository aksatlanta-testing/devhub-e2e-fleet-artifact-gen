apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobca6101c-9cc2-4fca-8dd3-a2bf4479928c.fullname" . }}
  labels:
    {{- include "go-echobca6101c-9cc2-4fca-8dd3-a2bf4479928c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobca6101c-9cc2-4fca-8dd3-a2bf4479928c.selectorLabels" . | nindent 6 }}
