apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc0734779-d0ef-4df3-a001-2109f6e00ed0.fullname" . }}
  labels:
    {{- include "go-echoc0734779-d0ef-4df3-a001-2109f6e00ed0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc0734779-d0ef-4df3-a001-2109f6e00ed0.selectorLabels" . | nindent 6 }}
