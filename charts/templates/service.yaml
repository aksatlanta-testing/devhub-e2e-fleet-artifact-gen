apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo58282029-9b78-4117-baba-62cd60b5745e.fullname" . }}
  labels:
    {{- include "go-echo58282029-9b78-4117-baba-62cd60b5745e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo58282029-9b78-4117-baba-62cd60b5745e.selectorLabels" . | nindent 6 }}
