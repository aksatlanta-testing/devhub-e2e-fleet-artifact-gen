apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaa75ecf8-7bab-47ee-81b6-eb03fbae8be2.fullname" . }}
  labels:
    {{- include "go-echoaa75ecf8-7bab-47ee-81b6-eb03fbae8be2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaa75ecf8-7bab-47ee-81b6-eb03fbae8be2.selectorLabels" . | nindent 6 }}
