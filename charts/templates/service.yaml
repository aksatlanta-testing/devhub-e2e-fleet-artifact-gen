apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod8ad8a76-f02d-4fda-842b-b4f85aaf73bd.fullname" . }}
  labels:
    {{- include "go-echod8ad8a76-f02d-4fda-842b-b4f85aaf73bd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod8ad8a76-f02d-4fda-842b-b4f85aaf73bd.selectorLabels" . | nindent 6 }}
