apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoeb471c6d-81c2-4059-9d46-95e24cc48775.fullname" . }}
  labels:
    {{- include "go-echoeb471c6d-81c2-4059-9d46-95e24cc48775.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoeb471c6d-81c2-4059-9d46-95e24cc48775.selectorLabels" . | nindent 6 }}
