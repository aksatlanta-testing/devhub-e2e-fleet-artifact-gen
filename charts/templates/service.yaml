apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo80b55405-e59f-4af8-8538-d101aeff6657.fullname" . }}
  labels:
    {{- include "go-echo80b55405-e59f-4af8-8538-d101aeff6657.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo80b55405-e59f-4af8-8538-d101aeff6657.selectorLabels" . | nindent 6 }}
