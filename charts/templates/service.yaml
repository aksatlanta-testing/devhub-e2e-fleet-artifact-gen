apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo94c9ca1a-9c74-40a4-bb55-ae9f010885b6.fullname" . }}
  labels:
    {{- include "go-echo94c9ca1a-9c74-40a4-bb55-ae9f010885b6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo94c9ca1a-9c74-40a4-bb55-ae9f010885b6.selectorLabels" . | nindent 6 }}
