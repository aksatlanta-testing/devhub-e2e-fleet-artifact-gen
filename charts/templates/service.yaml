apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo637dc100-e5de-4548-9f59-c9c8d7b59aef.fullname" . }}
  labels:
    {{- include "go-echo637dc100-e5de-4548-9f59-c9c8d7b59aef.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo637dc100-e5de-4548-9f59-c9c8d7b59aef.selectorLabels" . | nindent 6 }}
