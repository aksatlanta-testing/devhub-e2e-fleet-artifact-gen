apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo502d1e10-9427-4a35-8d54-c6b49c926744.fullname" . }}
  labels:
    {{- include "go-echo502d1e10-9427-4a35-8d54-c6b49c926744.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo502d1e10-9427-4a35-8d54-c6b49c926744.selectorLabels" . | nindent 6 }}
