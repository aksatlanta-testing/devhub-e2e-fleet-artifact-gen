apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoac3c1aa3-6481-4bd1-82e9-db31878220eb.fullname" . }}
  labels:
    {{- include "go-echoac3c1aa3-6481-4bd1-82e9-db31878220eb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoac3c1aa3-6481-4bd1-82e9-db31878220eb.selectorLabels" . | nindent 6 }}
