apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo67a5ac12-1957-4b44-acc3-b500667ab185.fullname" . }}
  labels:
    {{- include "go-echo67a5ac12-1957-4b44-acc3-b500667ab185.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo67a5ac12-1957-4b44-acc3-b500667ab185.selectorLabels" . | nindent 6 }}
