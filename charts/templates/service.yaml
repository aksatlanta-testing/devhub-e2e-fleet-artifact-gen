apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob40f1936-caa1-4f4e-b466-23eccd6c2b4c.fullname" . }}
  labels:
    {{- include "go-echob40f1936-caa1-4f4e-b466-23eccd6c2b4c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob40f1936-caa1-4f4e-b466-23eccd6c2b4c.selectorLabels" . | nindent 6 }}
