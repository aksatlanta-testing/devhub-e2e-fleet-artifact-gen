apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo81132f13-f513-4fb1-b251-a16b82480b70.fullname" . }}
  labels:
    {{- include "go-echo81132f13-f513-4fb1-b251-a16b82480b70.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo81132f13-f513-4fb1-b251-a16b82480b70.selectorLabels" . | nindent 6 }}
