apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe5b7b874-ee44-4051-8192-3d0a7474de9f.fullname" . }}
  labels:
    {{- include "go-echoe5b7b874-ee44-4051-8192-3d0a7474de9f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe5b7b874-ee44-4051-8192-3d0a7474de9f.selectorLabels" . | nindent 6 }}
