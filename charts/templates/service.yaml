apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo93883a20-097d-4cab-b255-0c0426bf41ff.fullname" . }}
  labels:
    {{- include "go-echo93883a20-097d-4cab-b255-0c0426bf41ff.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo93883a20-097d-4cab-b255-0c0426bf41ff.selectorLabels" . | nindent 6 }}
