apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocc646e0e-16a3-4260-9806-2cb561f29b66.fullname" . }}
  labels:
    {{- include "go-echocc646e0e-16a3-4260-9806-2cb561f29b66.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocc646e0e-16a3-4260-9806-2cb561f29b66.selectorLabels" . | nindent 6 }}
