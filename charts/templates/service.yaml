apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo12a57327-6ef3-4739-8bed-0c59b2cda44e.fullname" . }}
  labels:
    {{- include "go-echo12a57327-6ef3-4739-8bed-0c59b2cda44e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo12a57327-6ef3-4739-8bed-0c59b2cda44e.selectorLabels" . | nindent 6 }}
