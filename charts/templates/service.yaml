apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5913eb7a-a25a-403b-8bd3-bb8909bde151.fullname" . }}
  labels:
    {{- include "go-echo5913eb7a-a25a-403b-8bd3-bb8909bde151.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5913eb7a-a25a-403b-8bd3-bb8909bde151.selectorLabels" . | nindent 6 }}
