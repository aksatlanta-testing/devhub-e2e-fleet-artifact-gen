apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo894ee24d-d669-4d99-a979-e9fddd4c35c6.fullname" . }}
  labels:
    {{- include "go-echo894ee24d-d669-4d99-a979-e9fddd4c35c6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo894ee24d-d669-4d99-a979-e9fddd4c35c6.selectorLabels" . | nindent 6 }}
