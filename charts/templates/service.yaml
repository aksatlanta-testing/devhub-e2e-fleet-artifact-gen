apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3cf79b31-0885-4c69-9429-5dfd5aacf46e.fullname" . }}
  labels:
    {{- include "go-echo3cf79b31-0885-4c69-9429-5dfd5aacf46e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3cf79b31-0885-4c69-9429-5dfd5aacf46e.selectorLabels" . | nindent 6 }}
