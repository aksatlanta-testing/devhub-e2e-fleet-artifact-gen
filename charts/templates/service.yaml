apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo127c69b8-e0f1-4a3d-bfec-02779aee2455.fullname" . }}
  labels:
    {{- include "go-echo127c69b8-e0f1-4a3d-bfec-02779aee2455.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo127c69b8-e0f1-4a3d-bfec-02779aee2455.selectorLabels" . | nindent 6 }}
