apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoded643fe-9158-4f66-b7ba-10bd1ac0aad5.fullname" . }}
  labels:
    {{- include "go-echoded643fe-9158-4f66-b7ba-10bd1ac0aad5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoded643fe-9158-4f66-b7ba-10bd1ac0aad5.selectorLabels" . | nindent 6 }}
