apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo04412fd6-b496-45aa-b293-efadfcebbf88.fullname" . }}
  labels:
    {{- include "go-echo04412fd6-b496-45aa-b293-efadfcebbf88.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo04412fd6-b496-45aa-b293-efadfcebbf88.selectorLabels" . | nindent 6 }}
