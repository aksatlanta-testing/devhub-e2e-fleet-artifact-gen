apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8851bf85-6658-4f6a-a9e2-68245a7e5d06.fullname" . }}
  labels:
    {{- include "go-echo8851bf85-6658-4f6a-a9e2-68245a7e5d06.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8851bf85-6658-4f6a-a9e2-68245a7e5d06.selectorLabels" . | nindent 6 }}
