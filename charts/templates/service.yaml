apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaed7cadb-4443-4178-add0-18051c6183f2.fullname" . }}
  labels:
    {{- include "go-echoaed7cadb-4443-4178-add0-18051c6183f2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaed7cadb-4443-4178-add0-18051c6183f2.selectorLabels" . | nindent 6 }}
