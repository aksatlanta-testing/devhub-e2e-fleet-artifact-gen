apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoec646ece-628e-453d-a17f-12952fb31797.fullname" . }}
  labels:
    {{- include "go-echoec646ece-628e-453d-a17f-12952fb31797.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoec646ece-628e-453d-a17f-12952fb31797.selectorLabels" . | nindent 6 }}
