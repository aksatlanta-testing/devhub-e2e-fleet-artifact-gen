apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofcd37c28-7a71-4d03-9eed-43a7cf02343c.fullname" . }}
  labels:
    {{- include "go-echofcd37c28-7a71-4d03-9eed-43a7cf02343c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofcd37c28-7a71-4d03-9eed-43a7cf02343c.selectorLabels" . | nindent 6 }}
