apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo788968f5-df0c-4dff-aa81-cc96ddf386c9.fullname" . }}
  labels:
    {{- include "go-echo788968f5-df0c-4dff-aa81-cc96ddf386c9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo788968f5-df0c-4dff-aa81-cc96ddf386c9.selectorLabels" . | nindent 6 }}
