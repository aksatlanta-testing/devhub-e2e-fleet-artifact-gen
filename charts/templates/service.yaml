apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2014c409-f844-4595-8f61-444fbbf9ab0c.fullname" . }}
  labels:
    {{- include "go-echo2014c409-f844-4595-8f61-444fbbf9ab0c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2014c409-f844-4595-8f61-444fbbf9ab0c.selectorLabels" . | nindent 6 }}
