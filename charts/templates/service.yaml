apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7754cd82-d008-4d13-9ec7-d3ead0dd4d10.fullname" . }}
  labels:
    {{- include "go-echo7754cd82-d008-4d13-9ec7-d3ead0dd4d10.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7754cd82-d008-4d13-9ec7-d3ead0dd4d10.selectorLabels" . | nindent 6 }}
