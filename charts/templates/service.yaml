apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo59d1fd78-0529-4594-8ad5-fc6bbad8ed8d.fullname" . }}
  labels:
    {{- include "go-echo59d1fd78-0529-4594-8ad5-fc6bbad8ed8d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo59d1fd78-0529-4594-8ad5-fc6bbad8ed8d.selectorLabels" . | nindent 6 }}
