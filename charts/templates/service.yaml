apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7440edf6-fd0b-4947-a9ea-69d9a80dac19.fullname" . }}
  labels:
    {{- include "go-echo7440edf6-fd0b-4947-a9ea-69d9a80dac19.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7440edf6-fd0b-4947-a9ea-69d9a80dac19.selectorLabels" . | nindent 6 }}
