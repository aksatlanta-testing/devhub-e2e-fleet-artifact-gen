apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoba01ab62-0807-4c7f-8641-95f266209c5b.fullname" . }}
  labels:
    {{- include "go-echoba01ab62-0807-4c7f-8641-95f266209c5b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoba01ab62-0807-4c7f-8641-95f266209c5b.selectorLabels" . | nindent 6 }}
