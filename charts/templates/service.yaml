apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo213b2f2c-45f8-4999-b690-6bdd5160df1f.fullname" . }}
  labels:
    {{- include "go-echo213b2f2c-45f8-4999-b690-6bdd5160df1f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo213b2f2c-45f8-4999-b690-6bdd5160df1f.selectorLabels" . | nindent 6 }}
