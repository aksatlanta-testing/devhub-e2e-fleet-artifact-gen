apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe8e01c76-2be6-4600-852a-48494d339a5b.fullname" . }}
  labels:
    {{- include "go-echoe8e01c76-2be6-4600-852a-48494d339a5b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe8e01c76-2be6-4600-852a-48494d339a5b.selectorLabels" . | nindent 6 }}
