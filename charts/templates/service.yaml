apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo72414e7c-1afe-41c1-a499-083b11e2974d.fullname" . }}
  labels:
    {{- include "go-echo72414e7c-1afe-41c1-a499-083b11e2974d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo72414e7c-1afe-41c1-a499-083b11e2974d.selectorLabels" . | nindent 6 }}
