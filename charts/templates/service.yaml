apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4ef21c3d-9c6e-4e46-9d1d-d7df9876942e.fullname" . }}
  labels:
    {{- include "go-echo4ef21c3d-9c6e-4e46-9d1d-d7df9876942e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4ef21c3d-9c6e-4e46-9d1d-d7df9876942e.selectorLabels" . | nindent 6 }}
