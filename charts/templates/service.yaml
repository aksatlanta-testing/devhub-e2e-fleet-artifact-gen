apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo95fcaaa4-ec29-4c67-a0f4-00a5bd2b70f2.fullname" . }}
  labels:
    {{- include "go-echo95fcaaa4-ec29-4c67-a0f4-00a5bd2b70f2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo95fcaaa4-ec29-4c67-a0f4-00a5bd2b70f2.selectorLabels" . | nindent 6 }}
