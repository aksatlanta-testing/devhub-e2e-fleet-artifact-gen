apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo01dadfb0-728e-4621-85a3-2e7e0d8e43f0.fullname" . }}
  labels:
    {{- include "go-echo01dadfb0-728e-4621-85a3-2e7e0d8e43f0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo01dadfb0-728e-4621-85a3-2e7e0d8e43f0.selectorLabels" . | nindent 6 }}
