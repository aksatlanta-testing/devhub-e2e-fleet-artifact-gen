apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8a022f23-ae41-4460-b2f0-9e9c24a0c0d7.fullname" . }}
  labels:
    {{- include "go-echo8a022f23-ae41-4460-b2f0-9e9c24a0c0d7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8a022f23-ae41-4460-b2f0-9e9c24a0c0d7.selectorLabels" . | nindent 6 }}
