apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo488134d8-c598-4726-b409-221ca311b317.fullname" . }}
  labels:
    {{- include "go-echo488134d8-c598-4726-b409-221ca311b317.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo488134d8-c598-4726-b409-221ca311b317.selectorLabels" . | nindent 6 }}
