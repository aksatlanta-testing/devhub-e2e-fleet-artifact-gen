apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocbd2ce3e-44a3-40d4-b49b-6c56fcfc5934.fullname" . }}
  labels:
    {{- include "go-echocbd2ce3e-44a3-40d4-b49b-6c56fcfc5934.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocbd2ce3e-44a3-40d4-b49b-6c56fcfc5934.selectorLabels" . | nindent 6 }}
