apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe11b464d-3595-4f59-91f0-aa3d1a3cb56d.fullname" . }}
  labels:
    {{- include "go-echoe11b464d-3595-4f59-91f0-aa3d1a3cb56d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe11b464d-3595-4f59-91f0-aa3d1a3cb56d.selectorLabels" . | nindent 6 }}
