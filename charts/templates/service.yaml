apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo75f9a908-fb2c-45a7-953e-0489626db4d5.fullname" . }}
  labels:
    {{- include "go-echo75f9a908-fb2c-45a7-953e-0489626db4d5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo75f9a908-fb2c-45a7-953e-0489626db4d5.selectorLabels" . | nindent 6 }}
