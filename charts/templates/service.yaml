apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0ddd28cb-991b-4220-ad33-ebdde5c13ee0.fullname" . }}
  labels:
    {{- include "go-echo0ddd28cb-991b-4220-ad33-ebdde5c13ee0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0ddd28cb-991b-4220-ad33-ebdde5c13ee0.selectorLabels" . | nindent 6 }}
