apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo625d31bb-8d6d-4734-8182-87b80c093b32.fullname" . }}
  labels:
    {{- include "go-echo625d31bb-8d6d-4734-8182-87b80c093b32.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo625d31bb-8d6d-4734-8182-87b80c093b32.selectorLabels" . | nindent 6 }}
