apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa2af7d3f-a951-44f3-91c0-cfa042d81050.fullname" . }}
  labels:
    {{- include "go-echoa2af7d3f-a951-44f3-91c0-cfa042d81050.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa2af7d3f-a951-44f3-91c0-cfa042d81050.selectorLabels" . | nindent 6 }}
