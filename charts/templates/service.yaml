apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod5b61bbb-6394-41cd-ab76-b72a18ea8d6f.fullname" . }}
  labels:
    {{- include "go-echod5b61bbb-6394-41cd-ab76-b72a18ea8d6f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod5b61bbb-6394-41cd-ab76-b72a18ea8d6f.selectorLabels" . | nindent 6 }}
