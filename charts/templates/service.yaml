apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo713586a8-62c9-42e3-ac8d-924318357031.fullname" . }}
  labels:
    {{- include "go-echo713586a8-62c9-42e3-ac8d-924318357031.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo713586a8-62c9-42e3-ac8d-924318357031.selectorLabels" . | nindent 6 }}
