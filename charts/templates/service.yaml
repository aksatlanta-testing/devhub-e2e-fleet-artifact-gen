apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5c9baa01-46d0-4c91-b23a-a5b027e8ac96.fullname" . }}
  labels:
    {{- include "go-echo5c9baa01-46d0-4c91-b23a-a5b027e8ac96.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5c9baa01-46d0-4c91-b23a-a5b027e8ac96.selectorLabels" . | nindent 6 }}
