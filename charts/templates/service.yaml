apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1d45cc07-31eb-42c8-aefb-4eaff15dc281.fullname" . }}
  labels:
    {{- include "go-echo1d45cc07-31eb-42c8-aefb-4eaff15dc281.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1d45cc07-31eb-42c8-aefb-4eaff15dc281.selectorLabels" . | nindent 6 }}
