apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0e58432b-9b27-4ecf-8c08-6de3a0d5fd2c.fullname" . }}
  labels:
    {{- include "go-echo0e58432b-9b27-4ecf-8c08-6de3a0d5fd2c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0e58432b-9b27-4ecf-8c08-6de3a0d5fd2c.selectorLabels" . | nindent 6 }}
