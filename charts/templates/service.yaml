apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof64a833d-6dcd-4611-a231-b9cbb06488c3.fullname" . }}
  labels:
    {{- include "go-echof64a833d-6dcd-4611-a231-b9cbb06488c3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof64a833d-6dcd-4611-a231-b9cbb06488c3.selectorLabels" . | nindent 6 }}
