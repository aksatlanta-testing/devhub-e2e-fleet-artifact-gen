apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo92b92284-aca5-46c1-b176-10e9c4dadcb0.fullname" . }}
  labels:
    {{- include "go-echo92b92284-aca5-46c1-b176-10e9c4dadcb0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo92b92284-aca5-46c1-b176-10e9c4dadcb0.selectorLabels" . | nindent 6 }}
