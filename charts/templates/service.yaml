apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo69c86284-7101-4609-ac25-1bad650af4fe.fullname" . }}
  labels:
    {{- include "go-echo69c86284-7101-4609-ac25-1bad650af4fe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo69c86284-7101-4609-ac25-1bad650af4fe.selectorLabels" . | nindent 6 }}
