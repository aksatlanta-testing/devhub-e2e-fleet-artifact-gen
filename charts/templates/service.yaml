apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo62b7a73c-6183-4522-876a-1b6f718f8a09.fullname" . }}
  labels:
    {{- include "go-echo62b7a73c-6183-4522-876a-1b6f718f8a09.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo62b7a73c-6183-4522-876a-1b6f718f8a09.selectorLabels" . | nindent 6 }}
