apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7069cc09-8be7-4573-a7fa-38796af99dd0.fullname" . }}
  labels:
    {{- include "go-echo7069cc09-8be7-4573-a7fa-38796af99dd0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7069cc09-8be7-4573-a7fa-38796af99dd0.selectorLabels" . | nindent 6 }}
