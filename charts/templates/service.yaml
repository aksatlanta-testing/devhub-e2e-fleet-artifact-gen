apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1f9101c8-3b1f-4155-a6a5-caa14ff3d5b4.fullname" . }}
  labels:
    {{- include "go-echo1f9101c8-3b1f-4155-a6a5-caa14ff3d5b4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1f9101c8-3b1f-4155-a6a5-caa14ff3d5b4.selectorLabels" . | nindent 6 }}
