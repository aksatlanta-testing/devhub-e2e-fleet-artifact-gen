apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa1b239db-1825-4674-af16-5630b6e316b8.fullname" . }}
  labels:
    {{- include "go-echoa1b239db-1825-4674-af16-5630b6e316b8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa1b239db-1825-4674-af16-5630b6e316b8.selectorLabels" . | nindent 6 }}
