apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo716ca7f2-dda2-4fc1-b508-bdcf8ed15df0.fullname" . }}
  labels:
    {{- include "go-echo716ca7f2-dda2-4fc1-b508-bdcf8ed15df0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo716ca7f2-dda2-4fc1-b508-bdcf8ed15df0.selectorLabels" . | nindent 6 }}
