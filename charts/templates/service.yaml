apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo632be41e-d302-4a71-b92b-fa80471065b4.fullname" . }}
  labels:
    {{- include "go-echo632be41e-d302-4a71-b92b-fa80471065b4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo632be41e-d302-4a71-b92b-fa80471065b4.selectorLabels" . | nindent 6 }}
