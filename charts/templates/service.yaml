apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo97813738-24e0-4ff9-8cd0-aa532be6275b.fullname" . }}
  labels:
    {{- include "go-echo97813738-24e0-4ff9-8cd0-aa532be6275b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo97813738-24e0-4ff9-8cd0-aa532be6275b.selectorLabels" . | nindent 6 }}
