apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5290f971-45f0-44c6-bf36-cbccfc53d32f.fullname" . }}
  labels:
    {{- include "go-echo5290f971-45f0-44c6-bf36-cbccfc53d32f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5290f971-45f0-44c6-bf36-cbccfc53d32f.selectorLabels" . | nindent 6 }}
