apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo25637f1d-722c-4a51-979a-c57e6494bd2f.fullname" . }}
  labels:
    {{- include "go-echo25637f1d-722c-4a51-979a-c57e6494bd2f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
