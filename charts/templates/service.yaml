apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofe81781f-89fc-49f4-8d32-095abeaade16.fullname" . }}
  labels:
    {{- include "go-echofe81781f-89fc-49f4-8d32-095abeaade16.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofe81781f-89fc-49f4-8d32-095abeaade16.selectorLabels" . | nindent 6 }}
