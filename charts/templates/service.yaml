apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa4ee4c9d-770c-4d5d-b4fc-b70f45e9baa9.fullname" . }}
  labels:
    {{- include "go-echoa4ee4c9d-770c-4d5d-b4fc-b70f45e9baa9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa4ee4c9d-770c-4d5d-b4fc-b70f45e9baa9.selectorLabels" . | nindent 6 }}
