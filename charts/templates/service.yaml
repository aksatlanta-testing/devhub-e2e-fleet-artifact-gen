apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo384ba170-9390-46a4-8f8e-47b7db2a9f0d.fullname" . }}
  labels:
    {{- include "go-echo384ba170-9390-46a4-8f8e-47b7db2a9f0d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo384ba170-9390-46a4-8f8e-47b7db2a9f0d.selectorLabels" . | nindent 6 }}
