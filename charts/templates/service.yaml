apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2a32e005-84d0-4d89-90e1-e118e7c07ee0.fullname" . }}
  labels:
    {{- include "go-echo2a32e005-84d0-4d89-90e1-e118e7c07ee0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2a32e005-84d0-4d89-90e1-e118e7c07ee0.selectorLabels" . | nindent 6 }}
