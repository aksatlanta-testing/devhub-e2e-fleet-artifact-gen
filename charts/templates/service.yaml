apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc0feb023-7710-42e7-8a24-a5d9b94383d8.fullname" . }}
  labels:
    {{- include "go-echoc0feb023-7710-42e7-8a24-a5d9b94383d8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc0feb023-7710-42e7-8a24-a5d9b94383d8.selectorLabels" . | nindent 6 }}
