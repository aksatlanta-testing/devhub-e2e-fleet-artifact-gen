apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof81b0037-e7c1-4cfd-921c-1855fae8599b.fullname" . }}
  labels:
    {{- include "go-echof81b0037-e7c1-4cfd-921c-1855fae8599b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof81b0037-e7c1-4cfd-921c-1855fae8599b.selectorLabels" . | nindent 6 }}
