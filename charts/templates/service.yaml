apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof888c922-148d-4356-b15b-d7b92c88d369.fullname" . }}
  labels:
    {{- include "go-echof888c922-148d-4356-b15b-d7b92c88d369.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof888c922-148d-4356-b15b-d7b92c88d369.selectorLabels" . | nindent 6 }}
