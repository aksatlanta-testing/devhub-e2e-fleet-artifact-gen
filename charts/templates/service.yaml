apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9edffaa9-8036-4afd-8b24-60c83f66b890.fullname" . }}
  labels:
    {{- include "go-echo9edffaa9-8036-4afd-8b24-60c83f66b890.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9edffaa9-8036-4afd-8b24-60c83f66b890.selectorLabels" . | nindent 6 }}
