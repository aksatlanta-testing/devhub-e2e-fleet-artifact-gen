apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4fbc589a-abd2-4b2d-8527-0687556ae12e.fullname" . }}
  labels:
    {{- include "go-echo4fbc589a-abd2-4b2d-8527-0687556ae12e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4fbc589a-abd2-4b2d-8527-0687556ae12e.selectorLabels" . | nindent 6 }}
