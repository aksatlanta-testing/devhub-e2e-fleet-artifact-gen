apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod7724ab6-7667-468c-b05d-b1ab032949aa.fullname" . }}
  labels:
    {{- include "go-echod7724ab6-7667-468c-b05d-b1ab032949aa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod7724ab6-7667-468c-b05d-b1ab032949aa.selectorLabels" . | nindent 6 }}
