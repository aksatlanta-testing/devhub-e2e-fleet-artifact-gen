apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo920a5e8b-afb7-4117-8282-18e0b10205da.fullname" . }}
  labels:
    {{- include "go-echo920a5e8b-afb7-4117-8282-18e0b10205da.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo920a5e8b-afb7-4117-8282-18e0b10205da.selectorLabels" . | nindent 6 }}
