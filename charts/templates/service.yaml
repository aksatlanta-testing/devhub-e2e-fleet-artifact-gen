apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo560a2e1f-c138-4f52-8d31-c7f264551b9e.fullname" . }}
  labels:
    {{- include "go-echo560a2e1f-c138-4f52-8d31-c7f264551b9e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo560a2e1f-c138-4f52-8d31-c7f264551b9e.selectorLabels" . | nindent 6 }}
