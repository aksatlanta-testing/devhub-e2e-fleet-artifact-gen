apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8294bf5c-5200-44a4-8e94-4a879c98df66.fullname" . }}
  labels:
    {{- include "go-echo8294bf5c-5200-44a4-8e94-4a879c98df66.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8294bf5c-5200-44a4-8e94-4a879c98df66.selectorLabels" . | nindent 6 }}
