apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo581c749b-43a2-4d59-9beb-e6c9194c174d.fullname" . }}
  labels:
    {{- include "go-echo581c749b-43a2-4d59-9beb-e6c9194c174d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo581c749b-43a2-4d59-9beb-e6c9194c174d.selectorLabels" . | nindent 6 }}
