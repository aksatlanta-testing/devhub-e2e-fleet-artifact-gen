apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo67567c2f-f374-46f8-88bb-ba2b58aaa594.fullname" . }}
  labels:
    {{- include "go-echo67567c2f-f374-46f8-88bb-ba2b58aaa594.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo67567c2f-f374-46f8-88bb-ba2b58aaa594.selectorLabels" . | nindent 6 }}
