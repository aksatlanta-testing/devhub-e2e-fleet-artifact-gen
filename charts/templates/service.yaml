apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe18c0b2f-b707-4ed8-814b-aabfd5f35ade.fullname" . }}
  labels:
    {{- include "go-echoe18c0b2f-b707-4ed8-814b-aabfd5f35ade.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe18c0b2f-b707-4ed8-814b-aabfd5f35ade.selectorLabels" . | nindent 6 }}
