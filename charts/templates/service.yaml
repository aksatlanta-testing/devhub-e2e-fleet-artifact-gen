apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo44a521d4-7275-4c5f-b434-272edd1512fb.fullname" . }}
  labels:
    {{- include "go-echo44a521d4-7275-4c5f-b434-272edd1512fb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo44a521d4-7275-4c5f-b434-272edd1512fb.selectorLabels" . | nindent 6 }}
