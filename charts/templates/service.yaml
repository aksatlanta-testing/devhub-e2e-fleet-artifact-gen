apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1c9f53a6-14bb-43e8-943f-6f33111c9b00.fullname" . }}
  labels:
    {{- include "go-echo1c9f53a6-14bb-43e8-943f-6f33111c9b00.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1c9f53a6-14bb-43e8-943f-6f33111c9b00.selectorLabels" . | nindent 6 }}
