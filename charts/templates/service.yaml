apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe71d33dd-6d64-45e4-ab44-856582b7d52e.fullname" . }}
  labels:
    {{- include "go-echoe71d33dd-6d64-45e4-ab44-856582b7d52e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe71d33dd-6d64-45e4-ab44-856582b7d52e.selectorLabels" . | nindent 6 }}
