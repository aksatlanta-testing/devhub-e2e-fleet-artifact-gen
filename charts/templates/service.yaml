apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3d782a20-fbaa-4cdb-82db-004a5611d511.fullname" . }}
  labels:
    {{- include "go-echo3d782a20-fbaa-4cdb-82db-004a5611d511.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3d782a20-fbaa-4cdb-82db-004a5611d511.selectorLabels" . | nindent 6 }}
