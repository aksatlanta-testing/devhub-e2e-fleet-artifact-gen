apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo869fa833-8f80-499e-9062-e9b356191a42.fullname" . }}
  labels:
    {{- include "go-echo869fa833-8f80-499e-9062-e9b356191a42.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo869fa833-8f80-499e-9062-e9b356191a42.selectorLabels" . | nindent 6 }}
