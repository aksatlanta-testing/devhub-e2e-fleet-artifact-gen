apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo04939c2f-b5b8-46d9-b0e3-cd4d87f5eaa8.fullname" . }}
  labels:
    {{- include "go-echo04939c2f-b5b8-46d9-b0e3-cd4d87f5eaa8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo04939c2f-b5b8-46d9-b0e3-cd4d87f5eaa8.selectorLabels" . | nindent 6 }}
