apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod1e71961-dcb9-411b-ab11-a9faa7d5b405.fullname" . }}
  labels:
    {{- include "go-echod1e71961-dcb9-411b-ab11-a9faa7d5b405.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod1e71961-dcb9-411b-ab11-a9faa7d5b405.selectorLabels" . | nindent 6 }}
