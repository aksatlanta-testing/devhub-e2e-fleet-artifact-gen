apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo78529bfa-a3ba-4d71-ba63-8aa89f29ff22.fullname" . }}
  labels:
    {{- include "go-echo78529bfa-a3ba-4d71-ba63-8aa89f29ff22.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo78529bfa-a3ba-4d71-ba63-8aa89f29ff22.selectorLabels" . | nindent 6 }}
