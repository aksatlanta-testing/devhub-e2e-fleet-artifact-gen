apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc282385f-5a1e-4430-8f1f-900c85ffab9b.fullname" . }}
  labels:
    {{- include "go-echoc282385f-5a1e-4430-8f1f-900c85ffab9b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc282385f-5a1e-4430-8f1f-900c85ffab9b.selectorLabels" . | nindent 6 }}
