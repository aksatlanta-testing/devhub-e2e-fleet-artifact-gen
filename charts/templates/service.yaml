apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo907881c3-465a-41f3-895e-b90f8d14d77f.fullname" . }}
  labels:
    {{- include "go-echo907881c3-465a-41f3-895e-b90f8d14d77f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo907881c3-465a-41f3-895e-b90f8d14d77f.selectorLabels" . | nindent 6 }}
