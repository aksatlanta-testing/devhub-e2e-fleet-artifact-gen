apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo410d3c8b-cc72-45d4-b229-11cfc7d99a78.fullname" . }}
  labels:
    {{- include "go-echo410d3c8b-cc72-45d4-b229-11cfc7d99a78.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo410d3c8b-cc72-45d4-b229-11cfc7d99a78.selectorLabels" . | nindent 6 }}
