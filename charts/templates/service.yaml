apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1f8b3b0c-773a-48c5-af1e-788091a1ddda.fullname" . }}
  labels:
    {{- include "go-echo1f8b3b0c-773a-48c5-af1e-788091a1ddda.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1f8b3b0c-773a-48c5-af1e-788091a1ddda.selectorLabels" . | nindent 6 }}
