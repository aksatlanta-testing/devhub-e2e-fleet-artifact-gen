apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc8bd267b-1874-44f7-a517-297031982be2.fullname" . }}
  labels:
    {{- include "go-echoc8bd267b-1874-44f7-a517-297031982be2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc8bd267b-1874-44f7-a517-297031982be2.selectorLabels" . | nindent 6 }}
