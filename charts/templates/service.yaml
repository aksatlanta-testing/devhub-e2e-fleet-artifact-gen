apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5067fad3-258b-4a3c-84db-99df3106b8c8.fullname" . }}
  labels:
    {{- include "go-echo5067fad3-258b-4a3c-84db-99df3106b8c8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5067fad3-258b-4a3c-84db-99df3106b8c8.selectorLabels" . | nindent 6 }}
