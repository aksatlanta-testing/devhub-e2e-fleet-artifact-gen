apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo39436593-a1f7-4162-bde2-1dffe5da2a16.fullname" . }}
  labels:
    {{- include "go-echo39436593-a1f7-4162-bde2-1dffe5da2a16.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo39436593-a1f7-4162-bde2-1dffe5da2a16.selectorLabels" . | nindent 6 }}
