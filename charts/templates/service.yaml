apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofe4c41a0-d921-46ab-b603-b4fc796a11fa.fullname" . }}
  labels:
    {{- include "go-echofe4c41a0-d921-46ab-b603-b4fc796a11fa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofe4c41a0-d921-46ab-b603-b4fc796a11fa.selectorLabels" . | nindent 6 }}
