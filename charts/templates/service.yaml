apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4301c36f-d508-4ee6-93e8-ca441171aba2.fullname" . }}
  labels:
    {{- include "go-echo4301c36f-d508-4ee6-93e8-ca441171aba2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4301c36f-d508-4ee6-93e8-ca441171aba2.selectorLabels" . | nindent 6 }}
