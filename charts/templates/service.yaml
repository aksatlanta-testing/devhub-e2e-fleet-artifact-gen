apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6e146eb2-8756-4c61-973a-e7f26dfee6af.fullname" . }}
  labels:
    {{- include "go-echo6e146eb2-8756-4c61-973a-e7f26dfee6af.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6e146eb2-8756-4c61-973a-e7f26dfee6af.selectorLabels" . | nindent 6 }}
