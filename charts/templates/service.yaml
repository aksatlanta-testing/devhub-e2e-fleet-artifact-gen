apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof6730b30-fe5c-4535-b2a9-14376f6bb282.fullname" . }}
  labels:
    {{- include "go-echof6730b30-fe5c-4535-b2a9-14376f6bb282.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof6730b30-fe5c-4535-b2a9-14376f6bb282.selectorLabels" . | nindent 6 }}
