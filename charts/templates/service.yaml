apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofb39dec4-8ebc-4d55-8b49-81bb8699f691.fullname" . }}
  labels:
    {{- include "go-echofb39dec4-8ebc-4d55-8b49-81bb8699f691.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofb39dec4-8ebc-4d55-8b49-81bb8699f691.selectorLabels" . | nindent 6 }}
