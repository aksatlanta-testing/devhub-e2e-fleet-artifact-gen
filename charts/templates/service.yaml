apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo903ad9c7-25a0-4661-8ba9-f023b3689bef.fullname" . }}
  labels:
    {{- include "go-echo903ad9c7-25a0-4661-8ba9-f023b3689bef.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo903ad9c7-25a0-4661-8ba9-f023b3689bef.selectorLabels" . | nindent 6 }}
