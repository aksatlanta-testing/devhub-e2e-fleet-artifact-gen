apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9a1a61f0-be28-41ee-84f9-4b4f0f2ea173.fullname" . }}
  labels:
    {{- include "go-echo9a1a61f0-be28-41ee-84f9-4b4f0f2ea173.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9a1a61f0-be28-41ee-84f9-4b4f0f2ea173.selectorLabels" . | nindent 6 }}
