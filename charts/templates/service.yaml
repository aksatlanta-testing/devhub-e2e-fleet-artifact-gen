apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo72277a66-4dac-481c-a093-25e237b93539.fullname" . }}
  labels:
    {{- include "go-echo72277a66-4dac-481c-a093-25e237b93539.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo72277a66-4dac-481c-a093-25e237b93539.selectorLabels" . | nindent 6 }}
