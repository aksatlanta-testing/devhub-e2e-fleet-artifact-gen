apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9b53b235-91b3-4ede-9293-8c53054ffee4.fullname" . }}
  labels:
    {{- include "go-echo9b53b235-91b3-4ede-9293-8c53054ffee4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9b53b235-91b3-4ede-9293-8c53054ffee4.selectorLabels" . | nindent 6 }}
