apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2c977561-5d69-4ada-96b3-4ce53c10ce91.fullname" . }}
  labels:
    {{- include "go-echo2c977561-5d69-4ada-96b3-4ce53c10ce91.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2c977561-5d69-4ada-96b3-4ce53c10ce91.selectorLabels" . | nindent 6 }}
