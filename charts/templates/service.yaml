apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc48bfbda-9f36-4d0a-b94a-26083fefc630.fullname" . }}
  labels:
    {{- include "go-echoc48bfbda-9f36-4d0a-b94a-26083fefc630.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc48bfbda-9f36-4d0a-b94a-26083fefc630.selectorLabels" . | nindent 6 }}
