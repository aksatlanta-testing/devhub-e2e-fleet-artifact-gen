apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo642e7dc9-a5a7-45df-a6dd-5efc427639b7.fullname" . }}
  labels:
    {{- include "go-echo642e7dc9-a5a7-45df-a6dd-5efc427639b7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo642e7dc9-a5a7-45df-a6dd-5efc427639b7.selectorLabels" . | nindent 6 }}
