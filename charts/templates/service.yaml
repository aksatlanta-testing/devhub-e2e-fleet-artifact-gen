apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob6b25163-309b-4d3c-a49b-069210db7f51.fullname" . }}
  labels:
    {{- include "go-echob6b25163-309b-4d3c-a49b-069210db7f51.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob6b25163-309b-4d3c-a49b-069210db7f51.selectorLabels" . | nindent 6 }}
