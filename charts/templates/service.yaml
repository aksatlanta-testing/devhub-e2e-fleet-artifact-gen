apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5d6c9fcb-14bb-42db-bacd-61045ff7b726.fullname" . }}
  labels:
    {{- include "go-echo5d6c9fcb-14bb-42db-bacd-61045ff7b726.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5d6c9fcb-14bb-42db-bacd-61045ff7b726.selectorLabels" . | nindent 6 }}
