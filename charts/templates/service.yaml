apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4362fa44-0cca-4b95-8a0f-056776172133.fullname" . }}
  labels:
    {{- include "go-echo4362fa44-0cca-4b95-8a0f-056776172133.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4362fa44-0cca-4b95-8a0f-056776172133.selectorLabels" . | nindent 6 }}
