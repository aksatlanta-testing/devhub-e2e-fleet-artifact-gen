apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo005c989f-2992-4d10-9c0e-93a80118ef11.fullname" . }}
  labels:
    {{- include "go-echo005c989f-2992-4d10-9c0e-93a80118ef11.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo005c989f-2992-4d10-9c0e-93a80118ef11.selectorLabels" . | nindent 6 }}
