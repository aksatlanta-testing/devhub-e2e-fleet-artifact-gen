apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo782b8c5a-ed1f-4dc6-ab05-f42ebb99b781.fullname" . }}
  labels:
    {{- include "go-echo782b8c5a-ed1f-4dc6-ab05-f42ebb99b781.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo782b8c5a-ed1f-4dc6-ab05-f42ebb99b781.selectorLabels" . | nindent 6 }}
