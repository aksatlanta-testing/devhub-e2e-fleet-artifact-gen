apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofc5821b4-06c5-4326-bff7-6fb0dafa6c13.fullname" . }}
  labels:
    {{- include "go-echofc5821b4-06c5-4326-bff7-6fb0dafa6c13.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofc5821b4-06c5-4326-bff7-6fb0dafa6c13.selectorLabels" . | nindent 6 }}
