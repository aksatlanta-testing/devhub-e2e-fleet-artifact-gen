apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo23e69984-4351-4083-ad6a-30529fc5ab1b.fullname" . }}
  labels:
    {{- include "go-echo23e69984-4351-4083-ad6a-30529fc5ab1b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo23e69984-4351-4083-ad6a-30529fc5ab1b.selectorLabels" . | nindent 6 }}
