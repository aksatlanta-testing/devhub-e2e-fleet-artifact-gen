apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1795777e-b0c6-4da4-b8f9-f13d0be1b384.fullname" . }}
  labels:
    {{- include "go-echo1795777e-b0c6-4da4-b8f9-f13d0be1b384.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1795777e-b0c6-4da4-b8f9-f13d0be1b384.selectorLabels" . | nindent 6 }}
