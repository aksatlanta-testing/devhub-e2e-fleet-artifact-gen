apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9d5a1b0c-aec6-4227-83a4-3495c3596c62.fullname" . }}
  labels:
    {{- include "go-echo9d5a1b0c-aec6-4227-83a4-3495c3596c62.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9d5a1b0c-aec6-4227-83a4-3495c3596c62.selectorLabels" . | nindent 6 }}
