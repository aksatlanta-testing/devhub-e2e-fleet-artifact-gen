apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo05ce50b5-8eaf-45b5-b9a0-bd2a3472504b.fullname" . }}
  labels:
    {{- include "go-echo05ce50b5-8eaf-45b5-b9a0-bd2a3472504b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo05ce50b5-8eaf-45b5-b9a0-bd2a3472504b.selectorLabels" . | nindent 6 }}
