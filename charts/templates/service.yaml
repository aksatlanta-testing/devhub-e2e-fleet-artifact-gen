apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7fba11b7-d627-4bce-9ad4-b5bc5dc36b15.fullname" . }}
  labels:
    {{- include "go-echo7fba11b7-d627-4bce-9ad4-b5bc5dc36b15.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7fba11b7-d627-4bce-9ad4-b5bc5dc36b15.selectorLabels" . | nindent 6 }}
