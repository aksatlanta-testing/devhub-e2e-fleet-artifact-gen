apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo31c18bb5-a076-40c0-b02c-27a07670501a.fullname" . }}
  labels:
    {{- include "go-echo31c18bb5-a076-40c0-b02c-27a07670501a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo31c18bb5-a076-40c0-b02c-27a07670501a.selectorLabels" . | nindent 6 }}
