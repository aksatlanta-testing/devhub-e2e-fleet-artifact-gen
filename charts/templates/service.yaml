apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5521e075-0c25-4996-b241-1b6eb939845e.fullname" . }}
  labels:
    {{- include "go-echo5521e075-0c25-4996-b241-1b6eb939845e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5521e075-0c25-4996-b241-1b6eb939845e.selectorLabels" . | nindent 6 }}
