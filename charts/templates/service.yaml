apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0b931df5-5884-47cd-b7aa-f36f0b92b3af.fullname" . }}
  labels:
    {{- include "go-echo0b931df5-5884-47cd-b7aa-f36f0b92b3af.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0b931df5-5884-47cd-b7aa-f36f0b92b3af.selectorLabels" . | nindent 6 }}
