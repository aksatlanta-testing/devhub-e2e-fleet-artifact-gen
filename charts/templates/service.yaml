apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0a3c7f0d-67df-472d-af44-542d6d45da7c.fullname" . }}
  labels:
    {{- include "go-echo0a3c7f0d-67df-472d-af44-542d6d45da7c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0a3c7f0d-67df-472d-af44-542d6d45da7c.selectorLabels" . | nindent 6 }}
