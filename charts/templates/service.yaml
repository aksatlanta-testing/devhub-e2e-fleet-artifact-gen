apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo017c1cc7-81e4-4303-841a-15ca91f2d996.fullname" . }}
  labels:
    {{- include "go-echo017c1cc7-81e4-4303-841a-15ca91f2d996.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo017c1cc7-81e4-4303-841a-15ca91f2d996.selectorLabels" . | nindent 6 }}
