apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo715f09ea-bdec-4a1c-962d-82d007077bfe.fullname" . }}
  labels:
    {{- include "go-echo715f09ea-bdec-4a1c-962d-82d007077bfe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo715f09ea-bdec-4a1c-962d-82d007077bfe.selectorLabels" . | nindent 6 }}
