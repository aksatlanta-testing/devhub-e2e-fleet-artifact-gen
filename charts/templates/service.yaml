apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoad0e6482-4be3-4b03-a6c4-627ed37b5705.fullname" . }}
  labels:
    {{- include "go-echoad0e6482-4be3-4b03-a6c4-627ed37b5705.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoad0e6482-4be3-4b03-a6c4-627ed37b5705.selectorLabels" . | nindent 6 }}
