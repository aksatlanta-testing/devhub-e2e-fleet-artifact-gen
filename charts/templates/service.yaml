apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo51bf5a58-2417-4a50-87c3-085ea5f8f734.fullname" . }}
  labels:
    {{- include "go-echo51bf5a58-2417-4a50-87c3-085ea5f8f734.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo51bf5a58-2417-4a50-87c3-085ea5f8f734.selectorLabels" . | nindent 6 }}
