apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo457303ba-576e-44c7-a6ca-582c640ed645.fullname" . }}
  labels:
    {{- include "go-echo457303ba-576e-44c7-a6ca-582c640ed645.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo457303ba-576e-44c7-a6ca-582c640ed645.selectorLabels" . | nindent 6 }}
