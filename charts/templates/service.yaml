apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo49244733-3f73-452d-8f7f-48d4fd63c1ee.fullname" . }}
  labels:
    {{- include "go-echo49244733-3f73-452d-8f7f-48d4fd63c1ee.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo49244733-3f73-452d-8f7f-48d4fd63c1ee.selectorLabels" . | nindent 6 }}
