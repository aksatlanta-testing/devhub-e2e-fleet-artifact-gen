apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echode7c5672-f154-4ad1-a329-54e5ba344b65.fullname" . }}
  labels:
    {{- include "go-echode7c5672-f154-4ad1-a329-54e5ba344b65.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echode7c5672-f154-4ad1-a329-54e5ba344b65.selectorLabels" . | nindent 6 }}
