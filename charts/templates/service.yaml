apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe05c7d5a-c663-4266-8fd1-7d3ffe75fd72.fullname" . }}
  labels:
    {{- include "go-echoe05c7d5a-c663-4266-8fd1-7d3ffe75fd72.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe05c7d5a-c663-4266-8fd1-7d3ffe75fd72.selectorLabels" . | nindent 6 }}
