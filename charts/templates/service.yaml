apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1d0adb66-5fd3-4a88-9dc3-ac3d849971c2.fullname" . }}
  labels:
    {{- include "go-echo1d0adb66-5fd3-4a88-9dc3-ac3d849971c2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1d0adb66-5fd3-4a88-9dc3-ac3d849971c2.selectorLabels" . | nindent 6 }}
