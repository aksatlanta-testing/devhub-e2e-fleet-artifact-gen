apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6b32dec3-971d-43a8-8792-d89915da647d.fullname" . }}
  labels:
    {{- include "go-echo6b32dec3-971d-43a8-8792-d89915da647d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6b32dec3-971d-43a8-8792-d89915da647d.selectorLabels" . | nindent 6 }}
