apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof213d94b-bc3c-4fd6-969b-c0084b5049b0.fullname" . }}
  labels:
    {{- include "go-echof213d94b-bc3c-4fd6-969b-c0084b5049b0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof213d94b-bc3c-4fd6-969b-c0084b5049b0.selectorLabels" . | nindent 6 }}
