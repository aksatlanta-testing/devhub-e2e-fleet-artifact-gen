apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc4fe37ff-03fa-4fcf-a261-022c296f086f.fullname" . }}
  labels:
    {{- include "go-echoc4fe37ff-03fa-4fcf-a261-022c296f086f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc4fe37ff-03fa-4fcf-a261-022c296f086f.selectorLabels" . | nindent 6 }}
