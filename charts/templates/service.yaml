apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob25935ee-7a0e-4bd4-8d40-d58350ac1026.fullname" . }}
  labels:
    {{- include "go-echob25935ee-7a0e-4bd4-8d40-d58350ac1026.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob25935ee-7a0e-4bd4-8d40-d58350ac1026.selectorLabels" . | nindent 6 }}
