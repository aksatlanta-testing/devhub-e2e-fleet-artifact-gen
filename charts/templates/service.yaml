apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod773b940-c511-4d2b-a967-bc3148929dfb.fullname" . }}
  labels:
    {{- include "go-echod773b940-c511-4d2b-a967-bc3148929dfb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod773b940-c511-4d2b-a967-bc3148929dfb.selectorLabels" . | nindent 6 }}
