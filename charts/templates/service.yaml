apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob6bf4df6-6b9f-45f5-941c-aa4d19e8ec2e.fullname" . }}
  labels:
    {{- include "go-echob6bf4df6-6b9f-45f5-941c-aa4d19e8ec2e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob6bf4df6-6b9f-45f5-941c-aa4d19e8ec2e.selectorLabels" . | nindent 6 }}
