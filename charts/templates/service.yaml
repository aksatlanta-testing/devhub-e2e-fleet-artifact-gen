apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2bc2827a-a168-4980-91d4-2448e6cc6b8d.fullname" . }}
  labels:
    {{- include "go-echo2bc2827a-a168-4980-91d4-2448e6cc6b8d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2bc2827a-a168-4980-91d4-2448e6cc6b8d.selectorLabels" . | nindent 6 }}
