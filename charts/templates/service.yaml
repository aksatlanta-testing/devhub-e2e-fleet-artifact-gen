apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo956bed0d-f362-4dbd-9b75-a6838f10c210.fullname" . }}
  labels:
    {{- include "go-echo956bed0d-f362-4dbd-9b75-a6838f10c210.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo956bed0d-f362-4dbd-9b75-a6838f10c210.selectorLabels" . | nindent 6 }}
