apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3e6775f7-0f9e-48e0-918a-5bfca1035184.fullname" . }}
  labels:
    {{- include "go-echo3e6775f7-0f9e-48e0-918a-5bfca1035184.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3e6775f7-0f9e-48e0-918a-5bfca1035184.selectorLabels" . | nindent 6 }}
