apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob5e6ded0-95c8-4502-a5e8-1c998e5304ce.fullname" . }}
  labels:
    {{- include "go-echob5e6ded0-95c8-4502-a5e8-1c998e5304ce.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob5e6ded0-95c8-4502-a5e8-1c998e5304ce.selectorLabels" . | nindent 6 }}
