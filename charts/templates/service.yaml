apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3f9dfd2d-22a4-4c71-bf02-96853d0c5cbd.fullname" . }}
  labels:
    {{- include "go-echo3f9dfd2d-22a4-4c71-bf02-96853d0c5cbd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3f9dfd2d-22a4-4c71-bf02-96853d0c5cbd.selectorLabels" . | nindent 6 }}
