apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob3c2c38e-eee5-4472-8427-e6252f3536f1.fullname" . }}
  labels:
    {{- include "go-echob3c2c38e-eee5-4472-8427-e6252f3536f1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob3c2c38e-eee5-4472-8427-e6252f3536f1.selectorLabels" . | nindent 6 }}
