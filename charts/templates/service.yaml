apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo71afd533-5093-4ecd-bfbc-8cdc1c46601a.fullname" . }}
  labels:
    {{- include "go-echo71afd533-5093-4ecd-bfbc-8cdc1c46601a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo71afd533-5093-4ecd-bfbc-8cdc1c46601a.selectorLabels" . | nindent 6 }}
