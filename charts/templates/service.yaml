apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo85ed4368-6d24-4937-bddf-9aa90042450b.fullname" . }}
  labels:
    {{- include "go-echo85ed4368-6d24-4937-bddf-9aa90042450b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo85ed4368-6d24-4937-bddf-9aa90042450b.selectorLabels" . | nindent 6 }}
