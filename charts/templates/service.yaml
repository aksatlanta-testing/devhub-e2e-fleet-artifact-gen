apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo278a3092-85f7-4137-9c29-a94358eafc9e.fullname" . }}
  labels:
    {{- include "go-echo278a3092-85f7-4137-9c29-a94358eafc9e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo278a3092-85f7-4137-9c29-a94358eafc9e.selectorLabels" . | nindent 6 }}
