apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1fcd5434-c8fc-4895-939a-669f00d655fe.fullname" . }}
  labels:
    {{- include "go-echo1fcd5434-c8fc-4895-939a-669f00d655fe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1fcd5434-c8fc-4895-939a-669f00d655fe.selectorLabels" . | nindent 6 }}
