apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof1d70fa5-101c-4fde-945b-0d76a8949ad5.fullname" . }}
  labels:
    {{- include "go-echof1d70fa5-101c-4fde-945b-0d76a8949ad5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof1d70fa5-101c-4fde-945b-0d76a8949ad5.selectorLabels" . | nindent 6 }}
