apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo43d29bb4-8fc6-4701-a377-e488313488e0.fullname" . }}
  labels:
    {{- include "go-echo43d29bb4-8fc6-4701-a377-e488313488e0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo43d29bb4-8fc6-4701-a377-e488313488e0.selectorLabels" . | nindent 6 }}
