apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0262c893-9f4c-4978-bef0-c6bac68ded55.fullname" . }}
  labels:
    {{- include "go-echo0262c893-9f4c-4978-bef0-c6bac68ded55.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0262c893-9f4c-4978-bef0-c6bac68ded55.selectorLabels" . | nindent 6 }}
