apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo86771b2e-3104-41ce-9eef-d6371328d552.fullname" . }}
  labels:
    {{- include "go-echo86771b2e-3104-41ce-9eef-d6371328d552.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo86771b2e-3104-41ce-9eef-d6371328d552.selectorLabels" . | nindent 6 }}
