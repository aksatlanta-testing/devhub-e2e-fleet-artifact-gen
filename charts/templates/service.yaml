apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6bd5ec1e-8324-423a-ba36-804ee88d8dbd.fullname" . }}
  labels:
    {{- include "go-echo6bd5ec1e-8324-423a-ba36-804ee88d8dbd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6bd5ec1e-8324-423a-ba36-804ee88d8dbd.selectorLabels" . | nindent 6 }}
