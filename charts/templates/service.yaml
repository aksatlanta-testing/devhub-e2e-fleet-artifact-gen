apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa09a8758-fa53-4143-9dca-b5f796062fc4.fullname" . }}
  labels:
    {{- include "go-echoa09a8758-fa53-4143-9dca-b5f796062fc4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa09a8758-fa53-4143-9dca-b5f796062fc4.selectorLabels" . | nindent 6 }}
