apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo33df2ad9-0961-4900-8505-bda7eda23a73.fullname" . }}
  labels:
    {{- include "go-echo33df2ad9-0961-4900-8505-bda7eda23a73.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo33df2ad9-0961-4900-8505-bda7eda23a73.selectorLabels" . | nindent 6 }}
