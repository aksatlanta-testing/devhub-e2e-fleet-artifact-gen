apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa3091e2b-7f7d-443b-937c-e1171c234a60.fullname" . }}
  labels:
    {{- include "go-echoa3091e2b-7f7d-443b-937c-e1171c234a60.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa3091e2b-7f7d-443b-937c-e1171c234a60.selectorLabels" . | nindent 6 }}
