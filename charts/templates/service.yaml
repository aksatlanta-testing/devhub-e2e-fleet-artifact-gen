apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod76e12cb-6c07-4ae0-84a7-c6c9bb0e0c4c.fullname" . }}
  labels:
    {{- include "go-echod76e12cb-6c07-4ae0-84a7-c6c9bb0e0c4c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod76e12cb-6c07-4ae0-84a7-c6c9bb0e0c4c.selectorLabels" . | nindent 6 }}
