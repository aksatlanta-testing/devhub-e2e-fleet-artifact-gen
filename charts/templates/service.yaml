apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa9b52621-63b3-43b3-ae29-4179bda1a20f.fullname" . }}
  labels:
    {{- include "go-echoa9b52621-63b3-43b3-ae29-4179bda1a20f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa9b52621-63b3-43b3-ae29-4179bda1a20f.selectorLabels" . | nindent 6 }}
