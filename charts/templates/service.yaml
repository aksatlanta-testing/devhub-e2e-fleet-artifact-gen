apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7a8abc1b-a318-4ba0-a6a1-505ad687ebab.fullname" . }}
  labels:
    {{- include "go-echo7a8abc1b-a318-4ba0-a6a1-505ad687ebab.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7a8abc1b-a318-4ba0-a6a1-505ad687ebab.selectorLabels" . | nindent 6 }}
