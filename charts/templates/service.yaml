apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo35f32cdf-ce3f-40b8-82e0-6d0a76beae94.fullname" . }}
  labels:
    {{- include "go-echo35f32cdf-ce3f-40b8-82e0-6d0a76beae94.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo35f32cdf-ce3f-40b8-82e0-6d0a76beae94.selectorLabels" . | nindent 6 }}
