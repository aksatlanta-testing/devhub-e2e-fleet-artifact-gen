apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6ff267d6-7c33-4da6-8d3a-92e9c656ba3c.fullname" . }}
  labels:
    {{- include "go-echo6ff267d6-7c33-4da6-8d3a-92e9c656ba3c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6ff267d6-7c33-4da6-8d3a-92e9c656ba3c.selectorLabels" . | nindent 6 }}
