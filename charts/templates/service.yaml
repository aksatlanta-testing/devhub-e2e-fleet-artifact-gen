apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo33f0ecd1-d873-47fa-b685-13f4882b55bc.fullname" . }}
  labels:
    {{- include "go-echo33f0ecd1-d873-47fa-b685-13f4882b55bc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo33f0ecd1-d873-47fa-b685-13f4882b55bc.selectorLabels" . | nindent 6 }}
