apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo77beb6fa-cd32-4060-bf29-f6a8b7334767.fullname" . }}
  labels:
    {{- include "go-echo77beb6fa-cd32-4060-bf29-f6a8b7334767.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo77beb6fa-cd32-4060-bf29-f6a8b7334767.selectorLabels" . | nindent 6 }}
