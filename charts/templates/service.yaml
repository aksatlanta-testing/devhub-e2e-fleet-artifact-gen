apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo610b89a8-78fb-416f-a013-faa961df8f32.fullname" . }}
  labels:
    {{- include "go-echo610b89a8-78fb-416f-a013-faa961df8f32.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo610b89a8-78fb-416f-a013-faa961df8f32.selectorLabels" . | nindent 6 }}
