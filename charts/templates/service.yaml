apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocfb75a9a-0b63-4ae1-8a0b-2e610dbdd10b.fullname" . }}
  labels:
    {{- include "go-echocfb75a9a-0b63-4ae1-8a0b-2e610dbdd10b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocfb75a9a-0b63-4ae1-8a0b-2e610dbdd10b.selectorLabels" . | nindent 6 }}
