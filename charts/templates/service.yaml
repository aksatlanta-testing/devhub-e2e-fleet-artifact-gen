apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6cb82836-2179-4fe7-85f8-d9dde0b5d1e2.fullname" . }}
  labels:
    {{- include "go-echo6cb82836-2179-4fe7-85f8-d9dde0b5d1e2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6cb82836-2179-4fe7-85f8-d9dde0b5d1e2.selectorLabels" . | nindent 6 }}
