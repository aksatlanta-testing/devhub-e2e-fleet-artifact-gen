apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe763f900-97c0-4eef-9848-6f11ce0db1a0.fullname" . }}
  labels:
    {{- include "go-echoe763f900-97c0-4eef-9848-6f11ce0db1a0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe763f900-97c0-4eef-9848-6f11ce0db1a0.selectorLabels" . | nindent 6 }}
