apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3bb45391-ba76-43b2-b251-46cbc2709a33.fullname" . }}
  labels:
    {{- include "go-echo3bb45391-ba76-43b2-b251-46cbc2709a33.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3bb45391-ba76-43b2-b251-46cbc2709a33.selectorLabels" . | nindent 6 }}
