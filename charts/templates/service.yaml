apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc5bc452f-7623-4d31-8408-dc09905b97b8.fullname" . }}
  labels:
    {{- include "go-echoc5bc452f-7623-4d31-8408-dc09905b97b8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc5bc452f-7623-4d31-8408-dc09905b97b8.selectorLabels" . | nindent 6 }}
