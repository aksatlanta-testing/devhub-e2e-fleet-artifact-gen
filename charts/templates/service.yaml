apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo064c1b50-8cb4-4dce-b3f2-2056c78ca31f.fullname" . }}
  labels:
    {{- include "go-echo064c1b50-8cb4-4dce-b3f2-2056c78ca31f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo064c1b50-8cb4-4dce-b3f2-2056c78ca31f.selectorLabels" . | nindent 6 }}
