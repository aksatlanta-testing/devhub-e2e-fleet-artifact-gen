apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7707c067-2205-44f8-9dbd-cc00e9272a89.fullname" . }}
  labels:
    {{- include "go-echo7707c067-2205-44f8-9dbd-cc00e9272a89.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7707c067-2205-44f8-9dbd-cc00e9272a89.selectorLabels" . | nindent 6 }}
