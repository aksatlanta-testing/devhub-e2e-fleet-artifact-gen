apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo817a1a3e-cf36-449e-abbf-7251d00e50b7.fullname" . }}
  labels:
    {{- include "go-echo817a1a3e-cf36-449e-abbf-7251d00e50b7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo817a1a3e-cf36-449e-abbf-7251d00e50b7.selectorLabels" . | nindent 6 }}
