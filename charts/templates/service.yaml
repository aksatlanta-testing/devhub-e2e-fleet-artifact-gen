apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaf0935c7-dfd9-4195-ab75-4458452f17b0.fullname" . }}
  labels:
    {{- include "go-echoaf0935c7-dfd9-4195-ab75-4458452f17b0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaf0935c7-dfd9-4195-ab75-4458452f17b0.selectorLabels" . | nindent 6 }}
