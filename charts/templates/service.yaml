apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo169c370d-2d5a-4776-9cb4-dbc842167a20.fullname" . }}
  labels:
    {{- include "go-echo169c370d-2d5a-4776-9cb4-dbc842167a20.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo169c370d-2d5a-4776-9cb4-dbc842167a20.selectorLabels" . | nindent 6 }}
