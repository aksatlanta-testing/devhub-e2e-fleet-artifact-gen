apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob84f7bd9-c131-4ba0-90cb-c035119da8f9.fullname" . }}
  labels:
    {{- include "go-echob84f7bd9-c131-4ba0-90cb-c035119da8f9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob84f7bd9-c131-4ba0-90cb-c035119da8f9.selectorLabels" . | nindent 6 }}
