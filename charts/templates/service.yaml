apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3a43c0a3-2948-4af8-8d34-e51d830172c6.fullname" . }}
  labels:
    {{- include "go-echo3a43c0a3-2948-4af8-8d34-e51d830172c6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3a43c0a3-2948-4af8-8d34-e51d830172c6.selectorLabels" . | nindent 6 }}
