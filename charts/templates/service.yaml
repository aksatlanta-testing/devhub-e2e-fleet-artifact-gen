apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod64440dc-ad39-41eb-9710-7ed25a07280d.fullname" . }}
  labels:
    {{- include "go-echod64440dc-ad39-41eb-9710-7ed25a07280d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod64440dc-ad39-41eb-9710-7ed25a07280d.selectorLabels" . | nindent 6 }}
