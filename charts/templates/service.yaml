apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc6b05799-e017-4d06-bede-8b00de0a600b.fullname" . }}
  labels:
    {{- include "go-echoc6b05799-e017-4d06-bede-8b00de0a600b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc6b05799-e017-4d06-bede-8b00de0a600b.selectorLabels" . | nindent 6 }}
