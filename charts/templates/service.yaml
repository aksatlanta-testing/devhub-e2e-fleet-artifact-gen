apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoad4365b8-2783-485b-bcac-bb0b91345c9b.fullname" . }}
  labels:
    {{- include "go-echoad4365b8-2783-485b-bcac-bb0b91345c9b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoad4365b8-2783-485b-bcac-bb0b91345c9b.selectorLabels" . | nindent 6 }}
