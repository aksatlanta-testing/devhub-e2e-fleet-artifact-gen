apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo41c3c98d-b067-481f-91c6-039f9ccbd9ee.fullname" . }}
  labels:
    {{- include "go-echo41c3c98d-b067-481f-91c6-039f9ccbd9ee.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo41c3c98d-b067-481f-91c6-039f9ccbd9ee.selectorLabels" . | nindent 6 }}
