apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo76821e7f-3355-45f8-8688-c1d1b8176e13.fullname" . }}
  labels:
    {{- include "go-echo76821e7f-3355-45f8-8688-c1d1b8176e13.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo76821e7f-3355-45f8-8688-c1d1b8176e13.selectorLabels" . | nindent 6 }}
