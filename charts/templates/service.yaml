apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe33def19-3953-4df6-b674-84a015fea4c9.fullname" . }}
  labels:
    {{- include "go-echoe33def19-3953-4df6-b674-84a015fea4c9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe33def19-3953-4df6-b674-84a015fea4c9.selectorLabels" . | nindent 6 }}
