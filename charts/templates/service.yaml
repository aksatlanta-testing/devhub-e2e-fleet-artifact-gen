apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6d742543-bcf0-4edf-b16d-e8815f205f26.fullname" . }}
  labels:
    {{- include "go-echo6d742543-bcf0-4edf-b16d-e8815f205f26.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6d742543-bcf0-4edf-b16d-e8815f205f26.selectorLabels" . | nindent 6 }}
