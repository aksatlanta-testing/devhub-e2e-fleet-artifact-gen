apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3adbbf94-78fa-47a7-b6fc-cacdfb2b2836.fullname" . }}
  labels:
    {{- include "go-echo3adbbf94-78fa-47a7-b6fc-cacdfb2b2836.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3adbbf94-78fa-47a7-b6fc-cacdfb2b2836.selectorLabels" . | nindent 6 }}
