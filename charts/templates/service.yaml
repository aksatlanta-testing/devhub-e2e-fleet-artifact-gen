apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7c09218e-6237-4822-a550-2dfe39f0b9e0.fullname" . }}
  labels:
    {{- include "go-echo7c09218e-6237-4822-a550-2dfe39f0b9e0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7c09218e-6237-4822-a550-2dfe39f0b9e0.selectorLabels" . | nindent 6 }}
