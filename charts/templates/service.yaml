apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob05e5893-7b92-4178-be61-9cb8d4e24808.fullname" . }}
  labels:
    {{- include "go-echob05e5893-7b92-4178-be61-9cb8d4e24808.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob05e5893-7b92-4178-be61-9cb8d4e24808.selectorLabels" . | nindent 6 }}
