apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9c3581ec-6e2e-43d2-8968-8d88f6518934.fullname" . }}
  labels:
    {{- include "go-echo9c3581ec-6e2e-43d2-8968-8d88f6518934.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9c3581ec-6e2e-43d2-8968-8d88f6518934.selectorLabels" . | nindent 6 }}
