apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0a7029d4-9301-42cf-82bb-dbcd4ed2026a.fullname" . }}
  labels:
    {{- include "go-echo0a7029d4-9301-42cf-82bb-dbcd4ed2026a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0a7029d4-9301-42cf-82bb-dbcd4ed2026a.selectorLabels" . | nindent 6 }}
