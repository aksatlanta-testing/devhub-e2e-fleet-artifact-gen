apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo790a9738-7bfd-4636-9db4-073e51aa61df.fullname" . }}
  labels:
    {{- include "go-echo790a9738-7bfd-4636-9db4-073e51aa61df.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo790a9738-7bfd-4636-9db4-073e51aa61df.selectorLabels" . | nindent 6 }}
