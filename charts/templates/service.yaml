apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo01d90524-e7da-48d3-8310-b507a1bfecc6.fullname" . }}
  labels:
    {{- include "go-echo01d90524-e7da-48d3-8310-b507a1bfecc6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo01d90524-e7da-48d3-8310-b507a1bfecc6.selectorLabels" . | nindent 6 }}
