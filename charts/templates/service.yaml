apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9f1fe1ce-c8bc-42b1-b9c3-eed9ad5e9ada.fullname" . }}
  labels:
    {{- include "go-echo9f1fe1ce-c8bc-42b1-b9c3-eed9ad5e9ada.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9f1fe1ce-c8bc-42b1-b9c3-eed9ad5e9ada.selectorLabels" . | nindent 6 }}
