apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4cce7206-3044-468f-8daa-36075ade54bc.fullname" . }}
  labels:
    {{- include "go-echo4cce7206-3044-468f-8daa-36075ade54bc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4cce7206-3044-468f-8daa-36075ade54bc.selectorLabels" . | nindent 6 }}
