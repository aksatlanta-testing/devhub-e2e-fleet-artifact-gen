apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob198b9d4-1230-4d54-8173-a749eddebb42.fullname" . }}
  labels:
    {{- include "go-echob198b9d4-1230-4d54-8173-a749eddebb42.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob198b9d4-1230-4d54-8173-a749eddebb42.selectorLabels" . | nindent 6 }}
