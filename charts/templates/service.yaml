apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5b5a9977-f5cd-40c8-9229-a5b28f5000b7.fullname" . }}
  labels:
    {{- include "go-echo5b5a9977-f5cd-40c8-9229-a5b28f5000b7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5b5a9977-f5cd-40c8-9229-a5b28f5000b7.selectorLabels" . | nindent 6 }}
