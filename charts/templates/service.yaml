apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo391c4ddb-332f-4ff1-b35a-17b263591a33.fullname" . }}
  labels:
    {{- include "go-echo391c4ddb-332f-4ff1-b35a-17b263591a33.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo391c4ddb-332f-4ff1-b35a-17b263591a33.selectorLabels" . | nindent 6 }}
