apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod7f7e089-86aa-4dc2-9dd1-0f13732c2065.fullname" . }}
  labels:
    {{- include "go-echod7f7e089-86aa-4dc2-9dd1-0f13732c2065.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod7f7e089-86aa-4dc2-9dd1-0f13732c2065.selectorLabels" . | nindent 6 }}
