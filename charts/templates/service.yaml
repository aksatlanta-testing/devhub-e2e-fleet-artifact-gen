apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo80aa752a-05ff-416b-b5e4-23b93e46e05f.fullname" . }}
  labels:
    {{- include "go-echo80aa752a-05ff-416b-b5e4-23b93e46e05f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo80aa752a-05ff-416b-b5e4-23b93e46e05f.selectorLabels" . | nindent 6 }}
