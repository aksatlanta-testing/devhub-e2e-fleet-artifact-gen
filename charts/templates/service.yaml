apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofea476ee-e4af-4112-9013-67f9b3405d3f.fullname" . }}
  labels:
    {{- include "go-echofea476ee-e4af-4112-9013-67f9b3405d3f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofea476ee-e4af-4112-9013-67f9b3405d3f.selectorLabels" . | nindent 6 }}
