apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof42ba2fe-7f1f-4ab7-ae71-04c30478ce65.fullname" . }}
  labels:
    {{- include "go-echof42ba2fe-7f1f-4ab7-ae71-04c30478ce65.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof42ba2fe-7f1f-4ab7-ae71-04c30478ce65.selectorLabels" . | nindent 6 }}
