apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe87b433a-283a-4aef-892c-9b264065fb05.fullname" . }}
  labels:
    {{- include "go-echoe87b433a-283a-4aef-892c-9b264065fb05.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe87b433a-283a-4aef-892c-9b264065fb05.selectorLabels" . | nindent 6 }}
