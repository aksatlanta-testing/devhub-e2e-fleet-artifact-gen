apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3f474a08-3c87-4111-8487-57e5973c970e.fullname" . }}
  labels:
    {{- include "go-echo3f474a08-3c87-4111-8487-57e5973c970e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
