apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6ac5a253-57b9-4a53-949e-47696273ec32.fullname" . }}
  labels:
    {{- include "go-echo6ac5a253-57b9-4a53-949e-47696273ec32.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6ac5a253-57b9-4a53-949e-47696273ec32.selectorLabels" . | nindent 6 }}
