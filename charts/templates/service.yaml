apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa07ffba8-b9d2-40bc-9715-6c7cd8c1ca68.fullname" . }}
  labels:
    {{- include "go-echoa07ffba8-b9d2-40bc-9715-6c7cd8c1ca68.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa07ffba8-b9d2-40bc-9715-6c7cd8c1ca68.selectorLabels" . | nindent 6 }}
