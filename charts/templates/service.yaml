apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5a342967-8b30-462c-842c-46fcbc04d72c.fullname" . }}
  labels:
    {{- include "go-echo5a342967-8b30-462c-842c-46fcbc04d72c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5a342967-8b30-462c-842c-46fcbc04d72c.selectorLabels" . | nindent 6 }}
