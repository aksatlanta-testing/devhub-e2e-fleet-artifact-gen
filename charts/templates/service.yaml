apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo389f44df-1652-41e9-b228-ab600ab0c4ef.fullname" . }}
  labels:
    {{- include "go-echo389f44df-1652-41e9-b228-ab600ab0c4ef.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo389f44df-1652-41e9-b228-ab600ab0c4ef.selectorLabels" . | nindent 6 }}
