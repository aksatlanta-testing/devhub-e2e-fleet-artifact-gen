apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa2ff3a5b-8c5e-444c-9223-deb8ab6c7ea6.fullname" . }}
  labels:
    {{- include "go-echoa2ff3a5b-8c5e-444c-9223-deb8ab6c7ea6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa2ff3a5b-8c5e-444c-9223-deb8ab6c7ea6.selectorLabels" . | nindent 6 }}
