apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo66c4f215-b066-49bb-b0c9-96bb3800c525.fullname" . }}
  labels:
    {{- include "go-echo66c4f215-b066-49bb-b0c9-96bb3800c525.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo66c4f215-b066-49bb-b0c9-96bb3800c525.selectorLabels" . | nindent 6 }}
