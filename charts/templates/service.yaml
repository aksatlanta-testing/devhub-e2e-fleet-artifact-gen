apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod9c5f0fc-b326-4d5b-96ec-cb662e8db601.fullname" . }}
  labels:
    {{- include "go-echod9c5f0fc-b326-4d5b-96ec-cb662e8db601.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod9c5f0fc-b326-4d5b-96ec-cb662e8db601.selectorLabels" . | nindent 6 }}
