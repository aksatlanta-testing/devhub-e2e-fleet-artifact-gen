apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo02ce211c-7adb-4308-bd17-2c808c10e8d8.fullname" . }}
  labels:
    {{- include "go-echo02ce211c-7adb-4308-bd17-2c808c10e8d8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo02ce211c-7adb-4308-bd17-2c808c10e8d8.selectorLabels" . | nindent 6 }}
