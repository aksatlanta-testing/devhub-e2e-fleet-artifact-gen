apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo91c8c78a-e1b4-4a6a-9ac9-e3685cc8cd4c.fullname" . }}
  labels:
    {{- include "go-echo91c8c78a-e1b4-4a6a-9ac9-e3685cc8cd4c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo91c8c78a-e1b4-4a6a-9ac9-e3685cc8cd4c.selectorLabels" . | nindent 6 }}
