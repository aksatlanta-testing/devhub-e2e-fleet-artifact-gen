apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo366b1d71-843a-4db4-a014-9c8f5505e1e5.fullname" . }}
  labels:
    {{- include "go-echo366b1d71-843a-4db4-a014-9c8f5505e1e5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo366b1d71-843a-4db4-a014-9c8f5505e1e5.selectorLabels" . | nindent 6 }}
