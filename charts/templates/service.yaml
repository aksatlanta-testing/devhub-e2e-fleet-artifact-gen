apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8840647c-6698-42f5-ba69-e001dae0d154.fullname" . }}
  labels:
    {{- include "go-echo8840647c-6698-42f5-ba69-e001dae0d154.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8840647c-6698-42f5-ba69-e001dae0d154.selectorLabels" . | nindent 6 }}
