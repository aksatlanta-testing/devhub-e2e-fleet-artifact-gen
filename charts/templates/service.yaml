apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod3006f05-2f50-43d8-b77c-6caa7f7eb207.fullname" . }}
  labels:
    {{- include "go-echod3006f05-2f50-43d8-b77c-6caa7f7eb207.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod3006f05-2f50-43d8-b77c-6caa7f7eb207.selectorLabels" . | nindent 6 }}
