apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob2deaaa2-134a-4426-902a-d2cc381c9ffa.fullname" . }}
  labels:
    {{- include "go-echob2deaaa2-134a-4426-902a-d2cc381c9ffa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob2deaaa2-134a-4426-902a-d2cc381c9ffa.selectorLabels" . | nindent 6 }}
