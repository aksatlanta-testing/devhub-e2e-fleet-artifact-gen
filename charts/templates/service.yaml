apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo58e2d775-b44d-4bf5-a906-8b95c95c0388.fullname" . }}
  labels:
    {{- include "go-echo58e2d775-b44d-4bf5-a906-8b95c95c0388.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo58e2d775-b44d-4bf5-a906-8b95c95c0388.selectorLabels" . | nindent 6 }}
