apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo04e41167-871f-4bd5-999d-bbc7bd9a4b06.fullname" . }}
  labels:
    {{- include "go-echo04e41167-871f-4bd5-999d-bbc7bd9a4b06.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo04e41167-871f-4bd5-999d-bbc7bd9a4b06.selectorLabels" . | nindent 6 }}
