apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo47e427be-b05c-4fd9-b6fa-a790a52614ed.fullname" . }}
  labels:
    {{- include "go-echo47e427be-b05c-4fd9-b6fa-a790a52614ed.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo47e427be-b05c-4fd9-b6fa-a790a52614ed.selectorLabels" . | nindent 6 }}
