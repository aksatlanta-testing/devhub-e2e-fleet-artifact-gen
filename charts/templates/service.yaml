apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo82458d94-c24f-4e5f-9d5f-4b3a177f9a45.fullname" . }}
  labels:
    {{- include "go-echo82458d94-c24f-4e5f-9d5f-4b3a177f9a45.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo82458d94-c24f-4e5f-9d5f-4b3a177f9a45.selectorLabels" . | nindent 6 }}
