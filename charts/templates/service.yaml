apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5288689a-913f-48f5-940f-d11bf8851aea.fullname" . }}
  labels:
    {{- include "go-echo5288689a-913f-48f5-940f-d11bf8851aea.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5288689a-913f-48f5-940f-d11bf8851aea.selectorLabels" . | nindent 6 }}
