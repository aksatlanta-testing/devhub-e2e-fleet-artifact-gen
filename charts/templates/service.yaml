apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocf50a99d-5410-4357-9264-d8711156c81a.fullname" . }}
  labels:
    {{- include "go-echocf50a99d-5410-4357-9264-d8711156c81a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocf50a99d-5410-4357-9264-d8711156c81a.selectorLabels" . | nindent 6 }}
