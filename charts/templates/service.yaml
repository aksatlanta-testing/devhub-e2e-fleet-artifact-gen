apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0f3e1c63-7de8-4661-ba1c-a83c058d5899.fullname" . }}
  labels:
    {{- include "go-echo0f3e1c63-7de8-4661-ba1c-a83c058d5899.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0f3e1c63-7de8-4661-ba1c-a83c058d5899.selectorLabels" . | nindent 6 }}
