apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9901702d-0b12-4887-9b6d-22173baa6e7a.fullname" . }}
  labels:
    {{- include "go-echo9901702d-0b12-4887-9b6d-22173baa6e7a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9901702d-0b12-4887-9b6d-22173baa6e7a.selectorLabels" . | nindent 6 }}
