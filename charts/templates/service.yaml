apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6879bd69-886b-4bdd-98f7-f1da4fa18d6b.fullname" . }}
  labels:
    {{- include "go-echo6879bd69-886b-4bdd-98f7-f1da4fa18d6b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6879bd69-886b-4bdd-98f7-f1da4fa18d6b.selectorLabels" . | nindent 6 }}
