apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo99d35307-0bf7-4b29-9456-f2bb78733ae5.fullname" . }}
  labels:
    {{- include "go-echo99d35307-0bf7-4b29-9456-f2bb78733ae5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo99d35307-0bf7-4b29-9456-f2bb78733ae5.selectorLabels" . | nindent 6 }}
