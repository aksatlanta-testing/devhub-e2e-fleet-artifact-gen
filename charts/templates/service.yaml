apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1a4da5cf-a07d-44cf-aab9-cd41ba201b57.fullname" . }}
  labels:
    {{- include "go-echo1a4da5cf-a07d-44cf-aab9-cd41ba201b57.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1a4da5cf-a07d-44cf-aab9-cd41ba201b57.selectorLabels" . | nindent 6 }}
