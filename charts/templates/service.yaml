apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc218d54b-6c9e-4d72-a7db-4dfd501be8bc.fullname" . }}
  labels:
    {{- include "go-echoc218d54b-6c9e-4d72-a7db-4dfd501be8bc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc218d54b-6c9e-4d72-a7db-4dfd501be8bc.selectorLabels" . | nindent 6 }}
