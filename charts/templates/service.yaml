apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa602fa37-ffb3-43b2-b7a5-6b71bd6169ad.fullname" . }}
  labels:
    {{- include "go-echoa602fa37-ffb3-43b2-b7a5-6b71bd6169ad.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa602fa37-ffb3-43b2-b7a5-6b71bd6169ad.selectorLabels" . | nindent 6 }}
