apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoecc95ea8-a5e5-41c7-9617-ca587e0ab234.fullname" . }}
  labels:
    {{- include "go-echoecc95ea8-a5e5-41c7-9617-ca587e0ab234.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoecc95ea8-a5e5-41c7-9617-ca587e0ab234.selectorLabels" . | nindent 6 }}
