apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof4e581e6-4b80-47ea-8c45-13e1bddea586.fullname" . }}
  labels:
    {{- include "go-echof4e581e6-4b80-47ea-8c45-13e1bddea586.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof4e581e6-4b80-47ea-8c45-13e1bddea586.selectorLabels" . | nindent 6 }}
