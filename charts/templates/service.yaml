apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob4c7abe4-de41-4371-9a63-62bbed47de8b.fullname" . }}
  labels:
    {{- include "go-echob4c7abe4-de41-4371-9a63-62bbed47de8b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob4c7abe4-de41-4371-9a63-62bbed47de8b.selectorLabels" . | nindent 6 }}
