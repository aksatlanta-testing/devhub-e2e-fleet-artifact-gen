apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobf462f6f-b6e0-42ff-83d2-f119c2ac33c1.fullname" . }}
  labels:
    {{- include "go-echobf462f6f-b6e0-42ff-83d2-f119c2ac33c1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobf462f6f-b6e0-42ff-83d2-f119c2ac33c1.selectorLabels" . | nindent 6 }}
