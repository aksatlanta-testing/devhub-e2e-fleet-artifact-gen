apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe9d33f65-2080-4291-b36d-3659d7c55d47.fullname" . }}
  labels:
    {{- include "go-echoe9d33f65-2080-4291-b36d-3659d7c55d47.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe9d33f65-2080-4291-b36d-3659d7c55d47.selectorLabels" . | nindent 6 }}
