apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo69f2ffa5-49a4-42ea-8b02-1ee53b1b63f9.fullname" . }}
  labels:
    {{- include "go-echo69f2ffa5-49a4-42ea-8b02-1ee53b1b63f9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo69f2ffa5-49a4-42ea-8b02-1ee53b1b63f9.selectorLabels" . | nindent 6 }}
