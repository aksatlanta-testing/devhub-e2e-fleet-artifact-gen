apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9f11221f-bfda-419d-af32-b803a70514f0.fullname" . }}
  labels:
    {{- include "go-echo9f11221f-bfda-419d-af32-b803a70514f0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9f11221f-bfda-419d-af32-b803a70514f0.selectorLabels" . | nindent 6 }}
