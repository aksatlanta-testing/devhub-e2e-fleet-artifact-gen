apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo05250138-d241-4500-a858-f07970059fef.fullname" . }}
  labels:
    {{- include "go-echo05250138-d241-4500-a858-f07970059fef.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo05250138-d241-4500-a858-f07970059fef.selectorLabels" . | nindent 6 }}
