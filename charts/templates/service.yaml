apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3afea3c0-e807-4ff5-b19a-466d968128f7.fullname" . }}
  labels:
    {{- include "go-echo3afea3c0-e807-4ff5-b19a-466d968128f7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3afea3c0-e807-4ff5-b19a-466d968128f7.selectorLabels" . | nindent 6 }}
