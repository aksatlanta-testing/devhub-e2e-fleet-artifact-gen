apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof25ab2a6-32b6-40ea-b21c-e18177aa7c73.fullname" . }}
  labels:
    {{- include "go-echof25ab2a6-32b6-40ea-b21c-e18177aa7c73.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof25ab2a6-32b6-40ea-b21c-e18177aa7c73.selectorLabels" . | nindent 6 }}
