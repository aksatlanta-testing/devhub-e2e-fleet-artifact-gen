apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo28592727-741f-4d50-a4ca-036f04adfa9a.fullname" . }}
  labels:
    {{- include "go-echo28592727-741f-4d50-a4ca-036f04adfa9a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo28592727-741f-4d50-a4ca-036f04adfa9a.selectorLabels" . | nindent 6 }}
