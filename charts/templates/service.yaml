apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoff2277eb-ffe2-4656-ad6e-9acb2c50133e.fullname" . }}
  labels:
    {{- include "go-echoff2277eb-ffe2-4656-ad6e-9acb2c50133e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoff2277eb-ffe2-4656-ad6e-9acb2c50133e.selectorLabels" . | nindent 6 }}
