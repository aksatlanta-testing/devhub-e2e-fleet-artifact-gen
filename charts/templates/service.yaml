apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo171c7cfb-02d3-4a8d-8a35-3493b19276f3.fullname" . }}
  labels:
    {{- include "go-echo171c7cfb-02d3-4a8d-8a35-3493b19276f3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo171c7cfb-02d3-4a8d-8a35-3493b19276f3.selectorLabels" . | nindent 6 }}
