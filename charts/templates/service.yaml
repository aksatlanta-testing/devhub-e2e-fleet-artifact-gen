apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo46bbb311-9b23-4b9f-937a-0d66e312730b.fullname" . }}
  labels:
    {{- include "go-echo46bbb311-9b23-4b9f-937a-0d66e312730b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo46bbb311-9b23-4b9f-937a-0d66e312730b.selectorLabels" . | nindent 6 }}
