apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9c73464c-99c7-437f-8539-95bb60e3aece.fullname" . }}
  labels:
    {{- include "go-echo9c73464c-99c7-437f-8539-95bb60e3aece.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9c73464c-99c7-437f-8539-95bb60e3aece.selectorLabels" . | nindent 6 }}
