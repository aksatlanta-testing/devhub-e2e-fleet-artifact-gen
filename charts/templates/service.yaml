apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo27f3d12b-e4f6-4b74-aaf4-0d68245dd0e2.fullname" . }}
  labels:
    {{- include "go-echo27f3d12b-e4f6-4b74-aaf4-0d68245dd0e2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo27f3d12b-e4f6-4b74-aaf4-0d68245dd0e2.selectorLabels" . | nindent 6 }}
