apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo24dcdb20-a17e-49b6-956a-922db7a10cea.fullname" . }}
  labels:
    {{- include "go-echo24dcdb20-a17e-49b6-956a-922db7a10cea.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo24dcdb20-a17e-49b6-956a-922db7a10cea.selectorLabels" . | nindent 6 }}
