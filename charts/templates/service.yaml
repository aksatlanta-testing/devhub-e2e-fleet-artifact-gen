apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod7d1d655-0a33-49d4-b30e-2c8c5b63bad3.fullname" . }}
  labels:
    {{- include "go-echod7d1d655-0a33-49d4-b30e-2c8c5b63bad3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod7d1d655-0a33-49d4-b30e-2c8c5b63bad3.selectorLabels" . | nindent 6 }}
