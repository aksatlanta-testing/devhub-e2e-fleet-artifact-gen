apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2a19ebeb-2377-4d4d-b746-7e5fda66f866.fullname" . }}
  labels:
    {{- include "go-echo2a19ebeb-2377-4d4d-b746-7e5fda66f866.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2a19ebeb-2377-4d4d-b746-7e5fda66f866.selectorLabels" . | nindent 6 }}
