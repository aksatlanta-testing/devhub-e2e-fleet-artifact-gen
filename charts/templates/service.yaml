apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod191a729-1413-4dec-82a8-90edb6b76a80.fullname" . }}
  labels:
    {{- include "go-echod191a729-1413-4dec-82a8-90edb6b76a80.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod191a729-1413-4dec-82a8-90edb6b76a80.selectorLabels" . | nindent 6 }}
