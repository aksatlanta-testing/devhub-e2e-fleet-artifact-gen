apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo72e6ea9e-08e3-4da6-9736-00a5e5be0124.fullname" . }}
  labels:
    {{- include "go-echo72e6ea9e-08e3-4da6-9736-00a5e5be0124.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo72e6ea9e-08e3-4da6-9736-00a5e5be0124.selectorLabels" . | nindent 6 }}
