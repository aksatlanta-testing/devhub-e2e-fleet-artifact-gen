apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob2dd7880-d0b8-4ae4-ae55-44e2cfa44fe2.fullname" . }}
  labels:
    {{- include "go-echob2dd7880-d0b8-4ae4-ae55-44e2cfa44fe2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob2dd7880-d0b8-4ae4-ae55-44e2cfa44fe2.selectorLabels" . | nindent 6 }}
