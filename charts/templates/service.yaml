apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo88460d22-369d-4b5d-84ee-54c4636a0edf.fullname" . }}
  labels:
    {{- include "go-echo88460d22-369d-4b5d-84ee-54c4636a0edf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo88460d22-369d-4b5d-84ee-54c4636a0edf.selectorLabels" . | nindent 6 }}
