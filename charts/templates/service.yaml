apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6a63678a-601b-4c49-9c85-8c1cfa364646.fullname" . }}
  labels:
    {{- include "go-echo6a63678a-601b-4c49-9c85-8c1cfa364646.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6a63678a-601b-4c49-9c85-8c1cfa364646.selectorLabels" . | nindent 6 }}
