apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo16b2f3d8-2e9c-4929-9b54-948e9c82197c.fullname" . }}
  labels:
    {{- include "go-echo16b2f3d8-2e9c-4929-9b54-948e9c82197c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo16b2f3d8-2e9c-4929-9b54-948e9c82197c.selectorLabels" . | nindent 6 }}
