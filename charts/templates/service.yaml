apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9bb49ee2-14c7-4571-8307-13b35861e0dd.fullname" . }}
  labels:
    {{- include "go-echo9bb49ee2-14c7-4571-8307-13b35861e0dd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9bb49ee2-14c7-4571-8307-13b35861e0dd.selectorLabels" . | nindent 6 }}
