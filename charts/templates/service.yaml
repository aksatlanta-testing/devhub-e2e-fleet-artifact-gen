apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo681ad6c4-ccdc-4bf3-b010-c86a9e126f07.fullname" . }}
  labels:
    {{- include "go-echo681ad6c4-ccdc-4bf3-b010-c86a9e126f07.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo681ad6c4-ccdc-4bf3-b010-c86a9e126f07.selectorLabels" . | nindent 6 }}
