apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo542d26a3-b060-4432-a99e-0829fee0a856.fullname" . }}
  labels:
    {{- include "go-echo542d26a3-b060-4432-a99e-0829fee0a856.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo542d26a3-b060-4432-a99e-0829fee0a856.selectorLabels" . | nindent 6 }}
