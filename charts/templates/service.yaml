apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9b37e9e1-7c9a-4d04-b066-24babb93a875.fullname" . }}
  labels:
    {{- include "go-echo9b37e9e1-7c9a-4d04-b066-24babb93a875.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9b37e9e1-7c9a-4d04-b066-24babb93a875.selectorLabels" . | nindent 6 }}
