apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob944be26-f786-429e-84a9-c7ecf975dab4.fullname" . }}
  labels:
    {{- include "go-echob944be26-f786-429e-84a9-c7ecf975dab4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob944be26-f786-429e-84a9-c7ecf975dab4.selectorLabels" . | nindent 6 }}
