apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1d46ef25-b0e8-40d1-a0ea-66484ee78305.fullname" . }}
  labels:
    {{- include "go-echo1d46ef25-b0e8-40d1-a0ea-66484ee78305.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1d46ef25-b0e8-40d1-a0ea-66484ee78305.selectorLabels" . | nindent 6 }}
