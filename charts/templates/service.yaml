apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa2646d64-6397-41fb-8e58-3858425cd9c0.fullname" . }}
  labels:
    {{- include "go-echoa2646d64-6397-41fb-8e58-3858425cd9c0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa2646d64-6397-41fb-8e58-3858425cd9c0.selectorLabels" . | nindent 6 }}
