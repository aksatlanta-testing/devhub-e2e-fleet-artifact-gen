apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo093471d9-c4e5-4c47-8045-f4264748c391.fullname" . }}
  labels:
    {{- include "go-echo093471d9-c4e5-4c47-8045-f4264748c391.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo093471d9-c4e5-4c47-8045-f4264748c391.selectorLabels" . | nindent 6 }}
