apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2926e97d-0d58-4f56-99e5-34805cbe8a3b.fullname" . }}
  labels:
    {{- include "go-echo2926e97d-0d58-4f56-99e5-34805cbe8a3b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2926e97d-0d58-4f56-99e5-34805cbe8a3b.selectorLabels" . | nindent 6 }}
