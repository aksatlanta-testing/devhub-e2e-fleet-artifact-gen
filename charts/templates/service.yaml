apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof272e977-bbf3-474c-b861-c5d65bb53ef6.fullname" . }}
  labels:
    {{- include "go-echof272e977-bbf3-474c-b861-c5d65bb53ef6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof272e977-bbf3-474c-b861-c5d65bb53ef6.selectorLabels" . | nindent 6 }}
