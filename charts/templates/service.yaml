apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo33dbe0e3-1cf3-4d22-bef5-31fcf956f038.fullname" . }}
  labels:
    {{- include "go-echo33dbe0e3-1cf3-4d22-bef5-31fcf956f038.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo33dbe0e3-1cf3-4d22-bef5-31fcf956f038.selectorLabels" . | nindent 6 }}
