apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofba2f1f7-493e-4380-8bb2-3aa740a3403b.fullname" . }}
  labels:
    {{- include "go-echofba2f1f7-493e-4380-8bb2-3aa740a3403b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofba2f1f7-493e-4380-8bb2-3aa740a3403b.selectorLabels" . | nindent 6 }}
