apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo77794125-1fe1-4803-9ea6-6b7da0b05ec0.fullname" . }}
  labels:
    {{- include "go-echo77794125-1fe1-4803-9ea6-6b7da0b05ec0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo77794125-1fe1-4803-9ea6-6b7da0b05ec0.selectorLabels" . | nindent 6 }}
