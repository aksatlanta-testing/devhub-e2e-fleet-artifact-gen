apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof2607a06-f70e-4fe8-9258-30364a8bae34.fullname" . }}
  labels:
    {{- include "go-echof2607a06-f70e-4fe8-9258-30364a8bae34.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof2607a06-f70e-4fe8-9258-30364a8bae34.selectorLabels" . | nindent 6 }}
