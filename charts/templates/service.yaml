apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc41e1a2f-5e6c-4a37-af89-59d4885aa1e3.fullname" . }}
  labels:
    {{- include "go-echoc41e1a2f-5e6c-4a37-af89-59d4885aa1e3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc41e1a2f-5e6c-4a37-af89-59d4885aa1e3.selectorLabels" . | nindent 6 }}
