apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoecfcd2ba-f8bf-4810-a15f-3ae426734f3c.fullname" . }}
  labels:
    {{- include "go-echoecfcd2ba-f8bf-4810-a15f-3ae426734f3c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoecfcd2ba-f8bf-4810-a15f-3ae426734f3c.selectorLabels" . | nindent 6 }}
