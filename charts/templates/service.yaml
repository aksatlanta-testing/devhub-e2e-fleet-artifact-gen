apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4cf04f68-d245-4f67-a3e8-8b0dce040d5e.fullname" . }}
  labels:
    {{- include "go-echo4cf04f68-d245-4f67-a3e8-8b0dce040d5e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4cf04f68-d245-4f67-a3e8-8b0dce040d5e.selectorLabels" . | nindent 6 }}
