apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoea094465-9701-43f3-8bf7-438b0dfdfcd6.fullname" . }}
  labels:
    {{- include "go-echoea094465-9701-43f3-8bf7-438b0dfdfcd6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoea094465-9701-43f3-8bf7-438b0dfdfcd6.selectorLabels" . | nindent 6 }}
