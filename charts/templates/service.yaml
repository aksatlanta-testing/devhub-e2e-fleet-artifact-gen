apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob5b68fa2-1114-45f0-a3cb-69973802fc2f.fullname" . }}
  labels:
    {{- include "go-echob5b68fa2-1114-45f0-a3cb-69973802fc2f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob5b68fa2-1114-45f0-a3cb-69973802fc2f.selectorLabels" . | nindent 6 }}
