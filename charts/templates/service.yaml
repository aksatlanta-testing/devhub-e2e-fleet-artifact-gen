apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo21863281-2689-4307-baf7-e4c56c365685.fullname" . }}
  labels:
    {{- include "go-echo21863281-2689-4307-baf7-e4c56c365685.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo21863281-2689-4307-baf7-e4c56c365685.selectorLabels" . | nindent 6 }}
