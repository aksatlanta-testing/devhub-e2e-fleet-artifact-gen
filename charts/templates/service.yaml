apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof93eba45-e391-4fa0-8b55-e1e6c9a4888a.fullname" . }}
  labels:
    {{- include "go-echof93eba45-e391-4fa0-8b55-e1e6c9a4888a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof93eba45-e391-4fa0-8b55-e1e6c9a4888a.selectorLabels" . | nindent 6 }}
