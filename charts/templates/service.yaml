apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod5cd53fd-01fb-4600-b7aa-4a1ee0121819.fullname" . }}
  labels:
    {{- include "go-echod5cd53fd-01fb-4600-b7aa-4a1ee0121819.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod5cd53fd-01fb-4600-b7aa-4a1ee0121819.selectorLabels" . | nindent 6 }}
