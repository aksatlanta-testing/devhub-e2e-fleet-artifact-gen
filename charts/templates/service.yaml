apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoca145696-ac8d-4bd8-aeea-12c5bf6824f9.fullname" . }}
  labels:
    {{- include "go-echoca145696-ac8d-4bd8-aeea-12c5bf6824f9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoca145696-ac8d-4bd8-aeea-12c5bf6824f9.selectorLabels" . | nindent 6 }}
