apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo686be419-02a0-488e-9818-2d063a87e08c.fullname" . }}
  labels:
    {{- include "go-echo686be419-02a0-488e-9818-2d063a87e08c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo686be419-02a0-488e-9818-2d063a87e08c.selectorLabels" . | nindent 6 }}
