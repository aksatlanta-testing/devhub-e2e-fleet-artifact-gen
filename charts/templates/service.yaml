apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo97058ecb-571d-420a-b8b4-801356ab6f2b.fullname" . }}
  labels:
    {{- include "go-echo97058ecb-571d-420a-b8b4-801356ab6f2b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo97058ecb-571d-420a-b8b4-801356ab6f2b.selectorLabels" . | nindent 6 }}
