apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodf5ffcb9-7402-4b4c-b3d6-2db66b26c74a.fullname" . }}
  labels:
    {{- include "go-echodf5ffcb9-7402-4b4c-b3d6-2db66b26c74a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodf5ffcb9-7402-4b4c-b3d6-2db66b26c74a.selectorLabels" . | nindent 6 }}
