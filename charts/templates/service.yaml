apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1f10c453-26e9-4321-9a58-c7487c612c4c.fullname" . }}
  labels:
    {{- include "go-echo1f10c453-26e9-4321-9a58-c7487c612c4c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1f10c453-26e9-4321-9a58-c7487c612c4c.selectorLabels" . | nindent 6 }}
