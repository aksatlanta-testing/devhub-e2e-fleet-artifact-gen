apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa2de3333-f5cc-425f-a0c7-939b59276d05.fullname" . }}
  labels:
    {{- include "go-echoa2de3333-f5cc-425f-a0c7-939b59276d05.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa2de3333-f5cc-425f-a0c7-939b59276d05.selectorLabels" . | nindent 6 }}
