apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo747af4c4-44f0-4586-a60b-7c34655304ee.fullname" . }}
  labels:
    {{- include "go-echo747af4c4-44f0-4586-a60b-7c34655304ee.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo747af4c4-44f0-4586-a60b-7c34655304ee.selectorLabels" . | nindent 6 }}
