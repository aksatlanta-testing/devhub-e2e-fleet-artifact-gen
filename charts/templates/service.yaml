apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7f28cb12-f7ee-44bb-82e5-44e2ec4c6458.fullname" . }}
  labels:
    {{- include "go-echo7f28cb12-f7ee-44bb-82e5-44e2ec4c6458.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7f28cb12-f7ee-44bb-82e5-44e2ec4c6458.selectorLabels" . | nindent 6 }}
