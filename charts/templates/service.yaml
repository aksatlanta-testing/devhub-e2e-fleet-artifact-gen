apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo09c2589c-f051-4366-8f6d-a9eeb11f00c7.fullname" . }}
  labels:
    {{- include "go-echo09c2589c-f051-4366-8f6d-a9eeb11f00c7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo09c2589c-f051-4366-8f6d-a9eeb11f00c7.selectorLabels" . | nindent 6 }}
