apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoae8a8059-3167-4d7b-b7a5-56dfe784e344.fullname" . }}
  labels:
    {{- include "go-echoae8a8059-3167-4d7b-b7a5-56dfe784e344.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoae8a8059-3167-4d7b-b7a5-56dfe784e344.selectorLabels" . | nindent 6 }}
