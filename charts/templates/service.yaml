apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2e609d33-223f-44d5-8168-b5e428b08046.fullname" . }}
  labels:
    {{- include "go-echo2e609d33-223f-44d5-8168-b5e428b08046.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2e609d33-223f-44d5-8168-b5e428b08046.selectorLabels" . | nindent 6 }}
