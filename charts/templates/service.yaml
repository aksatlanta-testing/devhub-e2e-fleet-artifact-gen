apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7467463a-2c26-4d4c-81a1-0f37061dd344.fullname" . }}
  labels:
    {{- include "go-echo7467463a-2c26-4d4c-81a1-0f37061dd344.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7467463a-2c26-4d4c-81a1-0f37061dd344.selectorLabels" . | nindent 6 }}
