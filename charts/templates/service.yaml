apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo763b96ef-612a-491e-a7a7-69be09eda845.fullname" . }}
  labels:
    {{- include "go-echo763b96ef-612a-491e-a7a7-69be09eda845.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo763b96ef-612a-491e-a7a7-69be09eda845.selectorLabels" . | nindent 6 }}
