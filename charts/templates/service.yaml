apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobb0fcd71-8687-4cbc-9534-9dc1b2ef1c7e.fullname" . }}
  labels:
    {{- include "go-echobb0fcd71-8687-4cbc-9534-9dc1b2ef1c7e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobb0fcd71-8687-4cbc-9534-9dc1b2ef1c7e.selectorLabels" . | nindent 6 }}
