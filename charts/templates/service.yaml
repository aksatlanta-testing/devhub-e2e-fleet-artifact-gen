apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo66a033a8-14ea-4c7d-9174-bb3489654a28.fullname" . }}
  labels:
    {{- include "go-echo66a033a8-14ea-4c7d-9174-bb3489654a28.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo66a033a8-14ea-4c7d-9174-bb3489654a28.selectorLabels" . | nindent 6 }}
