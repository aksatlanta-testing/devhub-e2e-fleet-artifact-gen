apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod86eb3b2-0ea8-4ecc-9f9c-d6506262c597.fullname" . }}
  labels:
    {{- include "go-echod86eb3b2-0ea8-4ecc-9f9c-d6506262c597.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod86eb3b2-0ea8-4ecc-9f9c-d6506262c597.selectorLabels" . | nindent 6 }}
