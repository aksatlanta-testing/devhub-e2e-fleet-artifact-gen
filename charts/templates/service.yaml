apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocc910324-8796-4cc3-abae-dbebc6e0678d.fullname" . }}
  labels:
    {{- include "go-echocc910324-8796-4cc3-abae-dbebc6e0678d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocc910324-8796-4cc3-abae-dbebc6e0678d.selectorLabels" . | nindent 6 }}
