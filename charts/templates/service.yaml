apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5990e9a5-5462-4be8-a591-9e1cacfb94cc.fullname" . }}
  labels:
    {{- include "go-echo5990e9a5-5462-4be8-a591-9e1cacfb94cc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5990e9a5-5462-4be8-a591-9e1cacfb94cc.selectorLabels" . | nindent 6 }}
