apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6af28a0f-fd73-4042-b8fb-7cf339c4da1b.fullname" . }}
  labels:
    {{- include "go-echo6af28a0f-fd73-4042-b8fb-7cf339c4da1b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6af28a0f-fd73-4042-b8fb-7cf339c4da1b.selectorLabels" . | nindent 6 }}
