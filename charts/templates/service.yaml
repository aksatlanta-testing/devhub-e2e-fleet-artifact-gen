apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6ee57602-2647-4059-8704-1d12c1c3a959.fullname" . }}
  labels:
    {{- include "go-echo6ee57602-2647-4059-8704-1d12c1c3a959.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6ee57602-2647-4059-8704-1d12c1c3a959.selectorLabels" . | nindent 6 }}
