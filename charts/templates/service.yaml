apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo356939b9-d57d-4bd4-9a7b-4974379c966c.fullname" . }}
  labels:
    {{- include "go-echo356939b9-d57d-4bd4-9a7b-4974379c966c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo356939b9-d57d-4bd4-9a7b-4974379c966c.selectorLabels" . | nindent 6 }}
