apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa5933897-f0b2-41dd-9d95-c6f2ed90f531.fullname" . }}
  labels:
    {{- include "go-echoa5933897-f0b2-41dd-9d95-c6f2ed90f531.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa5933897-f0b2-41dd-9d95-c6f2ed90f531.selectorLabels" . | nindent 6 }}
