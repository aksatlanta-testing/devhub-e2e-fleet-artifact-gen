apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0a90cee2-4164-48c6-bdc4-749aec496ba4.fullname" . }}
  labels:
    {{- include "go-echo0a90cee2-4164-48c6-bdc4-749aec496ba4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0a90cee2-4164-48c6-bdc4-749aec496ba4.selectorLabels" . | nindent 6 }}
