apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5cafbf43-2abc-4b74-bfd4-fa4a031340ba.fullname" . }}
  labels:
    {{- include "go-echo5cafbf43-2abc-4b74-bfd4-fa4a031340ba.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5cafbf43-2abc-4b74-bfd4-fa4a031340ba.selectorLabels" . | nindent 6 }}
