apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoec83ba70-0409-40db-9a05-3873ff4ff30b.fullname" . }}
  labels:
    {{- include "go-echoec83ba70-0409-40db-9a05-3873ff4ff30b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoec83ba70-0409-40db-9a05-3873ff4ff30b.selectorLabels" . | nindent 6 }}
