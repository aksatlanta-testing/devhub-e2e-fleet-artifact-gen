apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa3166e02-f3d8-4574-b110-07f2d5f1af4b.fullname" . }}
  labels:
    {{- include "go-echoa3166e02-f3d8-4574-b110-07f2d5f1af4b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa3166e02-f3d8-4574-b110-07f2d5f1af4b.selectorLabels" . | nindent 6 }}
