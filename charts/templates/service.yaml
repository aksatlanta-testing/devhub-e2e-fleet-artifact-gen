apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod0b0784e-c143-454f-835f-3f874b90eaaf.fullname" . }}
  labels:
    {{- include "go-echod0b0784e-c143-454f-835f-3f874b90eaaf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod0b0784e-c143-454f-835f-3f874b90eaaf.selectorLabels" . | nindent 6 }}
