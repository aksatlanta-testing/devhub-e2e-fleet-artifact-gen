apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1d3eb521-99cc-4c54-816f-17c117038d3d.fullname" . }}
  labels:
    {{- include "go-echo1d3eb521-99cc-4c54-816f-17c117038d3d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1d3eb521-99cc-4c54-816f-17c117038d3d.selectorLabels" . | nindent 6 }}
