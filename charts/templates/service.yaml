apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo141fa28a-78a8-4667-acf9-d9d29ea63560.fullname" . }}
  labels:
    {{- include "go-echo141fa28a-78a8-4667-acf9-d9d29ea63560.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo141fa28a-78a8-4667-acf9-d9d29ea63560.selectorLabels" . | nindent 6 }}
