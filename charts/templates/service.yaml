apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoee7babca-9a4a-41c7-a16d-88755747539d.fullname" . }}
  labels:
    {{- include "go-echoee7babca-9a4a-41c7-a16d-88755747539d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoee7babca-9a4a-41c7-a16d-88755747539d.selectorLabels" . | nindent 6 }}
