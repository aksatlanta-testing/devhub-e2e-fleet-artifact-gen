apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo00feaa2f-5e6b-47eb-8474-56436b4db800.fullname" . }}
  labels:
    {{- include "go-echo00feaa2f-5e6b-47eb-8474-56436b4db800.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo00feaa2f-5e6b-47eb-8474-56436b4db800.selectorLabels" . | nindent 6 }}
