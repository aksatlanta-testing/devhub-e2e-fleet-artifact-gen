apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof1d026ad-8556-4e1b-990b-0d8a10d2e82d.fullname" . }}
  labels:
    {{- include "go-echof1d026ad-8556-4e1b-990b-0d8a10d2e82d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof1d026ad-8556-4e1b-990b-0d8a10d2e82d.selectorLabels" . | nindent 6 }}
