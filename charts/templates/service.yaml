apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe90d3c78-3dbe-4da3-8786-27cf9d5508ce.fullname" . }}
  labels:
    {{- include "go-echoe90d3c78-3dbe-4da3-8786-27cf9d5508ce.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe90d3c78-3dbe-4da3-8786-27cf9d5508ce.selectorLabels" . | nindent 6 }}
