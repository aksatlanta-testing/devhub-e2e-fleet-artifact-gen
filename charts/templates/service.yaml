apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1ad8f72e-e015-4045-a769-540472841d82.fullname" . }}
  labels:
    {{- include "go-echo1ad8f72e-e015-4045-a769-540472841d82.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1ad8f72e-e015-4045-a769-540472841d82.selectorLabels" . | nindent 6 }}
