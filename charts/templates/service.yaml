apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo157502d5-e139-44ec-ba94-ef43833c6943.fullname" . }}
  labels:
    {{- include "go-echo157502d5-e139-44ec-ba94-ef43833c6943.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo157502d5-e139-44ec-ba94-ef43833c6943.selectorLabels" . | nindent 6 }}
