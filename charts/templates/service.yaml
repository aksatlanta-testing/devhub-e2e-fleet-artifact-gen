apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo773a7b9e-7699-427e-87de-6c9403f5b016.fullname" . }}
  labels:
    {{- include "go-echo773a7b9e-7699-427e-87de-6c9403f5b016.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo773a7b9e-7699-427e-87de-6c9403f5b016.selectorLabels" . | nindent 6 }}
