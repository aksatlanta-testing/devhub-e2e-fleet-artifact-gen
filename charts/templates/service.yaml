apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo60bdb605-32d1-466a-8c32-6331a4333aab.fullname" . }}
  labels:
    {{- include "go-echo60bdb605-32d1-466a-8c32-6331a4333aab.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo60bdb605-32d1-466a-8c32-6331a4333aab.selectorLabels" . | nindent 6 }}
