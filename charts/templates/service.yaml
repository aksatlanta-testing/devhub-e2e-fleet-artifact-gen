apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6223cc53-e253-4e1e-b171-ab1bd0c6435a.fullname" . }}
  labels:
    {{- include "go-echo6223cc53-e253-4e1e-b171-ab1bd0c6435a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6223cc53-e253-4e1e-b171-ab1bd0c6435a.selectorLabels" . | nindent 6 }}
