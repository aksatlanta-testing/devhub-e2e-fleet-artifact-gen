apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa6615e06-6f8c-487c-832c-fee1c0e5516b.fullname" . }}
  labels:
    {{- include "go-echoa6615e06-6f8c-487c-832c-fee1c0e5516b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa6615e06-6f8c-487c-832c-fee1c0e5516b.selectorLabels" . | nindent 6 }}
