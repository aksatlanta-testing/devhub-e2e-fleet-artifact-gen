apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa35ab549-2e21-40d1-8f63-ced566da5f61.fullname" . }}
  labels:
    {{- include "go-echoa35ab549-2e21-40d1-8f63-ced566da5f61.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa35ab549-2e21-40d1-8f63-ced566da5f61.selectorLabels" . | nindent 6 }}
