apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6794195a-1652-4da6-9fa9-541a96e2b2e2.fullname" . }}
  labels:
    {{- include "go-echo6794195a-1652-4da6-9fa9-541a96e2b2e2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6794195a-1652-4da6-9fa9-541a96e2b2e2.selectorLabels" . | nindent 6 }}
