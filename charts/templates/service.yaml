apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo574b65ab-8c76-4303-bfc3-4cfeae6f7855.fullname" . }}
  labels:
    {{- include "go-echo574b65ab-8c76-4303-bfc3-4cfeae6f7855.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo574b65ab-8c76-4303-bfc3-4cfeae6f7855.selectorLabels" . | nindent 6 }}
