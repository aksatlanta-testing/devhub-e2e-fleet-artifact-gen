apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6cbe8ae9-9fc3-4962-a5f9-187c08df72f0.fullname" . }}
  labels:
    {{- include "go-echo6cbe8ae9-9fc3-4962-a5f9-187c08df72f0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6cbe8ae9-9fc3-4962-a5f9-187c08df72f0.selectorLabels" . | nindent 6 }}
