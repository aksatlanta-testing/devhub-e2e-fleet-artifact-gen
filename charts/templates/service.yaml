apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof0af26ed-9c7d-45bd-a187-f90443669bea.fullname" . }}
  labels:
    {{- include "go-echof0af26ed-9c7d-45bd-a187-f90443669bea.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof0af26ed-9c7d-45bd-a187-f90443669bea.selectorLabels" . | nindent 6 }}
