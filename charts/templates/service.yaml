apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo94a6cf6f-e3b9-4779-8e4a-325251affc51.fullname" . }}
  labels:
    {{- include "go-echo94a6cf6f-e3b9-4779-8e4a-325251affc51.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo94a6cf6f-e3b9-4779-8e4a-325251affc51.selectorLabels" . | nindent 6 }}
