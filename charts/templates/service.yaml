apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9c09481d-7775-4a66-a079-69ddcfb99a83.fullname" . }}
  labels:
    {{- include "go-echo9c09481d-7775-4a66-a079-69ddcfb99a83.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9c09481d-7775-4a66-a079-69ddcfb99a83.selectorLabels" . | nindent 6 }}
