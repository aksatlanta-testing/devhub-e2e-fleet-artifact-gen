apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo78b7841a-f8bb-44c4-a03e-2ddacc57118b.fullname" . }}
  labels:
    {{- include "go-echo78b7841a-f8bb-44c4-a03e-2ddacc57118b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo78b7841a-f8bb-44c4-a03e-2ddacc57118b.selectorLabels" . | nindent 6 }}
