apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo967e90b2-1a80-4a79-9a47-747d93e818e9.fullname" . }}
  labels:
    {{- include "go-echo967e90b2-1a80-4a79-9a47-747d93e818e9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo967e90b2-1a80-4a79-9a47-747d93e818e9.selectorLabels" . | nindent 6 }}
