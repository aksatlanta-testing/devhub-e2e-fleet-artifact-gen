apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo711c1ccf-0665-4acf-abc0-57a202c6c59d.fullname" . }}
  labels:
    {{- include "go-echo711c1ccf-0665-4acf-abc0-57a202c6c59d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo711c1ccf-0665-4acf-abc0-57a202c6c59d.selectorLabels" . | nindent 6 }}
