apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1e9688f4-3eb5-47c6-8b5b-3abfddb3bcb9.fullname" . }}
  labels:
    {{- include "go-echo1e9688f4-3eb5-47c6-8b5b-3abfddb3bcb9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1e9688f4-3eb5-47c6-8b5b-3abfddb3bcb9.selectorLabels" . | nindent 6 }}
