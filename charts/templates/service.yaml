apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5b41c958-9258-46db-a535-430a809e2580.fullname" . }}
  labels:
    {{- include "go-echo5b41c958-9258-46db-a535-430a809e2580.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5b41c958-9258-46db-a535-430a809e2580.selectorLabels" . | nindent 6 }}
