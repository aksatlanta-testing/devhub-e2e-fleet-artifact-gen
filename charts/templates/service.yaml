apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo314bad10-7042-484e-9fac-7458a23f53df.fullname" . }}
  labels:
    {{- include "go-echo314bad10-7042-484e-9fac-7458a23f53df.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo314bad10-7042-484e-9fac-7458a23f53df.selectorLabels" . | nindent 6 }}
