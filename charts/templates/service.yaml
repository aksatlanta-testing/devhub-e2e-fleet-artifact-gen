apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo81ff72f4-56bf-4a72-889e-46443f5c492b.fullname" . }}
  labels:
    {{- include "go-echo81ff72f4-56bf-4a72-889e-46443f5c492b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo81ff72f4-56bf-4a72-889e-46443f5c492b.selectorLabels" . | nindent 6 }}
