apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo08f3aecf-cd27-45d6-b841-44783870eccd.fullname" . }}
  labels:
    {{- include "go-echo08f3aecf-cd27-45d6-b841-44783870eccd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo08f3aecf-cd27-45d6-b841-44783870eccd.selectorLabels" . | nindent 6 }}
