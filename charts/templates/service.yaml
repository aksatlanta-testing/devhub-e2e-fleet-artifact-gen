apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo92edc564-1d0e-43a6-84f7-0b1d93bf93c2.fullname" . }}
  labels:
    {{- include "go-echo92edc564-1d0e-43a6-84f7-0b1d93bf93c2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo92edc564-1d0e-43a6-84f7-0b1d93bf93c2.selectorLabels" . | nindent 6 }}
