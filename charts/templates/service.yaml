apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7072213b-e5b7-41b2-b4b9-02ceba60bd48.fullname" . }}
  labels:
    {{- include "go-echo7072213b-e5b7-41b2-b4b9-02ceba60bd48.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7072213b-e5b7-41b2-b4b9-02ceba60bd48.selectorLabels" . | nindent 6 }}
