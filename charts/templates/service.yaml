apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo453bf05a-e287-4a59-affd-e73d89eac948.fullname" . }}
  labels:
    {{- include "go-echo453bf05a-e287-4a59-affd-e73d89eac948.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo453bf05a-e287-4a59-affd-e73d89eac948.selectorLabels" . | nindent 6 }}
