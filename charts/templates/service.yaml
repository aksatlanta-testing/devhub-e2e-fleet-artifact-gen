apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo968b5899-c13e-456e-abc8-01848f0e99a6.fullname" . }}
  labels:
    {{- include "go-echo968b5899-c13e-456e-abc8-01848f0e99a6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo968b5899-c13e-456e-abc8-01848f0e99a6.selectorLabels" . | nindent 6 }}
