apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo68413c88-e999-4e88-91f8-4c22fce0efff.fullname" . }}
  labels:
    {{- include "go-echo68413c88-e999-4e88-91f8-4c22fce0efff.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo68413c88-e999-4e88-91f8-4c22fce0efff.selectorLabels" . | nindent 6 }}
