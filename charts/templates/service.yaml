apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1c739915-fb7e-4106-bb16-a1dd28d55441.fullname" . }}
  labels:
    {{- include "go-echo1c739915-fb7e-4106-bb16-a1dd28d55441.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1c739915-fb7e-4106-bb16-a1dd28d55441.selectorLabels" . | nindent 6 }}
