apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo44b385e5-d7c4-42f7-9a6c-a64ab1fda67b.fullname" . }}
  labels:
    {{- include "go-echo44b385e5-d7c4-42f7-9a6c-a64ab1fda67b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo44b385e5-d7c4-42f7-9a6c-a64ab1fda67b.selectorLabels" . | nindent 6 }}
