apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof125d5a8-30d8-451a-9fdb-0fcd2782174c.fullname" . }}
  labels:
    {{- include "go-echof125d5a8-30d8-451a-9fdb-0fcd2782174c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof125d5a8-30d8-451a-9fdb-0fcd2782174c.selectorLabels" . | nindent 6 }}
