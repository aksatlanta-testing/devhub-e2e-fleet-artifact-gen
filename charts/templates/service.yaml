apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3ecb5899-1277-41f6-bdcc-f2bfcd9cdd84.fullname" . }}
  labels:
    {{- include "go-echo3ecb5899-1277-41f6-bdcc-f2bfcd9cdd84.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3ecb5899-1277-41f6-bdcc-f2bfcd9cdd84.selectorLabels" . | nindent 6 }}
