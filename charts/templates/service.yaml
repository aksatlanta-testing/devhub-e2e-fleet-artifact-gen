apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7005790a-5d06-4c53-ba6e-15ff007b8343.fullname" . }}
  labels:
    {{- include "go-echo7005790a-5d06-4c53-ba6e-15ff007b8343.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7005790a-5d06-4c53-ba6e-15ff007b8343.selectorLabels" . | nindent 6 }}
