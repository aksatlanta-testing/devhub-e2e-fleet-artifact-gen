apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob303e976-df79-43e2-9efe-7979913b7c0e.fullname" . }}
  labels:
    {{- include "go-echob303e976-df79-43e2-9efe-7979913b7c0e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob303e976-df79-43e2-9efe-7979913b7c0e.selectorLabels" . | nindent 6 }}
