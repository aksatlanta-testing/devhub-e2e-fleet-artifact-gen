apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoedc3a982-26f1-4bb8-93af-bc8f30cc0444.fullname" . }}
  labels:
    {{- include "go-echoedc3a982-26f1-4bb8-93af-bc8f30cc0444.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoedc3a982-26f1-4bb8-93af-bc8f30cc0444.selectorLabels" . | nindent 6 }}
