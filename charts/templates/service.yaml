apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2d3e2cb4-0c7a-48e6-aafa-dd5b28867731.fullname" . }}
  labels:
    {{- include "go-echo2d3e2cb4-0c7a-48e6-aafa-dd5b28867731.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2d3e2cb4-0c7a-48e6-aafa-dd5b28867731.selectorLabels" . | nindent 6 }}
