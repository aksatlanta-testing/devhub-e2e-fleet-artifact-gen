apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo44e5c95c-54d9-4938-86ad-21734ea9940f.fullname" . }}
  labels:
    {{- include "go-echo44e5c95c-54d9-4938-86ad-21734ea9940f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo44e5c95c-54d9-4938-86ad-21734ea9940f.selectorLabels" . | nindent 6 }}
