apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod3031d1e-2b84-4eb7-a38a-e57e324b9212.fullname" . }}
  labels:
    {{- include "go-echod3031d1e-2b84-4eb7-a38a-e57e324b9212.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod3031d1e-2b84-4eb7-a38a-e57e324b9212.selectorLabels" . | nindent 6 }}
