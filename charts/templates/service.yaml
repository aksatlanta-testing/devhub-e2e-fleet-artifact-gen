apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoefc9047e-df9f-4d6a-9df3-b4d669119f04.fullname" . }}
  labels:
    {{- include "go-echoefc9047e-df9f-4d6a-9df3-b4d669119f04.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoefc9047e-df9f-4d6a-9df3-b4d669119f04.selectorLabels" . | nindent 6 }}
