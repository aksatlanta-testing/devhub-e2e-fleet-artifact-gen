apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod0b72332-e728-4bb1-9aba-c0c1fb58b130.fullname" . }}
  labels:
    {{- include "go-echod0b72332-e728-4bb1-9aba-c0c1fb58b130.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod0b72332-e728-4bb1-9aba-c0c1fb58b130.selectorLabels" . | nindent 6 }}
