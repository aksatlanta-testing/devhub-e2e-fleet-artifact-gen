apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo84501668-0713-4cce-befc-34c24d0bd56e.fullname" . }}
  labels:
    {{- include "go-echo84501668-0713-4cce-befc-34c24d0bd56e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo84501668-0713-4cce-befc-34c24d0bd56e.selectorLabels" . | nindent 6 }}
