apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7713e669-2b1a-4775-bb13-087b3f3c0642.fullname" . }}
  labels:
    {{- include "go-echo7713e669-2b1a-4775-bb13-087b3f3c0642.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7713e669-2b1a-4775-bb13-087b3f3c0642.selectorLabels" . | nindent 6 }}
