apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe225e28d-c462-4932-b64d-ec7fc603b7f6.fullname" . }}
  labels:
    {{- include "go-echoe225e28d-c462-4932-b64d-ec7fc603b7f6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe225e28d-c462-4932-b64d-ec7fc603b7f6.selectorLabels" . | nindent 6 }}
