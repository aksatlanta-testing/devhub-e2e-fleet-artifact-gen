apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof903a71e-b843-4478-b52a-3addbf47ac35.fullname" . }}
  labels:
    {{- include "go-echof903a71e-b843-4478-b52a-3addbf47ac35.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof903a71e-b843-4478-b52a-3addbf47ac35.selectorLabels" . | nindent 6 }}
