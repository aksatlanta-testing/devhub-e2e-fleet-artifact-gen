apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo05b48449-8efe-42ac-8e80-8ae4192b8d94.fullname" . }}
  labels:
    {{- include "go-echo05b48449-8efe-42ac-8e80-8ae4192b8d94.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo05b48449-8efe-42ac-8e80-8ae4192b8d94.selectorLabels" . | nindent 6 }}
