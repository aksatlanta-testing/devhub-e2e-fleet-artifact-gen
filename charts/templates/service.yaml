apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo03e4bb11-0b40-43da-8464-b4737589ab43.fullname" . }}
  labels:
    {{- include "go-echo03e4bb11-0b40-43da-8464-b4737589ab43.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo03e4bb11-0b40-43da-8464-b4737589ab43.selectorLabels" . | nindent 6 }}
