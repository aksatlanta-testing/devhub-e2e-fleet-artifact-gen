apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaa5629c4-f6d6-49e4-8f42-68af2d37b6fc.fullname" . }}
  labels:
    {{- include "go-echoaa5629c4-f6d6-49e4-8f42-68af2d37b6fc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaa5629c4-f6d6-49e4-8f42-68af2d37b6fc.selectorLabels" . | nindent 6 }}
