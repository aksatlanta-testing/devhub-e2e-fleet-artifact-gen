apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofe66d024-5466-4e72-a61b-25010d5f8127.fullname" . }}
  labels:
    {{- include "go-echofe66d024-5466-4e72-a61b-25010d5f8127.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofe66d024-5466-4e72-a61b-25010d5f8127.selectorLabels" . | nindent 6 }}
