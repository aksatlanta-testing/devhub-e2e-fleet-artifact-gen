apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo85ae0973-ff93-4d24-bb03-701ead1231c7.fullname" . }}
  labels:
    {{- include "go-echo85ae0973-ff93-4d24-bb03-701ead1231c7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo85ae0973-ff93-4d24-bb03-701ead1231c7.selectorLabels" . | nindent 6 }}
