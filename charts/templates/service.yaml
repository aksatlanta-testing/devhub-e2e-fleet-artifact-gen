apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7246b0b5-5f74-4203-a72d-e137a0ebd7ee.fullname" . }}
  labels:
    {{- include "go-echo7246b0b5-5f74-4203-a72d-e137a0ebd7ee.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7246b0b5-5f74-4203-a72d-e137a0ebd7ee.selectorLabels" . | nindent 6 }}
