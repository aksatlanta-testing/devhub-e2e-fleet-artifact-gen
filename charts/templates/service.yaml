apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo19c4baeb-f18e-4f8d-a93e-db79b0f56bb0.fullname" . }}
  labels:
    {{- include "go-echo19c4baeb-f18e-4f8d-a93e-db79b0f56bb0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo19c4baeb-f18e-4f8d-a93e-db79b0f56bb0.selectorLabels" . | nindent 6 }}
