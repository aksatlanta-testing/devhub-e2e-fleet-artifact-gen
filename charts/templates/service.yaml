apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6660fabc-68e2-43b4-b7a9-046dc1747a3a.fullname" . }}
  labels:
    {{- include "go-echo6660fabc-68e2-43b4-b7a9-046dc1747a3a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6660fabc-68e2-43b4-b7a9-046dc1747a3a.selectorLabels" . | nindent 6 }}
