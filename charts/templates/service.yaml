apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6aac6f81-5213-4973-b770-5062bd07af6f.fullname" . }}
  labels:
    {{- include "go-echo6aac6f81-5213-4973-b770-5062bd07af6f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6aac6f81-5213-4973-b770-5062bd07af6f.selectorLabels" . | nindent 6 }}
