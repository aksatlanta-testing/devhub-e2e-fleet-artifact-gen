apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofe44340b-32f9-4a52-9573-dd156ab0d416.fullname" . }}
  labels:
    {{- include "go-echofe44340b-32f9-4a52-9573-dd156ab0d416.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofe44340b-32f9-4a52-9573-dd156ab0d416.selectorLabels" . | nindent 6 }}
