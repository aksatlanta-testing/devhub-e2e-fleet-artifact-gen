apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe77c3968-252b-4d10-b853-7abfe7f0340c.fullname" . }}
  labels:
    {{- include "go-echoe77c3968-252b-4d10-b853-7abfe7f0340c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe77c3968-252b-4d10-b853-7abfe7f0340c.selectorLabels" . | nindent 6 }}
