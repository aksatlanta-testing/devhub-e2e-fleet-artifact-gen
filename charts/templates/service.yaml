apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofd98c27b-1523-4e60-9267-62743efb6991.fullname" . }}
  labels:
    {{- include "go-echofd98c27b-1523-4e60-9267-62743efb6991.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofd98c27b-1523-4e60-9267-62743efb6991.selectorLabels" . | nindent 6 }}
