apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4f6b6553-6ebb-43a4-bf4d-7c6e95787f5a.fullname" . }}
  labels:
    {{- include "go-echo4f6b6553-6ebb-43a4-bf4d-7c6e95787f5a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4f6b6553-6ebb-43a4-bf4d-7c6e95787f5a.selectorLabels" . | nindent 6 }}
