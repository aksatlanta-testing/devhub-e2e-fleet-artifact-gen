apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2111694e-ecbe-4dc4-9a98-da3a4e0e3040.fullname" . }}
  labels:
    {{- include "go-echo2111694e-ecbe-4dc4-9a98-da3a4e0e3040.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2111694e-ecbe-4dc4-9a98-da3a4e0e3040.selectorLabels" . | nindent 6 }}
