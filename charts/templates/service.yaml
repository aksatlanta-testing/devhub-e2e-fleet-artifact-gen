apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo535f4ad0-5260-433c-8e68-a7150d969fb9.fullname" . }}
  labels:
    {{- include "go-echo535f4ad0-5260-433c-8e68-a7150d969fb9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo535f4ad0-5260-433c-8e68-a7150d969fb9.selectorLabels" . | nindent 6 }}
