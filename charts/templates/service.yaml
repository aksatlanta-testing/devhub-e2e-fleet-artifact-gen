apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocb4f8235-83ae-4dfd-9a86-87f462db1afa.fullname" . }}
  labels:
    {{- include "go-echocb4f8235-83ae-4dfd-9a86-87f462db1afa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocb4f8235-83ae-4dfd-9a86-87f462db1afa.selectorLabels" . | nindent 6 }}
