apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6eebd6de-f53e-4563-bb93-afbeecc26555.fullname" . }}
  labels:
    {{- include "go-echo6eebd6de-f53e-4563-bb93-afbeecc26555.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6eebd6de-f53e-4563-bb93-afbeecc26555.selectorLabels" . | nindent 6 }}
