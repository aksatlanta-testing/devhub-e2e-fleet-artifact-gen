apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc6ef34f6-3483-434f-9c6a-fd80018f0c10.fullname" . }}
  labels:
    {{- include "go-echoc6ef34f6-3483-434f-9c6a-fd80018f0c10.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc6ef34f6-3483-434f-9c6a-fd80018f0c10.selectorLabels" . | nindent 6 }}
