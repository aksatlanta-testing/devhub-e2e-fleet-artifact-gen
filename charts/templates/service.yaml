apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9067bb67-0aba-4741-b39e-e8917c0e18ee.fullname" . }}
  labels:
    {{- include "go-echo9067bb67-0aba-4741-b39e-e8917c0e18ee.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9067bb67-0aba-4741-b39e-e8917c0e18ee.selectorLabels" . | nindent 6 }}
