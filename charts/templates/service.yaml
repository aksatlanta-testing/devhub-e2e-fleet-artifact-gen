apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2c90711e-bc01-4858-abc7-f10ea077496f.fullname" . }}
  labels:
    {{- include "go-echo2c90711e-bc01-4858-abc7-f10ea077496f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2c90711e-bc01-4858-abc7-f10ea077496f.selectorLabels" . | nindent 6 }}
