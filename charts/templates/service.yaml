apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo110e5f03-f4ec-4162-888b-6c1dddf957b4.fullname" . }}
  labels:
    {{- include "go-echo110e5f03-f4ec-4162-888b-6c1dddf957b4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo110e5f03-f4ec-4162-888b-6c1dddf957b4.selectorLabels" . | nindent 6 }}
