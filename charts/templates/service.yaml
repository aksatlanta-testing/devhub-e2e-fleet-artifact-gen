apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc71b78b2-3080-4162-aa93-18ce50c988dc.fullname" . }}
  labels:
    {{- include "go-echoc71b78b2-3080-4162-aa93-18ce50c988dc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc71b78b2-3080-4162-aa93-18ce50c988dc.selectorLabels" . | nindent 6 }}
