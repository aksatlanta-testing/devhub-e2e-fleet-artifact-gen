apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo97c3cb6d-c2d7-480b-83ba-505065f2c7ab.fullname" . }}
  labels:
    {{- include "go-echo97c3cb6d-c2d7-480b-83ba-505065f2c7ab.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo97c3cb6d-c2d7-480b-83ba-505065f2c7ab.selectorLabels" . | nindent 6 }}
