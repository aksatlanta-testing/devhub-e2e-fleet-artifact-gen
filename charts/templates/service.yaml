apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo60bef0b4-24a1-49ea-99ff-ee8936696b95.fullname" . }}
  labels:
    {{- include "go-echo60bef0b4-24a1-49ea-99ff-ee8936696b95.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo60bef0b4-24a1-49ea-99ff-ee8936696b95.selectorLabels" . | nindent 6 }}
