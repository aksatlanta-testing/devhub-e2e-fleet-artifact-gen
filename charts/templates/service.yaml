apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofa9f7a5e-cb25-4cb9-a262-58caa6006cd1.fullname" . }}
  labels:
    {{- include "go-echofa9f7a5e-cb25-4cb9-a262-58caa6006cd1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofa9f7a5e-cb25-4cb9-a262-58caa6006cd1.selectorLabels" . | nindent 6 }}
