apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof5b6350b-cd86-46e1-80c9-f0c71cea9f70.fullname" . }}
  labels:
    {{- include "go-echof5b6350b-cd86-46e1-80c9-f0c71cea9f70.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof5b6350b-cd86-46e1-80c9-f0c71cea9f70.selectorLabels" . | nindent 6 }}
