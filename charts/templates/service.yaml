apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo81e4e19b-dee6-425e-a895-6492a12a54ff.fullname" . }}
  labels:
    {{- include "go-echo81e4e19b-dee6-425e-a895-6492a12a54ff.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo81e4e19b-dee6-425e-a895-6492a12a54ff.selectorLabels" . | nindent 6 }}
