apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3f83000b-bd9c-4e2d-ac47-b454f53577db.fullname" . }}
  labels:
    {{- include "go-echo3f83000b-bd9c-4e2d-ac47-b454f53577db.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3f83000b-bd9c-4e2d-ac47-b454f53577db.selectorLabels" . | nindent 6 }}
