apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod2f2b19f-abae-4c56-82a9-98ada94edc3c.fullname" . }}
  labels:
    {{- include "go-echod2f2b19f-abae-4c56-82a9-98ada94edc3c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod2f2b19f-abae-4c56-82a9-98ada94edc3c.selectorLabels" . | nindent 6 }}
