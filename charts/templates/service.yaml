apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3ab8bd56-6424-4b49-95f4-5cf9d5fcfa2e.fullname" . }}
  labels:
    {{- include "go-echo3ab8bd56-6424-4b49-95f4-5cf9d5fcfa2e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3ab8bd56-6424-4b49-95f4-5cf9d5fcfa2e.selectorLabels" . | nindent 6 }}
