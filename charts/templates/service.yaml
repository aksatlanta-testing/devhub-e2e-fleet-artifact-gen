apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod0c54cb7-3669-4059-80d4-013530839b74.fullname" . }}
  labels:
    {{- include "go-echod0c54cb7-3669-4059-80d4-013530839b74.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod0c54cb7-3669-4059-80d4-013530839b74.selectorLabels" . | nindent 6 }}
