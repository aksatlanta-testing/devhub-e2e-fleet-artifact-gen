apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6ce06963-7da0-4db1-aa9a-beacabd4d5d5.fullname" . }}
  labels:
    {{- include "go-echo6ce06963-7da0-4db1-aa9a-beacabd4d5d5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6ce06963-7da0-4db1-aa9a-beacabd4d5d5.selectorLabels" . | nindent 6 }}
