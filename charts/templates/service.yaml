apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8ce84b3e-573c-4ca2-821e-abb579edaa1e.fullname" . }}
  labels:
    {{- include "go-echo8ce84b3e-573c-4ca2-821e-abb579edaa1e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8ce84b3e-573c-4ca2-821e-abb579edaa1e.selectorLabels" . | nindent 6 }}
