apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4bdea8d5-2b9d-4e78-afd9-2759a770859e.fullname" . }}
  labels:
    {{- include "go-echo4bdea8d5-2b9d-4e78-afd9-2759a770859e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4bdea8d5-2b9d-4e78-afd9-2759a770859e.selectorLabels" . | nindent 6 }}
