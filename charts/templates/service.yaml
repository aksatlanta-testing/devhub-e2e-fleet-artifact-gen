apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo72d9dffb-40e4-45ed-9dde-deb0f5fc5e86.fullname" . }}
  labels:
    {{- include "go-echo72d9dffb-40e4-45ed-9dde-deb0f5fc5e86.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo72d9dffb-40e4-45ed-9dde-deb0f5fc5e86.selectorLabels" . | nindent 6 }}
