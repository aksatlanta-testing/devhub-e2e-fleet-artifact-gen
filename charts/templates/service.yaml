apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8ccbeafa-7859-4d81-a4cf-be7f771c16e7.fullname" . }}
  labels:
    {{- include "go-echo8ccbeafa-7859-4d81-a4cf-be7f771c16e7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8ccbeafa-7859-4d81-a4cf-be7f771c16e7.selectorLabels" . | nindent 6 }}
