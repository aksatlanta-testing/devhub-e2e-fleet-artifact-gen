apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0f3e1437-cc7e-43c8-a463-ed5e31fa19e9.fullname" . }}
  labels:
    {{- include "go-echo0f3e1437-cc7e-43c8-a463-ed5e31fa19e9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0f3e1437-cc7e-43c8-a463-ed5e31fa19e9.selectorLabels" . | nindent 6 }}
