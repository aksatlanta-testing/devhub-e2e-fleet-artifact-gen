apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6a7ca4d3-19cd-4bbe-ba17-c4a093600026.fullname" . }}
  labels:
    {{- include "go-echo6a7ca4d3-19cd-4bbe-ba17-c4a093600026.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6a7ca4d3-19cd-4bbe-ba17-c4a093600026.selectorLabels" . | nindent 6 }}
