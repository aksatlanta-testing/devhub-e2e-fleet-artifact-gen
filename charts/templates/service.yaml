apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4af2c7f7-4192-4fac-a7bb-71c9deb7fbd3.fullname" . }}
  labels:
    {{- include "go-echo4af2c7f7-4192-4fac-a7bb-71c9deb7fbd3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4af2c7f7-4192-4fac-a7bb-71c9deb7fbd3.selectorLabels" . | nindent 6 }}
