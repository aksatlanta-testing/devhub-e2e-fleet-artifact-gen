apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo44a82d6c-5cb5-4f65-9a2f-7b014ea77741.fullname" . }}
  labels:
    {{- include "go-echo44a82d6c-5cb5-4f65-9a2f-7b014ea77741.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo44a82d6c-5cb5-4f65-9a2f-7b014ea77741.selectorLabels" . | nindent 6 }}
