apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc35ffa96-9b6c-4702-bfaa-50225d31c999.fullname" . }}
  labels:
    {{- include "go-echoc35ffa96-9b6c-4702-bfaa-50225d31c999.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc35ffa96-9b6c-4702-bfaa-50225d31c999.selectorLabels" . | nindent 6 }}
