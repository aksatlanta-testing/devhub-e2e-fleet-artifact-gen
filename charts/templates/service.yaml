apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa58b7722-36de-4397-8eb5-c6ef90ab05f0.fullname" . }}
  labels:
    {{- include "go-echoa58b7722-36de-4397-8eb5-c6ef90ab05f0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa58b7722-36de-4397-8eb5-c6ef90ab05f0.selectorLabels" . | nindent 6 }}
