apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo703ec6bc-ae45-46e4-a71c-cab97b4fc918.fullname" . }}
  labels:
    {{- include "go-echo703ec6bc-ae45-46e4-a71c-cab97b4fc918.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo703ec6bc-ae45-46e4-a71c-cab97b4fc918.selectorLabels" . | nindent 6 }}
