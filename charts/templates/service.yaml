apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa2d34d55-5224-4fa1-a2fb-5c636a4dcca4.fullname" . }}
  labels:
    {{- include "go-echoa2d34d55-5224-4fa1-a2fb-5c636a4dcca4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa2d34d55-5224-4fa1-a2fb-5c636a4dcca4.selectorLabels" . | nindent 6 }}
