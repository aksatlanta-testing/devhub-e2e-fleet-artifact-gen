apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo85291833-a9ec-4cc3-811d-9810563df58a.fullname" . }}
  labels:
    {{- include "go-echo85291833-a9ec-4cc3-811d-9810563df58a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo85291833-a9ec-4cc3-811d-9810563df58a.selectorLabels" . | nindent 6 }}
