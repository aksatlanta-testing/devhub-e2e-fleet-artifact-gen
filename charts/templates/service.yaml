apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo65b09842-a1d4-4bbf-a2da-600ae895bf5f.fullname" . }}
  labels:
    {{- include "go-echo65b09842-a1d4-4bbf-a2da-600ae895bf5f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo65b09842-a1d4-4bbf-a2da-600ae895bf5f.selectorLabels" . | nindent 6 }}
