apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6be26223-7958-4c05-9da1-9c145b363cbf.fullname" . }}
  labels:
    {{- include "go-echo6be26223-7958-4c05-9da1-9c145b363cbf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6be26223-7958-4c05-9da1-9c145b363cbf.selectorLabels" . | nindent 6 }}
