apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob1b197bd-3dbc-4bb6-b283-14177a3ef75b.fullname" . }}
  labels:
    {{- include "go-echob1b197bd-3dbc-4bb6-b283-14177a3ef75b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob1b197bd-3dbc-4bb6-b283-14177a3ef75b.selectorLabels" . | nindent 6 }}
