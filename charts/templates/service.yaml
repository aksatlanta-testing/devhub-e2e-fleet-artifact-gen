apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe5b90b92-7ee2-49d1-902e-e57b2ccc1844.fullname" . }}
  labels:
    {{- include "go-echoe5b90b92-7ee2-49d1-902e-e57b2ccc1844.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe5b90b92-7ee2-49d1-902e-e57b2ccc1844.selectorLabels" . | nindent 6 }}
