apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo06b328ab-f38b-4580-a459-8d5d2c3cb042.fullname" . }}
  labels:
    {{- include "go-echo06b328ab-f38b-4580-a459-8d5d2c3cb042.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo06b328ab-f38b-4580-a459-8d5d2c3cb042.selectorLabels" . | nindent 6 }}
