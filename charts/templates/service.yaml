apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4c27aae1-413a-4752-aae8-3070d39def45.fullname" . }}
  labels:
    {{- include "go-echo4c27aae1-413a-4752-aae8-3070d39def45.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4c27aae1-413a-4752-aae8-3070d39def45.selectorLabels" . | nindent 6 }}
