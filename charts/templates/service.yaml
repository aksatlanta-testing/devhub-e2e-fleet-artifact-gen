apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoad4dec90-7da3-44f9-90df-5c25e12e6aa6.fullname" . }}
  labels:
    {{- include "go-echoad4dec90-7da3-44f9-90df-5c25e12e6aa6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoad4dec90-7da3-44f9-90df-5c25e12e6aa6.selectorLabels" . | nindent 6 }}
