apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0c6a8905-1cde-49bb-8c3a-3fd72ea89a3a.fullname" . }}
  labels:
    {{- include "go-echo0c6a8905-1cde-49bb-8c3a-3fd72ea89a3a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0c6a8905-1cde-49bb-8c3a-3fd72ea89a3a.selectorLabels" . | nindent 6 }}
