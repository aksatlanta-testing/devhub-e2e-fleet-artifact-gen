apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo87232f52-8747-4890-8002-dc5d3808cc79.fullname" . }}
  labels:
    {{- include "go-echo87232f52-8747-4890-8002-dc5d3808cc79.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo87232f52-8747-4890-8002-dc5d3808cc79.selectorLabels" . | nindent 6 }}
