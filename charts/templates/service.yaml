apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8e190071-6365-4c4a-9f6f-99ee34d915c5.fullname" . }}
  labels:
    {{- include "go-echo8e190071-6365-4c4a-9f6f-99ee34d915c5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8e190071-6365-4c4a-9f6f-99ee34d915c5.selectorLabels" . | nindent 6 }}
