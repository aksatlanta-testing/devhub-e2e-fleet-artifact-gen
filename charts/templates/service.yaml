apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodff1bd14-136a-47aa-87ea-f9ba17f5ca01.fullname" . }}
  labels:
    {{- include "go-echodff1bd14-136a-47aa-87ea-f9ba17f5ca01.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodff1bd14-136a-47aa-87ea-f9ba17f5ca01.selectorLabels" . | nindent 6 }}
