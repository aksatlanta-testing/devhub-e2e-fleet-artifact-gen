apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3193ac11-83dc-40ce-8c5b-0fd023cde2a0.fullname" . }}
  labels:
    {{- include "go-echo3193ac11-83dc-40ce-8c5b-0fd023cde2a0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3193ac11-83dc-40ce-8c5b-0fd023cde2a0.selectorLabels" . | nindent 6 }}
