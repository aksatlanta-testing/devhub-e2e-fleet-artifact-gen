apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo59ec9cd1-32c4-4c33-a02e-c983ee3f3c66.fullname" . }}
  labels:
    {{- include "go-echo59ec9cd1-32c4-4c33-a02e-c983ee3f3c66.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo59ec9cd1-32c4-4c33-a02e-c983ee3f3c66.selectorLabels" . | nindent 6 }}
