apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8b5263a2-9754-4692-a665-96b369b2003f.fullname" . }}
  labels:
    {{- include "go-echo8b5263a2-9754-4692-a665-96b369b2003f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8b5263a2-9754-4692-a665-96b369b2003f.selectorLabels" . | nindent 6 }}
