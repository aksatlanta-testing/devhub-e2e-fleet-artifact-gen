apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo16500729-5479-4bf8-a8eb-33e5f0bc1965.fullname" . }}
  labels:
    {{- include "go-echo16500729-5479-4bf8-a8eb-33e5f0bc1965.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo16500729-5479-4bf8-a8eb-33e5f0bc1965.selectorLabels" . | nindent 6 }}
