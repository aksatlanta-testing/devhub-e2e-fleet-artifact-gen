apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8085a3bc-27c4-4449-91c9-4b5eb17b225e.fullname" . }}
  labels:
    {{- include "go-echo8085a3bc-27c4-4449-91c9-4b5eb17b225e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8085a3bc-27c4-4449-91c9-4b5eb17b225e.selectorLabels" . | nindent 6 }}
