apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocbdfaf2d-bf1a-4ae8-b927-0bcc5f37e900.fullname" . }}
  labels:
    {{- include "go-echocbdfaf2d-bf1a-4ae8-b927-0bcc5f37e900.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocbdfaf2d-bf1a-4ae8-b927-0bcc5f37e900.selectorLabels" . | nindent 6 }}
