apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5d11b4fc-ac9b-4a74-8a8a-9d67789876bd.fullname" . }}
  labels:
    {{- include "go-echo5d11b4fc-ac9b-4a74-8a8a-9d67789876bd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5d11b4fc-ac9b-4a74-8a8a-9d67789876bd.selectorLabels" . | nindent 6 }}
