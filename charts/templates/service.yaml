apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof07d7908-f0c4-4508-ae55-c4ac69743fc0.fullname" . }}
  labels:
    {{- include "go-echof07d7908-f0c4-4508-ae55-c4ac69743fc0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof07d7908-f0c4-4508-ae55-c4ac69743fc0.selectorLabels" . | nindent 6 }}
