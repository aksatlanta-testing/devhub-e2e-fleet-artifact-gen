apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo93e7fdcb-e96b-4139-a8f2-6c489100f47f.fullname" . }}
  labels:
    {{- include "go-echo93e7fdcb-e96b-4139-a8f2-6c489100f47f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo93e7fdcb-e96b-4139-a8f2-6c489100f47f.selectorLabels" . | nindent 6 }}
