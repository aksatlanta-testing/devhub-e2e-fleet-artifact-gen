apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6825b8c2-22de-483c-b2c0-d86d433b3236.fullname" . }}
  labels:
    {{- include "go-echo6825b8c2-22de-483c-b2c0-d86d433b3236.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6825b8c2-22de-483c-b2c0-d86d433b3236.selectorLabels" . | nindent 6 }}
