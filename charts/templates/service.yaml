apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo688321a9-4bd2-487a-8e9f-5b7a2c6345a3.fullname" . }}
  labels:
    {{- include "go-echo688321a9-4bd2-487a-8e9f-5b7a2c6345a3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo688321a9-4bd2-487a-8e9f-5b7a2c6345a3.selectorLabels" . | nindent 6 }}
