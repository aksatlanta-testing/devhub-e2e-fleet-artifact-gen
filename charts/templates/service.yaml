apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoff69d8f7-5f3d-4558-a7e8-296fd985f803.fullname" . }}
  labels:
    {{- include "go-echoff69d8f7-5f3d-4558-a7e8-296fd985f803.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoff69d8f7-5f3d-4558-a7e8-296fd985f803.selectorLabels" . | nindent 6 }}
