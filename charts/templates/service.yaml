apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof36584ee-418c-44a3-8248-e5b4ee18457d.fullname" . }}
  labels:
    {{- include "go-echof36584ee-418c-44a3-8248-e5b4ee18457d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof36584ee-418c-44a3-8248-e5b4ee18457d.selectorLabels" . | nindent 6 }}
