apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1c27991b-c622-43d8-ab18-a4d1a79757eb.fullname" . }}
  labels:
    {{- include "go-echo1c27991b-c622-43d8-ab18-a4d1a79757eb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1c27991b-c622-43d8-ab18-a4d1a79757eb.selectorLabels" . | nindent 6 }}
