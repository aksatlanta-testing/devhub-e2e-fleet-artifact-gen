apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocab76678-6947-46a7-ac12-e0d091ef90ac.fullname" . }}
  labels:
    {{- include "go-echocab76678-6947-46a7-ac12-e0d091ef90ac.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocab76678-6947-46a7-ac12-e0d091ef90ac.selectorLabels" . | nindent 6 }}
