apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4b8547b5-e023-42a3-909d-fc707cbfc816.fullname" . }}
  labels:
    {{- include "go-echo4b8547b5-e023-42a3-909d-fc707cbfc816.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4b8547b5-e023-42a3-909d-fc707cbfc816.selectorLabels" . | nindent 6 }}
