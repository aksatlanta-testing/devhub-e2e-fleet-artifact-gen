apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo13a5c545-f25c-4c6c-b923-164ee56cf597.fullname" . }}
  labels:
    {{- include "go-echo13a5c545-f25c-4c6c-b923-164ee56cf597.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo13a5c545-f25c-4c6c-b923-164ee56cf597.selectorLabels" . | nindent 6 }}
