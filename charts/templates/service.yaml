apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob7a6bdb7-272d-4ee8-bdae-4efa6f42009a.fullname" . }}
  labels:
    {{- include "go-echob7a6bdb7-272d-4ee8-bdae-4efa6f42009a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob7a6bdb7-272d-4ee8-bdae-4efa6f42009a.selectorLabels" . | nindent 6 }}
