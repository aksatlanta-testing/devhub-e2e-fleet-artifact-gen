apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7debed0b-b0c5-4b28-a03f-31bdeb806855.fullname" . }}
  labels:
    {{- include "go-echo7debed0b-b0c5-4b28-a03f-31bdeb806855.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7debed0b-b0c5-4b28-a03f-31bdeb806855.selectorLabels" . | nindent 6 }}
