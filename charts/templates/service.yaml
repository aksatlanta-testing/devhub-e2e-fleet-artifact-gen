apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo09312698-659d-4c48-b220-e648484fd326.fullname" . }}
  labels:
    {{- include "go-echo09312698-659d-4c48-b220-e648484fd326.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo09312698-659d-4c48-b220-e648484fd326.selectorLabels" . | nindent 6 }}
