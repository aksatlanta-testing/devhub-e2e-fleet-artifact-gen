apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo391bc69b-4518-450f-aa9b-d7f1b2529e00.fullname" . }}
  labels:
    {{- include "go-echo391bc69b-4518-450f-aa9b-d7f1b2529e00.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo391bc69b-4518-450f-aa9b-d7f1b2529e00.selectorLabels" . | nindent 6 }}
