apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa714f583-aff3-46a8-88c7-21f12ea21f01.fullname" . }}
  labels:
    {{- include "go-echoa714f583-aff3-46a8-88c7-21f12ea21f01.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa714f583-aff3-46a8-88c7-21f12ea21f01.selectorLabels" . | nindent 6 }}
