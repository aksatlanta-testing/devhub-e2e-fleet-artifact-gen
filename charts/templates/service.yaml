apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5d804fb2-6904-4ff5-bb49-3a1ea8e868f9.fullname" . }}
  labels:
    {{- include "go-echo5d804fb2-6904-4ff5-bb49-3a1ea8e868f9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5d804fb2-6904-4ff5-bb49-3a1ea8e868f9.selectorLabels" . | nindent 6 }}
