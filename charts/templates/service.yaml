apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod2219c03-97e3-4c6f-a825-3c81fa55a5f8.fullname" . }}
  labels:
    {{- include "go-echod2219c03-97e3-4c6f-a825-3c81fa55a5f8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod2219c03-97e3-4c6f-a825-3c81fa55a5f8.selectorLabels" . | nindent 6 }}
