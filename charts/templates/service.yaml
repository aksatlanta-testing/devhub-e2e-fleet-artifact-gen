apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3cdc5363-69eb-4483-ae74-89ea8d44dd5e.fullname" . }}
  labels:
    {{- include "go-echo3cdc5363-69eb-4483-ae74-89ea8d44dd5e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3cdc5363-69eb-4483-ae74-89ea8d44dd5e.selectorLabels" . | nindent 6 }}
