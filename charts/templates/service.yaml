apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1f2fd370-196f-4d01-bed7-8f2e28c91e56.fullname" . }}
  labels:
    {{- include "go-echo1f2fd370-196f-4d01-bed7-8f2e28c91e56.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1f2fd370-196f-4d01-bed7-8f2e28c91e56.selectorLabels" . | nindent 6 }}
