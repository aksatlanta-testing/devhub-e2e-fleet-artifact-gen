apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3619abbb-8d32-4ccb-93ba-50cfbadc1741.fullname" . }}
  labels:
    {{- include "go-echo3619abbb-8d32-4ccb-93ba-50cfbadc1741.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3619abbb-8d32-4ccb-93ba-50cfbadc1741.selectorLabels" . | nindent 6 }}
