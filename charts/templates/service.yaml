apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4e31ba2e-4fc1-4535-997f-c4f6ce3e275d.fullname" . }}
  labels:
    {{- include "go-echo4e31ba2e-4fc1-4535-997f-c4f6ce3e275d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4e31ba2e-4fc1-4535-997f-c4f6ce3e275d.selectorLabels" . | nindent 6 }}
