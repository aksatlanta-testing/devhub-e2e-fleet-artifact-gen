apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo56a10a75-fe25-4d85-9cbd-b77a9e901825.fullname" . }}
  labels:
    {{- include "go-echo56a10a75-fe25-4d85-9cbd-b77a9e901825.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo56a10a75-fe25-4d85-9cbd-b77a9e901825.selectorLabels" . | nindent 6 }}
