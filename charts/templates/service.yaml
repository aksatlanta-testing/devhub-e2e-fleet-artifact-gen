apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobc7c3333-0b84-4075-965c-4881ae118ff1.fullname" . }}
  labels:
    {{- include "go-echobc7c3333-0b84-4075-965c-4881ae118ff1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobc7c3333-0b84-4075-965c-4881ae118ff1.selectorLabels" . | nindent 6 }}
