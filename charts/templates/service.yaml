apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7a24d88c-c558-43f6-8f31-1acd780ebe91.fullname" . }}
  labels:
    {{- include "go-echo7a24d88c-c558-43f6-8f31-1acd780ebe91.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7a24d88c-c558-43f6-8f31-1acd780ebe91.selectorLabels" . | nindent 6 }}
