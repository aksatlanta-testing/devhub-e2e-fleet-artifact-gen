apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe88b7ca5-47f6-4391-8707-faddc2bdf313.fullname" . }}
  labels:
    {{- include "go-echoe88b7ca5-47f6-4391-8707-faddc2bdf313.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe88b7ca5-47f6-4391-8707-faddc2bdf313.selectorLabels" . | nindent 6 }}
