apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe3ed893d-86d1-4b8e-b10c-d4c49195e51d.fullname" . }}
  labels:
    {{- include "go-echoe3ed893d-86d1-4b8e-b10c-d4c49195e51d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe3ed893d-86d1-4b8e-b10c-d4c49195e51d.selectorLabels" . | nindent 6 }}
