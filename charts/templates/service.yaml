apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7e1af950-d2fa-45f3-85cb-d7533be15a98.fullname" . }}
  labels:
    {{- include "go-echo7e1af950-d2fa-45f3-85cb-d7533be15a98.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7e1af950-d2fa-45f3-85cb-d7533be15a98.selectorLabels" . | nindent 6 }}
