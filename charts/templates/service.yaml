apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6864d765-c8b9-4afb-b900-b63a8b896b33.fullname" . }}
  labels:
    {{- include "go-echo6864d765-c8b9-4afb-b900-b63a8b896b33.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6864d765-c8b9-4afb-b900-b63a8b896b33.selectorLabels" . | nindent 6 }}
