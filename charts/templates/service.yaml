apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodea5f3b3-aec6-4220-ade9-184889369ecd.fullname" . }}
  labels:
    {{- include "go-echodea5f3b3-aec6-4220-ade9-184889369ecd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodea5f3b3-aec6-4220-ade9-184889369ecd.selectorLabels" . | nindent 6 }}
