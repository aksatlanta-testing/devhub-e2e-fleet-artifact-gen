apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo77d19a82-234a-4de2-af8a-685904a6dfa1.fullname" . }}
  labels:
    {{- include "go-echo77d19a82-234a-4de2-af8a-685904a6dfa1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo77d19a82-234a-4de2-af8a-685904a6dfa1.selectorLabels" . | nindent 6 }}
