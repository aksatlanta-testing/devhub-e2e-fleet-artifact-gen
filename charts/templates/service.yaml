apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc206a085-aaaf-47ec-9122-77cbcf9e6c71.fullname" . }}
  labels:
    {{- include "go-echoc206a085-aaaf-47ec-9122-77cbcf9e6c71.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc206a085-aaaf-47ec-9122-77cbcf9e6c71.selectorLabels" . | nindent 6 }}
