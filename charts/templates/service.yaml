apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof58ed115-3da4-4900-add0-557d5ea40f9d.fullname" . }}
  labels:
    {{- include "go-echof58ed115-3da4-4900-add0-557d5ea40f9d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof58ed115-3da4-4900-add0-557d5ea40f9d.selectorLabels" . | nindent 6 }}
