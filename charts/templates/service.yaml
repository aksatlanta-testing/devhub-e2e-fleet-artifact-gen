apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0f6fb56d-b2d1-47df-8ce2-3329d98e41eb.fullname" . }}
  labels:
    {{- include "go-echo0f6fb56d-b2d1-47df-8ce2-3329d98e41eb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0f6fb56d-b2d1-47df-8ce2-3329d98e41eb.selectorLabels" . | nindent 6 }}
