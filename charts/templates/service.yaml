apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1240f2c1-c666-49e2-a67a-a2e46dd8ecbe.fullname" . }}
  labels:
    {{- include "go-echo1240f2c1-c666-49e2-a67a-a2e46dd8ecbe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1240f2c1-c666-49e2-a67a-a2e46dd8ecbe.selectorLabels" . | nindent 6 }}
