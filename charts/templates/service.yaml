apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9d2768a5-e9dc-4b2d-b1fd-532e8c6ab298.fullname" . }}
  labels:
    {{- include "go-echo9d2768a5-e9dc-4b2d-b1fd-532e8c6ab298.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9d2768a5-e9dc-4b2d-b1fd-532e8c6ab298.selectorLabels" . | nindent 6 }}
