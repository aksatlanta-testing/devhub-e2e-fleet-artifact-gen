apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod74e86fb-63bd-47f6-b4f3-6d627f7e22e1.fullname" . }}
  labels:
    {{- include "go-echod74e86fb-63bd-47f6-b4f3-6d627f7e22e1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod74e86fb-63bd-47f6-b4f3-6d627f7e22e1.selectorLabels" . | nindent 6 }}
