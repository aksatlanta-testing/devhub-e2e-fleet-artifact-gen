apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa8efa0a2-ad62-4ade-b060-91354f689208.fullname" . }}
  labels:
    {{- include "go-echoa8efa0a2-ad62-4ade-b060-91354f689208.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa8efa0a2-ad62-4ade-b060-91354f689208.selectorLabels" . | nindent 6 }}
