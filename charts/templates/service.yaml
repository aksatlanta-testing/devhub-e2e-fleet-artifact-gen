apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoec25dae4-b53a-44e6-9e83-3c27ba77241e.fullname" . }}
  labels:
    {{- include "go-echoec25dae4-b53a-44e6-9e83-3c27ba77241e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoec25dae4-b53a-44e6-9e83-3c27ba77241e.selectorLabels" . | nindent 6 }}
