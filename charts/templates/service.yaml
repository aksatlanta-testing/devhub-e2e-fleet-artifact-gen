apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo56dd2e88-82f1-4625-81fd-5764a914c3d4.fullname" . }}
  labels:
    {{- include "go-echo56dd2e88-82f1-4625-81fd-5764a914c3d4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo56dd2e88-82f1-4625-81fd-5764a914c3d4.selectorLabels" . | nindent 6 }}
