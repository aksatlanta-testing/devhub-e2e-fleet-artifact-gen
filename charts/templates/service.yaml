apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8aa77b9f-3df3-4e3d-a506-0f1c80da992a.fullname" . }}
  labels:
    {{- include "go-echo8aa77b9f-3df3-4e3d-a506-0f1c80da992a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8aa77b9f-3df3-4e3d-a506-0f1c80da992a.selectorLabels" . | nindent 6 }}
