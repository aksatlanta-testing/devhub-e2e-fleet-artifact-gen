apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8bd38111-d59a-44fc-a28e-1c8879fdd441.fullname" . }}
  labels:
    {{- include "go-echo8bd38111-d59a-44fc-a28e-1c8879fdd441.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8bd38111-d59a-44fc-a28e-1c8879fdd441.selectorLabels" . | nindent 6 }}
