apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoefea38a8-8c0d-4568-aad3-96f7a933b47f.fullname" . }}
  labels:
    {{- include "go-echoefea38a8-8c0d-4568-aad3-96f7a933b47f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoefea38a8-8c0d-4568-aad3-96f7a933b47f.selectorLabels" . | nindent 6 }}
