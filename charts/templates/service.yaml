apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo667e0b51-51c7-49b1-9946-a9a669b592a6.fullname" . }}
  labels:
    {{- include "go-echo667e0b51-51c7-49b1-9946-a9a669b592a6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo667e0b51-51c7-49b1-9946-a9a669b592a6.selectorLabels" . | nindent 6 }}
