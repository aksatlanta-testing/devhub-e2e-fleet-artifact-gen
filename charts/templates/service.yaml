apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1a81439f-20a1-4261-97a1-19eef9b6e95d.fullname" . }}
  labels:
    {{- include "go-echo1a81439f-20a1-4261-97a1-19eef9b6e95d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1a81439f-20a1-4261-97a1-19eef9b6e95d.selectorLabels" . | nindent 6 }}
