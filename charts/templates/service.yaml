apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo44f82049-d29d-440e-a43c-e44088d3add6.fullname" . }}
  labels:
    {{- include "go-echo44f82049-d29d-440e-a43c-e44088d3add6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo44f82049-d29d-440e-a43c-e44088d3add6.selectorLabels" . | nindent 6 }}
