apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoae182c43-c8fd-4602-92fc-c6cfe4c3a472.fullname" . }}
  labels:
    {{- include "go-echoae182c43-c8fd-4602-92fc-c6cfe4c3a472.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoae182c43-c8fd-4602-92fc-c6cfe4c3a472.selectorLabels" . | nindent 6 }}
