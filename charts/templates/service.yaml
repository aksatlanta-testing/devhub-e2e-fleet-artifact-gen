apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa64b4bc1-9291-4783-ae47-82737bf6bd58.fullname" . }}
  labels:
    {{- include "go-echoa64b4bc1-9291-4783-ae47-82737bf6bd58.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa64b4bc1-9291-4783-ae47-82737bf6bd58.selectorLabels" . | nindent 6 }}
