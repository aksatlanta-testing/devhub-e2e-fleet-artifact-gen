apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoacfc7b64-fe85-4c6d-b65c-97ffc9663ae2.fullname" . }}
  labels:
    {{- include "go-echoacfc7b64-fe85-4c6d-b65c-97ffc9663ae2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoacfc7b64-fe85-4c6d-b65c-97ffc9663ae2.selectorLabels" . | nindent 6 }}
