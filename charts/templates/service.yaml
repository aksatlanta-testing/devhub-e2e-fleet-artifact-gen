apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc3f23a2a-fbc0-42cc-ad60-df082618a069.fullname" . }}
  labels:
    {{- include "go-echoc3f23a2a-fbc0-42cc-ad60-df082618a069.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc3f23a2a-fbc0-42cc-ad60-df082618a069.selectorLabels" . | nindent 6 }}
