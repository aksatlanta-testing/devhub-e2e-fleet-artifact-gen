apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobc0d38de-a4f5-45ca-9caa-96ceb76e1904.fullname" . }}
  labels:
    {{- include "go-echobc0d38de-a4f5-45ca-9caa-96ceb76e1904.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobc0d38de-a4f5-45ca-9caa-96ceb76e1904.selectorLabels" . | nindent 6 }}
