apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0a60c775-1394-44fe-80b1-41a2971605d8.fullname" . }}
  labels:
    {{- include "go-echo0a60c775-1394-44fe-80b1-41a2971605d8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0a60c775-1394-44fe-80b1-41a2971605d8.selectorLabels" . | nindent 6 }}
