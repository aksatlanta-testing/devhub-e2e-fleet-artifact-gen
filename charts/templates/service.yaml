apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0f8a0438-f466-42bb-b5ea-2170b71da9fb.fullname" . }}
  labels:
    {{- include "go-echo0f8a0438-f466-42bb-b5ea-2170b71da9fb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0f8a0438-f466-42bb-b5ea-2170b71da9fb.selectorLabels" . | nindent 6 }}
