apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod839ea76-8c09-4f86-b137-bc26fcc89410.fullname" . }}
  labels:
    {{- include "go-echod839ea76-8c09-4f86-b137-bc26fcc89410.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod839ea76-8c09-4f86-b137-bc26fcc89410.selectorLabels" . | nindent 6 }}
