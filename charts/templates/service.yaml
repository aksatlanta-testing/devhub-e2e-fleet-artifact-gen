apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob1d379fb-32c3-4a0b-a6b6-f81d97e02a29.fullname" . }}
  labels:
    {{- include "go-echob1d379fb-32c3-4a0b-a6b6-f81d97e02a29.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob1d379fb-32c3-4a0b-a6b6-f81d97e02a29.selectorLabels" . | nindent 6 }}
