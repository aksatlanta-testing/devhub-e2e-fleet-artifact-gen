apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc4c4f1dc-71ca-4664-9cf7-d7c7c3aff4f6.fullname" . }}
  labels:
    {{- include "go-echoc4c4f1dc-71ca-4664-9cf7-d7c7c3aff4f6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc4c4f1dc-71ca-4664-9cf7-d7c7c3aff4f6.selectorLabels" . | nindent 6 }}
