apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa7e46dd1-2784-41af-9d23-d2a35ef61235.fullname" . }}
  labels:
    {{- include "go-echoa7e46dd1-2784-41af-9d23-d2a35ef61235.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa7e46dd1-2784-41af-9d23-d2a35ef61235.selectorLabels" . | nindent 6 }}
