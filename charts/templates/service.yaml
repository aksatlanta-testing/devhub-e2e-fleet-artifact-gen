apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobb7921b4-c8b7-4f9f-8102-70240ae7085e.fullname" . }}
  labels:
    {{- include "go-echobb7921b4-c8b7-4f9f-8102-70240ae7085e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobb7921b4-c8b7-4f9f-8102-70240ae7085e.selectorLabels" . | nindent 6 }}
