apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof75f2f01-c76a-4cfe-ab6d-317c29b86684.fullname" . }}
  labels:
    {{- include "go-echof75f2f01-c76a-4cfe-ab6d-317c29b86684.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof75f2f01-c76a-4cfe-ab6d-317c29b86684.selectorLabels" . | nindent 6 }}
