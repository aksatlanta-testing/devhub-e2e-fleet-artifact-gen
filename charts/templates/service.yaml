apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo45f5c1ab-3ce2-4ac3-8f34-743d2d9b54ec.fullname" . }}
  labels:
    {{- include "go-echo45f5c1ab-3ce2-4ac3-8f34-743d2d9b54ec.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo45f5c1ab-3ce2-4ac3-8f34-743d2d9b54ec.selectorLabels" . | nindent 6 }}
