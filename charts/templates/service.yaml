apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7bcea6f7-3487-4b47-b488-a0c6f5e0db14.fullname" . }}
  labels:
    {{- include "go-echo7bcea6f7-3487-4b47-b488-a0c6f5e0db14.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7bcea6f7-3487-4b47-b488-a0c6f5e0db14.selectorLabels" . | nindent 6 }}
