apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo24eab0bb-0440-42d1-bf59-1d9e9d1e1bff.fullname" . }}
  labels:
    {{- include "go-echo24eab0bb-0440-42d1-bf59-1d9e9d1e1bff.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo24eab0bb-0440-42d1-bf59-1d9e9d1e1bff.selectorLabels" . | nindent 6 }}
