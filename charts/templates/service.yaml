apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2352f0ff-f9d8-4f3b-bc1b-837399f76339.fullname" . }}
  labels:
    {{- include "go-echo2352f0ff-f9d8-4f3b-bc1b-837399f76339.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2352f0ff-f9d8-4f3b-bc1b-837399f76339.selectorLabels" . | nindent 6 }}
