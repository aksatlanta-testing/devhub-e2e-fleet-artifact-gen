apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo38e696c0-6121-423e-9a42-222d76b3c22c.fullname" . }}
  labels:
    {{- include "go-echo38e696c0-6121-423e-9a42-222d76b3c22c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo38e696c0-6121-423e-9a42-222d76b3c22c.selectorLabels" . | nindent 6 }}
