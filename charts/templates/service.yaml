apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo002074a7-af6a-49a1-9825-6049c4f9bcfb.fullname" . }}
  labels:
    {{- include "go-echo002074a7-af6a-49a1-9825-6049c4f9bcfb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo002074a7-af6a-49a1-9825-6049c4f9bcfb.selectorLabels" . | nindent 6 }}
