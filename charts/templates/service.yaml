apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof8beab65-b1fc-41dc-b4e5-3b99889ec6d4.fullname" . }}
  labels:
    {{- include "go-echof8beab65-b1fc-41dc-b4e5-3b99889ec6d4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof8beab65-b1fc-41dc-b4e5-3b99889ec6d4.selectorLabels" . | nindent 6 }}
