apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2683c2fe-2b21-4932-a29d-8927e8815046.fullname" . }}
  labels:
    {{- include "go-echo2683c2fe-2b21-4932-a29d-8927e8815046.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2683c2fe-2b21-4932-a29d-8927e8815046.selectorLabels" . | nindent 6 }}
