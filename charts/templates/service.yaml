apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo85ba9328-2977-457e-b201-de94b83e5acb.fullname" . }}
  labels:
    {{- include "go-echo85ba9328-2977-457e-b201-de94b83e5acb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo85ba9328-2977-457e-b201-de94b83e5acb.selectorLabels" . | nindent 6 }}
