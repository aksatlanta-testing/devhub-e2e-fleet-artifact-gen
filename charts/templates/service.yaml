apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof063a24e-743f-4aaf-9916-1daead695b64.fullname" . }}
  labels:
    {{- include "go-echof063a24e-743f-4aaf-9916-1daead695b64.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof063a24e-743f-4aaf-9916-1daead695b64.selectorLabels" . | nindent 6 }}
