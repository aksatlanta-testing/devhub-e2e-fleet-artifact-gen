apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod3f8388d-6bd5-45d5-ae8c-ab4e455f07fe.fullname" . }}
  labels:
    {{- include "go-echod3f8388d-6bd5-45d5-ae8c-ab4e455f07fe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod3f8388d-6bd5-45d5-ae8c-ab4e455f07fe.selectorLabels" . | nindent 6 }}
