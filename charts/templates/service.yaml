apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo59fb9e7e-8f15-400c-a055-56fbcf883037.fullname" . }}
  labels:
    {{- include "go-echo59fb9e7e-8f15-400c-a055-56fbcf883037.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo59fb9e7e-8f15-400c-a055-56fbcf883037.selectorLabels" . | nindent 6 }}
