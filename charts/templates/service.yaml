apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2948f50a-131e-46b3-9412-88d02a9369cf.fullname" . }}
  labels:
    {{- include "go-echo2948f50a-131e-46b3-9412-88d02a9369cf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2948f50a-131e-46b3-9412-88d02a9369cf.selectorLabels" . | nindent 6 }}
