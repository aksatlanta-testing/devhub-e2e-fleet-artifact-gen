apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo237d62e8-d1f9-4b1e-b008-8153175f0dbf.fullname" . }}
  labels:
    {{- include "go-echo237d62e8-d1f9-4b1e-b008-8153175f0dbf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo237d62e8-d1f9-4b1e-b008-8153175f0dbf.selectorLabels" . | nindent 6 }}
