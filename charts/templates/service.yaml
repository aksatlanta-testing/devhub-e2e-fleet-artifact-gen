apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo783ec663-7230-41c6-a5c8-c46c9609be40.fullname" . }}
  labels:
    {{- include "go-echo783ec663-7230-41c6-a5c8-c46c9609be40.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo783ec663-7230-41c6-a5c8-c46c9609be40.selectorLabels" . | nindent 6 }}
