apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe2b69331-6449-4632-b5da-56cc803a47e2.fullname" . }}
  labels:
    {{- include "go-echoe2b69331-6449-4632-b5da-56cc803a47e2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe2b69331-6449-4632-b5da-56cc803a47e2.selectorLabels" . | nindent 6 }}
