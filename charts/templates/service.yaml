apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob8a6aa00-3fbc-4d41-8117-5e388fb9c328.fullname" . }}
  labels:
    {{- include "go-echob8a6aa00-3fbc-4d41-8117-5e388fb9c328.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob8a6aa00-3fbc-4d41-8117-5e388fb9c328.selectorLabels" . | nindent 6 }}
