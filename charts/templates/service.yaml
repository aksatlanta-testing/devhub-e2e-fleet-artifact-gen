apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob9d7066d-22a5-46f4-a311-fbfc6e39be35.fullname" . }}
  labels:
    {{- include "go-echob9d7066d-22a5-46f4-a311-fbfc6e39be35.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob9d7066d-22a5-46f4-a311-fbfc6e39be35.selectorLabels" . | nindent 6 }}
