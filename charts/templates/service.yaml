apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo457491ea-98a2-479d-8aea-7ed10851a697.fullname" . }}
  labels:
    {{- include "go-echo457491ea-98a2-479d-8aea-7ed10851a697.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo457491ea-98a2-479d-8aea-7ed10851a697.selectorLabels" . | nindent 6 }}
