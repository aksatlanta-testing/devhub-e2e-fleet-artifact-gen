apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo90d41f44-febf-4c1f-b2b4-1fc77f755431.fullname" . }}
  labels:
    {{- include "go-echo90d41f44-febf-4c1f-b2b4-1fc77f755431.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo90d41f44-febf-4c1f-b2b4-1fc77f755431.selectorLabels" . | nindent 6 }}
