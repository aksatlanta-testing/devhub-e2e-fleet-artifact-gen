apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo367b16b0-ce41-40fd-ac44-14ddd43ff57c.fullname" . }}
  labels:
    {{- include "go-echo367b16b0-ce41-40fd-ac44-14ddd43ff57c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo367b16b0-ce41-40fd-ac44-14ddd43ff57c.selectorLabels" . | nindent 6 }}
