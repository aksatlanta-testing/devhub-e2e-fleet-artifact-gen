apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo338719c8-e5bd-4d2f-aaa9-65153babf739.fullname" . }}
  labels:
    {{- include "go-echo338719c8-e5bd-4d2f-aaa9-65153babf739.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo338719c8-e5bd-4d2f-aaa9-65153babf739.selectorLabels" . | nindent 6 }}
