apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod2cb3472-d228-4f50-a559-57b294c4de69.fullname" . }}
  labels:
    {{- include "go-echod2cb3472-d228-4f50-a559-57b294c4de69.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod2cb3472-d228-4f50-a559-57b294c4de69.selectorLabels" . | nindent 6 }}
