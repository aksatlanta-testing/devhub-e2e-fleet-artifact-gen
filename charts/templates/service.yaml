apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo438155f8-16aa-4a89-86e0-df761c614b67.fullname" . }}
  labels:
    {{- include "go-echo438155f8-16aa-4a89-86e0-df761c614b67.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo438155f8-16aa-4a89-86e0-df761c614b67.selectorLabels" . | nindent 6 }}
