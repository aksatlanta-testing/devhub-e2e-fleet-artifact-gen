apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4003f354-dae9-4ac6-ab2a-63a4035bf70e.fullname" . }}
  labels:
    {{- include "go-echo4003f354-dae9-4ac6-ab2a-63a4035bf70e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4003f354-dae9-4ac6-ab2a-63a4035bf70e.selectorLabels" . | nindent 6 }}
