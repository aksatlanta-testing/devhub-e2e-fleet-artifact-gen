apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo623b68d8-979c-4826-b117-c795a0c563ea.fullname" . }}
  labels:
    {{- include "go-echo623b68d8-979c-4826-b117-c795a0c563ea.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo623b68d8-979c-4826-b117-c795a0c563ea.selectorLabels" . | nindent 6 }}
