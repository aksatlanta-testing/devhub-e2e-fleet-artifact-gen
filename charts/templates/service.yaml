apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo29ba4dcb-98d7-4284-8cdf-52d52350a41b.fullname" . }}
  labels:
    {{- include "go-echo29ba4dcb-98d7-4284-8cdf-52d52350a41b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo29ba4dcb-98d7-4284-8cdf-52d52350a41b.selectorLabels" . | nindent 6 }}
