apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobbbcd278-f78d-4235-9a4b-2d72d462838c.fullname" . }}
  labels:
    {{- include "go-echobbbcd278-f78d-4235-9a4b-2d72d462838c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobbbcd278-f78d-4235-9a4b-2d72d462838c.selectorLabels" . | nindent 6 }}
