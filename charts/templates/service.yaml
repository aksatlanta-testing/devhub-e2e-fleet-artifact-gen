apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0b0e9b54-f975-45e0-a993-629634e80dc6.fullname" . }}
  labels:
    {{- include "go-echo0b0e9b54-f975-45e0-a993-629634e80dc6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0b0e9b54-f975-45e0-a993-629634e80dc6.selectorLabels" . | nindent 6 }}
