apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4534fbd0-e03d-49e1-809c-bc5bb2c42ad3.fullname" . }}
  labels:
    {{- include "go-echo4534fbd0-e03d-49e1-809c-bc5bb2c42ad3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4534fbd0-e03d-49e1-809c-bc5bb2c42ad3.selectorLabels" . | nindent 6 }}
