apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4d2aacc2-1e4f-4741-8789-4cdb53b17899.fullname" . }}
  labels:
    {{- include "go-echo4d2aacc2-1e4f-4741-8789-4cdb53b17899.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
