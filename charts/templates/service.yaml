apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4959a9c9-b65f-442d-8b08-f9ca5cd3b443.fullname" . }}
  labels:
    {{- include "go-echo4959a9c9-b65f-442d-8b08-f9ca5cd3b443.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4959a9c9-b65f-442d-8b08-f9ca5cd3b443.selectorLabels" . | nindent 6 }}
