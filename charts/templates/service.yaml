apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9c66475c-cd72-4c02-a15b-d5bc29a20290.fullname" . }}
  labels:
    {{- include "go-echo9c66475c-cd72-4c02-a15b-d5bc29a20290.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9c66475c-cd72-4c02-a15b-d5bc29a20290.selectorLabels" . | nindent 6 }}
