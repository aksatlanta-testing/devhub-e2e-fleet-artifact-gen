apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo799deab7-8e8f-45ea-8955-c9f9f9387d5e.fullname" . }}
  labels:
    {{- include "go-echo799deab7-8e8f-45ea-8955-c9f9f9387d5e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo799deab7-8e8f-45ea-8955-c9f9f9387d5e.selectorLabels" . | nindent 6 }}
