apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1e4e6d9e-5bbe-462d-9d5b-201d683b2f53.fullname" . }}
  labels:
    {{- include "go-echo1e4e6d9e-5bbe-462d-9d5b-201d683b2f53.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1e4e6d9e-5bbe-462d-9d5b-201d683b2f53.selectorLabels" . | nindent 6 }}
