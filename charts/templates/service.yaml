apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo19f9119f-b40e-437d-81e0-76dce8fb5a11.fullname" . }}
  labels:
    {{- include "go-echo19f9119f-b40e-437d-81e0-76dce8fb5a11.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo19f9119f-b40e-437d-81e0-76dce8fb5a11.selectorLabels" . | nindent 6 }}
