apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echode6daac1-b24d-43ff-81bb-b56100c65255.fullname" . }}
  labels:
    {{- include "go-echode6daac1-b24d-43ff-81bb-b56100c65255.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echode6daac1-b24d-43ff-81bb-b56100c65255.selectorLabels" . | nindent 6 }}
