apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3591a559-0048-4970-bc14-e4fa029d9de8.fullname" . }}
  labels:
    {{- include "go-echo3591a559-0048-4970-bc14-e4fa029d9de8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3591a559-0048-4970-bc14-e4fa029d9de8.selectorLabels" . | nindent 6 }}
