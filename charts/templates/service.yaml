apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7a02bd30-ede5-400e-9c13-88f0c7a73162.fullname" . }}
  labels:
    {{- include "go-echo7a02bd30-ede5-400e-9c13-88f0c7a73162.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7a02bd30-ede5-400e-9c13-88f0c7a73162.selectorLabels" . | nindent 6 }}
