apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7be96c39-88d2-4304-b129-2e228dad8099.fullname" . }}
  labels:
    {{- include "go-echo7be96c39-88d2-4304-b129-2e228dad8099.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
