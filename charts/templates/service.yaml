apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3a7c7b87-cfc3-42f9-b023-4b941f399e8c.fullname" . }}
  labels:
    {{- include "go-echo3a7c7b87-cfc3-42f9-b023-4b941f399e8c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3a7c7b87-cfc3-42f9-b023-4b941f399e8c.selectorLabels" . | nindent 6 }}
