apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa6416424-1bbd-4a90-b882-bed564211a5c.fullname" . }}
  labels:
    {{- include "go-echoa6416424-1bbd-4a90-b882-bed564211a5c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa6416424-1bbd-4a90-b882-bed564211a5c.selectorLabels" . | nindent 6 }}
