apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobd5d427f-435d-4d58-b1bb-61239fc964ce.fullname" . }}
  labels:
    {{- include "go-echobd5d427f-435d-4d58-b1bb-61239fc964ce.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobd5d427f-435d-4d58-b1bb-61239fc964ce.selectorLabels" . | nindent 6 }}
