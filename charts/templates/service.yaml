apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo515e1628-1e52-401e-9211-6818a89fbb04.fullname" . }}
  labels:
    {{- include "go-echo515e1628-1e52-401e-9211-6818a89fbb04.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo515e1628-1e52-401e-9211-6818a89fbb04.selectorLabels" . | nindent 6 }}
