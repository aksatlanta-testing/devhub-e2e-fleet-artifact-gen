apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo868722fa-5073-4d22-ab8f-815d08b8c95f.fullname" . }}
  labels:
    {{- include "go-echo868722fa-5073-4d22-ab8f-815d08b8c95f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo868722fa-5073-4d22-ab8f-815d08b8c95f.selectorLabels" . | nindent 6 }}
