apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4138fc04-e648-4c9a-aa39-51616a485e30.fullname" . }}
  labels:
    {{- include "go-echo4138fc04-e648-4c9a-aa39-51616a485e30.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4138fc04-e648-4c9a-aa39-51616a485e30.selectorLabels" . | nindent 6 }}
