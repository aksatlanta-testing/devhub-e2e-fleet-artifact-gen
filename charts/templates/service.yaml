apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo17647082-bdd4-43ed-a98a-428a472e91ea.fullname" . }}
  labels:
    {{- include "go-echo17647082-bdd4-43ed-a98a-428a472e91ea.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo17647082-bdd4-43ed-a98a-428a472e91ea.selectorLabels" . | nindent 6 }}
