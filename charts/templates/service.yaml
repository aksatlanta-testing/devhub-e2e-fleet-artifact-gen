apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa403c613-99b6-4067-bac3-3e47f8f205fc.fullname" . }}
  labels:
    {{- include "go-echoa403c613-99b6-4067-bac3-3e47f8f205fc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa403c613-99b6-4067-bac3-3e47f8f205fc.selectorLabels" . | nindent 6 }}
