apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6d8b9163-068e-420a-97c2-6c8d50568ec0.fullname" . }}
  labels:
    {{- include "go-echo6d8b9163-068e-420a-97c2-6c8d50568ec0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6d8b9163-068e-420a-97c2-6c8d50568ec0.selectorLabels" . | nindent 6 }}
