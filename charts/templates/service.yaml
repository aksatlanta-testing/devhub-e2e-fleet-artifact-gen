apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe7ca5526-5811-49b2-bfff-249f55c03c9a.fullname" . }}
  labels:
    {{- include "go-echoe7ca5526-5811-49b2-bfff-249f55c03c9a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe7ca5526-5811-49b2-bfff-249f55c03c9a.selectorLabels" . | nindent 6 }}
