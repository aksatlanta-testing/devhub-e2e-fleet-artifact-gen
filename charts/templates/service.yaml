apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echode4490d5-b62a-4289-9609-5ed091ff9c80.fullname" . }}
  labels:
    {{- include "go-echode4490d5-b62a-4289-9609-5ed091ff9c80.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echode4490d5-b62a-4289-9609-5ed091ff9c80.selectorLabels" . | nindent 6 }}
