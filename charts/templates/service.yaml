apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc6c8eeac-5a77-4716-88d3-76aa88b7898a.fullname" . }}
  labels:
    {{- include "go-echoc6c8eeac-5a77-4716-88d3-76aa88b7898a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc6c8eeac-5a77-4716-88d3-76aa88b7898a.selectorLabels" . | nindent 6 }}
