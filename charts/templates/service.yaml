apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo386b9d98-c130-4676-944e-6941bcc74265.fullname" . }}
  labels:
    {{- include "go-echo386b9d98-c130-4676-944e-6941bcc74265.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo386b9d98-c130-4676-944e-6941bcc74265.selectorLabels" . | nindent 6 }}
