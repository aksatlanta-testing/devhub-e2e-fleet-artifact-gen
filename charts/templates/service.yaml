apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1628167a-36d9-450c-86ed-c29503adc09f.fullname" . }}
  labels:
    {{- include "go-echo1628167a-36d9-450c-86ed-c29503adc09f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1628167a-36d9-450c-86ed-c29503adc09f.selectorLabels" . | nindent 6 }}
