apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo54b64fce-4d82-4f51-affa-c0693b114a68.fullname" . }}
  labels:
    {{- include "go-echo54b64fce-4d82-4f51-affa-c0693b114a68.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo54b64fce-4d82-4f51-affa-c0693b114a68.selectorLabels" . | nindent 6 }}
