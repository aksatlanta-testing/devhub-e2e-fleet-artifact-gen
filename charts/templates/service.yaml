apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo849753d4-3004-4fd1-b3dd-9beedb06df92.fullname" . }}
  labels:
    {{- include "go-echo849753d4-3004-4fd1-b3dd-9beedb06df92.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo849753d4-3004-4fd1-b3dd-9beedb06df92.selectorLabels" . | nindent 6 }}
