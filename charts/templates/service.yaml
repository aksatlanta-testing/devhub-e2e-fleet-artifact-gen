apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc4296e60-18bd-4287-8881-709762a08d82.fullname" . }}
  labels:
    {{- include "go-echoc4296e60-18bd-4287-8881-709762a08d82.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc4296e60-18bd-4287-8881-709762a08d82.selectorLabels" . | nindent 6 }}
