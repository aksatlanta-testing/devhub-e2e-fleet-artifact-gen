apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoafac68ca-c4c6-45c8-aaab-06967d5d588d.fullname" . }}
  labels:
    {{- include "go-echoafac68ca-c4c6-45c8-aaab-06967d5d588d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoafac68ca-c4c6-45c8-aaab-06967d5d588d.selectorLabels" . | nindent 6 }}
