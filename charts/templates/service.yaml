apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo03abd1a9-3f1e-4383-9272-9b65673bf853.fullname" . }}
  labels:
    {{- include "go-echo03abd1a9-3f1e-4383-9272-9b65673bf853.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo03abd1a9-3f1e-4383-9272-9b65673bf853.selectorLabels" . | nindent 6 }}
