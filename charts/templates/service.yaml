apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoda7dcf54-b1f2-4940-ad87-71bb78df85f8.fullname" . }}
  labels:
    {{- include "go-echoda7dcf54-b1f2-4940-ad87-71bb78df85f8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoda7dcf54-b1f2-4940-ad87-71bb78df85f8.selectorLabels" . | nindent 6 }}
