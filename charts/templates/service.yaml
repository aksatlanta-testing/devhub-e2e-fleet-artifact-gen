apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo55ec1ca0-b020-4d6d-bc73-83c92157acdc.fullname" . }}
  labels:
    {{- include "go-echo55ec1ca0-b020-4d6d-bc73-83c92157acdc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo55ec1ca0-b020-4d6d-bc73-83c92157acdc.selectorLabels" . | nindent 6 }}
