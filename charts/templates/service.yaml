apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo735d4af2-746f-4037-aa65-55ce044b6964.fullname" . }}
  labels:
    {{- include "go-echo735d4af2-746f-4037-aa65-55ce044b6964.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo735d4af2-746f-4037-aa65-55ce044b6964.selectorLabels" . | nindent 6 }}
