apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo410cd001-7361-4b4e-8bab-a7cfccdca207.fullname" . }}
  labels:
    {{- include "go-echo410cd001-7361-4b4e-8bab-a7cfccdca207.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo410cd001-7361-4b4e-8bab-a7cfccdca207.selectorLabels" . | nindent 6 }}
