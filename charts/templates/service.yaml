apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo90a00c8a-523b-4052-97a7-2312e205ae0a.fullname" . }}
  labels:
    {{- include "go-echo90a00c8a-523b-4052-97a7-2312e205ae0a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo90a00c8a-523b-4052-97a7-2312e205ae0a.selectorLabels" . | nindent 6 }}
