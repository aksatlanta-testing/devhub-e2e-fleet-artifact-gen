apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo21f91b27-edcf-41a0-80fd-dc98b39526dc.fullname" . }}
  labels:
    {{- include "go-echo21f91b27-edcf-41a0-80fd-dc98b39526dc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo21f91b27-edcf-41a0-80fd-dc98b39526dc.selectorLabels" . | nindent 6 }}
