apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa1a7de75-5da9-4548-bfb1-cb6d206d732e.fullname" . }}
  labels:
    {{- include "go-echoa1a7de75-5da9-4548-bfb1-cb6d206d732e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa1a7de75-5da9-4548-bfb1-cb6d206d732e.selectorLabels" . | nindent 6 }}
