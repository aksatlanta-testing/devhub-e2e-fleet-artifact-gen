apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo63c99d46-3d1d-4c2b-9964-937c5246a016.fullname" . }}
  labels:
    {{- include "go-echo63c99d46-3d1d-4c2b-9964-937c5246a016.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo63c99d46-3d1d-4c2b-9964-937c5246a016.selectorLabels" . | nindent 6 }}
