apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo563eb8e8-99d8-4ce6-9415-af4f0c414f10.fullname" . }}
  labels:
    {{- include "go-echo563eb8e8-99d8-4ce6-9415-af4f0c414f10.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo563eb8e8-99d8-4ce6-9415-af4f0c414f10.selectorLabels" . | nindent 6 }}
