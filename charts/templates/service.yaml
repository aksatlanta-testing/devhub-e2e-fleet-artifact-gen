apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof3bd5c31-bb0b-4399-a898-2de68680435c.fullname" . }}
  labels:
    {{- include "go-echof3bd5c31-bb0b-4399-a898-2de68680435c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof3bd5c31-bb0b-4399-a898-2de68680435c.selectorLabels" . | nindent 6 }}
