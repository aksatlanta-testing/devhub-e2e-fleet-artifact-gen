apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0b4c509c-3d18-435e-b4ad-6e452721c431.fullname" . }}
  labels:
    {{- include "go-echo0b4c509c-3d18-435e-b4ad-6e452721c431.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0b4c509c-3d18-435e-b4ad-6e452721c431.selectorLabels" . | nindent 6 }}
