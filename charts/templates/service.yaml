apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoda8b2e7f-6062-431a-ac3f-51a0181e04b8.fullname" . }}
  labels:
    {{- include "go-echoda8b2e7f-6062-431a-ac3f-51a0181e04b8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoda8b2e7f-6062-431a-ac3f-51a0181e04b8.selectorLabels" . | nindent 6 }}
