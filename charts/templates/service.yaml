apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo13810bfe-27f3-43c4-b30c-b4dad51ff982.fullname" . }}
  labels:
    {{- include "go-echo13810bfe-27f3-43c4-b30c-b4dad51ff982.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo13810bfe-27f3-43c4-b30c-b4dad51ff982.selectorLabels" . | nindent 6 }}
