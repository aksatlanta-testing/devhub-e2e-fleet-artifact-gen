apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc940adb7-5a2b-4d05-a110-269833533972.fullname" . }}
  labels:
    {{- include "go-echoc940adb7-5a2b-4d05-a110-269833533972.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc940adb7-5a2b-4d05-a110-269833533972.selectorLabels" . | nindent 6 }}
