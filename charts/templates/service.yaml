apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofe2ba4ba-7b4d-4616-bb6d-06d4f7222e9c.fullname" . }}
  labels:
    {{- include "go-echofe2ba4ba-7b4d-4616-bb6d-06d4f7222e9c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofe2ba4ba-7b4d-4616-bb6d-06d4f7222e9c.selectorLabels" . | nindent 6 }}
