apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocfb36443-bd31-4036-ae3c-3ec4309b0d16.fullname" . }}
  labels:
    {{- include "go-echocfb36443-bd31-4036-ae3c-3ec4309b0d16.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocfb36443-bd31-4036-ae3c-3ec4309b0d16.selectorLabels" . | nindent 6 }}
