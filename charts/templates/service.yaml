apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoba2d5a0c-08e3-4c88-929d-74cc5603fa50.fullname" . }}
  labels:
    {{- include "go-echoba2d5a0c-08e3-4c88-929d-74cc5603fa50.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoba2d5a0c-08e3-4c88-929d-74cc5603fa50.selectorLabels" . | nindent 6 }}
