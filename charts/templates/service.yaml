apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo72466427-d82a-4c0b-be79-e8e18fccd87d.fullname" . }}
  labels:
    {{- include "go-echo72466427-d82a-4c0b-be79-e8e18fccd87d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo72466427-d82a-4c0b-be79-e8e18fccd87d.selectorLabels" . | nindent 6 }}
