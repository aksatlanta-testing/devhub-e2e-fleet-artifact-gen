apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1bb9538a-885a-4dc3-983c-a0d6ba709e2d.fullname" . }}
  labels:
    {{- include "go-echo1bb9538a-885a-4dc3-983c-a0d6ba709e2d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1bb9538a-885a-4dc3-983c-a0d6ba709e2d.selectorLabels" . | nindent 6 }}
