apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe3f65b41-af4b-4b72-a650-87103c69fc33.fullname" . }}
  labels:
    {{- include "go-echoe3f65b41-af4b-4b72-a650-87103c69fc33.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe3f65b41-af4b-4b72-a650-87103c69fc33.selectorLabels" . | nindent 6 }}
