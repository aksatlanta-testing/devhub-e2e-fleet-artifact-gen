apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2a7637b8-f4c4-4120-83be-2ea0833621b3.fullname" . }}
  labels:
    {{- include "go-echo2a7637b8-f4c4-4120-83be-2ea0833621b3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2a7637b8-f4c4-4120-83be-2ea0833621b3.selectorLabels" . | nindent 6 }}
