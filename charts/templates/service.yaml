apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof28c6a9d-5d31-4fd0-9dc0-64ae9c582544.fullname" . }}
  labels:
    {{- include "go-echof28c6a9d-5d31-4fd0-9dc0-64ae9c582544.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof28c6a9d-5d31-4fd0-9dc0-64ae9c582544.selectorLabels" . | nindent 6 }}
