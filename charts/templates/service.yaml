apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo54696f0f-f1a0-4622-b5bb-e0f00ee8edb3.fullname" . }}
  labels:
    {{- include "go-echo54696f0f-f1a0-4622-b5bb-e0f00ee8edb3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo54696f0f-f1a0-4622-b5bb-e0f00ee8edb3.selectorLabels" . | nindent 6 }}
