apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo507f88eb-06a4-40c4-945c-6f82aa436767.fullname" . }}
  labels:
    {{- include "go-echo507f88eb-06a4-40c4-945c-6f82aa436767.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo507f88eb-06a4-40c4-945c-6f82aa436767.selectorLabels" . | nindent 6 }}
