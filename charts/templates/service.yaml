apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod83162b9-416c-4ebf-9a46-3d34e7dd381b.fullname" . }}
  labels:
    {{- include "go-echod83162b9-416c-4ebf-9a46-3d34e7dd381b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod83162b9-416c-4ebf-9a46-3d34e7dd381b.selectorLabels" . | nindent 6 }}
