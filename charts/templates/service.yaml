apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9f13ad2e-6f29-417f-bac1-afdd7ea8fc8d.fullname" . }}
  labels:
    {{- include "go-echo9f13ad2e-6f29-417f-bac1-afdd7ea8fc8d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9f13ad2e-6f29-417f-bac1-afdd7ea8fc8d.selectorLabels" . | nindent 6 }}
