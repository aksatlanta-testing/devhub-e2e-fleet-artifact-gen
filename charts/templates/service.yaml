apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0d6fb330-d5bb-457e-9ea8-9edd21033d82.fullname" . }}
  labels:
    {{- include "go-echo0d6fb330-d5bb-457e-9ea8-9edd21033d82.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0d6fb330-d5bb-457e-9ea8-9edd21033d82.selectorLabels" . | nindent 6 }}
