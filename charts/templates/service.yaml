apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0e1a65ed-99f6-4f2b-9d0f-170c1f4f3349.fullname" . }}
  labels:
    {{- include "go-echo0e1a65ed-99f6-4f2b-9d0f-170c1f4f3349.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0e1a65ed-99f6-4f2b-9d0f-170c1f4f3349.selectorLabels" . | nindent 6 }}
