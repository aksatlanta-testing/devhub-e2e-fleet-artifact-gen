apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9549e465-0097-4fa9-aac5-5cb6305dd305.fullname" . }}
  labels:
    {{- include "go-echo9549e465-0097-4fa9-aac5-5cb6305dd305.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9549e465-0097-4fa9-aac5-5cb6305dd305.selectorLabels" . | nindent 6 }}
