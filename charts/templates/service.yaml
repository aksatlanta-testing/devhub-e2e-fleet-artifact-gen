apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6f034292-d91b-4969-9374-99728a50eb73.fullname" . }}
  labels:
    {{- include "go-echo6f034292-d91b-4969-9374-99728a50eb73.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6f034292-d91b-4969-9374-99728a50eb73.selectorLabels" . | nindent 6 }}
