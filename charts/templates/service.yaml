apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo88d6f560-457e-46ee-aca2-243aa510ad19.fullname" . }}
  labels:
    {{- include "go-echo88d6f560-457e-46ee-aca2-243aa510ad19.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo88d6f560-457e-46ee-aca2-243aa510ad19.selectorLabels" . | nindent 6 }}
