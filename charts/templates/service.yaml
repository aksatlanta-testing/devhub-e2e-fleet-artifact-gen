apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo35b801a7-a1fb-40ed-b837-8601cdbd1426.fullname" . }}
  labels:
    {{- include "go-echo35b801a7-a1fb-40ed-b837-8601cdbd1426.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo35b801a7-a1fb-40ed-b837-8601cdbd1426.selectorLabels" . | nindent 6 }}
