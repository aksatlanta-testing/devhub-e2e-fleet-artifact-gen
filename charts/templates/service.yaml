apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob74b8b36-b93d-4ca4-8872-8033879d720a.fullname" . }}
  labels:
    {{- include "go-echob74b8b36-b93d-4ca4-8872-8033879d720a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob74b8b36-b93d-4ca4-8872-8033879d720a.selectorLabels" . | nindent 6 }}
