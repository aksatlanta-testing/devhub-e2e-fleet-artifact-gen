apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4db9ace4-2db7-4c5d-b8c7-a6eeacfcf0ea.fullname" . }}
  labels:
    {{- include "go-echo4db9ace4-2db7-4c5d-b8c7-a6eeacfcf0ea.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4db9ace4-2db7-4c5d-b8c7-a6eeacfcf0ea.selectorLabels" . | nindent 6 }}
