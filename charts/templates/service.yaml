apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo57769e49-b35c-48ab-b422-127f1909b079.fullname" . }}
  labels:
    {{- include "go-echo57769e49-b35c-48ab-b422-127f1909b079.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo57769e49-b35c-48ab-b422-127f1909b079.selectorLabels" . | nindent 6 }}
