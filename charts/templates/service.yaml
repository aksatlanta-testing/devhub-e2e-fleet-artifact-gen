apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2a796143-a9d7-4072-81a3-0e1515031836.fullname" . }}
  labels:
    {{- include "go-echo2a796143-a9d7-4072-81a3-0e1515031836.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2a796143-a9d7-4072-81a3-0e1515031836.selectorLabels" . | nindent 6 }}
