apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0441b498-24a4-440b-89d3-32ccb741ff8e.fullname" . }}
  labels:
    {{- include "go-echo0441b498-24a4-440b-89d3-32ccb741ff8e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0441b498-24a4-440b-89d3-32ccb741ff8e.selectorLabels" . | nindent 6 }}
