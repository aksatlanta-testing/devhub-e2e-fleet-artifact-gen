apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7e5374e1-16a2-418b-bbdf-aa340fb49413.fullname" . }}
  labels:
    {{- include "go-echo7e5374e1-16a2-418b-bbdf-aa340fb49413.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7e5374e1-16a2-418b-bbdf-aa340fb49413.selectorLabels" . | nindent 6 }}
