apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe4ba39a4-2475-49ad-b973-f7c5e830dd61.fullname" . }}
  labels:
    {{- include "go-echoe4ba39a4-2475-49ad-b973-f7c5e830dd61.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe4ba39a4-2475-49ad-b973-f7c5e830dd61.selectorLabels" . | nindent 6 }}
