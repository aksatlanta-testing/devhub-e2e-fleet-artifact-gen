apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9b45d29b-bdb1-4b23-8a1c-68b7429f4011.fullname" . }}
  labels:
    {{- include "go-echo9b45d29b-bdb1-4b23-8a1c-68b7429f4011.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9b45d29b-bdb1-4b23-8a1c-68b7429f4011.selectorLabels" . | nindent 6 }}
