apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa5f7dd3e-ffc8-4563-a013-da64217ec765.fullname" . }}
  labels:
    {{- include "go-echoa5f7dd3e-ffc8-4563-a013-da64217ec765.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa5f7dd3e-ffc8-4563-a013-da64217ec765.selectorLabels" . | nindent 6 }}
