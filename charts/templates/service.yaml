apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo643b4a6c-9a8f-4e0d-8b6b-0767892b6d0d.fullname" . }}
  labels:
    {{- include "go-echo643b4a6c-9a8f-4e0d-8b6b-0767892b6d0d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo643b4a6c-9a8f-4e0d-8b6b-0767892b6d0d.selectorLabels" . | nindent 6 }}
