apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoecc2cb40-8f7f-4c73-ab85-ae9d26a6185b.fullname" . }}
  labels:
    {{- include "go-echoecc2cb40-8f7f-4c73-ab85-ae9d26a6185b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoecc2cb40-8f7f-4c73-ab85-ae9d26a6185b.selectorLabels" . | nindent 6 }}
