apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo78e13e12-5043-4620-8d0c-1db9880e65bd.fullname" . }}
  labels:
    {{- include "go-echo78e13e12-5043-4620-8d0c-1db9880e65bd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo78e13e12-5043-4620-8d0c-1db9880e65bd.selectorLabels" . | nindent 6 }}
