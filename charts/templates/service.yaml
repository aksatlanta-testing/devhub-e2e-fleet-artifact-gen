apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo68067f38-9ec0-4c7d-baf8-17a19f3cd2b1.fullname" . }}
  labels:
    {{- include "go-echo68067f38-9ec0-4c7d-baf8-17a19f3cd2b1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo68067f38-9ec0-4c7d-baf8-17a19f3cd2b1.selectorLabels" . | nindent 6 }}
