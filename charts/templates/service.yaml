apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo102fada5-3342-479d-83ce-74bf125bc019.fullname" . }}
  labels:
    {{- include "go-echo102fada5-3342-479d-83ce-74bf125bc019.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo102fada5-3342-479d-83ce-74bf125bc019.selectorLabels" . | nindent 6 }}
