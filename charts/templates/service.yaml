apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa304e889-f407-412b-bfe1-c36da4f09688.fullname" . }}
  labels:
    {{- include "go-echoa304e889-f407-412b-bfe1-c36da4f09688.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa304e889-f407-412b-bfe1-c36da4f09688.selectorLabels" . | nindent 6 }}
