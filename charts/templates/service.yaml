apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo19141eb3-c55a-4ff4-a0b2-d216076c6c95.fullname" . }}
  labels:
    {{- include "go-echo19141eb3-c55a-4ff4-a0b2-d216076c6c95.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo19141eb3-c55a-4ff4-a0b2-d216076c6c95.selectorLabels" . | nindent 6 }}
