apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoee3c9822-8f4e-4860-a657-d72654d18508.fullname" . }}
  labels:
    {{- include "go-echoee3c9822-8f4e-4860-a657-d72654d18508.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoee3c9822-8f4e-4860-a657-d72654d18508.selectorLabels" . | nindent 6 }}
