apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa71b3b1b-e2a5-47ae-a66e-2f0f7f703d36.fullname" . }}
  labels:
    {{- include "go-echoa71b3b1b-e2a5-47ae-a66e-2f0f7f703d36.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa71b3b1b-e2a5-47ae-a66e-2f0f7f703d36.selectorLabels" . | nindent 6 }}
