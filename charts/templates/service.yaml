apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo073a26d0-4a65-45f6-af93-b2d63d9cd6ac.fullname" . }}
  labels:
    {{- include "go-echo073a26d0-4a65-45f6-af93-b2d63d9cd6ac.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo073a26d0-4a65-45f6-af93-b2d63d9cd6ac.selectorLabels" . | nindent 6 }}
