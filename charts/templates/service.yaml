apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod996f7ed-019b-4fd1-a643-c22808b09853.fullname" . }}
  labels:
    {{- include "go-echod996f7ed-019b-4fd1-a643-c22808b09853.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod996f7ed-019b-4fd1-a643-c22808b09853.selectorLabels" . | nindent 6 }}
