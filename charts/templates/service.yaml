apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5e4549dd-7ad2-4ee6-9258-50b91c6a3f11.fullname" . }}
  labels:
    {{- include "go-echo5e4549dd-7ad2-4ee6-9258-50b91c6a3f11.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5e4549dd-7ad2-4ee6-9258-50b91c6a3f11.selectorLabels" . | nindent 6 }}
