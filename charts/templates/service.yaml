apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc7821d63-c2b8-4627-af4d-b3c5460229a8.fullname" . }}
  labels:
    {{- include "go-echoc7821d63-c2b8-4627-af4d-b3c5460229a8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc7821d63-c2b8-4627-af4d-b3c5460229a8.selectorLabels" . | nindent 6 }}
