apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo62d7e766-f33f-40c9-9306-788173c90981.fullname" . }}
  labels:
    {{- include "go-echo62d7e766-f33f-40c9-9306-788173c90981.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo62d7e766-f33f-40c9-9306-788173c90981.selectorLabels" . | nindent 6 }}
