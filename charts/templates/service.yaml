apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo99b90e12-cde9-4702-a000-dde50356c90d.fullname" . }}
  labels:
    {{- include "go-echo99b90e12-cde9-4702-a000-dde50356c90d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo99b90e12-cde9-4702-a000-dde50356c90d.selectorLabels" . | nindent 6 }}
