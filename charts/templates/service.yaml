apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc219d120-d87c-4d36-b861-6644db5b689d.fullname" . }}
  labels:
    {{- include "go-echoc219d120-d87c-4d36-b861-6644db5b689d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc219d120-d87c-4d36-b861-6644db5b689d.selectorLabels" . | nindent 6 }}
