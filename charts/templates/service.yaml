apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo42a9400b-8415-4e58-904e-d7916c22c65c.fullname" . }}
  labels:
    {{- include "go-echo42a9400b-8415-4e58-904e-d7916c22c65c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo42a9400b-8415-4e58-904e-d7916c22c65c.selectorLabels" . | nindent 6 }}
