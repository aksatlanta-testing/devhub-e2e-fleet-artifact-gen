apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5ef2d6ec-962b-4093-a602-27c8c92c814e.fullname" . }}
  labels:
    {{- include "go-echo5ef2d6ec-962b-4093-a602-27c8c92c814e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5ef2d6ec-962b-4093-a602-27c8c92c814e.selectorLabels" . | nindent 6 }}
