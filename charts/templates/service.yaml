apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaf344ad0-424d-42f7-bbca-b34e5fe3e41e.fullname" . }}
  labels:
    {{- include "go-echoaf344ad0-424d-42f7-bbca-b34e5fe3e41e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaf344ad0-424d-42f7-bbca-b34e5fe3e41e.selectorLabels" . | nindent 6 }}
