apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodaeca2ca-1655-4d6e-8b83-ba5db77a8602.fullname" . }}
  labels:
    {{- include "go-echodaeca2ca-1655-4d6e-8b83-ba5db77a8602.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodaeca2ca-1655-4d6e-8b83-ba5db77a8602.selectorLabels" . | nindent 6 }}
