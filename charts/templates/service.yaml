apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9dfeac78-5e03-4842-9c5a-1587c3ae838e.fullname" . }}
  labels:
    {{- include "go-echo9dfeac78-5e03-4842-9c5a-1587c3ae838e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9dfeac78-5e03-4842-9c5a-1587c3ae838e.selectorLabels" . | nindent 6 }}
