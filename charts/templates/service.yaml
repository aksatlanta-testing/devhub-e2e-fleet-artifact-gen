apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoebed3276-9ebe-46c7-bc6e-9dc1c7bbcc00.fullname" . }}
  labels:
    {{- include "go-echoebed3276-9ebe-46c7-bc6e-9dc1c7bbcc00.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoebed3276-9ebe-46c7-bc6e-9dc1c7bbcc00.selectorLabels" . | nindent 6 }}
