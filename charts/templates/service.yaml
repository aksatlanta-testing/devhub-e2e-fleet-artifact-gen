apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8a0d3ac9-024c-4e9e-bc9d-cff0d82d27da.fullname" . }}
  labels:
    {{- include "go-echo8a0d3ac9-024c-4e9e-bc9d-cff0d82d27da.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8a0d3ac9-024c-4e9e-bc9d-cff0d82d27da.selectorLabels" . | nindent 6 }}
