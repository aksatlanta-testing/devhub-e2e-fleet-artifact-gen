apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobe7461a3-9477-4f97-9342-8cb0a6ea9fd8.fullname" . }}
  labels:
    {{- include "go-echobe7461a3-9477-4f97-9342-8cb0a6ea9fd8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobe7461a3-9477-4f97-9342-8cb0a6ea9fd8.selectorLabels" . | nindent 6 }}
