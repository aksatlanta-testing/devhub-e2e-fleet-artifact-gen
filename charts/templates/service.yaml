apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobcaf8464-4c9f-4ea1-9bdd-5f3de70c30f4.fullname" . }}
  labels:
    {{- include "go-echobcaf8464-4c9f-4ea1-9bdd-5f3de70c30f4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobcaf8464-4c9f-4ea1-9bdd-5f3de70c30f4.selectorLabels" . | nindent 6 }}
