apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodc51ef25-5122-412a-988c-eea523e116c8.fullname" . }}
  labels:
    {{- include "go-echodc51ef25-5122-412a-988c-eea523e116c8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodc51ef25-5122-412a-988c-eea523e116c8.selectorLabels" . | nindent 6 }}
