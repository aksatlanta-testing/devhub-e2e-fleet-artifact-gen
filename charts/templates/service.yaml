apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo03ce7339-47b7-4b68-9ea9-5c84d389d7dd.fullname" . }}
  labels:
    {{- include "go-echo03ce7339-47b7-4b68-9ea9-5c84d389d7dd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo03ce7339-47b7-4b68-9ea9-5c84d389d7dd.selectorLabels" . | nindent 6 }}
