apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodcdbe290-9791-4657-9af4-60fbf5ac7cd2.fullname" . }}
  labels:
    {{- include "go-echodcdbe290-9791-4657-9af4-60fbf5ac7cd2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodcdbe290-9791-4657-9af4-60fbf5ac7cd2.selectorLabels" . | nindent 6 }}
