apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo78a18634-e769-4aaa-ac93-01765f3ef1e5.fullname" . }}
  labels:
    {{- include "go-echo78a18634-e769-4aaa-ac93-01765f3ef1e5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo78a18634-e769-4aaa-ac93-01765f3ef1e5.selectorLabels" . | nindent 6 }}
