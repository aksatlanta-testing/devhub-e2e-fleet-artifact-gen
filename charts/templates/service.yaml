apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocfc9d28e-b76f-4c16-9f28-8fb62b108863.fullname" . }}
  labels:
    {{- include "go-echocfc9d28e-b76f-4c16-9f28-8fb62b108863.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocfc9d28e-b76f-4c16-9f28-8fb62b108863.selectorLabels" . | nindent 6 }}
