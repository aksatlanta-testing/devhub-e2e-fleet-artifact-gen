apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoac38997b-5ea4-4bc4-8525-4daa4b2de7f2.fullname" . }}
  labels:
    {{- include "go-echoac38997b-5ea4-4bc4-8525-4daa4b2de7f2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoac38997b-5ea4-4bc4-8525-4daa4b2de7f2.selectorLabels" . | nindent 6 }}
