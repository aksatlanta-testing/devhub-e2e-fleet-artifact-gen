apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob8ae2e76-6bf4-4f08-993b-b66d67a14314.fullname" . }}
  labels:
    {{- include "go-echob8ae2e76-6bf4-4f08-993b-b66d67a14314.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob8ae2e76-6bf4-4f08-993b-b66d67a14314.selectorLabels" . | nindent 6 }}
