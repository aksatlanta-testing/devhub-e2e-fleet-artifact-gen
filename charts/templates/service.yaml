apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo01e79796-db3d-4666-84a1-29b5f57269f4.fullname" . }}
  labels:
    {{- include "go-echo01e79796-db3d-4666-84a1-29b5f57269f4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo01e79796-db3d-4666-84a1-29b5f57269f4.selectorLabels" . | nindent 6 }}
