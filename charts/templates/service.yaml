apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo30758cdd-ac86-4fb6-983d-cb1f6d7b9f47.fullname" . }}
  labels:
    {{- include "go-echo30758cdd-ac86-4fb6-983d-cb1f6d7b9f47.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo30758cdd-ac86-4fb6-983d-cb1f6d7b9f47.selectorLabels" . | nindent 6 }}
