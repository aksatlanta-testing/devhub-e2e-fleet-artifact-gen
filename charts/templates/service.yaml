apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9f3127a1-8a82-49fc-9bce-90efc60abcca.fullname" . }}
  labels:
    {{- include "go-echo9f3127a1-8a82-49fc-9bce-90efc60abcca.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9f3127a1-8a82-49fc-9bce-90efc60abcca.selectorLabels" . | nindent 6 }}
