apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoff6d4ee7-c5b6-40de-937e-0711a40353ac.fullname" . }}
  labels:
    {{- include "go-echoff6d4ee7-c5b6-40de-937e-0711a40353ac.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoff6d4ee7-c5b6-40de-937e-0711a40353ac.selectorLabels" . | nindent 6 }}
