apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoee94b757-e8df-4619-8333-2d8cce5c7534.fullname" . }}
  labels:
    {{- include "go-echoee94b757-e8df-4619-8333-2d8cce5c7534.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoee94b757-e8df-4619-8333-2d8cce5c7534.selectorLabels" . | nindent 6 }}
