apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo08e768ba-ba48-4eee-b39c-a87d16a53c00.fullname" . }}
  labels:
    {{- include "go-echo08e768ba-ba48-4eee-b39c-a87d16a53c00.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo08e768ba-ba48-4eee-b39c-a87d16a53c00.selectorLabels" . | nindent 6 }}
