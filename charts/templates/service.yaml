apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob77f8d52-3f71-41bb-b126-3b51273456e1.fullname" . }}
  labels:
    {{- include "go-echob77f8d52-3f71-41bb-b126-3b51273456e1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob77f8d52-3f71-41bb-b126-3b51273456e1.selectorLabels" . | nindent 6 }}
