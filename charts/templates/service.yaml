apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe591abec-0227-438e-9000-12fb3566d010.fullname" . }}
  labels:
    {{- include "go-echoe591abec-0227-438e-9000-12fb3566d010.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe591abec-0227-438e-9000-12fb3566d010.selectorLabels" . | nindent 6 }}
