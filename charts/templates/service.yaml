apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8f2662aa-2d14-45a0-a31a-7a4ef32ee485.fullname" . }}
  labels:
    {{- include "go-echo8f2662aa-2d14-45a0-a31a-7a4ef32ee485.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8f2662aa-2d14-45a0-a31a-7a4ef32ee485.selectorLabels" . | nindent 6 }}
