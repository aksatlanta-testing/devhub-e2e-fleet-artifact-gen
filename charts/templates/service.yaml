apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo80b7e17b-aa5c-4f38-819f-58bd310a50ef.fullname" . }}
  labels:
    {{- include "go-echo80b7e17b-aa5c-4f38-819f-58bd310a50ef.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo80b7e17b-aa5c-4f38-819f-58bd310a50ef.selectorLabels" . | nindent 6 }}
