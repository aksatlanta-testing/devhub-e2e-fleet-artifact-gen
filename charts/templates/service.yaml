apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0fdeb248-5cc2-4498-8795-801990e0e11b.fullname" . }}
  labels:
    {{- include "go-echo0fdeb248-5cc2-4498-8795-801990e0e11b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0fdeb248-5cc2-4498-8795-801990e0e11b.selectorLabels" . | nindent 6 }}
