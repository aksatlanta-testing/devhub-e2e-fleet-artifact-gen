apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod3052331-d329-46c4-863d-55159424a84d.fullname" . }}
  labels:
    {{- include "go-echod3052331-d329-46c4-863d-55159424a84d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod3052331-d329-46c4-863d-55159424a84d.selectorLabels" . | nindent 6 }}
