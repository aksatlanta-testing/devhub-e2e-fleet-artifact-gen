apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo33882df3-07f5-4f1d-8636-a52aec3981bd.fullname" . }}
  labels:
    {{- include "go-echo33882df3-07f5-4f1d-8636-a52aec3981bd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo33882df3-07f5-4f1d-8636-a52aec3981bd.selectorLabels" . | nindent 6 }}
