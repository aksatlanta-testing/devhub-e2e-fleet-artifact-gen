apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob5cc03a6-4ae3-49b9-847d-4e9a53c14ba5.fullname" . }}
  labels:
    {{- include "go-echob5cc03a6-4ae3-49b9-847d-4e9a53c14ba5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob5cc03a6-4ae3-49b9-847d-4e9a53c14ba5.selectorLabels" . | nindent 6 }}
