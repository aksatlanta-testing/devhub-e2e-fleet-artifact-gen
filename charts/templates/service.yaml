apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoce1addfb-3f04-46d3-bfa6-9bbd37ab6b55.fullname" . }}
  labels:
    {{- include "go-echoce1addfb-3f04-46d3-bfa6-9bbd37ab6b55.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoce1addfb-3f04-46d3-bfa6-9bbd37ab6b55.selectorLabels" . | nindent 6 }}
