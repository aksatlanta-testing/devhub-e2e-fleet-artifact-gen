apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofbcb736f-04e9-4562-9bc2-fbc044a782e5.fullname" . }}
  labels:
    {{- include "go-echofbcb736f-04e9-4562-9bc2-fbc044a782e5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofbcb736f-04e9-4562-9bc2-fbc044a782e5.selectorLabels" . | nindent 6 }}
