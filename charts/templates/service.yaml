apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo34851876-2b3f-40c4-b747-e2de59eb5c17.fullname" . }}
  labels:
    {{- include "go-echo34851876-2b3f-40c4-b747-e2de59eb5c17.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo34851876-2b3f-40c4-b747-e2de59eb5c17.selectorLabels" . | nindent 6 }}
