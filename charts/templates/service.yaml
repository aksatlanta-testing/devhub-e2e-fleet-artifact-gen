apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc8671526-bdf6-4cd8-b3fc-fd2506411a3c.fullname" . }}
  labels:
    {{- include "go-echoc8671526-bdf6-4cd8-b3fc-fd2506411a3c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc8671526-bdf6-4cd8-b3fc-fd2506411a3c.selectorLabels" . | nindent 6 }}
