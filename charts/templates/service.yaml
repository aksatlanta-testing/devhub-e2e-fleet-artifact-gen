apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocb5e2dd6-5b00-4b30-81b6-3c374ccb279d.fullname" . }}
  labels:
    {{- include "go-echocb5e2dd6-5b00-4b30-81b6-3c374ccb279d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocb5e2dd6-5b00-4b30-81b6-3c374ccb279d.selectorLabels" . | nindent 6 }}
