apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7a680dfc-ee40-4292-921f-9bb75a7c3056.fullname" . }}
  labels:
    {{- include "go-echo7a680dfc-ee40-4292-921f-9bb75a7c3056.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7a680dfc-ee40-4292-921f-9bb75a7c3056.selectorLabels" . | nindent 6 }}
