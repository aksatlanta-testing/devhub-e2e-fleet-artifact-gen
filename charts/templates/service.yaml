apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6d43ab94-080c-4c74-b895-e6d770e6a170.fullname" . }}
  labels:
    {{- include "go-echo6d43ab94-080c-4c74-b895-e6d770e6a170.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6d43ab94-080c-4c74-b895-e6d770e6a170.selectorLabels" . | nindent 6 }}
