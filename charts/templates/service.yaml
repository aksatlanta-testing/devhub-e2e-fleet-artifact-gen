apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo53cf0e3f-18fb-4758-87f0-604c2adf63c9.fullname" . }}
  labels:
    {{- include "go-echo53cf0e3f-18fb-4758-87f0-604c2adf63c9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo53cf0e3f-18fb-4758-87f0-604c2adf63c9.selectorLabels" . | nindent 6 }}
