apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob4008dc2-216b-4f4e-8708-2bf0393277b2.fullname" . }}
  labels:
    {{- include "go-echob4008dc2-216b-4f4e-8708-2bf0393277b2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob4008dc2-216b-4f4e-8708-2bf0393277b2.selectorLabels" . | nindent 6 }}
