apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7d79bdd5-9346-4c0a-909d-267bc4881544.fullname" . }}
  labels:
    {{- include "go-echo7d79bdd5-9346-4c0a-909d-267bc4881544.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7d79bdd5-9346-4c0a-909d-267bc4881544.selectorLabels" . | nindent 6 }}
