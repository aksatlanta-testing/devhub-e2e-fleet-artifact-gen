apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa3d7a736-4083-4002-859f-f556412c7eb8.fullname" . }}
  labels:
    {{- include "go-echoa3d7a736-4083-4002-859f-f556412c7eb8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa3d7a736-4083-4002-859f-f556412c7eb8.selectorLabels" . | nindent 6 }}
