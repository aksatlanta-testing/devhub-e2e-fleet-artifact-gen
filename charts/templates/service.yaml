apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4ad3678d-c1c2-47b7-828e-a5229e481611.fullname" . }}
  labels:
    {{- include "go-echo4ad3678d-c1c2-47b7-828e-a5229e481611.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4ad3678d-c1c2-47b7-828e-a5229e481611.selectorLabels" . | nindent 6 }}
