apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod593f672-1a99-41ba-b78e-cd972566f1c0.fullname" . }}
  labels:
    {{- include "go-echod593f672-1a99-41ba-b78e-cd972566f1c0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod593f672-1a99-41ba-b78e-cd972566f1c0.selectorLabels" . | nindent 6 }}
