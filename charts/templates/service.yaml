apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo99fe5119-d341-4a50-9e25-e176ce7411d3.fullname" . }}
  labels:
    {{- include "go-echo99fe5119-d341-4a50-9e25-e176ce7411d3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo99fe5119-d341-4a50-9e25-e176ce7411d3.selectorLabels" . | nindent 6 }}
