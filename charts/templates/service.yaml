apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod416d288-305f-42d7-a11b-42717e616300.fullname" . }}
  labels:
    {{- include "go-echod416d288-305f-42d7-a11b-42717e616300.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod416d288-305f-42d7-a11b-42717e616300.selectorLabels" . | nindent 6 }}
