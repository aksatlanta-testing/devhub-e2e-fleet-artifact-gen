apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof0d50461-10f1-4d7e-aa1a-3f5319f3a2e8.fullname" . }}
  labels:
    {{- include "go-echof0d50461-10f1-4d7e-aa1a-3f5319f3a2e8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof0d50461-10f1-4d7e-aa1a-3f5319f3a2e8.selectorLabels" . | nindent 6 }}
