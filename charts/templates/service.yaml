apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1a03b144-53ce-414e-a222-6d68ec08fa6e.fullname" . }}
  labels:
    {{- include "go-echo1a03b144-53ce-414e-a222-6d68ec08fa6e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1a03b144-53ce-414e-a222-6d68ec08fa6e.selectorLabels" . | nindent 6 }}
