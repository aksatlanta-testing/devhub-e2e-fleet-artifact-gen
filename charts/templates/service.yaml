apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo98950631-2173-4b6b-b9e5-6bf0476c6ac5.fullname" . }}
  labels:
    {{- include "go-echo98950631-2173-4b6b-b9e5-6bf0476c6ac5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo98950631-2173-4b6b-b9e5-6bf0476c6ac5.selectorLabels" . | nindent 6 }}
