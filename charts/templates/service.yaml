apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob566c895-6e7e-4e56-9744-fbdcb14f700c.fullname" . }}
  labels:
    {{- include "go-echob566c895-6e7e-4e56-9744-fbdcb14f700c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob566c895-6e7e-4e56-9744-fbdcb14f700c.selectorLabels" . | nindent 6 }}
