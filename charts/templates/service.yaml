apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7553a027-3df2-4826-b3df-a1d9dfd4b25b.fullname" . }}
  labels:
    {{- include "go-echo7553a027-3df2-4826-b3df-a1d9dfd4b25b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7553a027-3df2-4826-b3df-a1d9dfd4b25b.selectorLabels" . | nindent 6 }}
