apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4582642c-be51-4b49-a01c-bd1a7d89b187.fullname" . }}
  labels:
    {{- include "go-echo4582642c-be51-4b49-a01c-bd1a7d89b187.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4582642c-be51-4b49-a01c-bd1a7d89b187.selectorLabels" . | nindent 6 }}
