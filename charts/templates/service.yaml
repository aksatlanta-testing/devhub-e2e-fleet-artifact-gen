apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5c880cf9-9460-472f-aa84-cff4f871d86f.fullname" . }}
  labels:
    {{- include "go-echo5c880cf9-9460-472f-aa84-cff4f871d86f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5c880cf9-9460-472f-aa84-cff4f871d86f.selectorLabels" . | nindent 6 }}
