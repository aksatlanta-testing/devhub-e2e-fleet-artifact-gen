apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoef7fb3ef-1bef-4742-8cd5-1285d2da2fd0.fullname" . }}
  labels:
    {{- include "go-echoef7fb3ef-1bef-4742-8cd5-1285d2da2fd0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoef7fb3ef-1bef-4742-8cd5-1285d2da2fd0.selectorLabels" . | nindent 6 }}
