apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof8d438a6-d323-4e75-a31e-5b8071de9024.fullname" . }}
  labels:
    {{- include "go-echof8d438a6-d323-4e75-a31e-5b8071de9024.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof8d438a6-d323-4e75-a31e-5b8071de9024.selectorLabels" . | nindent 6 }}
