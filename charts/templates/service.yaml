apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe145ba29-fb8d-4266-a95a-0886eb5b2f5a.fullname" . }}
  labels:
    {{- include "go-echoe145ba29-fb8d-4266-a95a-0886eb5b2f5a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe145ba29-fb8d-4266-a95a-0886eb5b2f5a.selectorLabels" . | nindent 6 }}
