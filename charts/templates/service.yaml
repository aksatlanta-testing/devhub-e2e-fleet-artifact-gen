apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo03eb391a-2546-4d64-804a-aa872dbf79a1.fullname" . }}
  labels:
    {{- include "go-echo03eb391a-2546-4d64-804a-aa872dbf79a1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo03eb391a-2546-4d64-804a-aa872dbf79a1.selectorLabels" . | nindent 6 }}
