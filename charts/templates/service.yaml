apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9a0e5151-b144-4f57-851a-406783cbf449.fullname" . }}
  labels:
    {{- include "go-echo9a0e5151-b144-4f57-851a-406783cbf449.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9a0e5151-b144-4f57-851a-406783cbf449.selectorLabels" . | nindent 6 }}
