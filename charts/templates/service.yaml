apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo65e28bd3-e224-4eb6-8d78-7672857f6115.fullname" . }}
  labels:
    {{- include "go-echo65e28bd3-e224-4eb6-8d78-7672857f6115.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo65e28bd3-e224-4eb6-8d78-7672857f6115.selectorLabels" . | nindent 6 }}
