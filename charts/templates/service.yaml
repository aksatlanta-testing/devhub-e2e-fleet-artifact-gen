apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof5984c57-08f4-4c6c-b69c-b7ae94a93f65.fullname" . }}
  labels:
    {{- include "go-echof5984c57-08f4-4c6c-b69c-b7ae94a93f65.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof5984c57-08f4-4c6c-b69c-b7ae94a93f65.selectorLabels" . | nindent 6 }}
