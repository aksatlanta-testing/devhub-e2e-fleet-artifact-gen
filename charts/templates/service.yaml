apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3659938c-65b6-4864-85f1-c51be3cc8260.fullname" . }}
  labels:
    {{- include "go-echo3659938c-65b6-4864-85f1-c51be3cc8260.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3659938c-65b6-4864-85f1-c51be3cc8260.selectorLabels" . | nindent 6 }}
