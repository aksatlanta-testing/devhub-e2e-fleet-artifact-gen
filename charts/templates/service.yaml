apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6586876e-ac73-4dc5-8312-01b3a63cd33d.fullname" . }}
  labels:
    {{- include "go-echo6586876e-ac73-4dc5-8312-01b3a63cd33d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6586876e-ac73-4dc5-8312-01b3a63cd33d.selectorLabels" . | nindent 6 }}
