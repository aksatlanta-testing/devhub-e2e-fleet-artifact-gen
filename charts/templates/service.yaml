apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8a7cc8ab-f1a0-4b75-ae77-5ceab8874b7c.fullname" . }}
  labels:
    {{- include "go-echo8a7cc8ab-f1a0-4b75-ae77-5ceab8874b7c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8a7cc8ab-f1a0-4b75-ae77-5ceab8874b7c.selectorLabels" . | nindent 6 }}
