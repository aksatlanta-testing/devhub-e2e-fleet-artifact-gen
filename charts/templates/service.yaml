apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoad062211-ab66-4d5a-9e7a-e35d17c700fc.fullname" . }}
  labels:
    {{- include "go-echoad062211-ab66-4d5a-9e7a-e35d17c700fc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoad062211-ab66-4d5a-9e7a-e35d17c700fc.selectorLabels" . | nindent 6 }}
