apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0bcc1022-12d5-40e2-943c-d1d8c372f571.fullname" . }}
  labels:
    {{- include "go-echo0bcc1022-12d5-40e2-943c-d1d8c372f571.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0bcc1022-12d5-40e2-943c-d1d8c372f571.selectorLabels" . | nindent 6 }}
