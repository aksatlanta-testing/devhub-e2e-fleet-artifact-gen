apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodf6c553d-2867-4c64-b31e-18bae386d9dd.fullname" . }}
  labels:
    {{- include "go-echodf6c553d-2867-4c64-b31e-18bae386d9dd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodf6c553d-2867-4c64-b31e-18bae386d9dd.selectorLabels" . | nindent 6 }}
