apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobc437c94-183a-469e-bf6a-139f0f43df9c.fullname" . }}
  labels:
    {{- include "go-echobc437c94-183a-469e-bf6a-139f0f43df9c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobc437c94-183a-469e-bf6a-139f0f43df9c.selectorLabels" . | nindent 6 }}
