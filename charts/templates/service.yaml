apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa99fbf6c-8054-4a25-8b2b-81c617fdb3ca.fullname" . }}
  labels:
    {{- include "go-echoa99fbf6c-8054-4a25-8b2b-81c617fdb3ca.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa99fbf6c-8054-4a25-8b2b-81c617fdb3ca.selectorLabels" . | nindent 6 }}
