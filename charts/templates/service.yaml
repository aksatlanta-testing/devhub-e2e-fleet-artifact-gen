apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoef304bf5-f0d5-4f9b-9d59-d099f9b049e1.fullname" . }}
  labels:
    {{- include "go-echoef304bf5-f0d5-4f9b-9d59-d099f9b049e1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoef304bf5-f0d5-4f9b-9d59-d099f9b049e1.selectorLabels" . | nindent 6 }}
