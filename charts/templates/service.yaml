apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2075b445-2343-4f61-b84d-64f03d028bd9.fullname" . }}
  labels:
    {{- include "go-echo2075b445-2343-4f61-b84d-64f03d028bd9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2075b445-2343-4f61-b84d-64f03d028bd9.selectorLabels" . | nindent 6 }}
