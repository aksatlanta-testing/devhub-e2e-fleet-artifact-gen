apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8b97b0e3-dc44-4a1a-a6c1-978ea7b4eb7f.fullname" . }}
  labels:
    {{- include "go-echo8b97b0e3-dc44-4a1a-a6c1-978ea7b4eb7f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8b97b0e3-dc44-4a1a-a6c1-978ea7b4eb7f.selectorLabels" . | nindent 6 }}
