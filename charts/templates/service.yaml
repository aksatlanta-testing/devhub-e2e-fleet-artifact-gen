apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7ca1ddb3-a67d-489f-a9e4-792a4d479e33.fullname" . }}
  labels:
    {{- include "go-echo7ca1ddb3-a67d-489f-a9e4-792a4d479e33.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7ca1ddb3-a67d-489f-a9e4-792a4d479e33.selectorLabels" . | nindent 6 }}
