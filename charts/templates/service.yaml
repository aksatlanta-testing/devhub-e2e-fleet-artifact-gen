apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc6e4f1e3-477e-4f2e-83ae-acda666c99d7.fullname" . }}
  labels:
    {{- include "go-echoc6e4f1e3-477e-4f2e-83ae-acda666c99d7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc6e4f1e3-477e-4f2e-83ae-acda666c99d7.selectorLabels" . | nindent 6 }}
