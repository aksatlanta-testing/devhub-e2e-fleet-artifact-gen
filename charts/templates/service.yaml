apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2a52a975-fd35-4b4e-a1d9-f00242ee2b24.fullname" . }}
  labels:
    {{- include "go-echo2a52a975-fd35-4b4e-a1d9-f00242ee2b24.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2a52a975-fd35-4b4e-a1d9-f00242ee2b24.selectorLabels" . | nindent 6 }}
