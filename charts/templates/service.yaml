apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo304a78f0-2415-451e-9b02-93e90784ddd9.fullname" . }}
  labels:
    {{- include "go-echo304a78f0-2415-451e-9b02-93e90784ddd9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo304a78f0-2415-451e-9b02-93e90784ddd9.selectorLabels" . | nindent 6 }}
