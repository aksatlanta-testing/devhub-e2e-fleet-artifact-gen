apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof4b22b44-bfce-4319-bda0-5df30cf13519.fullname" . }}
  labels:
    {{- include "go-echof4b22b44-bfce-4319-bda0-5df30cf13519.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof4b22b44-bfce-4319-bda0-5df30cf13519.selectorLabels" . | nindent 6 }}
