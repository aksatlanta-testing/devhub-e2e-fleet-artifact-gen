apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo262950ea-d7bb-4e03-99f8-e938648b93b2.fullname" . }}
  labels:
    {{- include "go-echo262950ea-d7bb-4e03-99f8-e938648b93b2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo262950ea-d7bb-4e03-99f8-e938648b93b2.selectorLabels" . | nindent 6 }}
