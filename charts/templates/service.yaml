apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoee3e65b3-85b2-49c3-8c1c-f0051411984a.fullname" . }}
  labels:
    {{- include "go-echoee3e65b3-85b2-49c3-8c1c-f0051411984a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoee3e65b3-85b2-49c3-8c1c-f0051411984a.selectorLabels" . | nindent 6 }}
