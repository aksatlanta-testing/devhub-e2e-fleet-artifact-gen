apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoeeb8bb0f-73e8-4814-912d-771a5ac62535.fullname" . }}
  labels:
    {{- include "go-echoeeb8bb0f-73e8-4814-912d-771a5ac62535.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoeeb8bb0f-73e8-4814-912d-771a5ac62535.selectorLabels" . | nindent 6 }}
