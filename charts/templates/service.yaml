apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7d62e3da-c11d-49f9-8017-7322a4aeac12.fullname" . }}
  labels:
    {{- include "go-echo7d62e3da-c11d-49f9-8017-7322a4aeac12.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7d62e3da-c11d-49f9-8017-7322a4aeac12.selectorLabels" . | nindent 6 }}
