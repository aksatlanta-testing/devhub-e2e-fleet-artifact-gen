apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocc29cdef-e2d8-4172-a44f-2594ab388dcf.fullname" . }}
  labels:
    {{- include "go-echocc29cdef-e2d8-4172-a44f-2594ab388dcf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocc29cdef-e2d8-4172-a44f-2594ab388dcf.selectorLabels" . | nindent 6 }}
