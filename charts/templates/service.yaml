apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo99a2524e-ad3b-4670-b886-d4481601b995.fullname" . }}
  labels:
    {{- include "go-echo99a2524e-ad3b-4670-b886-d4481601b995.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo99a2524e-ad3b-4670-b886-d4481601b995.selectorLabels" . | nindent 6 }}
