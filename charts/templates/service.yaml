apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof584cb83-b4ec-443e-a925-e42791fe1061.fullname" . }}
  labels:
    {{- include "go-echof584cb83-b4ec-443e-a925-e42791fe1061.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof584cb83-b4ec-443e-a925-e42791fe1061.selectorLabels" . | nindent 6 }}
