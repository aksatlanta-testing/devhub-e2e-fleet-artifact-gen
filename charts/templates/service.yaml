apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc62a8c0f-5c78-477c-b410-34f18de7eb4c.fullname" . }}
  labels:
    {{- include "go-echoc62a8c0f-5c78-477c-b410-34f18de7eb4c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc62a8c0f-5c78-477c-b410-34f18de7eb4c.selectorLabels" . | nindent 6 }}
