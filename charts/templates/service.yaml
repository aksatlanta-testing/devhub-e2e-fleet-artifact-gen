apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo86d14666-a8c7-4d70-88f4-75fa279549c6.fullname" . }}
  labels:
    {{- include "go-echo86d14666-a8c7-4d70-88f4-75fa279549c6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo86d14666-a8c7-4d70-88f4-75fa279549c6.selectorLabels" . | nindent 6 }}
