apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofffaf19b-1570-429b-99eb-0c5fc867d4ed.fullname" . }}
  labels:
    {{- include "go-echofffaf19b-1570-429b-99eb-0c5fc867d4ed.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofffaf19b-1570-429b-99eb-0c5fc867d4ed.selectorLabels" . | nindent 6 }}
