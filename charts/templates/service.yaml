apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodb56395e-b506-4e9f-888c-b8be0147f469.fullname" . }}
  labels:
    {{- include "go-echodb56395e-b506-4e9f-888c-b8be0147f469.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodb56395e-b506-4e9f-888c-b8be0147f469.selectorLabels" . | nindent 6 }}
