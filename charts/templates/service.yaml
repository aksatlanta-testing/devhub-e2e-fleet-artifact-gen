apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5f94542f-e4ff-4191-a6ed-7f2c58649c7e.fullname" . }}
  labels:
    {{- include "go-echo5f94542f-e4ff-4191-a6ed-7f2c58649c7e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5f94542f-e4ff-4191-a6ed-7f2c58649c7e.selectorLabels" . | nindent 6 }}
