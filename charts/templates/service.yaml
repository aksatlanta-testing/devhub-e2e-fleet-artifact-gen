apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo10bf2c66-0695-4a7e-9436-5aeed250e0dd.fullname" . }}
  labels:
    {{- include "go-echo10bf2c66-0695-4a7e-9436-5aeed250e0dd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo10bf2c66-0695-4a7e-9436-5aeed250e0dd.selectorLabels" . | nindent 6 }}
