apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa1799c84-9b02-45c7-9950-fa947c58aee3.fullname" . }}
  labels:
    {{- include "go-echoa1799c84-9b02-45c7-9950-fa947c58aee3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa1799c84-9b02-45c7-9950-fa947c58aee3.selectorLabels" . | nindent 6 }}
