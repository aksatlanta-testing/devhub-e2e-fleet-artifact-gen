apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3ec544ca-a5e5-41dd-9676-8d2a8dc8e7c6.fullname" . }}
  labels:
    {{- include "go-echo3ec544ca-a5e5-41dd-9676-8d2a8dc8e7c6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3ec544ca-a5e5-41dd-9676-8d2a8dc8e7c6.selectorLabels" . | nindent 6 }}
