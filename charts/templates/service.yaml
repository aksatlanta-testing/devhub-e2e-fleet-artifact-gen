apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo90ba05fe-cb02-4060-9226-7900f0d6b8e2.fullname" . }}
  labels:
    {{- include "go-echo90ba05fe-cb02-4060-9226-7900f0d6b8e2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo90ba05fe-cb02-4060-9226-7900f0d6b8e2.selectorLabels" . | nindent 6 }}
