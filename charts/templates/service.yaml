apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof51920fb-0701-4368-b677-cd3dee5128d7.fullname" . }}
  labels:
    {{- include "go-echof51920fb-0701-4368-b677-cd3dee5128d7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof51920fb-0701-4368-b677-cd3dee5128d7.selectorLabels" . | nindent 6 }}
