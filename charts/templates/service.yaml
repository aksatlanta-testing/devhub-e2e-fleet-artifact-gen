apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9e99e200-f7b7-4c54-bd00-2da23a20fcbd.fullname" . }}
  labels:
    {{- include "go-echo9e99e200-f7b7-4c54-bd00-2da23a20fcbd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9e99e200-f7b7-4c54-bd00-2da23a20fcbd.selectorLabels" . | nindent 6 }}
