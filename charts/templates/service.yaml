apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6f1d1001-fd26-44f5-9fa2-5196815e4059.fullname" . }}
  labels:
    {{- include "go-echo6f1d1001-fd26-44f5-9fa2-5196815e4059.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6f1d1001-fd26-44f5-9fa2-5196815e4059.selectorLabels" . | nindent 6 }}
