apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa0e865ab-b872-448b-92ab-732ea3895bce.fullname" . }}
  labels:
    {{- include "go-echoa0e865ab-b872-448b-92ab-732ea3895bce.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa0e865ab-b872-448b-92ab-732ea3895bce.selectorLabels" . | nindent 6 }}
