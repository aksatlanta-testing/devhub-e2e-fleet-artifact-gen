apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo05d96823-e7a4-4d6c-9f77-110057871c02.fullname" . }}
  labels:
    {{- include "go-echo05d96823-e7a4-4d6c-9f77-110057871c02.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo05d96823-e7a4-4d6c-9f77-110057871c02.selectorLabels" . | nindent 6 }}
