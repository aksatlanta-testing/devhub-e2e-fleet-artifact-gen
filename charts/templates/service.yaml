apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocf7e7406-c1df-407a-a36f-6c10c24e55a0.fullname" . }}
  labels:
    {{- include "go-echocf7e7406-c1df-407a-a36f-6c10c24e55a0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocf7e7406-c1df-407a-a36f-6c10c24e55a0.selectorLabels" . | nindent 6 }}
