apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocc51bede-9334-414e-b895-b860cb7af008.fullname" . }}
  labels:
    {{- include "go-echocc51bede-9334-414e-b895-b860cb7af008.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocc51bede-9334-414e-b895-b860cb7af008.selectorLabels" . | nindent 6 }}
