apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob2bab07b-6c8d-431e-becd-ff03e6878734.fullname" . }}
  labels:
    {{- include "go-echob2bab07b-6c8d-431e-becd-ff03e6878734.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob2bab07b-6c8d-431e-becd-ff03e6878734.selectorLabels" . | nindent 6 }}
