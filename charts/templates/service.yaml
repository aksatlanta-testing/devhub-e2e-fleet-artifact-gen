apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4764ceae-dc95-45e1-bfb9-58ee419f400a.fullname" . }}
  labels:
    {{- include "go-echo4764ceae-dc95-45e1-bfb9-58ee419f400a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4764ceae-dc95-45e1-bfb9-58ee419f400a.selectorLabels" . | nindent 6 }}
