apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc954c30e-98d9-4b05-abad-032d4697e6a6.fullname" . }}
  labels:
    {{- include "go-echoc954c30e-98d9-4b05-abad-032d4697e6a6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc954c30e-98d9-4b05-abad-032d4697e6a6.selectorLabels" . | nindent 6 }}
