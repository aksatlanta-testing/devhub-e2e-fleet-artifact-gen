apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1154c7b6-2583-4a74-9a29-46759df2d78e.fullname" . }}
  labels:
    {{- include "go-echo1154c7b6-2583-4a74-9a29-46759df2d78e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1154c7b6-2583-4a74-9a29-46759df2d78e.selectorLabels" . | nindent 6 }}
