apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo40109e4b-b957-4ba8-8687-1f87bb01df8d.fullname" . }}
  labels:
    {{- include "go-echo40109e4b-b957-4ba8-8687-1f87bb01df8d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo40109e4b-b957-4ba8-8687-1f87bb01df8d.selectorLabels" . | nindent 6 }}
