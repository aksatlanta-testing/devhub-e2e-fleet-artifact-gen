apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo498a86b8-a1bd-4175-ab96-53bf5ec9d1fe.fullname" . }}
  labels:
    {{- include "go-echo498a86b8-a1bd-4175-ab96-53bf5ec9d1fe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo498a86b8-a1bd-4175-ab96-53bf5ec9d1fe.selectorLabels" . | nindent 6 }}
