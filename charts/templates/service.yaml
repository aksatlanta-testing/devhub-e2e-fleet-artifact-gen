apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6a4b3f18-3974-49be-95ef-a3a1519370a1.fullname" . }}
  labels:
    {{- include "go-echo6a4b3f18-3974-49be-95ef-a3a1519370a1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6a4b3f18-3974-49be-95ef-a3a1519370a1.selectorLabels" . | nindent 6 }}
