apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodd8a9108-b961-47b8-a20b-c7f2027e59c4.fullname" . }}
  labels:
    {{- include "go-echodd8a9108-b961-47b8-a20b-c7f2027e59c4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodd8a9108-b961-47b8-a20b-c7f2027e59c4.selectorLabels" . | nindent 6 }}
