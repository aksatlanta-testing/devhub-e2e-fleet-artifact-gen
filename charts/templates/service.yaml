apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo383ab9b3-2de2-447b-8e5e-e086be4c8395.fullname" . }}
  labels:
    {{- include "go-echo383ab9b3-2de2-447b-8e5e-e086be4c8395.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo383ab9b3-2de2-447b-8e5e-e086be4c8395.selectorLabels" . | nindent 6 }}
