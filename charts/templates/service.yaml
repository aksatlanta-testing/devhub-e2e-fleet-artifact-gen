apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo881bcd80-35b8-4c54-b341-d1160d05d074.fullname" . }}
  labels:
    {{- include "go-echo881bcd80-35b8-4c54-b341-d1160d05d074.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo881bcd80-35b8-4c54-b341-d1160d05d074.selectorLabels" . | nindent 6 }}
