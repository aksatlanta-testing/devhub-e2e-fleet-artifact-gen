apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo510d8757-b56e-4c55-9b68-572ced3e1f28.fullname" . }}
  labels:
    {{- include "go-echo510d8757-b56e-4c55-9b68-572ced3e1f28.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo510d8757-b56e-4c55-9b68-572ced3e1f28.selectorLabels" . | nindent 6 }}
