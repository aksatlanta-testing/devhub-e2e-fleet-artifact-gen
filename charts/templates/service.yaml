apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2faa4c62-fe14-47a1-a687-3e65f23ff39c.fullname" . }}
  labels:
    {{- include "go-echo2faa4c62-fe14-47a1-a687-3e65f23ff39c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2faa4c62-fe14-47a1-a687-3e65f23ff39c.selectorLabels" . | nindent 6 }}
