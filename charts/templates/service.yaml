apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8a92b35c-05ba-4d55-9d39-c8e418802948.fullname" . }}
  labels:
    {{- include "go-echo8a92b35c-05ba-4d55-9d39-c8e418802948.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8a92b35c-05ba-4d55-9d39-c8e418802948.selectorLabels" . | nindent 6 }}
