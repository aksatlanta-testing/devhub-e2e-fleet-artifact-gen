apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4b8b1855-6b94-4817-8db3-e9b28a0753c2.fullname" . }}
  labels:
    {{- include "go-echo4b8b1855-6b94-4817-8db3-e9b28a0753c2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4b8b1855-6b94-4817-8db3-e9b28a0753c2.selectorLabels" . | nindent 6 }}
