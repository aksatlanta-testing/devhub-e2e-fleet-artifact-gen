apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0b29e46b-0872-47ae-b735-f29635159486.fullname" . }}
  labels:
    {{- include "go-echo0b29e46b-0872-47ae-b735-f29635159486.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0b29e46b-0872-47ae-b735-f29635159486.selectorLabels" . | nindent 6 }}
