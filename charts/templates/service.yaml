apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1c4f6f32-7de2-46dc-a315-617215969b90.fullname" . }}
  labels:
    {{- include "go-echo1c4f6f32-7de2-46dc-a315-617215969b90.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1c4f6f32-7de2-46dc-a315-617215969b90.selectorLabels" . | nindent 6 }}
