apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1d30a50e-9d89-493d-bfba-9c7d27e1e0ac.fullname" . }}
  labels:
    {{- include "go-echo1d30a50e-9d89-493d-bfba-9c7d27e1e0ac.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1d30a50e-9d89-493d-bfba-9c7d27e1e0ac.selectorLabels" . | nindent 6 }}
