apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc2110b3b-2253-42ee-8b04-ad2160dfef6b.fullname" . }}
  labels:
    {{- include "go-echoc2110b3b-2253-42ee-8b04-ad2160dfef6b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc2110b3b-2253-42ee-8b04-ad2160dfef6b.selectorLabels" . | nindent 6 }}
