apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof769fd70-20da-4de8-a12d-2ef7b022d32b.fullname" . }}
  labels:
    {{- include "go-echof769fd70-20da-4de8-a12d-2ef7b022d32b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof769fd70-20da-4de8-a12d-2ef7b022d32b.selectorLabels" . | nindent 6 }}
