apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo990cfc37-4602-4dc1-abf7-e601ebcf278c.fullname" . }}
  labels:
    {{- include "go-echo990cfc37-4602-4dc1-abf7-e601ebcf278c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo990cfc37-4602-4dc1-abf7-e601ebcf278c.selectorLabels" . | nindent 6 }}
