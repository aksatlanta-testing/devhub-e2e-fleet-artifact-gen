apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe196194d-5182-4d32-bb75-27db1dda14c4.fullname" . }}
  labels:
    {{- include "go-echoe196194d-5182-4d32-bb75-27db1dda14c4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe196194d-5182-4d32-bb75-27db1dda14c4.selectorLabels" . | nindent 6 }}
