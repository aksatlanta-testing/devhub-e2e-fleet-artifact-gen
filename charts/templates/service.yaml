apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofa7cd958-9f02-4f4d-8850-b659d883aa33.fullname" . }}
  labels:
    {{- include "go-echofa7cd958-9f02-4f4d-8850-b659d883aa33.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofa7cd958-9f02-4f4d-8850-b659d883aa33.selectorLabels" . | nindent 6 }}
