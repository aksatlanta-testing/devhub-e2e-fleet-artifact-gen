apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof348bd8e-2dda-4966-8185-bf8c3e655b8b.fullname" . }}
  labels:
    {{- include "go-echof348bd8e-2dda-4966-8185-bf8c3e655b8b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof348bd8e-2dda-4966-8185-bf8c3e655b8b.selectorLabels" . | nindent 6 }}
