apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaf299d9a-0e5f-466b-aad2-166a346eae38.fullname" . }}
  labels:
    {{- include "go-echoaf299d9a-0e5f-466b-aad2-166a346eae38.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaf299d9a-0e5f-466b-aad2-166a346eae38.selectorLabels" . | nindent 6 }}
