apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa4600706-1137-4ae5-a26e-7c921ab1a821.fullname" . }}
  labels:
    {{- include "go-echoa4600706-1137-4ae5-a26e-7c921ab1a821.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa4600706-1137-4ae5-a26e-7c921ab1a821.selectorLabels" . | nindent 6 }}
