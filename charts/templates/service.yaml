apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2cf07fdd-16ee-4e9d-aa7e-b68d9ee4419c.fullname" . }}
  labels:
    {{- include "go-echo2cf07fdd-16ee-4e9d-aa7e-b68d9ee4419c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2cf07fdd-16ee-4e9d-aa7e-b68d9ee4419c.selectorLabels" . | nindent 6 }}
