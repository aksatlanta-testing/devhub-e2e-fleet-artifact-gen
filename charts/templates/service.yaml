apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9a81f66e-f416-4283-a6b7-f1e119e94053.fullname" . }}
  labels:
    {{- include "go-echo9a81f66e-f416-4283-a6b7-f1e119e94053.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9a81f66e-f416-4283-a6b7-f1e119e94053.selectorLabels" . | nindent 6 }}
