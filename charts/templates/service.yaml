apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo54baa62a-d9c7-458d-8aba-1ef0253e7649.fullname" . }}
  labels:
    {{- include "go-echo54baa62a-d9c7-458d-8aba-1ef0253e7649.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo54baa62a-d9c7-458d-8aba-1ef0253e7649.selectorLabels" . | nindent 6 }}
