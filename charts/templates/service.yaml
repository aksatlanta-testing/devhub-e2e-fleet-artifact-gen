apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2581d2fe-644c-42b1-b029-322155c8f171.fullname" . }}
  labels:
    {{- include "go-echo2581d2fe-644c-42b1-b029-322155c8f171.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2581d2fe-644c-42b1-b029-322155c8f171.selectorLabels" . | nindent 6 }}
