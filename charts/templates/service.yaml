apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe72898b5-7b61-44a7-9bd8-7b65f0d3e2cb.fullname" . }}
  labels:
    {{- include "go-echoe72898b5-7b61-44a7-9bd8-7b65f0d3e2cb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe72898b5-7b61-44a7-9bd8-7b65f0d3e2cb.selectorLabels" . | nindent 6 }}
