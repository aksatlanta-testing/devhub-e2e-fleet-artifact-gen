apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo279acce2-0dea-48a1-8e04-d4e968b923d4.fullname" . }}
  labels:
    {{- include "go-echo279acce2-0dea-48a1-8e04-d4e968b923d4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo279acce2-0dea-48a1-8e04-d4e968b923d4.selectorLabels" . | nindent 6 }}
