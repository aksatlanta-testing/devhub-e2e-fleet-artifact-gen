apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2a36215e-9477-416c-b36b-338e1bee7700.fullname" . }}
  labels:
    {{- include "go-echo2a36215e-9477-416c-b36b-338e1bee7700.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2a36215e-9477-416c-b36b-338e1bee7700.selectorLabels" . | nindent 6 }}
