apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo98f97353-c495-4b85-8628-587367ead910.fullname" . }}
  labels:
    {{- include "go-echo98f97353-c495-4b85-8628-587367ead910.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo98f97353-c495-4b85-8628-587367ead910.selectorLabels" . | nindent 6 }}
