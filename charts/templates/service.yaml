apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofa22e3ad-bdc6-43a3-945d-9dd391001ef2.fullname" . }}
  labels:
    {{- include "go-echofa22e3ad-bdc6-43a3-945d-9dd391001ef2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofa22e3ad-bdc6-43a3-945d-9dd391001ef2.selectorLabels" . | nindent 6 }}
