apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob8624895-9f96-46ff-a948-65b4744ddab4.fullname" . }}
  labels:
    {{- include "go-echob8624895-9f96-46ff-a948-65b4744ddab4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob8624895-9f96-46ff-a948-65b4744ddab4.selectorLabels" . | nindent 6 }}
