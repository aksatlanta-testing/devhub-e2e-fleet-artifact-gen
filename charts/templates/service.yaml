apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo06d33135-5a5c-4639-8fef-ce9981d759b3.fullname" . }}
  labels:
    {{- include "go-echo06d33135-5a5c-4639-8fef-ce9981d759b3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo06d33135-5a5c-4639-8fef-ce9981d759b3.selectorLabels" . | nindent 6 }}
