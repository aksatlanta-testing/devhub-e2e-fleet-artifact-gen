apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc4983c57-a642-4491-b67e-767987ad7f5a.fullname" . }}
  labels:
    {{- include "go-echoc4983c57-a642-4491-b67e-767987ad7f5a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc4983c57-a642-4491-b67e-767987ad7f5a.selectorLabels" . | nindent 6 }}
