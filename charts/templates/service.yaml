apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7808e319-c558-4d1e-a964-a055a96d46e8.fullname" . }}
  labels:
    {{- include "go-echo7808e319-c558-4d1e-a964-a055a96d46e8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7808e319-c558-4d1e-a964-a055a96d46e8.selectorLabels" . | nindent 6 }}
