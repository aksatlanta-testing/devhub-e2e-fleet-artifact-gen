apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo58257788-e716-48e9-8b5e-f9c4f0914aa4.fullname" . }}
  labels:
    {{- include "go-echo58257788-e716-48e9-8b5e-f9c4f0914aa4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo58257788-e716-48e9-8b5e-f9c4f0914aa4.selectorLabels" . | nindent 6 }}
