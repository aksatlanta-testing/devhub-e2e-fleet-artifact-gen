apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe186f880-b723-40dc-9bb0-b1ab638ac589.fullname" . }}
  labels:
    {{- include "go-echoe186f880-b723-40dc-9bb0-b1ab638ac589.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe186f880-b723-40dc-9bb0-b1ab638ac589.selectorLabels" . | nindent 6 }}
