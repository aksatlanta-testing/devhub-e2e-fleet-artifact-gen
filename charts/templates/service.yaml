apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod4f68180-0c75-4795-a76a-9d8c29ab204d.fullname" . }}
  labels:
    {{- include "go-echod4f68180-0c75-4795-a76a-9d8c29ab204d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod4f68180-0c75-4795-a76a-9d8c29ab204d.selectorLabels" . | nindent 6 }}
