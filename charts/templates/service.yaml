apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0e7c8169-7488-4090-919e-8749bf91c6cb.fullname" . }}
  labels:
    {{- include "go-echo0e7c8169-7488-4090-919e-8749bf91c6cb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0e7c8169-7488-4090-919e-8749bf91c6cb.selectorLabels" . | nindent 6 }}
