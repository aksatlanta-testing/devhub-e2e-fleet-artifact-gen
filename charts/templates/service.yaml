apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo68eb3d78-8963-4350-9027-693eaeb2c942.fullname" . }}
  labels:
    {{- include "go-echo68eb3d78-8963-4350-9027-693eaeb2c942.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo68eb3d78-8963-4350-9027-693eaeb2c942.selectorLabels" . | nindent 6 }}
