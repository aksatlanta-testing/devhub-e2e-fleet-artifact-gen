apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo54ef7995-011e-424c-b80e-f85b98aa2def.fullname" . }}
  labels:
    {{- include "go-echo54ef7995-011e-424c-b80e-f85b98aa2def.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo54ef7995-011e-424c-b80e-f85b98aa2def.selectorLabels" . | nindent 6 }}
