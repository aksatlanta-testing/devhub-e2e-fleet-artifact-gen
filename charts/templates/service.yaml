apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo13481d06-096b-4000-bce6-d4dcbeaa55df.fullname" . }}
  labels:
    {{- include "go-echo13481d06-096b-4000-bce6-d4dcbeaa55df.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo13481d06-096b-4000-bce6-d4dcbeaa55df.selectorLabels" . | nindent 6 }}
