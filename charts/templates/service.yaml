apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3acdb9cc-722a-4901-872d-6236d9b0b459.fullname" . }}
  labels:
    {{- include "go-echo3acdb9cc-722a-4901-872d-6236d9b0b459.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3acdb9cc-722a-4901-872d-6236d9b0b459.selectorLabels" . | nindent 6 }}
