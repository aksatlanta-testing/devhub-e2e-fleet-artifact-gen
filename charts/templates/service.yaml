apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe2716a9e-9f80-465f-a56d-374765053780.fullname" . }}
  labels:
    {{- include "go-echoe2716a9e-9f80-465f-a56d-374765053780.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe2716a9e-9f80-465f-a56d-374765053780.selectorLabels" . | nindent 6 }}
