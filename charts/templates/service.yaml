apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo622ef90c-4c54-45fe-8e56-fa3dd2900fa9.fullname" . }}
  labels:
    {{- include "go-echo622ef90c-4c54-45fe-8e56-fa3dd2900fa9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo622ef90c-4c54-45fe-8e56-fa3dd2900fa9.selectorLabels" . | nindent 6 }}
