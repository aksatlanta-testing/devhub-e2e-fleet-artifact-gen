apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5b81e246-bd8a-4f76-ab27-63b15addae20.fullname" . }}
  labels:
    {{- include "go-echo5b81e246-bd8a-4f76-ab27-63b15addae20.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5b81e246-bd8a-4f76-ab27-63b15addae20.selectorLabels" . | nindent 6 }}
