apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod55eb4ad-476a-4cad-b8e3-a0d7d395a395.fullname" . }}
  labels:
    {{- include "go-echod55eb4ad-476a-4cad-b8e3-a0d7d395a395.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod55eb4ad-476a-4cad-b8e3-a0d7d395a395.selectorLabels" . | nindent 6 }}
