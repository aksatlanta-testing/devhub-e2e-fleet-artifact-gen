apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9b7a1820-c3cd-4e0d-a036-ec738965f408.fullname" . }}
  labels:
    {{- include "go-echo9b7a1820-c3cd-4e0d-a036-ec738965f408.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9b7a1820-c3cd-4e0d-a036-ec738965f408.selectorLabels" . | nindent 6 }}
