apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobbeedf31-46c6-4fb8-b461-d0c31a12ef0b.fullname" . }}
  labels:
    {{- include "go-echobbeedf31-46c6-4fb8-b461-d0c31a12ef0b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobbeedf31-46c6-4fb8-b461-d0c31a12ef0b.selectorLabels" . | nindent 6 }}
