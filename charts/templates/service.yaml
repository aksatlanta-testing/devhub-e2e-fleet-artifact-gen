apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofe321466-938e-43d3-a958-09be2109ecae.fullname" . }}
  labels:
    {{- include "go-echofe321466-938e-43d3-a958-09be2109ecae.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofe321466-938e-43d3-a958-09be2109ecae.selectorLabels" . | nindent 6 }}
