apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoacf6ce1c-1a96-4b9f-b461-be55091c03c4.fullname" . }}
  labels:
    {{- include "go-echoacf6ce1c-1a96-4b9f-b461-be55091c03c4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoacf6ce1c-1a96-4b9f-b461-be55091c03c4.selectorLabels" . | nindent 6 }}
