apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6e738e77-1808-481a-8133-240b9bcfcf0f.fullname" . }}
  labels:
    {{- include "go-echo6e738e77-1808-481a-8133-240b9bcfcf0f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6e738e77-1808-481a-8133-240b9bcfcf0f.selectorLabels" . | nindent 6 }}
