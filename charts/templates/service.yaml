apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6cf5ecfe-b8b1-41d2-8215-34a43d3dcc45.fullname" . }}
  labels:
    {{- include "go-echo6cf5ecfe-b8b1-41d2-8215-34a43d3dcc45.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6cf5ecfe-b8b1-41d2-8215-34a43d3dcc45.selectorLabels" . | nindent 6 }}
