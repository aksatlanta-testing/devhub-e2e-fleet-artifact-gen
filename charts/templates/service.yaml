apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe190054e-c26f-40e3-aa52-b9a5c8740e3d.fullname" . }}
  labels:
    {{- include "go-echoe190054e-c26f-40e3-aa52-b9a5c8740e3d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe190054e-c26f-40e3-aa52-b9a5c8740e3d.selectorLabels" . | nindent 6 }}
