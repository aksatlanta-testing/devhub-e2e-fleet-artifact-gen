apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob3f4fae9-3a22-4292-9ee6-31dfc76638ee.fullname" . }}
  labels:
    {{- include "go-echob3f4fae9-3a22-4292-9ee6-31dfc76638ee.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob3f4fae9-3a22-4292-9ee6-31dfc76638ee.selectorLabels" . | nindent 6 }}
