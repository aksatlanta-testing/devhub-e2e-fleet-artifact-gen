apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo01ea8021-a37e-4419-a85b-f0fa523ada0d.fullname" . }}
  labels:
    {{- include "go-echo01ea8021-a37e-4419-a85b-f0fa523ada0d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo01ea8021-a37e-4419-a85b-f0fa523ada0d.selectorLabels" . | nindent 6 }}
