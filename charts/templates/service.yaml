apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa1340e77-a1f7-41d3-9460-02826cb18851.fullname" . }}
  labels:
    {{- include "go-echoa1340e77-a1f7-41d3-9460-02826cb18851.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa1340e77-a1f7-41d3-9460-02826cb18851.selectorLabels" . | nindent 6 }}
