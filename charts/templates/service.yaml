apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo071d03c6-a28e-4574-b2d6-8c4bd1282d1f.fullname" . }}
  labels:
    {{- include "go-echo071d03c6-a28e-4574-b2d6-8c4bd1282d1f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo071d03c6-a28e-4574-b2d6-8c4bd1282d1f.selectorLabels" . | nindent 6 }}
