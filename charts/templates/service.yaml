apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoeebab8f8-f3f6-4648-b574-5059746af754.fullname" . }}
  labels:
    {{- include "go-echoeebab8f8-f3f6-4648-b574-5059746af754.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoeebab8f8-f3f6-4648-b574-5059746af754.selectorLabels" . | nindent 6 }}
