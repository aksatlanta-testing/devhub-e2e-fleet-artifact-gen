apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoae1985ba-62ef-4c59-9bb5-65a3eaa90c3d.fullname" . }}
  labels:
    {{- include "go-echoae1985ba-62ef-4c59-9bb5-65a3eaa90c3d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoae1985ba-62ef-4c59-9bb5-65a3eaa90c3d.selectorLabels" . | nindent 6 }}
