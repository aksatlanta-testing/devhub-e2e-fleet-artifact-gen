apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8ed8c2fa-ed3d-4d4f-94ec-a9edbb90e306.fullname" . }}
  labels:
    {{- include "go-echo8ed8c2fa-ed3d-4d4f-94ec-a9edbb90e306.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8ed8c2fa-ed3d-4d4f-94ec-a9edbb90e306.selectorLabels" . | nindent 6 }}
