apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo36770b71-6153-4af7-b7d1-8b06851ad6eb.fullname" . }}
  labels:
    {{- include "go-echo36770b71-6153-4af7-b7d1-8b06851ad6eb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo36770b71-6153-4af7-b7d1-8b06851ad6eb.selectorLabels" . | nindent 6 }}
