apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7a96ae02-1bf9-4fea-96f9-af532aeb90b7.fullname" . }}
  labels:
    {{- include "go-echo7a96ae02-1bf9-4fea-96f9-af532aeb90b7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7a96ae02-1bf9-4fea-96f9-af532aeb90b7.selectorLabels" . | nindent 6 }}
