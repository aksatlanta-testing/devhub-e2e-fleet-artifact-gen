apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo329a41e8-fae2-4af1-be31-d92176daf5bb.fullname" . }}
  labels:
    {{- include "go-echo329a41e8-fae2-4af1-be31-d92176daf5bb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo329a41e8-fae2-4af1-be31-d92176daf5bb.selectorLabels" . | nindent 6 }}
