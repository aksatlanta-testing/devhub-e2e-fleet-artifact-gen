apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8e61683c-dab2-4363-a2c1-93640acfafd2.fullname" . }}
  labels:
    {{- include "go-echo8e61683c-dab2-4363-a2c1-93640acfafd2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8e61683c-dab2-4363-a2c1-93640acfafd2.selectorLabels" . | nindent 6 }}
