apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof41a3d0d-2d95-4420-b331-4ceea13a9d82.fullname" . }}
  labels:
    {{- include "go-echof41a3d0d-2d95-4420-b331-4ceea13a9d82.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof41a3d0d-2d95-4420-b331-4ceea13a9d82.selectorLabels" . | nindent 6 }}
