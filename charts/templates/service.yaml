apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob81919da-e7d7-42a0-8f8c-8448818710cb.fullname" . }}
  labels:
    {{- include "go-echob81919da-e7d7-42a0-8f8c-8448818710cb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob81919da-e7d7-42a0-8f8c-8448818710cb.selectorLabels" . | nindent 6 }}
