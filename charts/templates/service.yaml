apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo44210692-5173-4058-a4d0-7dc14f9ed83a.fullname" . }}
  labels:
    {{- include "go-echo44210692-5173-4058-a4d0-7dc14f9ed83a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo44210692-5173-4058-a4d0-7dc14f9ed83a.selectorLabels" . | nindent 6 }}
