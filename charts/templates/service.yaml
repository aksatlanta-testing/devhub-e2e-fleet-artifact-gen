apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8b68f579-5783-45e2-890b-c6e58747040a.fullname" . }}
  labels:
    {{- include "go-echo8b68f579-5783-45e2-890b-c6e58747040a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8b68f579-5783-45e2-890b-c6e58747040a.selectorLabels" . | nindent 6 }}
