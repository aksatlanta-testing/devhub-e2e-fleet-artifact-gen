apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo94b117ee-b125-4b8b-9a00-53cea988c3dd.fullname" . }}
  labels:
    {{- include "go-echo94b117ee-b125-4b8b-9a00-53cea988c3dd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo94b117ee-b125-4b8b-9a00-53cea988c3dd.selectorLabels" . | nindent 6 }}
