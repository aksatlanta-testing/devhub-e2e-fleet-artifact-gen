apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocf21a955-dbc4-4582-87e9-7b177b646923.fullname" . }}
  labels:
    {{- include "go-echocf21a955-dbc4-4582-87e9-7b177b646923.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocf21a955-dbc4-4582-87e9-7b177b646923.selectorLabels" . | nindent 6 }}
