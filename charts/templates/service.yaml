apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1fe67181-4ada-4436-95d4-d06dfd56669a.fullname" . }}
  labels:
    {{- include "go-echo1fe67181-4ada-4436-95d4-d06dfd56669a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1fe67181-4ada-4436-95d4-d06dfd56669a.selectorLabels" . | nindent 6 }}
