apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo22b1932f-728d-4b53-856a-2f506d3a00ca.fullname" . }}
  labels:
    {{- include "go-echo22b1932f-728d-4b53-856a-2f506d3a00ca.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo22b1932f-728d-4b53-856a-2f506d3a00ca.selectorLabels" . | nindent 6 }}
