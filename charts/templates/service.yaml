apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo19a808a4-9271-4ea1-a13c-6b933ea36c02.fullname" . }}
  labels:
    {{- include "go-echo19a808a4-9271-4ea1-a13c-6b933ea36c02.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo19a808a4-9271-4ea1-a13c-6b933ea36c02.selectorLabels" . | nindent 6 }}
