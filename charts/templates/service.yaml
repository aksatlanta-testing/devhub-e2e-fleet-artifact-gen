apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo07353ace-785f-477e-8e7d-4559bf00f9c6.fullname" . }}
  labels:
    {{- include "go-echo07353ace-785f-477e-8e7d-4559bf00f9c6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo07353ace-785f-477e-8e7d-4559bf00f9c6.selectorLabels" . | nindent 6 }}
