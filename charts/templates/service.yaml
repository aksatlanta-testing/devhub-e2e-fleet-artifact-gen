apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9ad4c449-2cb0-418c-8f90-6f34505cc5d1.fullname" . }}
  labels:
    {{- include "go-echo9ad4c449-2cb0-418c-8f90-6f34505cc5d1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9ad4c449-2cb0-418c-8f90-6f34505cc5d1.selectorLabels" . | nindent 6 }}
