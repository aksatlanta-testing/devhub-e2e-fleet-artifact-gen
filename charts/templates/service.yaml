apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc5a43d68-ce0a-4801-8092-7ecd46c2662e.fullname" . }}
  labels:
    {{- include "go-echoc5a43d68-ce0a-4801-8092-7ecd46c2662e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc5a43d68-ce0a-4801-8092-7ecd46c2662e.selectorLabels" . | nindent 6 }}
