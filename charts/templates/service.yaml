apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo463a0259-d34d-48ca-85c4-1e5b62111969.fullname" . }}
  labels:
    {{- include "go-echo463a0259-d34d-48ca-85c4-1e5b62111969.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo463a0259-d34d-48ca-85c4-1e5b62111969.selectorLabels" . | nindent 6 }}
