apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob4e39149-f3c5-4be0-ad6d-f5e37a916e88.fullname" . }}
  labels:
    {{- include "go-echob4e39149-f3c5-4be0-ad6d-f5e37a916e88.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob4e39149-f3c5-4be0-ad6d-f5e37a916e88.selectorLabels" . | nindent 6 }}
