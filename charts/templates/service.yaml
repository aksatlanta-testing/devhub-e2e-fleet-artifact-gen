apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo48abe454-d053-45ef-8e2f-4516f76ae366.fullname" . }}
  labels:
    {{- include "go-echo48abe454-d053-45ef-8e2f-4516f76ae366.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo48abe454-d053-45ef-8e2f-4516f76ae366.selectorLabels" . | nindent 6 }}
