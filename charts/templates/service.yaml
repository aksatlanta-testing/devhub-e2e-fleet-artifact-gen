apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof5f12c5f-9219-43a6-a928-0f71597b07c0.fullname" . }}
  labels:
    {{- include "go-echof5f12c5f-9219-43a6-a928-0f71597b07c0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof5f12c5f-9219-43a6-a928-0f71597b07c0.selectorLabels" . | nindent 6 }}
