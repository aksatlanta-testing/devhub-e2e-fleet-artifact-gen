apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1e3f6f20-debc-4e3f-b29a-01e9466db7db.fullname" . }}
  labels:
    {{- include "go-echo1e3f6f20-debc-4e3f-b29a-01e9466db7db.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1e3f6f20-debc-4e3f-b29a-01e9466db7db.selectorLabels" . | nindent 6 }}
