apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobf37fe44-0bee-4556-8c75-c9d7c4000ee5.fullname" . }}
  labels:
    {{- include "go-echobf37fe44-0bee-4556-8c75-c9d7c4000ee5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobf37fe44-0bee-4556-8c75-c9d7c4000ee5.selectorLabels" . | nindent 6 }}
