apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo03b2b84b-2ba8-4707-ba12-adb11f003384.fullname" . }}
  labels:
    {{- include "go-echo03b2b84b-2ba8-4707-ba12-adb11f003384.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo03b2b84b-2ba8-4707-ba12-adb11f003384.selectorLabels" . | nindent 6 }}
