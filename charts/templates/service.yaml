apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2a3e0438-930f-41b0-831f-61c7ce80cab8.fullname" . }}
  labels:
    {{- include "go-echo2a3e0438-930f-41b0-831f-61c7ce80cab8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2a3e0438-930f-41b0-831f-61c7ce80cab8.selectorLabels" . | nindent 6 }}
