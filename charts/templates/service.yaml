apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0b1ce298-c9bc-4163-9bcc-c57a6304d79f.fullname" . }}
  labels:
    {{- include "go-echo0b1ce298-c9bc-4163-9bcc-c57a6304d79f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0b1ce298-c9bc-4163-9bcc-c57a6304d79f.selectorLabels" . | nindent 6 }}
