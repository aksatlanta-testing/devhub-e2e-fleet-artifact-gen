apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9bb9bd62-a98d-45c8-bfe2-7251bd48ab33.fullname" . }}
  labels:
    {{- include "go-echo9bb9bd62-a98d-45c8-bfe2-7251bd48ab33.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9bb9bd62-a98d-45c8-bfe2-7251bd48ab33.selectorLabels" . | nindent 6 }}
