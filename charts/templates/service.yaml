apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo459ecfe3-f572-4ab0-9e18-b321e88db04a.fullname" . }}
  labels:
    {{- include "go-echo459ecfe3-f572-4ab0-9e18-b321e88db04a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo459ecfe3-f572-4ab0-9e18-b321e88db04a.selectorLabels" . | nindent 6 }}
