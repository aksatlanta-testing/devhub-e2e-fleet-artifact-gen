apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobb5fde46-d0d0-4c09-90bc-f5b72ab2c47e.fullname" . }}
  labels:
    {{- include "go-echobb5fde46-d0d0-4c09-90bc-f5b72ab2c47e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobb5fde46-d0d0-4c09-90bc-f5b72ab2c47e.selectorLabels" . | nindent 6 }}
