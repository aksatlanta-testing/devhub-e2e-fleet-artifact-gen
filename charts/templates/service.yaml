apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo24a522d4-3408-45a7-80cb-7004630adf34.fullname" . }}
  labels:
    {{- include "go-echo24a522d4-3408-45a7-80cb-7004630adf34.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo24a522d4-3408-45a7-80cb-7004630adf34.selectorLabels" . | nindent 6 }}
