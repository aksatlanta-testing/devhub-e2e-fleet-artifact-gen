apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo346f1cf5-af72-4e29-835b-fc9ba0c98b46.fullname" . }}
  labels:
    {{- include "go-echo346f1cf5-af72-4e29-835b-fc9ba0c98b46.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo346f1cf5-af72-4e29-835b-fc9ba0c98b46.selectorLabels" . | nindent 6 }}
