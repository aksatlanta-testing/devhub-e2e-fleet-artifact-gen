apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9543011d-9f3e-4222-a407-01e52767d452.fullname" . }}
  labels:
    {{- include "go-echo9543011d-9f3e-4222-a407-01e52767d452.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9543011d-9f3e-4222-a407-01e52767d452.selectorLabels" . | nindent 6 }}
