apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof592d148-ec38-4c4e-ade2-0904d19ea9e5.fullname" . }}
  labels:
    {{- include "go-echof592d148-ec38-4c4e-ade2-0904d19ea9e5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof592d148-ec38-4c4e-ade2-0904d19ea9e5.selectorLabels" . | nindent 6 }}
