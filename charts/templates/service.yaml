apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo640bca5f-cf64-419b-b923-16429980fd20.fullname" . }}
  labels:
    {{- include "go-echo640bca5f-cf64-419b-b923-16429980fd20.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo640bca5f-cf64-419b-b923-16429980fd20.selectorLabels" . | nindent 6 }}
