apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4014f025-df8f-4ba9-871c-131483af614c.fullname" . }}
  labels:
    {{- include "go-echo4014f025-df8f-4ba9-871c-131483af614c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4014f025-df8f-4ba9-871c-131483af614c.selectorLabels" . | nindent 6 }}
