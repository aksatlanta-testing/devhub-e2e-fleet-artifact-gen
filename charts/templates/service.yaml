apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8c1ad366-4874-4d2f-9b86-313603dc1cca.fullname" . }}
  labels:
    {{- include "go-echo8c1ad366-4874-4d2f-9b86-313603dc1cca.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8c1ad366-4874-4d2f-9b86-313603dc1cca.selectorLabels" . | nindent 6 }}
