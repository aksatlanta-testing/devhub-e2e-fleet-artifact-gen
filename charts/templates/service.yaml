apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe597a57c-cca7-4773-8f95-5bbf335a64ba.fullname" . }}
  labels:
    {{- include "go-echoe597a57c-cca7-4773-8f95-5bbf335a64ba.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe597a57c-cca7-4773-8f95-5bbf335a64ba.selectorLabels" . | nindent 6 }}
