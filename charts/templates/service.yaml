apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodf06e220-0d25-41da-b346-d3506213e1d4.fullname" . }}
  labels:
    {{- include "go-echodf06e220-0d25-41da-b346-d3506213e1d4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodf06e220-0d25-41da-b346-d3506213e1d4.selectorLabels" . | nindent 6 }}
