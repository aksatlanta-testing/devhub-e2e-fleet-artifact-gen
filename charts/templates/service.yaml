apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa969bb66-a904-4af0-8e98-da2a5900979d.fullname" . }}
  labels:
    {{- include "go-echoa969bb66-a904-4af0-8e98-da2a5900979d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa969bb66-a904-4af0-8e98-da2a5900979d.selectorLabels" . | nindent 6 }}
