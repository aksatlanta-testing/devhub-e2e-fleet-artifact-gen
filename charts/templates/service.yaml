apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6a5a08d0-8f42-406c-9bf9-b944a90ff11e.fullname" . }}
  labels:
    {{- include "go-echo6a5a08d0-8f42-406c-9bf9-b944a90ff11e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6a5a08d0-8f42-406c-9bf9-b944a90ff11e.selectorLabels" . | nindent 6 }}
