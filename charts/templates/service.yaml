apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3910aeb3-87ce-4fdc-8f77-834a67e634c4.fullname" . }}
  labels:
    {{- include "go-echo3910aeb3-87ce-4fdc-8f77-834a67e634c4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3910aeb3-87ce-4fdc-8f77-834a67e634c4.selectorLabels" . | nindent 6 }}
