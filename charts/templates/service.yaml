apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4b6840a8-c719-4f4b-8604-bf1aaeff2a77.fullname" . }}
  labels:
    {{- include "go-echo4b6840a8-c719-4f4b-8604-bf1aaeff2a77.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4b6840a8-c719-4f4b-8604-bf1aaeff2a77.selectorLabels" . | nindent 6 }}
