apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo32360fec-634a-4dd7-814c-a814d9aef3e5.fullname" . }}
  labels:
    {{- include "go-echo32360fec-634a-4dd7-814c-a814d9aef3e5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo32360fec-634a-4dd7-814c-a814d9aef3e5.selectorLabels" . | nindent 6 }}
