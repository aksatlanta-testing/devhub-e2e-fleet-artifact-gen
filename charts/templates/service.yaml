apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1c8fa893-36cf-4f02-a598-111d21d2b9b9.fullname" . }}
  labels:
    {{- include "go-echo1c8fa893-36cf-4f02-a598-111d21d2b9b9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1c8fa893-36cf-4f02-a598-111d21d2b9b9.selectorLabels" . | nindent 6 }}
