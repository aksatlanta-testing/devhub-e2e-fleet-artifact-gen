apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2d148a73-a3ce-468d-9cb0-484f4d8736e6.fullname" . }}
  labels:
    {{- include "go-echo2d148a73-a3ce-468d-9cb0-484f4d8736e6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2d148a73-a3ce-468d-9cb0-484f4d8736e6.selectorLabels" . | nindent 6 }}
