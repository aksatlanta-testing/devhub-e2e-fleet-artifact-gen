apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6f4d15ce-256e-4016-b30b-5b296390c47a.fullname" . }}
  labels:
    {{- include "go-echo6f4d15ce-256e-4016-b30b-5b296390c47a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6f4d15ce-256e-4016-b30b-5b296390c47a.selectorLabels" . | nindent 6 }}
