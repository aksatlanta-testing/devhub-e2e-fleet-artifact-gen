apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echode480459-38a0-4b2f-ae1e-9db9d33a3b60.fullname" . }}
  labels:
    {{- include "go-echode480459-38a0-4b2f-ae1e-9db9d33a3b60.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echode480459-38a0-4b2f-ae1e-9db9d33a3b60.selectorLabels" . | nindent 6 }}
