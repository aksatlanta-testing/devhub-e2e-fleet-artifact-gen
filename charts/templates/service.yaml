apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof0759bf6-6d07-4b88-80a3-b4748e43147d.fullname" . }}
  labels:
    {{- include "go-echof0759bf6-6d07-4b88-80a3-b4748e43147d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof0759bf6-6d07-4b88-80a3-b4748e43147d.selectorLabels" . | nindent 6 }}
