apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9ff44048-b7c8-4e06-8135-227c63926c41.fullname" . }}
  labels:
    {{- include "go-echo9ff44048-b7c8-4e06-8135-227c63926c41.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9ff44048-b7c8-4e06-8135-227c63926c41.selectorLabels" . | nindent 6 }}
