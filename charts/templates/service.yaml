apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe08f9e35-3d0d-4792-a35a-79a80e77d82a.fullname" . }}
  labels:
    {{- include "go-echoe08f9e35-3d0d-4792-a35a-79a80e77d82a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe08f9e35-3d0d-4792-a35a-79a80e77d82a.selectorLabels" . | nindent 6 }}
