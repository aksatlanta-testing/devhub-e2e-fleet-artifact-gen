apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob7d9cfe9-6fab-423e-a823-1a6fe086a089.fullname" . }}
  labels:
    {{- include "go-echob7d9cfe9-6fab-423e-a823-1a6fe086a089.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob7d9cfe9-6fab-423e-a823-1a6fe086a089.selectorLabels" . | nindent 6 }}
