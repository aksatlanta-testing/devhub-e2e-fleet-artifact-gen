apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoce1f82e7-5207-4e86-b2f8-a13d8976c6d3.fullname" . }}
  labels:
    {{- include "go-echoce1f82e7-5207-4e86-b2f8-a13d8976c6d3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoce1f82e7-5207-4e86-b2f8-a13d8976c6d3.selectorLabels" . | nindent 6 }}
