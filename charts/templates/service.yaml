apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo61966671-e0ea-419c-9479-84d1b5a2b0d4.fullname" . }}
  labels:
    {{- include "go-echo61966671-e0ea-419c-9479-84d1b5a2b0d4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo61966671-e0ea-419c-9479-84d1b5a2b0d4.selectorLabels" . | nindent 6 }}
