apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo83ca9d79-59a0-4a89-9c41-9a5959d76440.fullname" . }}
  labels:
    {{- include "go-echo83ca9d79-59a0-4a89-9c41-9a5959d76440.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo83ca9d79-59a0-4a89-9c41-9a5959d76440.selectorLabels" . | nindent 6 }}
