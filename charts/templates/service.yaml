apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo71c951c5-82d3-4783-ab2b-1e14823ad182.fullname" . }}
  labels:
    {{- include "go-echo71c951c5-82d3-4783-ab2b-1e14823ad182.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo71c951c5-82d3-4783-ab2b-1e14823ad182.selectorLabels" . | nindent 6 }}
