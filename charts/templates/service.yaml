apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5817f764-cd04-4f62-bb29-46b6ad15d86f.fullname" . }}
  labels:
    {{- include "go-echo5817f764-cd04-4f62-bb29-46b6ad15d86f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5817f764-cd04-4f62-bb29-46b6ad15d86f.selectorLabels" . | nindent 6 }}
