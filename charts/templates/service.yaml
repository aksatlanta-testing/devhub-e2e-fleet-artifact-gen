apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0169af48-da82-42c2-9f55-85113378d9b9.fullname" . }}
  labels:
    {{- include "go-echo0169af48-da82-42c2-9f55-85113378d9b9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0169af48-da82-42c2-9f55-85113378d9b9.selectorLabels" . | nindent 6 }}
