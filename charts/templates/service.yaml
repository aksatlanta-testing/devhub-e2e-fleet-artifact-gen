apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofffe2232-2464-4b32-bad9-3efcae018595.fullname" . }}
  labels:
    {{- include "go-echofffe2232-2464-4b32-bad9-3efcae018595.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofffe2232-2464-4b32-bad9-3efcae018595.selectorLabels" . | nindent 6 }}
