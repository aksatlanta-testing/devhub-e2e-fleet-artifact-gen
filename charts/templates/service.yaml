apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1b72e7d6-4d9d-4e04-8c50-2800766b0d25.fullname" . }}
  labels:
    {{- include "go-echo1b72e7d6-4d9d-4e04-8c50-2800766b0d25.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1b72e7d6-4d9d-4e04-8c50-2800766b0d25.selectorLabels" . | nindent 6 }}
