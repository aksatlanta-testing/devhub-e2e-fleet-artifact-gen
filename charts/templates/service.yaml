apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa49a6c17-6f3f-4f34-a4b7-f634ed93972f.fullname" . }}
  labels:
    {{- include "go-echoa49a6c17-6f3f-4f34-a4b7-f634ed93972f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa49a6c17-6f3f-4f34-a4b7-f634ed93972f.selectorLabels" . | nindent 6 }}
