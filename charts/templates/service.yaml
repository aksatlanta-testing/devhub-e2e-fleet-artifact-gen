apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo689da84e-40f3-432b-b6ac-216394047ad4.fullname" . }}
  labels:
    {{- include "go-echo689da84e-40f3-432b-b6ac-216394047ad4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo689da84e-40f3-432b-b6ac-216394047ad4.selectorLabels" . | nindent 6 }}
