apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo49baf3a3-9b5e-499c-8e82-206f0b9e9e80.fullname" . }}
  labels:
    {{- include "go-echo49baf3a3-9b5e-499c-8e82-206f0b9e9e80.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo49baf3a3-9b5e-499c-8e82-206f0b9e9e80.selectorLabels" . | nindent 6 }}
