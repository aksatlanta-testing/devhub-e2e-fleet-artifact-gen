apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo462425b5-33f1-4dc7-a550-8f069b45f24f.fullname" . }}
  labels:
    {{- include "go-echo462425b5-33f1-4dc7-a550-8f069b45f24f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo462425b5-33f1-4dc7-a550-8f069b45f24f.selectorLabels" . | nindent 6 }}
