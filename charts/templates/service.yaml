apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4c3cd646-ff8f-4f58-bd25-261d0bda5ef4.fullname" . }}
  labels:
    {{- include "go-echo4c3cd646-ff8f-4f58-bd25-261d0bda5ef4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4c3cd646-ff8f-4f58-bd25-261d0bda5ef4.selectorLabels" . | nindent 6 }}
