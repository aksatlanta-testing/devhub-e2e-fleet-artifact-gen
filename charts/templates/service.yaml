apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo41cf9346-25a8-4917-9563-b75f6205c828.fullname" . }}
  labels:
    {{- include "go-echo41cf9346-25a8-4917-9563-b75f6205c828.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo41cf9346-25a8-4917-9563-b75f6205c828.selectorLabels" . | nindent 6 }}
