apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoda86e687-21c5-469e-bd1f-b898599d4bde.fullname" . }}
  labels:
    {{- include "go-echoda86e687-21c5-469e-bd1f-b898599d4bde.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoda86e687-21c5-469e-bd1f-b898599d4bde.selectorLabels" . | nindent 6 }}
