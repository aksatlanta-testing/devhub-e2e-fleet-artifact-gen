apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofedd62c2-6ec8-429e-8177-eb165b3b2d15.fullname" . }}
  labels:
    {{- include "go-echofedd62c2-6ec8-429e-8177-eb165b3b2d15.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofedd62c2-6ec8-429e-8177-eb165b3b2d15.selectorLabels" . | nindent 6 }}
