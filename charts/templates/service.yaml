apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoeac40ab9-ab90-40a9-943d-543e4b2cfdfd.fullname" . }}
  labels:
    {{- include "go-echoeac40ab9-ab90-40a9-943d-543e4b2cfdfd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoeac40ab9-ab90-40a9-943d-543e4b2cfdfd.selectorLabels" . | nindent 6 }}
