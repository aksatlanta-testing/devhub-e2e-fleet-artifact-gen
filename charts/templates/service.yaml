apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa341991c-67b7-4582-b1fe-461a0954d924.fullname" . }}
  labels:
    {{- include "go-echoa341991c-67b7-4582-b1fe-461a0954d924.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa341991c-67b7-4582-b1fe-461a0954d924.selectorLabels" . | nindent 6 }}
