apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3222df44-1edd-4875-bc6d-a2a87ac18b27.fullname" . }}
  labels:
    {{- include "go-echo3222df44-1edd-4875-bc6d-a2a87ac18b27.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3222df44-1edd-4875-bc6d-a2a87ac18b27.selectorLabels" . | nindent 6 }}
