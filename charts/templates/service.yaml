apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo503a8be9-058f-4116-b8c7-6eb06c96add7.fullname" . }}
  labels:
    {{- include "go-echo503a8be9-058f-4116-b8c7-6eb06c96add7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo503a8be9-058f-4116-b8c7-6eb06c96add7.selectorLabels" . | nindent 6 }}
