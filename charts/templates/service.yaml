apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe8417c31-cce2-4043-9df4-0fa7f817b717.fullname" . }}
  labels:
    {{- include "go-echoe8417c31-cce2-4043-9df4-0fa7f817b717.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe8417c31-cce2-4043-9df4-0fa7f817b717.selectorLabels" . | nindent 6 }}
