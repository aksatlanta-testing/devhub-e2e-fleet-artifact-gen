apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoacc41c0c-0e55-4231-a794-56fc88a8cdce.fullname" . }}
  labels:
    {{- include "go-echoacc41c0c-0e55-4231-a794-56fc88a8cdce.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoacc41c0c-0e55-4231-a794-56fc88a8cdce.selectorLabels" . | nindent 6 }}
