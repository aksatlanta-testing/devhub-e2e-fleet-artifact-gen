apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1e439d1a-6dc5-40c2-8522-2b006c620164.fullname" . }}
  labels:
    {{- include "go-echo1e439d1a-6dc5-40c2-8522-2b006c620164.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1e439d1a-6dc5-40c2-8522-2b006c620164.selectorLabels" . | nindent 6 }}
