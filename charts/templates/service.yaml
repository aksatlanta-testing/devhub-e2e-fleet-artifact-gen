apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo286640b4-a5a3-4ea6-85b2-66a2803451b9.fullname" . }}
  labels:
    {{- include "go-echo286640b4-a5a3-4ea6-85b2-66a2803451b9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo286640b4-a5a3-4ea6-85b2-66a2803451b9.selectorLabels" . | nindent 6 }}
