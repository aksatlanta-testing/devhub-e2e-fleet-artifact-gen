apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof6bf67e3-abbe-4a36-9e9d-b3f4477a76bf.fullname" . }}
  labels:
    {{- include "go-echof6bf67e3-abbe-4a36-9e9d-b3f4477a76bf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof6bf67e3-abbe-4a36-9e9d-b3f4477a76bf.selectorLabels" . | nindent 6 }}
