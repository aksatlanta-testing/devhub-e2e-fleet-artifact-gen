apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8d5de4d7-70fb-4f6e-b99d-1365192e0b48.fullname" . }}
  labels:
    {{- include "go-echo8d5de4d7-70fb-4f6e-b99d-1365192e0b48.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8d5de4d7-70fb-4f6e-b99d-1365192e0b48.selectorLabels" . | nindent 6 }}
