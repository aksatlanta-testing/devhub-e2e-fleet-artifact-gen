apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6da30e4d-abd0-453f-a6f8-dc949a4f6632.fullname" . }}
  labels:
    {{- include "go-echo6da30e4d-abd0-453f-a6f8-dc949a4f6632.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6da30e4d-abd0-453f-a6f8-dc949a4f6632.selectorLabels" . | nindent 6 }}
