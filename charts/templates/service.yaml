apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo840fb940-b939-4aff-98e2-57db73d54683.fullname" . }}
  labels:
    {{- include "go-echo840fb940-b939-4aff-98e2-57db73d54683.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo840fb940-b939-4aff-98e2-57db73d54683.selectorLabels" . | nindent 6 }}
