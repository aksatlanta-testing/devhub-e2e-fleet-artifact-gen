apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof2e886a6-19e1-4d60-a9bd-ecc76d15f925.fullname" . }}
  labels:
    {{- include "go-echof2e886a6-19e1-4d60-a9bd-ecc76d15f925.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof2e886a6-19e1-4d60-a9bd-ecc76d15f925.selectorLabels" . | nindent 6 }}
