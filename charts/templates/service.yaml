apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod1768268-c724-4f15-ac24-9af05df6726c.fullname" . }}
  labels:
    {{- include "go-echod1768268-c724-4f15-ac24-9af05df6726c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod1768268-c724-4f15-ac24-9af05df6726c.selectorLabels" . | nindent 6 }}
