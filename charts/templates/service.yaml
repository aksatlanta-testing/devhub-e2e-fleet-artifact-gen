apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3e9567b5-c0d0-42cb-b49f-0c494f23587d.fullname" . }}
  labels:
    {{- include "go-echo3e9567b5-c0d0-42cb-b49f-0c494f23587d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3e9567b5-c0d0-42cb-b49f-0c494f23587d.selectorLabels" . | nindent 6 }}
