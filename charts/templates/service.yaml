apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4d8d8d73-6419-4dd0-acb1-202939b79600.fullname" . }}
  labels:
    {{- include "go-echo4d8d8d73-6419-4dd0-acb1-202939b79600.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4d8d8d73-6419-4dd0-acb1-202939b79600.selectorLabels" . | nindent 6 }}
