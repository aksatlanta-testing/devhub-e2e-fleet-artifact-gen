apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod3cf520a-a398-43a8-9a05-4e8b0e5e7d9c.fullname" . }}
  labels:
    {{- include "go-echod3cf520a-a398-43a8-9a05-4e8b0e5e7d9c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod3cf520a-a398-43a8-9a05-4e8b0e5e7d9c.selectorLabels" . | nindent 6 }}
