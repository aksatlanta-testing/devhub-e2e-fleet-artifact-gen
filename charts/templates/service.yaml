apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3742ee17-6290-4197-bb04-33bbbc0621fe.fullname" . }}
  labels:
    {{- include "go-echo3742ee17-6290-4197-bb04-33bbbc0621fe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3742ee17-6290-4197-bb04-33bbbc0621fe.selectorLabels" . | nindent 6 }}
