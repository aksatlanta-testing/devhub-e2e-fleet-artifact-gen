apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo34786036-6ec4-44a5-b697-a728addcce5e.fullname" . }}
  labels:
    {{- include "go-echo34786036-6ec4-44a5-b697-a728addcce5e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo34786036-6ec4-44a5-b697-a728addcce5e.selectorLabels" . | nindent 6 }}
