apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3978bf11-02a0-4aa2-b637-55af6b061b5f.fullname" . }}
  labels:
    {{- include "go-echo3978bf11-02a0-4aa2-b637-55af6b061b5f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3978bf11-02a0-4aa2-b637-55af6b061b5f.selectorLabels" . | nindent 6 }}
