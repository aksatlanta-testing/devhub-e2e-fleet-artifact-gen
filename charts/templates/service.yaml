apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa4fcdfad-4710-4032-a7d7-0a5e1a73008b.fullname" . }}
  labels:
    {{- include "go-echoa4fcdfad-4710-4032-a7d7-0a5e1a73008b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa4fcdfad-4710-4032-a7d7-0a5e1a73008b.selectorLabels" . | nindent 6 }}
