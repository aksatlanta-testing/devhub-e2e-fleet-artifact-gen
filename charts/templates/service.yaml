apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe5192d97-3001-4b50-96a1-8f24927a1276.fullname" . }}
  labels:
    {{- include "go-echoe5192d97-3001-4b50-96a1-8f24927a1276.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe5192d97-3001-4b50-96a1-8f24927a1276.selectorLabels" . | nindent 6 }}
