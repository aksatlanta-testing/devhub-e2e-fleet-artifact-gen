apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo79c2c06e-9920-49a9-a661-a4537dee872d.fullname" . }}
  labels:
    {{- include "go-echo79c2c06e-9920-49a9-a661-a4537dee872d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo79c2c06e-9920-49a9-a661-a4537dee872d.selectorLabels" . | nindent 6 }}
