apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod7c93db9-3ba0-4a66-b92e-58590284cb0c.fullname" . }}
  labels:
    {{- include "go-echod7c93db9-3ba0-4a66-b92e-58590284cb0c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod7c93db9-3ba0-4a66-b92e-58590284cb0c.selectorLabels" . | nindent 6 }}
