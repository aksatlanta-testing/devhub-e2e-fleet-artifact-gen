apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo98b97a37-87bd-4a7d-bcac-89c1a3290eab.fullname" . }}
  labels:
    {{- include "go-echo98b97a37-87bd-4a7d-bcac-89c1a3290eab.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo98b97a37-87bd-4a7d-bcac-89c1a3290eab.selectorLabels" . | nindent 6 }}
