apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo07e6ffdd-6151-4336-a24d-545e24f907fa.fullname" . }}
  labels:
    {{- include "go-echo07e6ffdd-6151-4336-a24d-545e24f907fa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo07e6ffdd-6151-4336-a24d-545e24f907fa.selectorLabels" . | nindent 6 }}
