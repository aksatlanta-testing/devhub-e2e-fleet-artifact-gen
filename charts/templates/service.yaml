apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5f171cbb-6e50-4c2e-9879-b819b73ff227.fullname" . }}
  labels:
    {{- include "go-echo5f171cbb-6e50-4c2e-9879-b819b73ff227.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5f171cbb-6e50-4c2e-9879-b819b73ff227.selectorLabels" . | nindent 6 }}
