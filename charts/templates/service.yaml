apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc44e8e19-fb16-4db6-a232-3a03c76fd25b.fullname" . }}
  labels:
    {{- include "go-echoc44e8e19-fb16-4db6-a232-3a03c76fd25b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc44e8e19-fb16-4db6-a232-3a03c76fd25b.selectorLabels" . | nindent 6 }}
