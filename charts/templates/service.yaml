apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo299db57b-780b-4423-98b8-34006d1ab78c.fullname" . }}
  labels:
    {{- include "go-echo299db57b-780b-4423-98b8-34006d1ab78c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo299db57b-780b-4423-98b8-34006d1ab78c.selectorLabels" . | nindent 6 }}
