apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo36749675-e8cb-4d78-963e-93b89089f0ec.fullname" . }}
  labels:
    {{- include "go-echo36749675-e8cb-4d78-963e-93b89089f0ec.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo36749675-e8cb-4d78-963e-93b89089f0ec.selectorLabels" . | nindent 6 }}
