apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa0475616-ca42-4163-8250-1186cc0b28d6.fullname" . }}
  labels:
    {{- include "go-echoa0475616-ca42-4163-8250-1186cc0b28d6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa0475616-ca42-4163-8250-1186cc0b28d6.selectorLabels" . | nindent 6 }}
