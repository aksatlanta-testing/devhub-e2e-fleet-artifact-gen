apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo595e99e7-c416-4212-a1bd-b2b83e04a101.fullname" . }}
  labels:
    {{- include "go-echo595e99e7-c416-4212-a1bd-b2b83e04a101.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo595e99e7-c416-4212-a1bd-b2b83e04a101.selectorLabels" . | nindent 6 }}
