apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo28208c76-7d45-46f8-a67b-f7fa1979acc5.fullname" . }}
  labels:
    {{- include "go-echo28208c76-7d45-46f8-a67b-f7fa1979acc5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo28208c76-7d45-46f8-a67b-f7fa1979acc5.selectorLabels" . | nindent 6 }}
