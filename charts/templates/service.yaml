apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod5eeb260-5a91-47cf-8ff2-7c5ffa41cc48.fullname" . }}
  labels:
    {{- include "go-echod5eeb260-5a91-47cf-8ff2-7c5ffa41cc48.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod5eeb260-5a91-47cf-8ff2-7c5ffa41cc48.selectorLabels" . | nindent 6 }}
