apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6d04e5f0-b2e5-4c02-9827-101d26845c16.fullname" . }}
  labels:
    {{- include "go-echo6d04e5f0-b2e5-4c02-9827-101d26845c16.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6d04e5f0-b2e5-4c02-9827-101d26845c16.selectorLabels" . | nindent 6 }}
