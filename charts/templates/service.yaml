apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo400b057a-db4a-4284-8391-5eae83943349.fullname" . }}
  labels:
    {{- include "go-echo400b057a-db4a-4284-8391-5eae83943349.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo400b057a-db4a-4284-8391-5eae83943349.selectorLabels" . | nindent 6 }}
