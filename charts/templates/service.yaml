apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo51fdc8d1-9142-4b79-8a03-57e618f06692.fullname" . }}
  labels:
    {{- include "go-echo51fdc8d1-9142-4b79-8a03-57e618f06692.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo51fdc8d1-9142-4b79-8a03-57e618f06692.selectorLabels" . | nindent 6 }}
