apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo26750151-1afa-4333-9c6f-69270f4d691f.fullname" . }}
  labels:
    {{- include "go-echo26750151-1afa-4333-9c6f-69270f4d691f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo26750151-1afa-4333-9c6f-69270f4d691f.selectorLabels" . | nindent 6 }}
