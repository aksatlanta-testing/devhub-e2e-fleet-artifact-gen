apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe1ac58d4-edfe-4324-a23b-764eb33bc286.fullname" . }}
  labels:
    {{- include "go-echoe1ac58d4-edfe-4324-a23b-764eb33bc286.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe1ac58d4-edfe-4324-a23b-764eb33bc286.selectorLabels" . | nindent 6 }}
