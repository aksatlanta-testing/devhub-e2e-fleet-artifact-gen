apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo365f3489-723c-49ae-8e52-00c0725506cc.fullname" . }}
  labels:
    {{- include "go-echo365f3489-723c-49ae-8e52-00c0725506cc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo365f3489-723c-49ae-8e52-00c0725506cc.selectorLabels" . | nindent 6 }}
