apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo02f0fbf0-a7e1-44cd-bbc6-46029cc02e8e.fullname" . }}
  labels:
    {{- include "go-echo02f0fbf0-a7e1-44cd-bbc6-46029cc02e8e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo02f0fbf0-a7e1-44cd-bbc6-46029cc02e8e.selectorLabels" . | nindent 6 }}
