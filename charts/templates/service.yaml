apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc772848a-b108-4502-8686-8e60f1360d95.fullname" . }}
  labels:
    {{- include "go-echoc772848a-b108-4502-8686-8e60f1360d95.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc772848a-b108-4502-8686-8e60f1360d95.selectorLabels" . | nindent 6 }}
