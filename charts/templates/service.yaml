apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6e016566-2aec-4b0d-a5cc-f72ce92f80d6.fullname" . }}
  labels:
    {{- include "go-echo6e016566-2aec-4b0d-a5cc-f72ce92f80d6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6e016566-2aec-4b0d-a5cc-f72ce92f80d6.selectorLabels" . | nindent 6 }}
