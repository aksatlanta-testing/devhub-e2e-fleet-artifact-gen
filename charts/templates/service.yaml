apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo35af74ae-473b-4dfe-933f-107de7b79771.fullname" . }}
  labels:
    {{- include "go-echo35af74ae-473b-4dfe-933f-107de7b79771.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo35af74ae-473b-4dfe-933f-107de7b79771.selectorLabels" . | nindent 6 }}
