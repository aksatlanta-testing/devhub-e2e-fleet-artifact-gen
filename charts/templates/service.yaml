apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo15b26b2e-62ac-48be-8d92-eb09cb402bd5.fullname" . }}
  labels:
    {{- include "go-echo15b26b2e-62ac-48be-8d92-eb09cb402bd5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo15b26b2e-62ac-48be-8d92-eb09cb402bd5.selectorLabels" . | nindent 6 }}
