apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod8b093b2-b6d4-41c7-a910-e843acfa7fc5.fullname" . }}
  labels:
    {{- include "go-echod8b093b2-b6d4-41c7-a910-e843acfa7fc5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod8b093b2-b6d4-41c7-a910-e843acfa7fc5.selectorLabels" . | nindent 6 }}
