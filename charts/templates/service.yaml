apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe9761537-6586-41e5-bc66-7568420012b2.fullname" . }}
  labels:
    {{- include "go-echoe9761537-6586-41e5-bc66-7568420012b2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe9761537-6586-41e5-bc66-7568420012b2.selectorLabels" . | nindent 6 }}
