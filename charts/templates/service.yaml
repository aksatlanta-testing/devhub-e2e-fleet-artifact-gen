apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6699a384-1a40-4c47-9359-33e21d990031.fullname" . }}
  labels:
    {{- include "go-echo6699a384-1a40-4c47-9359-33e21d990031.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
