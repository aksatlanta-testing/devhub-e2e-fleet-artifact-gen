apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa0054058-46ab-467c-893a-a10e6ab565f6.fullname" . }}
  labels:
    {{- include "go-echoa0054058-46ab-467c-893a-a10e6ab565f6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa0054058-46ab-467c-893a-a10e6ab565f6.selectorLabels" . | nindent 6 }}
