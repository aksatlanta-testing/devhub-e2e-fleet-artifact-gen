apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo47b571db-fc65-43b2-a46e-0152982a6db6.fullname" . }}
  labels:
    {{- include "go-echo47b571db-fc65-43b2-a46e-0152982a6db6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo47b571db-fc65-43b2-a46e-0152982a6db6.selectorLabels" . | nindent 6 }}
