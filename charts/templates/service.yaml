apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo76479451-a0c2-4999-af5f-ea1d1a8ae194.fullname" . }}
  labels:
    {{- include "go-echo76479451-a0c2-4999-af5f-ea1d1a8ae194.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo76479451-a0c2-4999-af5f-ea1d1a8ae194.selectorLabels" . | nindent 6 }}
