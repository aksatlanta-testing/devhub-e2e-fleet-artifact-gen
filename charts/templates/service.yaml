apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo54ded911-27e3-41a7-988e-e507759ac0bb.fullname" . }}
  labels:
    {{- include "go-echo54ded911-27e3-41a7-988e-e507759ac0bb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo54ded911-27e3-41a7-988e-e507759ac0bb.selectorLabels" . | nindent 6 }}
