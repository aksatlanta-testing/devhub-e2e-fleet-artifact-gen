apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2957182a-149d-4a34-b4b5-4c842b747bc2.fullname" . }}
  labels:
    {{- include "go-echo2957182a-149d-4a34-b4b5-4c842b747bc2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2957182a-149d-4a34-b4b5-4c842b747bc2.selectorLabels" . | nindent 6 }}
