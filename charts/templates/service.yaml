apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoace09b4f-6bbf-485f-97fc-33e5a5e15f77.fullname" . }}
  labels:
    {{- include "go-echoace09b4f-6bbf-485f-97fc-33e5a5e15f77.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoace09b4f-6bbf-485f-97fc-33e5a5e15f77.selectorLabels" . | nindent 6 }}
