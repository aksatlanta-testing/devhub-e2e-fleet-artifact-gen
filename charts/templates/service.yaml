apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo75f62584-fe27-4a0b-bd48-08f05845317e.fullname" . }}
  labels:
    {{- include "go-echo75f62584-fe27-4a0b-bd48-08f05845317e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo75f62584-fe27-4a0b-bd48-08f05845317e.selectorLabels" . | nindent 6 }}
