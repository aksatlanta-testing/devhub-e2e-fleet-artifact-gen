apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6bd10635-d3d7-4db3-b12a-04cd980ca79a.fullname" . }}
  labels:
    {{- include "go-echo6bd10635-d3d7-4db3-b12a-04cd980ca79a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6bd10635-d3d7-4db3-b12a-04cd980ca79a.selectorLabels" . | nindent 6 }}
