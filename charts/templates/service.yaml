apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9e3b4294-a7ee-407b-9f15-acae4e5f98c0.fullname" . }}
  labels:
    {{- include "go-echo9e3b4294-a7ee-407b-9f15-acae4e5f98c0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9e3b4294-a7ee-407b-9f15-acae4e5f98c0.selectorLabels" . | nindent 6 }}
