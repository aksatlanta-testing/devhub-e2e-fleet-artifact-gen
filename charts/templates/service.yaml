apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo771d45f4-2423-4a60-95b3-1b91002e66b4.fullname" . }}
  labels:
    {{- include "go-echo771d45f4-2423-4a60-95b3-1b91002e66b4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo771d45f4-2423-4a60-95b3-1b91002e66b4.selectorLabels" . | nindent 6 }}
