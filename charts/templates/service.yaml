apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2cec2206-7e14-44c9-8b05-5eb48ebfd98c.fullname" . }}
  labels:
    {{- include "go-echo2cec2206-7e14-44c9-8b05-5eb48ebfd98c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2cec2206-7e14-44c9-8b05-5eb48ebfd98c.selectorLabels" . | nindent 6 }}
