apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8cb0b373-5cb2-4f45-b7df-633bfdfbaefe.fullname" . }}
  labels:
    {{- include "go-echo8cb0b373-5cb2-4f45-b7df-633bfdfbaefe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8cb0b373-5cb2-4f45-b7df-633bfdfbaefe.selectorLabels" . | nindent 6 }}
