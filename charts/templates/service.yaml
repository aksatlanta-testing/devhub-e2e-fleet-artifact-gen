apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo43b00566-413d-4237-8f9b-f8e8aab0ce14.fullname" . }}
  labels:
    {{- include "go-echo43b00566-413d-4237-8f9b-f8e8aab0ce14.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo43b00566-413d-4237-8f9b-f8e8aab0ce14.selectorLabels" . | nindent 6 }}
