apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3016102f-b5d4-4719-80f1-2b999f4322b3.fullname" . }}
  labels:
    {{- include "go-echo3016102f-b5d4-4719-80f1-2b999f4322b3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3016102f-b5d4-4719-80f1-2b999f4322b3.selectorLabels" . | nindent 6 }}
