apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa7e00eba-e2df-48f7-a2e4-d44dcd44d659.fullname" . }}
  labels:
    {{- include "go-echoa7e00eba-e2df-48f7-a2e4-d44dcd44d659.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa7e00eba-e2df-48f7-a2e4-d44dcd44d659.selectorLabels" . | nindent 6 }}
