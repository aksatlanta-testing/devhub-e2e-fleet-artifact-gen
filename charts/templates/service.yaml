apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8ce17c52-02ff-42f5-8198-fee5d2f615dc.fullname" . }}
  labels:
    {{- include "go-echo8ce17c52-02ff-42f5-8198-fee5d2f615dc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8ce17c52-02ff-42f5-8198-fee5d2f615dc.selectorLabels" . | nindent 6 }}
