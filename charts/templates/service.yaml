apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa53c8833-91d2-4976-89da-0c9b7849d708.fullname" . }}
  labels:
    {{- include "go-echoa53c8833-91d2-4976-89da-0c9b7849d708.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa53c8833-91d2-4976-89da-0c9b7849d708.selectorLabels" . | nindent 6 }}
