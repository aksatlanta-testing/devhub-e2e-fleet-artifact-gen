apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof7aa6de9-6a7c-4011-9a0f-c3b08d87def0.fullname" . }}
  labels:
    {{- include "go-echof7aa6de9-6a7c-4011-9a0f-c3b08d87def0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof7aa6de9-6a7c-4011-9a0f-c3b08d87def0.selectorLabels" . | nindent 6 }}
