apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodbe5b61e-3755-4cba-b41d-49d0248568d1.fullname" . }}
  labels:
    {{- include "go-echodbe5b61e-3755-4cba-b41d-49d0248568d1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodbe5b61e-3755-4cba-b41d-49d0248568d1.selectorLabels" . | nindent 6 }}
