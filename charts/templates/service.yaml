apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo838ecd3d-ced1-41c6-8301-cca7ff8b21c4.fullname" . }}
  labels:
    {{- include "go-echo838ecd3d-ced1-41c6-8301-cca7ff8b21c4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo838ecd3d-ced1-41c6-8301-cca7ff8b21c4.selectorLabels" . | nindent 6 }}
