apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3b782fc7-2d6c-4274-8694-c7cc94c29087.fullname" . }}
  labels:
    {{- include "go-echo3b782fc7-2d6c-4274-8694-c7cc94c29087.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3b782fc7-2d6c-4274-8694-c7cc94c29087.selectorLabels" . | nindent 6 }}
