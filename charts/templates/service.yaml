apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo992e84ea-40fa-408f-95fe-c2dae7aeece4.fullname" . }}
  labels:
    {{- include "go-echo992e84ea-40fa-408f-95fe-c2dae7aeece4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo992e84ea-40fa-408f-95fe-c2dae7aeece4.selectorLabels" . | nindent 6 }}
