apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3005df6f-889c-4f0b-9f74-25337b0def0e.fullname" . }}
  labels:
    {{- include "go-echo3005df6f-889c-4f0b-9f74-25337b0def0e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3005df6f-889c-4f0b-9f74-25337b0def0e.selectorLabels" . | nindent 6 }}
