apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocb7d3799-7932-475b-8da5-45e80ec15c2b.fullname" . }}
  labels:
    {{- include "go-echocb7d3799-7932-475b-8da5-45e80ec15c2b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocb7d3799-7932-475b-8da5-45e80ec15c2b.selectorLabels" . | nindent 6 }}
