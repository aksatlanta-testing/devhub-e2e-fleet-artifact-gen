apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2ef604d5-73e2-4a99-9340-f21148353639.fullname" . }}
  labels:
    {{- include "go-echo2ef604d5-73e2-4a99-9340-f21148353639.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2ef604d5-73e2-4a99-9340-f21148353639.selectorLabels" . | nindent 6 }}
