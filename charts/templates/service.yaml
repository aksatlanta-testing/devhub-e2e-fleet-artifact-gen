apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7714396e-7de5-40f3-bbcd-0f9401a7bbcd.fullname" . }}
  labels:
    {{- include "go-echo7714396e-7de5-40f3-bbcd-0f9401a7bbcd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7714396e-7de5-40f3-bbcd-0f9401a7bbcd.selectorLabels" . | nindent 6 }}
