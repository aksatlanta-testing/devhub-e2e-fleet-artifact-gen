apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo89d38657-ddb6-4eed-bb95-a09e3549128e.fullname" . }}
  labels:
    {{- include "go-echo89d38657-ddb6-4eed-bb95-a09e3549128e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo89d38657-ddb6-4eed-bb95-a09e3549128e.selectorLabels" . | nindent 6 }}
