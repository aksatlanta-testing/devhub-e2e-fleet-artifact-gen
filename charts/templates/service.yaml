apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa1f2b4bc-eb5a-48e2-a4f6-981cc226a345.fullname" . }}
  labels:
    {{- include "go-echoa1f2b4bc-eb5a-48e2-a4f6-981cc226a345.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa1f2b4bc-eb5a-48e2-a4f6-981cc226a345.selectorLabels" . | nindent 6 }}
