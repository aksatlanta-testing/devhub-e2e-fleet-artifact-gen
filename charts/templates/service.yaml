apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0ef9512c-2546-44dd-a59d-1ffedbf44266.fullname" . }}
  labels:
    {{- include "go-echo0ef9512c-2546-44dd-a59d-1ffedbf44266.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0ef9512c-2546-44dd-a59d-1ffedbf44266.selectorLabels" . | nindent 6 }}
