apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod0d4f225-326a-4231-899e-b90279f7d4b6.fullname" . }}
  labels:
    {{- include "go-echod0d4f225-326a-4231-899e-b90279f7d4b6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod0d4f225-326a-4231-899e-b90279f7d4b6.selectorLabels" . | nindent 6 }}
