apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0fa3b9a7-a9a1-4edc-9cef-3b6408a868a9.fullname" . }}
  labels:
    {{- include "go-echo0fa3b9a7-a9a1-4edc-9cef-3b6408a868a9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0fa3b9a7-a9a1-4edc-9cef-3b6408a868a9.selectorLabels" . | nindent 6 }}
