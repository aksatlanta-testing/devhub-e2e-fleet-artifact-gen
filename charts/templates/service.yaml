apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2b1297fb-bdd4-4a6f-ac96-c408b7da9f3b.fullname" . }}
  labels:
    {{- include "go-echo2b1297fb-bdd4-4a6f-ac96-c408b7da9f3b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2b1297fb-bdd4-4a6f-ac96-c408b7da9f3b.selectorLabels" . | nindent 6 }}
