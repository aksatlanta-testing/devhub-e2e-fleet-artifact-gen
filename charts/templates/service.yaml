apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob9eeaf88-cf84-4c5a-91fc-93cf20bd2bf9.fullname" . }}
  labels:
    {{- include "go-echob9eeaf88-cf84-4c5a-91fc-93cf20bd2bf9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob9eeaf88-cf84-4c5a-91fc-93cf20bd2bf9.selectorLabels" . | nindent 6 }}
