apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9b55ef00-c840-4e4e-abde-0c9348509e6b.fullname" . }}
  labels:
    {{- include "go-echo9b55ef00-c840-4e4e-abde-0c9348509e6b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9b55ef00-c840-4e4e-abde-0c9348509e6b.selectorLabels" . | nindent 6 }}
