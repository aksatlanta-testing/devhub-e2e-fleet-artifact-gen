apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa7271c1f-8598-4a4e-9903-58369018192f.fullname" . }}
  labels:
    {{- include "go-echoa7271c1f-8598-4a4e-9903-58369018192f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
