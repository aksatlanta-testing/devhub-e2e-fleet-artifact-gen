apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc769c076-2a70-4f95-9a40-c4b46106dfd8.fullname" . }}
  labels:
    {{- include "go-echoc769c076-2a70-4f95-9a40-c4b46106dfd8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc769c076-2a70-4f95-9a40-c4b46106dfd8.selectorLabels" . | nindent 6 }}
