apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo52929658-6cf9-4e2a-a32b-626d493639d0.fullname" . }}
  labels:
    {{- include "go-echo52929658-6cf9-4e2a-a32b-626d493639d0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo52929658-6cf9-4e2a-a32b-626d493639d0.selectorLabels" . | nindent 6 }}
