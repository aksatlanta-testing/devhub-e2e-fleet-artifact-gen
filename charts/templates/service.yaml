apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8cf5e8f3-ec47-4eac-8e4f-7171aa9cd7a0.fullname" . }}
  labels:
    {{- include "go-echo8cf5e8f3-ec47-4eac-8e4f-7171aa9cd7a0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8cf5e8f3-ec47-4eac-8e4f-7171aa9cd7a0.selectorLabels" . | nindent 6 }}
