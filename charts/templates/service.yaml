apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4785f5ff-db14-4c72-b81c-d12deba35559.fullname" . }}
  labels:
    {{- include "go-echo4785f5ff-db14-4c72-b81c-d12deba35559.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4785f5ff-db14-4c72-b81c-d12deba35559.selectorLabels" . | nindent 6 }}
