apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo80a6f3a3-16fc-4980-99f7-b6ea5feadbe7.fullname" . }}
  labels:
    {{- include "go-echo80a6f3a3-16fc-4980-99f7-b6ea5feadbe7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo80a6f3a3-16fc-4980-99f7-b6ea5feadbe7.selectorLabels" . | nindent 6 }}
