apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0cb60222-35ed-46a6-b959-8f3656ddfb31.fullname" . }}
  labels:
    {{- include "go-echo0cb60222-35ed-46a6-b959-8f3656ddfb31.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0cb60222-35ed-46a6-b959-8f3656ddfb31.selectorLabels" . | nindent 6 }}
