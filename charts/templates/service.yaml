apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9e836512-924b-4828-855d-c84f7d7804f2.fullname" . }}
  labels:
    {{- include "go-echo9e836512-924b-4828-855d-c84f7d7804f2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9e836512-924b-4828-855d-c84f7d7804f2.selectorLabels" . | nindent 6 }}
