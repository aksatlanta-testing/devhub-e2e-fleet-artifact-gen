apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobca0fb55-80d3-4fc1-ad30-200c3f03dcd6.fullname" . }}
  labels:
    {{- include "go-echobca0fb55-80d3-4fc1-ad30-200c3f03dcd6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobca0fb55-80d3-4fc1-ad30-200c3f03dcd6.selectorLabels" . | nindent 6 }}
