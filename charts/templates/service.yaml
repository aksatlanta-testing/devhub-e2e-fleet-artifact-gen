apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo487636ee-1496-4dcd-b8e2-e68c0c8e0f01.fullname" . }}
  labels:
    {{- include "go-echo487636ee-1496-4dcd-b8e2-e68c0c8e0f01.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo487636ee-1496-4dcd-b8e2-e68c0c8e0f01.selectorLabels" . | nindent 6 }}
