apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob6615a28-b52e-4403-9cb2-474dc98bf34b.fullname" . }}
  labels:
    {{- include "go-echob6615a28-b52e-4403-9cb2-474dc98bf34b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob6615a28-b52e-4403-9cb2-474dc98bf34b.selectorLabels" . | nindent 6 }}
