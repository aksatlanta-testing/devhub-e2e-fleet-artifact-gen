apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa0c34eb2-cf48-4810-95e6-6824f7a73092.fullname" . }}
  labels:
    {{- include "go-echoa0c34eb2-cf48-4810-95e6-6824f7a73092.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa0c34eb2-cf48-4810-95e6-6824f7a73092.selectorLabels" . | nindent 6 }}
