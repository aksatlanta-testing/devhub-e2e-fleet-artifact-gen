apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo95e81c41-d2e0-4a8d-87bb-eceb93752eae.fullname" . }}
  labels:
    {{- include "go-echo95e81c41-d2e0-4a8d-87bb-eceb93752eae.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo95e81c41-d2e0-4a8d-87bb-eceb93752eae.selectorLabels" . | nindent 6 }}
