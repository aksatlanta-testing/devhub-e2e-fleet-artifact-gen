apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoea7dc3ae-70a4-4e19-9632-3061ac312cf9.fullname" . }}
  labels:
    {{- include "go-echoea7dc3ae-70a4-4e19-9632-3061ac312cf9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoea7dc3ae-70a4-4e19-9632-3061ac312cf9.selectorLabels" . | nindent 6 }}
