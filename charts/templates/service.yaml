apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod9ef42cc-2b54-47e8-9e1e-fe20ea25ac0a.fullname" . }}
  labels:
    {{- include "go-echod9ef42cc-2b54-47e8-9e1e-fe20ea25ac0a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod9ef42cc-2b54-47e8-9e1e-fe20ea25ac0a.selectorLabels" . | nindent 6 }}
