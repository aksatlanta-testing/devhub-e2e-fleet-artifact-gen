apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobd10128f-518b-4505-9b4d-c28cc8bb3641.fullname" . }}
  labels:
    {{- include "go-echobd10128f-518b-4505-9b4d-c28cc8bb3641.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobd10128f-518b-4505-9b4d-c28cc8bb3641.selectorLabels" . | nindent 6 }}
