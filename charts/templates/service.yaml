apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo42cb545f-2ff0-4775-898b-0b49e00cbd5d.fullname" . }}
  labels:
    {{- include "go-echo42cb545f-2ff0-4775-898b-0b49e00cbd5d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo42cb545f-2ff0-4775-898b-0b49e00cbd5d.selectorLabels" . | nindent 6 }}
