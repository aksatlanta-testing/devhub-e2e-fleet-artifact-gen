apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1b30141e-dc2a-46db-87d2-9e779c23bb16.fullname" . }}
  labels:
    {{- include "go-echo1b30141e-dc2a-46db-87d2-9e779c23bb16.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1b30141e-dc2a-46db-87d2-9e779c23bb16.selectorLabels" . | nindent 6 }}
