apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7e0c1614-af10-4f1f-81da-13d4193a177d.fullname" . }}
  labels:
    {{- include "go-echo7e0c1614-af10-4f1f-81da-13d4193a177d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7e0c1614-af10-4f1f-81da-13d4193a177d.selectorLabels" . | nindent 6 }}
