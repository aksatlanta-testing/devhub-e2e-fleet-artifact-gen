apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoebf5311e-c875-41c1-85c7-0ff0a1fa22c9.fullname" . }}
  labels:
    {{- include "go-echoebf5311e-c875-41c1-85c7-0ff0a1fa22c9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoebf5311e-c875-41c1-85c7-0ff0a1fa22c9.selectorLabels" . | nindent 6 }}
