apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo35947393-f585-408e-b834-64b452893013.fullname" . }}
  labels:
    {{- include "go-echo35947393-f585-408e-b834-64b452893013.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo35947393-f585-408e-b834-64b452893013.selectorLabels" . | nindent 6 }}
