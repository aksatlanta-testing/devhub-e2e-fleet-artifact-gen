apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo52b42098-ddae-48ce-b4c0-a0edaa022203.fullname" . }}
  labels:
    {{- include "go-echo52b42098-ddae-48ce-b4c0-a0edaa022203.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo52b42098-ddae-48ce-b4c0-a0edaa022203.selectorLabels" . | nindent 6 }}
