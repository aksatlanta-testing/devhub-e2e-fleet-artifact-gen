apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo32507681-4418-4bbd-9611-0b6a65e4b156.fullname" . }}
  labels:
    {{- include "go-echo32507681-4418-4bbd-9611-0b6a65e4b156.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo32507681-4418-4bbd-9611-0b6a65e4b156.selectorLabels" . | nindent 6 }}
