apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc883727e-1d7a-4017-8832-2e64883a1325.fullname" . }}
  labels:
    {{- include "go-echoc883727e-1d7a-4017-8832-2e64883a1325.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc883727e-1d7a-4017-8832-2e64883a1325.selectorLabels" . | nindent 6 }}
