apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1e686ca5-472e-4245-b9a7-330e86196628.fullname" . }}
  labels:
    {{- include "go-echo1e686ca5-472e-4245-b9a7-330e86196628.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1e686ca5-472e-4245-b9a7-330e86196628.selectorLabels" . | nindent 6 }}
