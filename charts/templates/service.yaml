apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo77e68103-f2d4-4aba-a8ee-96e8490e303f.fullname" . }}
  labels:
    {{- include "go-echo77e68103-f2d4-4aba-a8ee-96e8490e303f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo77e68103-f2d4-4aba-a8ee-96e8490e303f.selectorLabels" . | nindent 6 }}
