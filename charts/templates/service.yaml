apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8d299247-1853-456b-836b-1c334cf8b445.fullname" . }}
  labels:
    {{- include "go-echo8d299247-1853-456b-836b-1c334cf8b445.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8d299247-1853-456b-836b-1c334cf8b445.selectorLabels" . | nindent 6 }}
