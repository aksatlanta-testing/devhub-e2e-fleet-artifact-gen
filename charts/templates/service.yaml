apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4f80be8a-c000-4090-8af2-18a795f0af3b.fullname" . }}
  labels:
    {{- include "go-echo4f80be8a-c000-4090-8af2-18a795f0af3b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4f80be8a-c000-4090-8af2-18a795f0af3b.selectorLabels" . | nindent 6 }}
