apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2e313185-ea6e-4f92-a9b1-c78b7d00fa46.fullname" . }}
  labels:
    {{- include "go-echo2e313185-ea6e-4f92-a9b1-c78b7d00fa46.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2e313185-ea6e-4f92-a9b1-c78b7d00fa46.selectorLabels" . | nindent 6 }}
