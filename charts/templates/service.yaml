apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1c69fe29-bf3e-4cd0-8495-a985aad2640d.fullname" . }}
  labels:
    {{- include "go-echo1c69fe29-bf3e-4cd0-8495-a985aad2640d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1c69fe29-bf3e-4cd0-8495-a985aad2640d.selectorLabels" . | nindent 6 }}
