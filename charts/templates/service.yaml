apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo18ae9279-6294-4fb7-b097-68e555e33d82.fullname" . }}
  labels:
    {{- include "go-echo18ae9279-6294-4fb7-b097-68e555e33d82.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo18ae9279-6294-4fb7-b097-68e555e33d82.selectorLabels" . | nindent 6 }}
