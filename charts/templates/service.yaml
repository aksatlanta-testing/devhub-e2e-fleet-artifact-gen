apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo411642d9-97c8-4219-8cd6-0402fd016344.fullname" . }}
  labels:
    {{- include "go-echo411642d9-97c8-4219-8cd6-0402fd016344.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo411642d9-97c8-4219-8cd6-0402fd016344.selectorLabels" . | nindent 6 }}
