apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo24536b09-9c1b-485c-98fd-c5333415d968.fullname" . }}
  labels:
    {{- include "go-echo24536b09-9c1b-485c-98fd-c5333415d968.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo24536b09-9c1b-485c-98fd-c5333415d968.selectorLabels" . | nindent 6 }}
