apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocf5ce396-eab7-461d-8d64-b5c9c567b2b1.fullname" . }}
  labels:
    {{- include "go-echocf5ce396-eab7-461d-8d64-b5c9c567b2b1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocf5ce396-eab7-461d-8d64-b5c9c567b2b1.selectorLabels" . | nindent 6 }}
