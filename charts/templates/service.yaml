apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoee3f3c92-1cfb-4b16-b1cd-270ccb355e38.fullname" . }}
  labels:
    {{- include "go-echoee3f3c92-1cfb-4b16-b1cd-270ccb355e38.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoee3f3c92-1cfb-4b16-b1cd-270ccb355e38.selectorLabels" . | nindent 6 }}
