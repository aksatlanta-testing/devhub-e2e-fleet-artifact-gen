apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0fd1e545-6c02-43e2-b1e2-599e77093abc.fullname" . }}
  labels:
    {{- include "go-echo0fd1e545-6c02-43e2-b1e2-599e77093abc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0fd1e545-6c02-43e2-b1e2-599e77093abc.selectorLabels" . | nindent 6 }}
