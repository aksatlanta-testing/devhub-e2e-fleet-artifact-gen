apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofe42aa6e-4168-4a3c-8dc7-e3284e80777a.fullname" . }}
  labels:
    {{- include "go-echofe42aa6e-4168-4a3c-8dc7-e3284e80777a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofe42aa6e-4168-4a3c-8dc7-e3284e80777a.selectorLabels" . | nindent 6 }}
