apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc0799014-f629-485d-9378-4f0a69f429f3.fullname" . }}
  labels:
    {{- include "go-echoc0799014-f629-485d-9378-4f0a69f429f3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc0799014-f629-485d-9378-4f0a69f429f3.selectorLabels" . | nindent 6 }}
