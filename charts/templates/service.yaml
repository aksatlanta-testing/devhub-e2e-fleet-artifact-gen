apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9da0af3c-152c-40b3-a80a-3ede2567453b.fullname" . }}
  labels:
    {{- include "go-echo9da0af3c-152c-40b3-a80a-3ede2567453b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9da0af3c-152c-40b3-a80a-3ede2567453b.selectorLabels" . | nindent 6 }}
