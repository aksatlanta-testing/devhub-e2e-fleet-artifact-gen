apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2667722c-1838-43e3-beb2-225ebb815c8b.fullname" . }}
  labels:
    {{- include "go-echo2667722c-1838-43e3-beb2-225ebb815c8b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2667722c-1838-43e3-beb2-225ebb815c8b.selectorLabels" . | nindent 6 }}
