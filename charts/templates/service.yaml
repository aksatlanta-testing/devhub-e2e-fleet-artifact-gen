apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1fe522cd-d0cd-4852-9be8-b06488feb6ed.fullname" . }}
  labels:
    {{- include "go-echo1fe522cd-d0cd-4852-9be8-b06488feb6ed.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1fe522cd-d0cd-4852-9be8-b06488feb6ed.selectorLabels" . | nindent 6 }}
