apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo52aed908-1beb-4e6b-a008-c903fe290332.fullname" . }}
  labels:
    {{- include "go-echo52aed908-1beb-4e6b-a008-c903fe290332.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo52aed908-1beb-4e6b-a008-c903fe290332.selectorLabels" . | nindent 6 }}
