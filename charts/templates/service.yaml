apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa53104ea-aecf-413c-858c-d0955b5fdc1a.fullname" . }}
  labels:
    {{- include "go-echoa53104ea-aecf-413c-858c-d0955b5fdc1a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa53104ea-aecf-413c-858c-d0955b5fdc1a.selectorLabels" . | nindent 6 }}
