apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc1e77bab-3127-4c36-9ede-d8804c7cd975.fullname" . }}
  labels:
    {{- include "go-echoc1e77bab-3127-4c36-9ede-d8804c7cd975.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc1e77bab-3127-4c36-9ede-d8804c7cd975.selectorLabels" . | nindent 6 }}
