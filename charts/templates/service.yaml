apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofa9d8ccf-443e-4039-8505-b813cbc3e242.fullname" . }}
  labels:
    {{- include "go-echofa9d8ccf-443e-4039-8505-b813cbc3e242.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofa9d8ccf-443e-4039-8505-b813cbc3e242.selectorLabels" . | nindent 6 }}
