apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1fa5bc05-81da-4654-a927-f4fd7a1e6dcb.fullname" . }}
  labels:
    {{- include "go-echo1fa5bc05-81da-4654-a927-f4fd7a1e6dcb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1fa5bc05-81da-4654-a927-f4fd7a1e6dcb.selectorLabels" . | nindent 6 }}
