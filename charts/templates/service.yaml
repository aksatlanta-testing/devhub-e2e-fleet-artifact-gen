apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7e7f002d-668d-4aef-adb9-125ef8812d10.fullname" . }}
  labels:
    {{- include "go-echo7e7f002d-668d-4aef-adb9-125ef8812d10.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7e7f002d-668d-4aef-adb9-125ef8812d10.selectorLabels" . | nindent 6 }}
