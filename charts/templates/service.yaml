apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6cef3d32-9ee5-45d0-9f08-21882b7cba95.fullname" . }}
  labels:
    {{- include "go-echo6cef3d32-9ee5-45d0-9f08-21882b7cba95.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6cef3d32-9ee5-45d0-9f08-21882b7cba95.selectorLabels" . | nindent 6 }}
