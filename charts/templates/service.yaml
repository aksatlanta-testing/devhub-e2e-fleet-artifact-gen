apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo00be9477-3b0a-4cc3-83b3-4e755d56b6b8.fullname" . }}
  labels:
    {{- include "go-echo00be9477-3b0a-4cc3-83b3-4e755d56b6b8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo00be9477-3b0a-4cc3-83b3-4e755d56b6b8.selectorLabels" . | nindent 6 }}
