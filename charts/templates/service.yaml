apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9048e3d1-ebed-4026-a9fc-1242316e704f.fullname" . }}
  labels:
    {{- include "go-echo9048e3d1-ebed-4026-a9fc-1242316e704f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9048e3d1-ebed-4026-a9fc-1242316e704f.selectorLabels" . | nindent 6 }}
