apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa8aacfeb-bc59-40c1-9779-132ec2be73f1.fullname" . }}
  labels:
    {{- include "go-echoa8aacfeb-bc59-40c1-9779-132ec2be73f1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa8aacfeb-bc59-40c1-9779-132ec2be73f1.selectorLabels" . | nindent 6 }}
