apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo973d70d2-b559-4860-853f-0f1ff3ea79b0.fullname" . }}
  labels:
    {{- include "go-echo973d70d2-b559-4860-853f-0f1ff3ea79b0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo973d70d2-b559-4860-853f-0f1ff3ea79b0.selectorLabels" . | nindent 6 }}
