apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo33be4177-2113-4064-b5ad-13935fef6ed9.fullname" . }}
  labels:
    {{- include "go-echo33be4177-2113-4064-b5ad-13935fef6ed9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo33be4177-2113-4064-b5ad-13935fef6ed9.selectorLabels" . | nindent 6 }}
