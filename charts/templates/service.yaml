apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod59d895a-7888-4c92-9726-bcef9d875bd4.fullname" . }}
  labels:
    {{- include "go-echod59d895a-7888-4c92-9726-bcef9d875bd4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod59d895a-7888-4c92-9726-bcef9d875bd4.selectorLabels" . | nindent 6 }}
