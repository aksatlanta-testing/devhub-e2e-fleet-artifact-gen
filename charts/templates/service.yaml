apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo53eb33f9-dd13-49d1-80a6-a378e4ca9dd2.fullname" . }}
  labels:
    {{- include "go-echo53eb33f9-dd13-49d1-80a6-a378e4ca9dd2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo53eb33f9-dd13-49d1-80a6-a378e4ca9dd2.selectorLabels" . | nindent 6 }}
