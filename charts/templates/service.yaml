apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod56872a1-efd1-4773-b15d-1363897df612.fullname" . }}
  labels:
    {{- include "go-echod56872a1-efd1-4773-b15d-1363897df612.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod56872a1-efd1-4773-b15d-1363897df612.selectorLabels" . | nindent 6 }}
