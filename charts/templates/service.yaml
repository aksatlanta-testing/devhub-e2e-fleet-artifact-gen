apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo04c2c7d7-de81-4403-8c29-3b49ed53fd60.fullname" . }}
  labels:
    {{- include "go-echo04c2c7d7-de81-4403-8c29-3b49ed53fd60.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo04c2c7d7-de81-4403-8c29-3b49ed53fd60.selectorLabels" . | nindent 6 }}
