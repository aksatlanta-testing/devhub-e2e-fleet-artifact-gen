apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobb789016-77cd-4c40-a6f4-ececfa90cf12.fullname" . }}
  labels:
    {{- include "go-echobb789016-77cd-4c40-a6f4-ececfa90cf12.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobb789016-77cd-4c40-a6f4-ececfa90cf12.selectorLabels" . | nindent 6 }}
