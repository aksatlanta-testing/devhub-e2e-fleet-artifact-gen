apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo828fb0a8-a1c1-4655-900f-f78df3fc2eda.fullname" . }}
  labels:
    {{- include "go-echo828fb0a8-a1c1-4655-900f-f78df3fc2eda.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo828fb0a8-a1c1-4655-900f-f78df3fc2eda.selectorLabels" . | nindent 6 }}
