apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo28a1719c-7274-43c6-bdba-77138446933c.fullname" . }}
  labels:
    {{- include "go-echo28a1719c-7274-43c6-bdba-77138446933c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo28a1719c-7274-43c6-bdba-77138446933c.selectorLabels" . | nindent 6 }}
