apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoef662456-88e8-449a-92d1-4876606d3fd9.fullname" . }}
  labels:
    {{- include "go-echoef662456-88e8-449a-92d1-4876606d3fd9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoef662456-88e8-449a-92d1-4876606d3fd9.selectorLabels" . | nindent 6 }}
