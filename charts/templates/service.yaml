apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1f1969a0-91b3-46b7-bc1c-b9d7f80c3d3e.fullname" . }}
  labels:
    {{- include "go-echo1f1969a0-91b3-46b7-bc1c-b9d7f80c3d3e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1f1969a0-91b3-46b7-bc1c-b9d7f80c3d3e.selectorLabels" . | nindent 6 }}
