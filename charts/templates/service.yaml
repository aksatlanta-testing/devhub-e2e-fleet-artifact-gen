apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoabdf190c-5b14-4ed0-8e1d-beb404858797.fullname" . }}
  labels:
    {{- include "go-echoabdf190c-5b14-4ed0-8e1d-beb404858797.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoabdf190c-5b14-4ed0-8e1d-beb404858797.selectorLabels" . | nindent 6 }}
