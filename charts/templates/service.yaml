apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo40fc74b9-0030-45c4-b4f9-6d2ef12ada40.fullname" . }}
  labels:
    {{- include "go-echo40fc74b9-0030-45c4-b4f9-6d2ef12ada40.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo40fc74b9-0030-45c4-b4f9-6d2ef12ada40.selectorLabels" . | nindent 6 }}
