apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofd82fb01-7c08-4022-a85b-48d66c957c64.fullname" . }}
  labels:
    {{- include "go-echofd82fb01-7c08-4022-a85b-48d66c957c64.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofd82fb01-7c08-4022-a85b-48d66c957c64.selectorLabels" . | nindent 6 }}
