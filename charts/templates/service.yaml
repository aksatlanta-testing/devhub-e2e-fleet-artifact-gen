apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo80f53a47-4e3f-41e6-bfc4-1a9dc02a3730.fullname" . }}
  labels:
    {{- include "go-echo80f53a47-4e3f-41e6-bfc4-1a9dc02a3730.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo80f53a47-4e3f-41e6-bfc4-1a9dc02a3730.selectorLabels" . | nindent 6 }}
