apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8b7dbadc-f4dc-4b49-bb55-7d600952c976.fullname" . }}
  labels:
    {{- include "go-echo8b7dbadc-f4dc-4b49-bb55-7d600952c976.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8b7dbadc-f4dc-4b49-bb55-7d600952c976.selectorLabels" . | nindent 6 }}
