apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob4707f8f-bbf2-4323-b3da-ad390c541882.fullname" . }}
  labels:
    {{- include "go-echob4707f8f-bbf2-4323-b3da-ad390c541882.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob4707f8f-bbf2-4323-b3da-ad390c541882.selectorLabels" . | nindent 6 }}
