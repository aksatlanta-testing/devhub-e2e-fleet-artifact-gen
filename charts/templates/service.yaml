apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo248c13b9-248c-484c-bd81-55cb4db4a283.fullname" . }}
  labels:
    {{- include "go-echo248c13b9-248c-484c-bd81-55cb4db4a283.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo248c13b9-248c-484c-bd81-55cb4db4a283.selectorLabels" . | nindent 6 }}
