apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa1f1bce3-6ea5-4c26-9313-563805f86afe.fullname" . }}
  labels:
    {{- include "go-echoa1f1bce3-6ea5-4c26-9313-563805f86afe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa1f1bce3-6ea5-4c26-9313-563805f86afe.selectorLabels" . | nindent 6 }}
