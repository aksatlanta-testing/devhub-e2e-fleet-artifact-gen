apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob1869c84-12e7-4207-a28d-bce5ee7030e3.fullname" . }}
  labels:
    {{- include "go-echob1869c84-12e7-4207-a28d-bce5ee7030e3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob1869c84-12e7-4207-a28d-bce5ee7030e3.selectorLabels" . | nindent 6 }}
