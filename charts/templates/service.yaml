apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo257b4eaf-d327-4216-8afb-d453afaeba98.fullname" . }}
  labels:
    {{- include "go-echo257b4eaf-d327-4216-8afb-d453afaeba98.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo257b4eaf-d327-4216-8afb-d453afaeba98.selectorLabels" . | nindent 6 }}
