apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob5c55ce1-6514-4d8c-b5ef-de4c2d478df3.fullname" . }}
  labels:
    {{- include "go-echob5c55ce1-6514-4d8c-b5ef-de4c2d478df3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob5c55ce1-6514-4d8c-b5ef-de4c2d478df3.selectorLabels" . | nindent 6 }}
