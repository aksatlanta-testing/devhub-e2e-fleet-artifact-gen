apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo974c096a-1ae0-4d07-b35b-208d7bb20e2a.fullname" . }}
  labels:
    {{- include "go-echo974c096a-1ae0-4d07-b35b-208d7bb20e2a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo974c096a-1ae0-4d07-b35b-208d7bb20e2a.selectorLabels" . | nindent 6 }}
