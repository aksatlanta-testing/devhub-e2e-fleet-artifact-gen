apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobd19af8b-d528-4801-8123-225a22dff979.fullname" . }}
  labels:
    {{- include "go-echobd19af8b-d528-4801-8123-225a22dff979.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobd19af8b-d528-4801-8123-225a22dff979.selectorLabels" . | nindent 6 }}
