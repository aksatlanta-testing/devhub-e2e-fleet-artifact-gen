apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0396250a-9e85-4203-b4e6-4f3f3decbea6.fullname" . }}
  labels:
    {{- include "go-echo0396250a-9e85-4203-b4e6-4f3f3decbea6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0396250a-9e85-4203-b4e6-4f3f3decbea6.selectorLabels" . | nindent 6 }}
