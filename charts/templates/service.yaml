apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc59c03f3-dd58-4f3f-bcaf-67471dfeb6f0.fullname" . }}
  labels:
    {{- include "go-echoc59c03f3-dd58-4f3f-bcaf-67471dfeb6f0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc59c03f3-dd58-4f3f-bcaf-67471dfeb6f0.selectorLabels" . | nindent 6 }}
