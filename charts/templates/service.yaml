apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa681c451-d0d0-4bd0-8270-58a6f713b736.fullname" . }}
  labels:
    {{- include "go-echoa681c451-d0d0-4bd0-8270-58a6f713b736.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa681c451-d0d0-4bd0-8270-58a6f713b736.selectorLabels" . | nindent 6 }}
