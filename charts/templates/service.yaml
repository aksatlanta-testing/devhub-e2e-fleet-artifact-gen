apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6adfa1f6-1fcf-4d79-9d8b-70711e150ab8.fullname" . }}
  labels:
    {{- include "go-echo6adfa1f6-1fcf-4d79-9d8b-70711e150ab8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6adfa1f6-1fcf-4d79-9d8b-70711e150ab8.selectorLabels" . | nindent 6 }}
