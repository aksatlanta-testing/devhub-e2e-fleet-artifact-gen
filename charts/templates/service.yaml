apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3ab11f48-fd80-404b-99e9-cf300805fd05.fullname" . }}
  labels:
    {{- include "go-echo3ab11f48-fd80-404b-99e9-cf300805fd05.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3ab11f48-fd80-404b-99e9-cf300805fd05.selectorLabels" . | nindent 6 }}
