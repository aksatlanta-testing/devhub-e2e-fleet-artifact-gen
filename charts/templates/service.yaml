apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6369103d-da50-44c4-8d87-0fde04261143.fullname" . }}
  labels:
    {{- include "go-echo6369103d-da50-44c4-8d87-0fde04261143.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6369103d-da50-44c4-8d87-0fde04261143.selectorLabels" . | nindent 6 }}
