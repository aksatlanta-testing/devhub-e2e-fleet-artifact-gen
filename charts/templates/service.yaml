apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo240c715c-9356-4504-a547-e1ea063e622d.fullname" . }}
  labels:
    {{- include "go-echo240c715c-9356-4504-a547-e1ea063e622d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo240c715c-9356-4504-a547-e1ea063e622d.selectorLabels" . | nindent 6 }}
