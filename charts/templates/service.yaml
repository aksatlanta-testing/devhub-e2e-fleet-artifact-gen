apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa1a6d91b-a235-4ff3-84c1-91f06df1dd77.fullname" . }}
  labels:
    {{- include "go-echoa1a6d91b-a235-4ff3-84c1-91f06df1dd77.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa1a6d91b-a235-4ff3-84c1-91f06df1dd77.selectorLabels" . | nindent 6 }}
