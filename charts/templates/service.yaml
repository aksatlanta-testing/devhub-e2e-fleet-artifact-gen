apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod88a3d0a-719b-4571-9c47-881b66d1e0c0.fullname" . }}
  labels:
    {{- include "go-echod88a3d0a-719b-4571-9c47-881b66d1e0c0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod88a3d0a-719b-4571-9c47-881b66d1e0c0.selectorLabels" . | nindent 6 }}
