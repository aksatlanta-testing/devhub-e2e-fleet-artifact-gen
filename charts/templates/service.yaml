apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo186977e9-b7fb-4f45-9b25-131c8322081d.fullname" . }}
  labels:
    {{- include "go-echo186977e9-b7fb-4f45-9b25-131c8322081d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo186977e9-b7fb-4f45-9b25-131c8322081d.selectorLabels" . | nindent 6 }}
