apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof47bb55d-5bd1-42a0-8e0c-1c786e2cdada.fullname" . }}
  labels:
    {{- include "go-echof47bb55d-5bd1-42a0-8e0c-1c786e2cdada.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof47bb55d-5bd1-42a0-8e0c-1c786e2cdada.selectorLabels" . | nindent 6 }}
