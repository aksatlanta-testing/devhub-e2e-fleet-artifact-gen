apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo77809428-118f-4a7d-93e7-7cf81d7eb27c.fullname" . }}
  labels:
    {{- include "go-echo77809428-118f-4a7d-93e7-7cf81d7eb27c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo77809428-118f-4a7d-93e7-7cf81d7eb27c.selectorLabels" . | nindent 6 }}
