apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobfce6ed8-ea2d-42dc-bd1b-fff0f209fffe.fullname" . }}
  labels:
    {{- include "go-echobfce6ed8-ea2d-42dc-bd1b-fff0f209fffe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobfce6ed8-ea2d-42dc-bd1b-fff0f209fffe.selectorLabels" . | nindent 6 }}
