apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo89ffa685-fffe-428b-9e88-fabe219e9e29.fullname" . }}
  labels:
    {{- include "go-echo89ffa685-fffe-428b-9e88-fabe219e9e29.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo89ffa685-fffe-428b-9e88-fabe219e9e29.selectorLabels" . | nindent 6 }}
