apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo011c5335-4a17-42c2-8231-16cdf6d35301.fullname" . }}
  labels:
    {{- include "go-echo011c5335-4a17-42c2-8231-16cdf6d35301.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo011c5335-4a17-42c2-8231-16cdf6d35301.selectorLabels" . | nindent 6 }}
