apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof15687c9-80e3-44ed-b5d0-2fe69d44fb18.fullname" . }}
  labels:
    {{- include "go-echof15687c9-80e3-44ed-b5d0-2fe69d44fb18.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof15687c9-80e3-44ed-b5d0-2fe69d44fb18.selectorLabels" . | nindent 6 }}
