apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo73af9809-2138-4c1c-942b-0b6e56cc30f7.fullname" . }}
  labels:
    {{- include "go-echo73af9809-2138-4c1c-942b-0b6e56cc30f7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo73af9809-2138-4c1c-942b-0b6e56cc30f7.selectorLabels" . | nindent 6 }}
