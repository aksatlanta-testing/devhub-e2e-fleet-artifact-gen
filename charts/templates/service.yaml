apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo56bc4aff-b077-40d6-a5cb-d341c54828eb.fullname" . }}
  labels:
    {{- include "go-echo56bc4aff-b077-40d6-a5cb-d341c54828eb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo56bc4aff-b077-40d6-a5cb-d341c54828eb.selectorLabels" . | nindent 6 }}
