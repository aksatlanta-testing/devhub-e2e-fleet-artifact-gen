apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4ed6bb2d-82c9-435e-bccc-efbe815d2548.fullname" . }}
  labels:
    {{- include "go-echo4ed6bb2d-82c9-435e-bccc-efbe815d2548.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4ed6bb2d-82c9-435e-bccc-efbe815d2548.selectorLabels" . | nindent 6 }}
