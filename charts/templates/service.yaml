apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo315982e2-b4a6-4826-8f7f-021ce1300b71.fullname" . }}
  labels:
    {{- include "go-echo315982e2-b4a6-4826-8f7f-021ce1300b71.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo315982e2-b4a6-4826-8f7f-021ce1300b71.selectorLabels" . | nindent 6 }}
