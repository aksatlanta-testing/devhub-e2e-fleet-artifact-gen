apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo39c75588-13ce-4860-85e5-42b8c0dbbafa.fullname" . }}
  labels:
    {{- include "go-echo39c75588-13ce-4860-85e5-42b8c0dbbafa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo39c75588-13ce-4860-85e5-42b8c0dbbafa.selectorLabels" . | nindent 6 }}
