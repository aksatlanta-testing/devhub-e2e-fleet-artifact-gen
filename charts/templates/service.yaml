apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4f6c2776-a98f-4cdb-89f6-f8d999970633.fullname" . }}
  labels:
    {{- include "go-echo4f6c2776-a98f-4cdb-89f6-f8d999970633.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4f6c2776-a98f-4cdb-89f6-f8d999970633.selectorLabels" . | nindent 6 }}
