apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo59ec9da9-a573-4e42-83c0-1504d1dcd252.fullname" . }}
  labels:
    {{- include "go-echo59ec9da9-a573-4e42-83c0-1504d1dcd252.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo59ec9da9-a573-4e42-83c0-1504d1dcd252.selectorLabels" . | nindent 6 }}
