apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo89fd9fa4-f02f-404b-8dfd-7da2631e484d.fullname" . }}
  labels:
    {{- include "go-echo89fd9fa4-f02f-404b-8dfd-7da2631e484d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo89fd9fa4-f02f-404b-8dfd-7da2631e484d.selectorLabels" . | nindent 6 }}
