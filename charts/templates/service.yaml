apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6649aa60-4d51-4132-b0ad-11fffb32369c.fullname" . }}
  labels:
    {{- include "go-echo6649aa60-4d51-4132-b0ad-11fffb32369c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6649aa60-4d51-4132-b0ad-11fffb32369c.selectorLabels" . | nindent 6 }}
