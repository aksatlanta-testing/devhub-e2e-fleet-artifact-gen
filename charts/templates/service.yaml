apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo76e21bdd-8491-4590-a436-85c5d77fff4c.fullname" . }}
  labels:
    {{- include "go-echo76e21bdd-8491-4590-a436-85c5d77fff4c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo76e21bdd-8491-4590-a436-85c5d77fff4c.selectorLabels" . | nindent 6 }}
