apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo07bc2018-88c6-49e6-aece-1d14809cd527.fullname" . }}
  labels:
    {{- include "go-echo07bc2018-88c6-49e6-aece-1d14809cd527.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo07bc2018-88c6-49e6-aece-1d14809cd527.selectorLabels" . | nindent 6 }}
