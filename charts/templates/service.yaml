apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo38b0fa09-a8c4-436e-93fa-6be59e33d0a6.fullname" . }}
  labels:
    {{- include "go-echo38b0fa09-a8c4-436e-93fa-6be59e33d0a6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo38b0fa09-a8c4-436e-93fa-6be59e33d0a6.selectorLabels" . | nindent 6 }}
