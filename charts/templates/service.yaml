apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe9461752-bcae-4d8f-bc48-5efc92ce0694.fullname" . }}
  labels:
    {{- include "go-echoe9461752-bcae-4d8f-bc48-5efc92ce0694.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe9461752-bcae-4d8f-bc48-5efc92ce0694.selectorLabels" . | nindent 6 }}
