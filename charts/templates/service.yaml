apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo080b89b1-5b2c-4067-b902-c300a30ebaf6.fullname" . }}
  labels:
    {{- include "go-echo080b89b1-5b2c-4067-b902-c300a30ebaf6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo080b89b1-5b2c-4067-b902-c300a30ebaf6.selectorLabels" . | nindent 6 }}
