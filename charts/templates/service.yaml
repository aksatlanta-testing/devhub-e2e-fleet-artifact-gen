apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0e57018a-bda2-4dcb-b953-8cfe30892c3c.fullname" . }}
  labels:
    {{- include "go-echo0e57018a-bda2-4dcb-b953-8cfe30892c3c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0e57018a-bda2-4dcb-b953-8cfe30892c3c.selectorLabels" . | nindent 6 }}
