apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8a79991b-55ce-4668-92fc-75a41f299eee.fullname" . }}
  labels:
    {{- include "go-echo8a79991b-55ce-4668-92fc-75a41f299eee.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8a79991b-55ce-4668-92fc-75a41f299eee.selectorLabels" . | nindent 6 }}
