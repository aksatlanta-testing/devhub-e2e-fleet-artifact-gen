apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo04c55008-54e9-4665-8d90-54dc2f671815.fullname" . }}
  labels:
    {{- include "go-echo04c55008-54e9-4665-8d90-54dc2f671815.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo04c55008-54e9-4665-8d90-54dc2f671815.selectorLabels" . | nindent 6 }}
