apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod2a96216-4e00-47c3-a516-e56d8f780b75.fullname" . }}
  labels:
    {{- include "go-echod2a96216-4e00-47c3-a516-e56d8f780b75.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod2a96216-4e00-47c3-a516-e56d8f780b75.selectorLabels" . | nindent 6 }}
