apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob1ee90b9-07c8-485e-97ba-b3231a7ebad7.fullname" . }}
  labels:
    {{- include "go-echob1ee90b9-07c8-485e-97ba-b3231a7ebad7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob1ee90b9-07c8-485e-97ba-b3231a7ebad7.selectorLabels" . | nindent 6 }}
