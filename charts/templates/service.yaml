apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob309effa-1577-4156-97da-85153211d3e6.fullname" . }}
  labels:
    {{- include "go-echob309effa-1577-4156-97da-85153211d3e6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob309effa-1577-4156-97da-85153211d3e6.selectorLabels" . | nindent 6 }}
