apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo466360d3-74a3-4c15-8d6c-6397073a139e.fullname" . }}
  labels:
    {{- include "go-echo466360d3-74a3-4c15-8d6c-6397073a139e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo466360d3-74a3-4c15-8d6c-6397073a139e.selectorLabels" . | nindent 6 }}
