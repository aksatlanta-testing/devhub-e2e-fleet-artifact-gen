apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo06ee103e-4846-4f95-ac53-bd0de3dc61a5.fullname" . }}
  labels:
    {{- include "go-echo06ee103e-4846-4f95-ac53-bd0de3dc61a5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo06ee103e-4846-4f95-ac53-bd0de3dc61a5.selectorLabels" . | nindent 6 }}
