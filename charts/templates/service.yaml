apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoafff71ce-a05b-4cb3-8d23-29d6dcbaa442.fullname" . }}
  labels:
    {{- include "go-echoafff71ce-a05b-4cb3-8d23-29d6dcbaa442.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoafff71ce-a05b-4cb3-8d23-29d6dcbaa442.selectorLabels" . | nindent 6 }}
