apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo916a4ce7-28b4-4790-bfc2-bb47185e213c.fullname" . }}
  labels:
    {{- include "go-echo916a4ce7-28b4-4790-bfc2-bb47185e213c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo916a4ce7-28b4-4790-bfc2-bb47185e213c.selectorLabels" . | nindent 6 }}
