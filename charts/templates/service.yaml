apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa4d0777a-c1d8-4daf-9265-9e700e6b1721.fullname" . }}
  labels:
    {{- include "go-echoa4d0777a-c1d8-4daf-9265-9e700e6b1721.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa4d0777a-c1d8-4daf-9265-9e700e6b1721.selectorLabels" . | nindent 6 }}
