apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5723646c-df94-4eee-be5f-afddb5f0e50f.fullname" . }}
  labels:
    {{- include "go-echo5723646c-df94-4eee-be5f-afddb5f0e50f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5723646c-df94-4eee-be5f-afddb5f0e50f.selectorLabels" . | nindent 6 }}
