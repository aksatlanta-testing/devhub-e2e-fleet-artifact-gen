apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo35bcedc3-4653-4c64-a0e7-81848b203ce9.fullname" . }}
  labels:
    {{- include "go-echo35bcedc3-4653-4c64-a0e7-81848b203ce9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo35bcedc3-4653-4c64-a0e7-81848b203ce9.selectorLabels" . | nindent 6 }}
