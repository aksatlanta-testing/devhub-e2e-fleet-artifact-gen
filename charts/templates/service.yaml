apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo04b6789f-6bb6-4d47-ba64-8e51b8683f4c.fullname" . }}
  labels:
    {{- include "go-echo04b6789f-6bb6-4d47-ba64-8e51b8683f4c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo04b6789f-6bb6-4d47-ba64-8e51b8683f4c.selectorLabels" . | nindent 6 }}
