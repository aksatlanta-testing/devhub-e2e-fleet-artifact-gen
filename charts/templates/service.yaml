apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3bf4ee51-19e4-4f74-b4f5-7819d74453d7.fullname" . }}
  labels:
    {{- include "go-echo3bf4ee51-19e4-4f74-b4f5-7819d74453d7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3bf4ee51-19e4-4f74-b4f5-7819d74453d7.selectorLabels" . | nindent 6 }}
