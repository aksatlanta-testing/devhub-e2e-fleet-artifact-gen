apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobb3fee5d-e074-408e-9285-581a79811551.fullname" . }}
  labels:
    {{- include "go-echobb3fee5d-e074-408e-9285-581a79811551.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobb3fee5d-e074-408e-9285-581a79811551.selectorLabels" . | nindent 6 }}
