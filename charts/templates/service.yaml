apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo07cc0406-8d8c-4b88-afaa-0e2ef8721bef.fullname" . }}
  labels:
    {{- include "go-echo07cc0406-8d8c-4b88-afaa-0e2ef8721bef.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo07cc0406-8d8c-4b88-afaa-0e2ef8721bef.selectorLabels" . | nindent 6 }}
