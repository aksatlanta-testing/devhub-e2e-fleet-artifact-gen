apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo096eb776-30fd-45d6-81bc-f0ce7e42d8d4.fullname" . }}
  labels:
    {{- include "go-echo096eb776-30fd-45d6-81bc-f0ce7e42d8d4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo096eb776-30fd-45d6-81bc-f0ce7e42d8d4.selectorLabels" . | nindent 6 }}
