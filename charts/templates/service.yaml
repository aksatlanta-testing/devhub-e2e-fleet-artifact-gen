apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa705c039-acef-4f9b-8c27-72aa8dd2c61b.fullname" . }}
  labels:
    {{- include "go-echoa705c039-acef-4f9b-8c27-72aa8dd2c61b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa705c039-acef-4f9b-8c27-72aa8dd2c61b.selectorLabels" . | nindent 6 }}
