apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc6186af2-80f2-4fe3-8182-e43a2be017d9.fullname" . }}
  labels:
    {{- include "go-echoc6186af2-80f2-4fe3-8182-e43a2be017d9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc6186af2-80f2-4fe3-8182-e43a2be017d9.selectorLabels" . | nindent 6 }}
