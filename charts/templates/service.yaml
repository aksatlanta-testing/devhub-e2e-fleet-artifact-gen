apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo94d51de4-97de-4419-8b7b-f9b72eb7d1f2.fullname" . }}
  labels:
    {{- include "go-echo94d51de4-97de-4419-8b7b-f9b72eb7d1f2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo94d51de4-97de-4419-8b7b-f9b72eb7d1f2.selectorLabels" . | nindent 6 }}
