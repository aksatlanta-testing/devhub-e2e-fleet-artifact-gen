apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9bc191f1-65a4-4f5d-ae00-c7087f088190.fullname" . }}
  labels:
    {{- include "go-echo9bc191f1-65a4-4f5d-ae00-c7087f088190.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9bc191f1-65a4-4f5d-ae00-c7087f088190.selectorLabels" . | nindent 6 }}
