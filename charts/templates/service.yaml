apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo720a3893-e1ce-4120-8449-2b74b36bb624.fullname" . }}
  labels:
    {{- include "go-echo720a3893-e1ce-4120-8449-2b74b36bb624.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo720a3893-e1ce-4120-8449-2b74b36bb624.selectorLabels" . | nindent 6 }}
