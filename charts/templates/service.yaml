apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofe621994-5aae-4b19-bb2f-bc1f4db2cd92.fullname" . }}
  labels:
    {{- include "go-echofe621994-5aae-4b19-bb2f-bc1f4db2cd92.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofe621994-5aae-4b19-bb2f-bc1f4db2cd92.selectorLabels" . | nindent 6 }}
