apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9d5cb865-a3ca-4148-bcdc-be8437ff475f.fullname" . }}
  labels:
    {{- include "go-echo9d5cb865-a3ca-4148-bcdc-be8437ff475f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9d5cb865-a3ca-4148-bcdc-be8437ff475f.selectorLabels" . | nindent 6 }}
