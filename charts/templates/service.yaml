apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo538abbaf-a872-435c-adbc-12770a188242.fullname" . }}
  labels:
    {{- include "go-echo538abbaf-a872-435c-adbc-12770a188242.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo538abbaf-a872-435c-adbc-12770a188242.selectorLabels" . | nindent 6 }}
