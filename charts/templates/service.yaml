apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4b5e4130-4215-4fef-abbd-1a23dbc5cd4a.fullname" . }}
  labels:
    {{- include "go-echo4b5e4130-4215-4fef-abbd-1a23dbc5cd4a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4b5e4130-4215-4fef-abbd-1a23dbc5cd4a.selectorLabels" . | nindent 6 }}
