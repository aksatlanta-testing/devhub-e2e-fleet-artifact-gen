apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod704605f-c9d8-474d-83f4-2f4d35892e87.fullname" . }}
  labels:
    {{- include "go-echod704605f-c9d8-474d-83f4-2f4d35892e87.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod704605f-c9d8-474d-83f4-2f4d35892e87.selectorLabels" . | nindent 6 }}
