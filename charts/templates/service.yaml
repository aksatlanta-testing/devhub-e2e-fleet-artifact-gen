apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob3e2be36-6334-4ff7-a0e5-9501ed90251b.fullname" . }}
  labels:
    {{- include "go-echob3e2be36-6334-4ff7-a0e5-9501ed90251b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob3e2be36-6334-4ff7-a0e5-9501ed90251b.selectorLabels" . | nindent 6 }}
