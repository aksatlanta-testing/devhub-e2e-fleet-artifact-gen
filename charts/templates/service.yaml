apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobd00ede1-d507-48aa-ad2c-b78848fbe5bd.fullname" . }}
  labels:
    {{- include "go-echobd00ede1-d507-48aa-ad2c-b78848fbe5bd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobd00ede1-d507-48aa-ad2c-b78848fbe5bd.selectorLabels" . | nindent 6 }}
