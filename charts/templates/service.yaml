apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc8efe6af-a413-4ad7-a9a8-37de34ce7942.fullname" . }}
  labels:
    {{- include "go-echoc8efe6af-a413-4ad7-a9a8-37de34ce7942.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc8efe6af-a413-4ad7-a9a8-37de34ce7942.selectorLabels" . | nindent 6 }}
