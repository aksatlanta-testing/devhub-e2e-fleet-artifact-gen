apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7aec5e21-e962-42a9-ab4d-36d71ac28fa5.fullname" . }}
  labels:
    {{- include "go-echo7aec5e21-e962-42a9-ab4d-36d71ac28fa5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7aec5e21-e962-42a9-ab4d-36d71ac28fa5.selectorLabels" . | nindent 6 }}
