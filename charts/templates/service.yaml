apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1039de07-d997-4774-8b1f-471fa4381a3a.fullname" . }}
  labels:
    {{- include "go-echo1039de07-d997-4774-8b1f-471fa4381a3a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1039de07-d997-4774-8b1f-471fa4381a3a.selectorLabels" . | nindent 6 }}
