apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoad5816b2-2910-4309-b264-4b3a34100848.fullname" . }}
  labels:
    {{- include "go-echoad5816b2-2910-4309-b264-4b3a34100848.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoad5816b2-2910-4309-b264-4b3a34100848.selectorLabels" . | nindent 6 }}
