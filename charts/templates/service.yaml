apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4251c0aa-738d-442a-8074-25fc588f98ec.fullname" . }}
  labels:
    {{- include "go-echo4251c0aa-738d-442a-8074-25fc588f98ec.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4251c0aa-738d-442a-8074-25fc588f98ec.selectorLabels" . | nindent 6 }}
