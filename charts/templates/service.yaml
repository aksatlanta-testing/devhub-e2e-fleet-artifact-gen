apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod5ea8327-9568-44d8-815c-6214384100a6.fullname" . }}
  labels:
    {{- include "go-echod5ea8327-9568-44d8-815c-6214384100a6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod5ea8327-9568-44d8-815c-6214384100a6.selectorLabels" . | nindent 6 }}
