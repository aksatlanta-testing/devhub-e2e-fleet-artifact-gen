apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3b4481af-96a4-481b-a864-9eadba310523.fullname" . }}
  labels:
    {{- include "go-echo3b4481af-96a4-481b-a864-9eadba310523.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3b4481af-96a4-481b-a864-9eadba310523.selectorLabels" . | nindent 6 }}
