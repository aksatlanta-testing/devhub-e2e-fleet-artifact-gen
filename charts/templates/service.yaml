apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc2dce58d-2de0-4ccf-a421-27b7b3460fde.fullname" . }}
  labels:
    {{- include "go-echoc2dce58d-2de0-4ccf-a421-27b7b3460fde.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc2dce58d-2de0-4ccf-a421-27b7b3460fde.selectorLabels" . | nindent 6 }}
