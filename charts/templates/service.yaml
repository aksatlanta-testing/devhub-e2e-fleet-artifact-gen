apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo605f73eb-ed6a-4255-9db3-6f4ec554243b.fullname" . }}
  labels:
    {{- include "go-echo605f73eb-ed6a-4255-9db3-6f4ec554243b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo605f73eb-ed6a-4255-9db3-6f4ec554243b.selectorLabels" . | nindent 6 }}
