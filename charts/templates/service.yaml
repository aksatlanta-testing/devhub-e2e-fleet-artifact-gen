apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5ca31aea-635c-4f99-834f-e0065760fc75.fullname" . }}
  labels:
    {{- include "go-echo5ca31aea-635c-4f99-834f-e0065760fc75.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5ca31aea-635c-4f99-834f-e0065760fc75.selectorLabels" . | nindent 6 }}
