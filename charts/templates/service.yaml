apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2395af9f-658e-4f9b-958f-614a2953e158.fullname" . }}
  labels:
    {{- include "go-echo2395af9f-658e-4f9b-958f-614a2953e158.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2395af9f-658e-4f9b-958f-614a2953e158.selectorLabels" . | nindent 6 }}
