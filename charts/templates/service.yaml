apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoebfb1b91-475b-40cd-9591-8d8ddb53ef40.fullname" . }}
  labels:
    {{- include "go-echoebfb1b91-475b-40cd-9591-8d8ddb53ef40.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoebfb1b91-475b-40cd-9591-8d8ddb53ef40.selectorLabels" . | nindent 6 }}
