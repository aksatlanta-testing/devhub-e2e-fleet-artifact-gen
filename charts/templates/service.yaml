apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0178adeb-30a1-432b-b6a9-2358f1e2478c.fullname" . }}
  labels:
    {{- include "go-echo0178adeb-30a1-432b-b6a9-2358f1e2478c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0178adeb-30a1-432b-b6a9-2358f1e2478c.selectorLabels" . | nindent 6 }}
