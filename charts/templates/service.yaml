apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo31f17e62-df0c-4797-b308-7275622f89da.fullname" . }}
  labels:
    {{- include "go-echo31f17e62-df0c-4797-b308-7275622f89da.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo31f17e62-df0c-4797-b308-7275622f89da.selectorLabels" . | nindent 6 }}
