apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa6395fd0-5aaa-4879-a565-090bd14885ec.fullname" . }}
  labels:
    {{- include "go-echoa6395fd0-5aaa-4879-a565-090bd14885ec.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa6395fd0-5aaa-4879-a565-090bd14885ec.selectorLabels" . | nindent 6 }}
