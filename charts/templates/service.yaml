apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoffdb3699-545d-4a9f-acfa-b9e27707ca7a.fullname" . }}
  labels:
    {{- include "go-echoffdb3699-545d-4a9f-acfa-b9e27707ca7a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoffdb3699-545d-4a9f-acfa-b9e27707ca7a.selectorLabels" . | nindent 6 }}
