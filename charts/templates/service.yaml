apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo98cf19ab-cd48-4e1d-8144-0433f8090f1e.fullname" . }}
  labels:
    {{- include "go-echo98cf19ab-cd48-4e1d-8144-0433f8090f1e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo98cf19ab-cd48-4e1d-8144-0433f8090f1e.selectorLabels" . | nindent 6 }}
