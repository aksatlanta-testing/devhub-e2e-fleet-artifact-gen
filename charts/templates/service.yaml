apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoede75f0f-652a-4a2f-adfa-5aaa3c3da652.fullname" . }}
  labels:
    {{- include "go-echoede75f0f-652a-4a2f-adfa-5aaa3c3da652.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoede75f0f-652a-4a2f-adfa-5aaa3c3da652.selectorLabels" . | nindent 6 }}
