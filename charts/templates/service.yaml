apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7a2a9ea1-fb48-4261-873c-9eee7eb48a11.fullname" . }}
  labels:
    {{- include "go-echo7a2a9ea1-fb48-4261-873c-9eee7eb48a11.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7a2a9ea1-fb48-4261-873c-9eee7eb48a11.selectorLabels" . | nindent 6 }}
