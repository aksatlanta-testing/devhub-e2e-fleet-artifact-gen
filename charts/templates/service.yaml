apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof7053d94-57b3-496b-b827-25aeb465e5d5.fullname" . }}
  labels:
    {{- include "go-echof7053d94-57b3-496b-b827-25aeb465e5d5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof7053d94-57b3-496b-b827-25aeb465e5d5.selectorLabels" . | nindent 6 }}
