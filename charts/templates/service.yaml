apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9cbe7e2e-6814-4d40-a298-4f17b50c925a.fullname" . }}
  labels:
    {{- include "go-echo9cbe7e2e-6814-4d40-a298-4f17b50c925a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9cbe7e2e-6814-4d40-a298-4f17b50c925a.selectorLabels" . | nindent 6 }}
