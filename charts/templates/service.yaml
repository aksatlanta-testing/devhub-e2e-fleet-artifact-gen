apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod85bc9ae-7c7f-4ad1-beec-61bbd270f1c1.fullname" . }}
  labels:
    {{- include "go-echod85bc9ae-7c7f-4ad1-beec-61bbd270f1c1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod85bc9ae-7c7f-4ad1-beec-61bbd270f1c1.selectorLabels" . | nindent 6 }}
