apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2085be43-ff4c-4690-b5e1-d6d08347347e.fullname" . }}
  labels:
    {{- include "go-echo2085be43-ff4c-4690-b5e1-d6d08347347e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2085be43-ff4c-4690-b5e1-d6d08347347e.selectorLabels" . | nindent 6 }}
