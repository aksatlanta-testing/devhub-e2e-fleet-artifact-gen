apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8a00c03b-d871-4a63-87d2-275d53f2f94f.fullname" . }}
  labels:
    {{- include "go-echo8a00c03b-d871-4a63-87d2-275d53f2f94f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8a00c03b-d871-4a63-87d2-275d53f2f94f.selectorLabels" . | nindent 6 }}
