apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob91c650f-d466-4b3a-aaba-b0f01210101b.fullname" . }}
  labels:
    {{- include "go-echob91c650f-d466-4b3a-aaba-b0f01210101b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob91c650f-d466-4b3a-aaba-b0f01210101b.selectorLabels" . | nindent 6 }}
