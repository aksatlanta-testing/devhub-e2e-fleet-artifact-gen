apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofb40ca17-dfd5-443e-9ff5-6983f7267b1e.fullname" . }}
  labels:
    {{- include "go-echofb40ca17-dfd5-443e-9ff5-6983f7267b1e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofb40ca17-dfd5-443e-9ff5-6983f7267b1e.selectorLabels" . | nindent 6 }}
