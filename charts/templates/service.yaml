apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob670289a-8084-4797-a1ab-b9d979641fca.fullname" . }}
  labels:
    {{- include "go-echob670289a-8084-4797-a1ab-b9d979641fca.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob670289a-8084-4797-a1ab-b9d979641fca.selectorLabels" . | nindent 6 }}
