apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa091fada-00b9-4034-bbff-bf73f6b0906c.fullname" . }}
  labels:
    {{- include "go-echoa091fada-00b9-4034-bbff-bf73f6b0906c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa091fada-00b9-4034-bbff-bf73f6b0906c.selectorLabels" . | nindent 6 }}
