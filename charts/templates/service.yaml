apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoff2518d3-5ac8-4df0-bbca-5a5030cbc495.fullname" . }}
  labels:
    {{- include "go-echoff2518d3-5ac8-4df0-bbca-5a5030cbc495.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoff2518d3-5ac8-4df0-bbca-5a5030cbc495.selectorLabels" . | nindent 6 }}
