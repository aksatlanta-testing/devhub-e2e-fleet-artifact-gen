apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo45b2e607-ff0d-40d2-b557-57794a6fbdcf.fullname" . }}
  labels:
    {{- include "go-echo45b2e607-ff0d-40d2-b557-57794a6fbdcf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo45b2e607-ff0d-40d2-b557-57794a6fbdcf.selectorLabels" . | nindent 6 }}
