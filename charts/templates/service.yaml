apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa89ff6d2-e42b-4da9-97b3-7fe9bdd41df9.fullname" . }}
  labels:
    {{- include "go-echoa89ff6d2-e42b-4da9-97b3-7fe9bdd41df9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa89ff6d2-e42b-4da9-97b3-7fe9bdd41df9.selectorLabels" . | nindent 6 }}
