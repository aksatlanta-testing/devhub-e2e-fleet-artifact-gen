apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo711837c7-ba02-4ea9-9385-84246c26819a.fullname" . }}
  labels:
    {{- include "go-echo711837c7-ba02-4ea9-9385-84246c26819a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo711837c7-ba02-4ea9-9385-84246c26819a.selectorLabels" . | nindent 6 }}
