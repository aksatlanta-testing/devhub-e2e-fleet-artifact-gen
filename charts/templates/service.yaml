apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1ab1a5ba-9f80-49cf-b9fd-2ab895e1712f.fullname" . }}
  labels:
    {{- include "go-echo1ab1a5ba-9f80-49cf-b9fd-2ab895e1712f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1ab1a5ba-9f80-49cf-b9fd-2ab895e1712f.selectorLabels" . | nindent 6 }}
