apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo45870e2f-7663-4ba9-8aa6-4c652957d206.fullname" . }}
  labels:
    {{- include "go-echo45870e2f-7663-4ba9-8aa6-4c652957d206.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo45870e2f-7663-4ba9-8aa6-4c652957d206.selectorLabels" . | nindent 6 }}
