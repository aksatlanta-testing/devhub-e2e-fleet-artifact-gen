apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0325e3e9-e3b3-4798-b41a-d9adc825207b.fullname" . }}
  labels:
    {{- include "go-echo0325e3e9-e3b3-4798-b41a-d9adc825207b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0325e3e9-e3b3-4798-b41a-d9adc825207b.selectorLabels" . | nindent 6 }}
