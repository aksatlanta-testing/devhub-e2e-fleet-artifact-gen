apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4f872263-9c3b-4448-8156-94fe5fc86c6f.fullname" . }}
  labels:
    {{- include "go-echo4f872263-9c3b-4448-8156-94fe5fc86c6f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4f872263-9c3b-4448-8156-94fe5fc86c6f.selectorLabels" . | nindent 6 }}
