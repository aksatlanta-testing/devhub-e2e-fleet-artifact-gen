apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0b9b2254-e267-48bf-ae80-3113b697d735.fullname" . }}
  labels:
    {{- include "go-echo0b9b2254-e267-48bf-ae80-3113b697d735.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0b9b2254-e267-48bf-ae80-3113b697d735.selectorLabels" . | nindent 6 }}
