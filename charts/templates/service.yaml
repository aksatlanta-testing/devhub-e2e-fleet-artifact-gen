apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoabba79e4-540a-4fa9-b992-52ff0c1e73bd.fullname" . }}
  labels:
    {{- include "go-echoabba79e4-540a-4fa9-b992-52ff0c1e73bd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoabba79e4-540a-4fa9-b992-52ff0c1e73bd.selectorLabels" . | nindent 6 }}
