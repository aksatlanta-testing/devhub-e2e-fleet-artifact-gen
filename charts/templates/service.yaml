apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod7d784f0-800b-4f8f-89d2-75951236627a.fullname" . }}
  labels:
    {{- include "go-echod7d784f0-800b-4f8f-89d2-75951236627a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod7d784f0-800b-4f8f-89d2-75951236627a.selectorLabels" . | nindent 6 }}
