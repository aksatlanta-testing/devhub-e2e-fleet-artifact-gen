apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo01ed3baa-e6a5-4b3a-8dd6-fbcf842daf6f.fullname" . }}
  labels:
    {{- include "go-echo01ed3baa-e6a5-4b3a-8dd6-fbcf842daf6f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo01ed3baa-e6a5-4b3a-8dd6-fbcf842daf6f.selectorLabels" . | nindent 6 }}
