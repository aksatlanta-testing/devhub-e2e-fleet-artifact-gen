apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo82a0ad76-5677-48b4-adfa-6eb1015bed8c.fullname" . }}
  labels:
    {{- include "go-echo82a0ad76-5677-48b4-adfa-6eb1015bed8c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo82a0ad76-5677-48b4-adfa-6eb1015bed8c.selectorLabels" . | nindent 6 }}
