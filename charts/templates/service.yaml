apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0729ba19-93f6-4da1-ad9d-d9b707c16510.fullname" . }}
  labels:
    {{- include "go-echo0729ba19-93f6-4da1-ad9d-d9b707c16510.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0729ba19-93f6-4da1-ad9d-d9b707c16510.selectorLabels" . | nindent 6 }}
