apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofcc9e0e9-cd0f-4e13-bde5-2c8e3b5e702d.fullname" . }}
  labels:
    {{- include "go-echofcc9e0e9-cd0f-4e13-bde5-2c8e3b5e702d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofcc9e0e9-cd0f-4e13-bde5-2c8e3b5e702d.selectorLabels" . | nindent 6 }}
