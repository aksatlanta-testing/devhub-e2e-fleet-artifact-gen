apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9b2222f7-0b8f-4e83-82ad-cd72452ce1d8.fullname" . }}
  labels:
    {{- include "go-echo9b2222f7-0b8f-4e83-82ad-cd72452ce1d8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9b2222f7-0b8f-4e83-82ad-cd72452ce1d8.selectorLabels" . | nindent 6 }}
