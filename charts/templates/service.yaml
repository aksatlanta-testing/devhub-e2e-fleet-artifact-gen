apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoac4d4d5e-e8c3-4bb2-a204-f32bef0c2fbd.fullname" . }}
  labels:
    {{- include "go-echoac4d4d5e-e8c3-4bb2-a204-f32bef0c2fbd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoac4d4d5e-e8c3-4bb2-a204-f32bef0c2fbd.selectorLabels" . | nindent 6 }}
