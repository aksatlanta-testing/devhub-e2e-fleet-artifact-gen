apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2df893eb-989b-441b-8d61-045842580307.fullname" . }}
  labels:
    {{- include "go-echo2df893eb-989b-441b-8d61-045842580307.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2df893eb-989b-441b-8d61-045842580307.selectorLabels" . | nindent 6 }}
