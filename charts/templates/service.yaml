apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3cbc5b8b-cf1b-4bca-8d8a-d9ba726a7a15.fullname" . }}
  labels:
    {{- include "go-echo3cbc5b8b-cf1b-4bca-8d8a-d9ba726a7a15.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3cbc5b8b-cf1b-4bca-8d8a-d9ba726a7a15.selectorLabels" . | nindent 6 }}
