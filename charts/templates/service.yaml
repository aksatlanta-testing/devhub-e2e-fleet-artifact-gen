apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod4324a35-34e1-48ff-8153-e266d9ee9362.fullname" . }}
  labels:
    {{- include "go-echod4324a35-34e1-48ff-8153-e266d9ee9362.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod4324a35-34e1-48ff-8153-e266d9ee9362.selectorLabels" . | nindent 6 }}
