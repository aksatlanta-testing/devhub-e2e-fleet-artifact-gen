apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofd40aa13-8225-431d-bcc1-f00b6fbabf16.fullname" . }}
  labels:
    {{- include "go-echofd40aa13-8225-431d-bcc1-f00b6fbabf16.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofd40aa13-8225-431d-bcc1-f00b6fbabf16.selectorLabels" . | nindent 6 }}
