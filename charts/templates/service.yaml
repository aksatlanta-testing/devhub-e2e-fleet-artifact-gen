apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1ac5b3c4-ef09-4539-8ad1-76062ba7dcd9.fullname" . }}
  labels:
    {{- include "go-echo1ac5b3c4-ef09-4539-8ad1-76062ba7dcd9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1ac5b3c4-ef09-4539-8ad1-76062ba7dcd9.selectorLabels" . | nindent 6 }}
