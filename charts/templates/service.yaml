apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5170471f-f372-4df8-a938-7dab873ca6df.fullname" . }}
  labels:
    {{- include "go-echo5170471f-f372-4df8-a938-7dab873ca6df.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5170471f-f372-4df8-a938-7dab873ca6df.selectorLabels" . | nindent 6 }}
