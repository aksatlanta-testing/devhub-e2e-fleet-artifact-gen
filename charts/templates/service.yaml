apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo13870eee-b972-45df-95ef-38ee5de35e25.fullname" . }}
  labels:
    {{- include "go-echo13870eee-b972-45df-95ef-38ee5de35e25.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo13870eee-b972-45df-95ef-38ee5de35e25.selectorLabels" . | nindent 6 }}
