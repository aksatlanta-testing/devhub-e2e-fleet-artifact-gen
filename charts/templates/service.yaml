apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoffbafa9b-c0f8-473c-b9cf-4849cb1790c2.fullname" . }}
  labels:
    {{- include "go-echoffbafa9b-c0f8-473c-b9cf-4849cb1790c2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoffbafa9b-c0f8-473c-b9cf-4849cb1790c2.selectorLabels" . | nindent 6 }}
