apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6ac3e437-8ef1-4b7d-9bde-49b25eaacb84.fullname" . }}
  labels:
    {{- include "go-echo6ac3e437-8ef1-4b7d-9bde-49b25eaacb84.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6ac3e437-8ef1-4b7d-9bde-49b25eaacb84.selectorLabels" . | nindent 6 }}
