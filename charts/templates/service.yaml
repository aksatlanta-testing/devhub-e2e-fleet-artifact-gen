apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1c6f2b63-bd0a-4998-a3a5-cb18a2d814e6.fullname" . }}
  labels:
    {{- include "go-echo1c6f2b63-bd0a-4998-a3a5-cb18a2d814e6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1c6f2b63-bd0a-4998-a3a5-cb18a2d814e6.selectorLabels" . | nindent 6 }}
