apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo48da789c-cd76-4f97-8574-87a19fb1d092.fullname" . }}
  labels:
    {{- include "go-echo48da789c-cd76-4f97-8574-87a19fb1d092.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo48da789c-cd76-4f97-8574-87a19fb1d092.selectorLabels" . | nindent 6 }}
