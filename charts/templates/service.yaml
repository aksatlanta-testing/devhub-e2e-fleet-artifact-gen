apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5e8b2f93-cc9c-4d73-b19a-cab18492b0a9.fullname" . }}
  labels:
    {{- include "go-echo5e8b2f93-cc9c-4d73-b19a-cab18492b0a9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5e8b2f93-cc9c-4d73-b19a-cab18492b0a9.selectorLabels" . | nindent 6 }}
