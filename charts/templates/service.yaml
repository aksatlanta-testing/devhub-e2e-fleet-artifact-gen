apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo69000e42-a3c8-4c99-bf42-ae740905a282.fullname" . }}
  labels:
    {{- include "go-echo69000e42-a3c8-4c99-bf42-ae740905a282.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo69000e42-a3c8-4c99-bf42-ae740905a282.selectorLabels" . | nindent 6 }}
