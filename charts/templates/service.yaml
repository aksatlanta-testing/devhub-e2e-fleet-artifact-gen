apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo228e85db-3636-40fb-b8e6-c30a22fac7a7.fullname" . }}
  labels:
    {{- include "go-echo228e85db-3636-40fb-b8e6-c30a22fac7a7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo228e85db-3636-40fb-b8e6-c30a22fac7a7.selectorLabels" . | nindent 6 }}
