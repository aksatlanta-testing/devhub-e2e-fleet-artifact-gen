apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo577c5372-c253-47d7-9bd4-61ec8c3a91a0.fullname" . }}
  labels:
    {{- include "go-echo577c5372-c253-47d7-9bd4-61ec8c3a91a0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo577c5372-c253-47d7-9bd4-61ec8c3a91a0.selectorLabels" . | nindent 6 }}
