apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofe2131f9-417f-4828-a6a4-423d59d1a912.fullname" . }}
  labels:
    {{- include "go-echofe2131f9-417f-4828-a6a4-423d59d1a912.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofe2131f9-417f-4828-a6a4-423d59d1a912.selectorLabels" . | nindent 6 }}
