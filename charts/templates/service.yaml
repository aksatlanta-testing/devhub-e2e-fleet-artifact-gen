apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoac24c806-3e09-413c-9d3f-f0c0ede3a1c4.fullname" . }}
  labels:
    {{- include "go-echoac24c806-3e09-413c-9d3f-f0c0ede3a1c4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoac24c806-3e09-413c-9d3f-f0c0ede3a1c4.selectorLabels" . | nindent 6 }}
