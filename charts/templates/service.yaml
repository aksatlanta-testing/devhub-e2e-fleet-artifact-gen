apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo605fd2f0-dd23-4c8b-9b24-48df2d7e0ea7.fullname" . }}
  labels:
    {{- include "go-echo605fd2f0-dd23-4c8b-9b24-48df2d7e0ea7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo605fd2f0-dd23-4c8b-9b24-48df2d7e0ea7.selectorLabels" . | nindent 6 }}
