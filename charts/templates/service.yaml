apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa9ca03cf-2be7-4f19-bacf-21d6204da9bc.fullname" . }}
  labels:
    {{- include "go-echoa9ca03cf-2be7-4f19-bacf-21d6204da9bc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa9ca03cf-2be7-4f19-bacf-21d6204da9bc.selectorLabels" . | nindent 6 }}
