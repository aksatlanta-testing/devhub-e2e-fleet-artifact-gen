apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodcd7504f-b0dc-4651-98c8-4a132563738b.fullname" . }}
  labels:
    {{- include "go-echodcd7504f-b0dc-4651-98c8-4a132563738b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodcd7504f-b0dc-4651-98c8-4a132563738b.selectorLabels" . | nindent 6 }}
