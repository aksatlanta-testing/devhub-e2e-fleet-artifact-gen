apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobf6de488-f23b-434f-9d50-29bd2357456e.fullname" . }}
  labels:
    {{- include "go-echobf6de488-f23b-434f-9d50-29bd2357456e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobf6de488-f23b-434f-9d50-29bd2357456e.selectorLabels" . | nindent 6 }}
