apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocd11b14b-36a2-4f41-bfea-e4713de4f726.fullname" . }}
  labels:
    {{- include "go-echocd11b14b-36a2-4f41-bfea-e4713de4f726.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocd11b14b-36a2-4f41-bfea-e4713de4f726.selectorLabels" . | nindent 6 }}
