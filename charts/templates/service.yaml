apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo56173fc0-ae69-4828-88cc-b5b1af1f84f1.fullname" . }}
  labels:
    {{- include "go-echo56173fc0-ae69-4828-88cc-b5b1af1f84f1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo56173fc0-ae69-4828-88cc-b5b1af1f84f1.selectorLabels" . | nindent 6 }}
