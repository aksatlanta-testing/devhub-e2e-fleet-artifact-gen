apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5d7b9d34-64e6-4c04-848f-f93a599a7846.fullname" . }}
  labels:
    {{- include "go-echo5d7b9d34-64e6-4c04-848f-f93a599a7846.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5d7b9d34-64e6-4c04-848f-f93a599a7846.selectorLabels" . | nindent 6 }}
