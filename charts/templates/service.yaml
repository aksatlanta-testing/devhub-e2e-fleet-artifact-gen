apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1a3ccb1c-596e-4f99-8d7c-ba8f0ce47501.fullname" . }}
  labels:
    {{- include "go-echo1a3ccb1c-596e-4f99-8d7c-ba8f0ce47501.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1a3ccb1c-596e-4f99-8d7c-ba8f0ce47501.selectorLabels" . | nindent 6 }}
