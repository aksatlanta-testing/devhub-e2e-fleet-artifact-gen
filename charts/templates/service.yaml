apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3639181b-e705-412c-becb-2dfdf208663c.fullname" . }}
  labels:
    {{- include "go-echo3639181b-e705-412c-becb-2dfdf208663c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3639181b-e705-412c-becb-2dfdf208663c.selectorLabels" . | nindent 6 }}
