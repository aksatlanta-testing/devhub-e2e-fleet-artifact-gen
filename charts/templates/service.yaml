apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6b9cf573-00a2-49c2-8997-d464c2e630bd.fullname" . }}
  labels:
    {{- include "go-echo6b9cf573-00a2-49c2-8997-d464c2e630bd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6b9cf573-00a2-49c2-8997-d464c2e630bd.selectorLabels" . | nindent 6 }}
