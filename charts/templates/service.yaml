apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof9783069-87fc-4eff-a385-97b9fa9a8eb2.fullname" . }}
  labels:
    {{- include "go-echof9783069-87fc-4eff-a385-97b9fa9a8eb2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof9783069-87fc-4eff-a385-97b9fa9a8eb2.selectorLabels" . | nindent 6 }}
