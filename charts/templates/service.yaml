apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo43480159-e8bc-42ff-a057-1c641506fe4b.fullname" . }}
  labels:
    {{- include "go-echo43480159-e8bc-42ff-a057-1c641506fe4b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo43480159-e8bc-42ff-a057-1c641506fe4b.selectorLabels" . | nindent 6 }}
