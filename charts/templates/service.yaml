apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod0451807-4ce9-4e8a-96d4-4a86e2338b5b.fullname" . }}
  labels:
    {{- include "go-echod0451807-4ce9-4e8a-96d4-4a86e2338b5b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod0451807-4ce9-4e8a-96d4-4a86e2338b5b.selectorLabels" . | nindent 6 }}
