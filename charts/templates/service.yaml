apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3d88fe7f-adad-4280-8753-fa0a92c45027.fullname" . }}
  labels:
    {{- include "go-echo3d88fe7f-adad-4280-8753-fa0a92c45027.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3d88fe7f-adad-4280-8753-fa0a92c45027.selectorLabels" . | nindent 6 }}
