apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3300f644-71e8-4912-a57e-2a8c3637d291.fullname" . }}
  labels:
    {{- include "go-echo3300f644-71e8-4912-a57e-2a8c3637d291.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3300f644-71e8-4912-a57e-2a8c3637d291.selectorLabels" . | nindent 6 }}
