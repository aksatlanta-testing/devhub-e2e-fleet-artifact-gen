apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5bf4f9a6-e855-495b-a520-1ae4616dbedb.fullname" . }}
  labels:
    {{- include "go-echo5bf4f9a6-e855-495b-a520-1ae4616dbedb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5bf4f9a6-e855-495b-a520-1ae4616dbedb.selectorLabels" . | nindent 6 }}
