apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocff95816-7b91-41c4-8490-86044d8d888e.fullname" . }}
  labels:
    {{- include "go-echocff95816-7b91-41c4-8490-86044d8d888e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocff95816-7b91-41c4-8490-86044d8d888e.selectorLabels" . | nindent 6 }}
