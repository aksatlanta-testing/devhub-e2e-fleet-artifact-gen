apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo62ec89cc-09b1-4aab-a679-0120a29656e8.fullname" . }}
  labels:
    {{- include "go-echo62ec89cc-09b1-4aab-a679-0120a29656e8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo62ec89cc-09b1-4aab-a679-0120a29656e8.selectorLabels" . | nindent 6 }}
