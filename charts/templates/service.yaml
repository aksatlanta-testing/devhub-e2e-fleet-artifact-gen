apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4892913f-8d4c-475d-888e-6014861e4ef2.fullname" . }}
  labels:
    {{- include "go-echo4892913f-8d4c-475d-888e-6014861e4ef2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4892913f-8d4c-475d-888e-6014861e4ef2.selectorLabels" . | nindent 6 }}
