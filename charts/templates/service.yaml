apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6244c6b6-b7b2-460d-a593-1c6f36787725.fullname" . }}
  labels:
    {{- include "go-echo6244c6b6-b7b2-460d-a593-1c6f36787725.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6244c6b6-b7b2-460d-a593-1c6f36787725.selectorLabels" . | nindent 6 }}
