apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobf5e86da-2674-4e92-a62f-3191572eb8f9.fullname" . }}
  labels:
    {{- include "go-echobf5e86da-2674-4e92-a62f-3191572eb8f9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobf5e86da-2674-4e92-a62f-3191572eb8f9.selectorLabels" . | nindent 6 }}
