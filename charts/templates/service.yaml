apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof54e9ac2-5d5d-49eb-867d-ce0a264db2e2.fullname" . }}
  labels:
    {{- include "go-echof54e9ac2-5d5d-49eb-867d-ce0a264db2e2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof54e9ac2-5d5d-49eb-867d-ce0a264db2e2.selectorLabels" . | nindent 6 }}
