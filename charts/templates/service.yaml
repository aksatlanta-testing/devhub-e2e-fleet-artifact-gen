apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc3f8582d-417b-4fc1-afb2-65917c92c4d9.fullname" . }}
  labels:
    {{- include "go-echoc3f8582d-417b-4fc1-afb2-65917c92c4d9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc3f8582d-417b-4fc1-afb2-65917c92c4d9.selectorLabels" . | nindent 6 }}
