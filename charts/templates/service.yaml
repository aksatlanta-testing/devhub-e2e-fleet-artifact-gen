apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa48e6aa0-a07a-4307-b9c1-89a3ba0c5769.fullname" . }}
  labels:
    {{- include "go-echoa48e6aa0-a07a-4307-b9c1-89a3ba0c5769.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa48e6aa0-a07a-4307-b9c1-89a3ba0c5769.selectorLabels" . | nindent 6 }}
