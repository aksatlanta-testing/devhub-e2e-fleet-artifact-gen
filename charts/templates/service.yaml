apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo626c1e3d-4af7-4ca6-943e-580b19ba96bb.fullname" . }}
  labels:
    {{- include "go-echo626c1e3d-4af7-4ca6-943e-580b19ba96bb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo626c1e3d-4af7-4ca6-943e-580b19ba96bb.selectorLabels" . | nindent 6 }}
