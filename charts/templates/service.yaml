apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo06c14031-e513-4a9c-ba58-e76f1948717e.fullname" . }}
  labels:
    {{- include "go-echo06c14031-e513-4a9c-ba58-e76f1948717e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo06c14031-e513-4a9c-ba58-e76f1948717e.selectorLabels" . | nindent 6 }}
