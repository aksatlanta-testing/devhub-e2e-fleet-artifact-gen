apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo82521fde-169e-4989-995c-52c47324f6d5.fullname" . }}
  labels:
    {{- include "go-echo82521fde-169e-4989-995c-52c47324f6d5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo82521fde-169e-4989-995c-52c47324f6d5.selectorLabels" . | nindent 6 }}
