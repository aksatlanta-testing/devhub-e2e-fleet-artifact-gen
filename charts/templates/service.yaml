apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7813d8da-d91a-433e-862d-922c67f3b9cf.fullname" . }}
  labels:
    {{- include "go-echo7813d8da-d91a-433e-862d-922c67f3b9cf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7813d8da-d91a-433e-862d-922c67f3b9cf.selectorLabels" . | nindent 6 }}
