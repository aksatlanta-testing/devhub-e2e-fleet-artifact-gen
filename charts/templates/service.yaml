apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo051d753a-c26a-417a-89c9-98411e3b83b3.fullname" . }}
  labels:
    {{- include "go-echo051d753a-c26a-417a-89c9-98411e3b83b3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo051d753a-c26a-417a-89c9-98411e3b83b3.selectorLabels" . | nindent 6 }}
