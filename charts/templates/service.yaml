apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7fa4731a-dfb4-4d3c-a1aa-7e1b6368364d.fullname" . }}
  labels:
    {{- include "go-echo7fa4731a-dfb4-4d3c-a1aa-7e1b6368364d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7fa4731a-dfb4-4d3c-a1aa-7e1b6368364d.selectorLabels" . | nindent 6 }}
