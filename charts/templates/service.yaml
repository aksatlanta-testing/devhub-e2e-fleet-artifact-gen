apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1a511290-68e1-45f3-a1ba-9f2c6da2c700.fullname" . }}
  labels:
    {{- include "go-echo1a511290-68e1-45f3-a1ba-9f2c6da2c700.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1a511290-68e1-45f3-a1ba-9f2c6da2c700.selectorLabels" . | nindent 6 }}
