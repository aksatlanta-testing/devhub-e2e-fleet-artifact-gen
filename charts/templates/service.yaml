apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo03c6a329-a91b-4c3e-ada7-eeec8cf5c550.fullname" . }}
  labels:
    {{- include "go-echo03c6a329-a91b-4c3e-ada7-eeec8cf5c550.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo03c6a329-a91b-4c3e-ada7-eeec8cf5c550.selectorLabels" . | nindent 6 }}
