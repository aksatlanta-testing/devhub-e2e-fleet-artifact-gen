apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod670fa61-a6aa-4dfd-b7bc-2dd5fdff2f02.fullname" . }}
  labels:
    {{- include "go-echod670fa61-a6aa-4dfd-b7bc-2dd5fdff2f02.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod670fa61-a6aa-4dfd-b7bc-2dd5fdff2f02.selectorLabels" . | nindent 6 }}
