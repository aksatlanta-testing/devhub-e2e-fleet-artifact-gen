apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo071893ad-dcf0-4774-86c8-9f9baf6a43dc.fullname" . }}
  labels:
    {{- include "go-echo071893ad-dcf0-4774-86c8-9f9baf6a43dc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo071893ad-dcf0-4774-86c8-9f9baf6a43dc.selectorLabels" . | nindent 6 }}
