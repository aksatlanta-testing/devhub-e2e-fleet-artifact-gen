apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoedc3fa18-8895-4a97-8ede-5e1ba9f0ecc8.fullname" . }}
  labels:
    {{- include "go-echoedc3fa18-8895-4a97-8ede-5e1ba9f0ecc8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoedc3fa18-8895-4a97-8ede-5e1ba9f0ecc8.selectorLabels" . | nindent 6 }}
