apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9af9422c-dec0-46df-aeac-b3947b947ad2.fullname" . }}
  labels:
    {{- include "go-echo9af9422c-dec0-46df-aeac-b3947b947ad2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9af9422c-dec0-46df-aeac-b3947b947ad2.selectorLabels" . | nindent 6 }}
