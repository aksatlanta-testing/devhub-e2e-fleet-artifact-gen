apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4f0f289f-9bd2-4ee7-8e99-9894f74974f7.fullname" . }}
  labels:
    {{- include "go-echo4f0f289f-9bd2-4ee7-8e99-9894f74974f7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4f0f289f-9bd2-4ee7-8e99-9894f74974f7.selectorLabels" . | nindent 6 }}
