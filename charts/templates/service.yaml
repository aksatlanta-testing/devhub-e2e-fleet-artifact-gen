apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7c80d31e-0dfd-438b-82a5-0fb5dd700a6c.fullname" . }}
  labels:
    {{- include "go-echo7c80d31e-0dfd-438b-82a5-0fb5dd700a6c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7c80d31e-0dfd-438b-82a5-0fb5dd700a6c.selectorLabels" . | nindent 6 }}
