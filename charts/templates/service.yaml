apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo022ac0e3-3b52-405e-a306-05be117da55a.fullname" . }}
  labels:
    {{- include "go-echo022ac0e3-3b52-405e-a306-05be117da55a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo022ac0e3-3b52-405e-a306-05be117da55a.selectorLabels" . | nindent 6 }}
