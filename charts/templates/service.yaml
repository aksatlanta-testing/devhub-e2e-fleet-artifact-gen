apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2e1f5c24-3e99-4b97-a249-a46f6a7cc2a9.fullname" . }}
  labels:
    {{- include "go-echo2e1f5c24-3e99-4b97-a249-a46f6a7cc2a9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2e1f5c24-3e99-4b97-a249-a46f6a7cc2a9.selectorLabels" . | nindent 6 }}
