apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo64508fb1-62c5-4308-8a0b-f43a18628fb9.fullname" . }}
  labels:
    {{- include "go-echo64508fb1-62c5-4308-8a0b-f43a18628fb9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo64508fb1-62c5-4308-8a0b-f43a18628fb9.selectorLabels" . | nindent 6 }}
