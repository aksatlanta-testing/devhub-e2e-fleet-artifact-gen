apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8d32505e-a2d6-4048-97bd-d6b06a05e7da.fullname" . }}
  labels:
    {{- include "go-echo8d32505e-a2d6-4048-97bd-d6b06a05e7da.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8d32505e-a2d6-4048-97bd-d6b06a05e7da.selectorLabels" . | nindent 6 }}
