apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2d8cf2ee-1d7e-45f5-8901-0f47a7353a1c.fullname" . }}
  labels:
    {{- include "go-echo2d8cf2ee-1d7e-45f5-8901-0f47a7353a1c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2d8cf2ee-1d7e-45f5-8901-0f47a7353a1c.selectorLabels" . | nindent 6 }}
