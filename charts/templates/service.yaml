apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe90c5f15-8cdf-4d01-86ea-ade9d02a8b9b.fullname" . }}
  labels:
    {{- include "go-echoe90c5f15-8cdf-4d01-86ea-ade9d02a8b9b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe90c5f15-8cdf-4d01-86ea-ade9d02a8b9b.selectorLabels" . | nindent 6 }}
