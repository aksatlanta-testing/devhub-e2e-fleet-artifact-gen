apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo643513db-de66-403e-b54c-1e8c50dc16b4.fullname" . }}
  labels:
    {{- include "go-echo643513db-de66-403e-b54c-1e8c50dc16b4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo643513db-de66-403e-b54c-1e8c50dc16b4.selectorLabels" . | nindent 6 }}
