apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofbca9b79-a7e9-4a06-b1ca-242892a862e9.fullname" . }}
  labels:
    {{- include "go-echofbca9b79-a7e9-4a06-b1ca-242892a862e9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofbca9b79-a7e9-4a06-b1ca-242892a862e9.selectorLabels" . | nindent 6 }}
