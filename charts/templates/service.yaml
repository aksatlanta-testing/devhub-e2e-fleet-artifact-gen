apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6384168e-e1b3-4964-9af0-04fc3e461a6a.fullname" . }}
  labels:
    {{- include "go-echo6384168e-e1b3-4964-9af0-04fc3e461a6a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6384168e-e1b3-4964-9af0-04fc3e461a6a.selectorLabels" . | nindent 6 }}
