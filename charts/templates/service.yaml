apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2171b1ba-3126-44b6-a986-ce1d19e99f14.fullname" . }}
  labels:
    {{- include "go-echo2171b1ba-3126-44b6-a986-ce1d19e99f14.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2171b1ba-3126-44b6-a986-ce1d19e99f14.selectorLabels" . | nindent 6 }}
