apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob267a86e-e505-4231-8933-1b41abd4f1d2.fullname" . }}
  labels:
    {{- include "go-echob267a86e-e505-4231-8933-1b41abd4f1d2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob267a86e-e505-4231-8933-1b41abd4f1d2.selectorLabels" . | nindent 6 }}
