apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa14053bb-0c55-4c13-96f6-2100937bcf65.fullname" . }}
  labels:
    {{- include "go-echoa14053bb-0c55-4c13-96f6-2100937bcf65.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa14053bb-0c55-4c13-96f6-2100937bcf65.selectorLabels" . | nindent 6 }}
