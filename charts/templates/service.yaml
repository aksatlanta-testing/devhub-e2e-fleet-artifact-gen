apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc4d2e966-f38d-49f3-935f-ad84fa11c68c.fullname" . }}
  labels:
    {{- include "go-echoc4d2e966-f38d-49f3-935f-ad84fa11c68c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc4d2e966-f38d-49f3-935f-ad84fa11c68c.selectorLabels" . | nindent 6 }}
