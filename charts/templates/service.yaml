apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2da89116-b670-4e31-a5d9-4e4fa1988a57.fullname" . }}
  labels:
    {{- include "go-echo2da89116-b670-4e31-a5d9-4e4fa1988a57.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2da89116-b670-4e31-a5d9-4e4fa1988a57.selectorLabels" . | nindent 6 }}
