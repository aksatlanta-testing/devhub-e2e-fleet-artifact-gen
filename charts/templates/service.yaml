apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0d0d7fcd-bf8a-4677-8743-ec5607f1fa90.fullname" . }}
  labels:
    {{- include "go-echo0d0d7fcd-bf8a-4677-8743-ec5607f1fa90.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0d0d7fcd-bf8a-4677-8743-ec5607f1fa90.selectorLabels" . | nindent 6 }}
