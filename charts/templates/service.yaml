apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo814aadce-989e-4959-84df-84858107d869.fullname" . }}
  labels:
    {{- include "go-echo814aadce-989e-4959-84df-84858107d869.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo814aadce-989e-4959-84df-84858107d869.selectorLabels" . | nindent 6 }}
