apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocb00e36f-2d9f-40fd-aa0a-301e5a056cdb.fullname" . }}
  labels:
    {{- include "go-echocb00e36f-2d9f-40fd-aa0a-301e5a056cdb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocb00e36f-2d9f-40fd-aa0a-301e5a056cdb.selectorLabels" . | nindent 6 }}
