apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1776f385-36ed-46c0-ad3c-415842775896.fullname" . }}
  labels:
    {{- include "go-echo1776f385-36ed-46c0-ad3c-415842775896.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1776f385-36ed-46c0-ad3c-415842775896.selectorLabels" . | nindent 6 }}
