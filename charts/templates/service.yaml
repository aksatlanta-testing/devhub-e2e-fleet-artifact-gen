apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc8bbb177-1c7a-4419-b9fe-c78015f3cd1c.fullname" . }}
  labels:
    {{- include "go-echoc8bbb177-1c7a-4419-b9fe-c78015f3cd1c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc8bbb177-1c7a-4419-b9fe-c78015f3cd1c.selectorLabels" . | nindent 6 }}
