apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3cb18761-5dec-4ee2-865b-0fc25e2ff514.fullname" . }}
  labels:
    {{- include "go-echo3cb18761-5dec-4ee2-865b-0fc25e2ff514.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3cb18761-5dec-4ee2-865b-0fc25e2ff514.selectorLabels" . | nindent 6 }}
