apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo13bf6ffd-bf0c-4244-91df-5b5461f33728.fullname" . }}
  labels:
    {{- include "go-echo13bf6ffd-bf0c-4244-91df-5b5461f33728.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo13bf6ffd-bf0c-4244-91df-5b5461f33728.selectorLabels" . | nindent 6 }}
