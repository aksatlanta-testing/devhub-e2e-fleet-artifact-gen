apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo94b3830f-a40d-4256-8ed1-1204c3cf3cf9.fullname" . }}
  labels:
    {{- include "go-echo94b3830f-a40d-4256-8ed1-1204c3cf3cf9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo94b3830f-a40d-4256-8ed1-1204c3cf3cf9.selectorLabels" . | nindent 6 }}
