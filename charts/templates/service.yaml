apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2d096cdd-e476-47e8-9145-4912157ec03f.fullname" . }}
  labels:
    {{- include "go-echo2d096cdd-e476-47e8-9145-4912157ec03f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2d096cdd-e476-47e8-9145-4912157ec03f.selectorLabels" . | nindent 6 }}
