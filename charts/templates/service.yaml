apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe7161529-8e90-4a04-8a61-2ea558184b89.fullname" . }}
  labels:
    {{- include "go-echoe7161529-8e90-4a04-8a61-2ea558184b89.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe7161529-8e90-4a04-8a61-2ea558184b89.selectorLabels" . | nindent 6 }}
