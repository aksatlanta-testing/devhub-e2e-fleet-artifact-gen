apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc8671a8e-7f7e-4474-a2bb-458f17f902c8.fullname" . }}
  labels:
    {{- include "go-echoc8671a8e-7f7e-4474-a2bb-458f17f902c8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc8671a8e-7f7e-4474-a2bb-458f17f902c8.selectorLabels" . | nindent 6 }}
