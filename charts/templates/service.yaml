apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob0724c25-d6bc-43b9-934d-3f3e73dc4242.fullname" . }}
  labels:
    {{- include "go-echob0724c25-d6bc-43b9-934d-3f3e73dc4242.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob0724c25-d6bc-43b9-934d-3f3e73dc4242.selectorLabels" . | nindent 6 }}
