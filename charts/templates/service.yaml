apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo719c8902-44bf-4930-8049-0afee5fc365a.fullname" . }}
  labels:
    {{- include "go-echo719c8902-44bf-4930-8049-0afee5fc365a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo719c8902-44bf-4930-8049-0afee5fc365a.selectorLabels" . | nindent 6 }}
