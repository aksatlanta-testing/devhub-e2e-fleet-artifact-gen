apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5556f92b-9999-423c-9488-a08a78d03ac8.fullname" . }}
  labels:
    {{- include "go-echo5556f92b-9999-423c-9488-a08a78d03ac8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5556f92b-9999-423c-9488-a08a78d03ac8.selectorLabels" . | nindent 6 }}
