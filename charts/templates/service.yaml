apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1368677f-a993-4c64-a217-76287abf6fae.fullname" . }}
  labels:
    {{- include "go-echo1368677f-a993-4c64-a217-76287abf6fae.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1368677f-a993-4c64-a217-76287abf6fae.selectorLabels" . | nindent 6 }}
