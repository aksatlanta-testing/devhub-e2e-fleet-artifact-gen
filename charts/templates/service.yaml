apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0a9e8d66-78b9-4841-8388-9d481e78c724.fullname" . }}
  labels:
    {{- include "go-echo0a9e8d66-78b9-4841-8388-9d481e78c724.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0a9e8d66-78b9-4841-8388-9d481e78c724.selectorLabels" . | nindent 6 }}
