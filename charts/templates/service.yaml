apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocd7a5785-5f3e-46c1-a553-fdc8f0326d30.fullname" . }}
  labels:
    {{- include "go-echocd7a5785-5f3e-46c1-a553-fdc8f0326d30.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocd7a5785-5f3e-46c1-a553-fdc8f0326d30.selectorLabels" . | nindent 6 }}
