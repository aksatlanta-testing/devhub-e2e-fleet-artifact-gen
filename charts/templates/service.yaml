apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7e51c33c-8809-4824-ac96-5bc9fc1d92be.fullname" . }}
  labels:
    {{- include "go-echo7e51c33c-8809-4824-ac96-5bc9fc1d92be.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7e51c33c-8809-4824-ac96-5bc9fc1d92be.selectorLabels" . | nindent 6 }}
