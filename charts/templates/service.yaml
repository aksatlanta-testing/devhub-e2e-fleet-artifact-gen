apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoacbc1d34-2dcc-4ef2-83db-85862dba4d97.fullname" . }}
  labels:
    {{- include "go-echoacbc1d34-2dcc-4ef2-83db-85862dba4d97.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoacbc1d34-2dcc-4ef2-83db-85862dba4d97.selectorLabels" . | nindent 6 }}
