apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4c7dd952-9785-4357-bee9-a05a187d1202.fullname" . }}
  labels:
    {{- include "go-echo4c7dd952-9785-4357-bee9-a05a187d1202.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4c7dd952-9785-4357-bee9-a05a187d1202.selectorLabels" . | nindent 6 }}
