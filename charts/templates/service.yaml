apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo255bb33e-d8f2-4cd9-9cce-3431c88ad850.fullname" . }}
  labels:
    {{- include "go-echo255bb33e-d8f2-4cd9-9cce-3431c88ad850.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo255bb33e-d8f2-4cd9-9cce-3431c88ad850.selectorLabels" . | nindent 6 }}
