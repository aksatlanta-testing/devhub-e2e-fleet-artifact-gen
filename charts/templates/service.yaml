apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod1916a38-3622-4400-b9cc-d90287c1be45.fullname" . }}
  labels:
    {{- include "go-echod1916a38-3622-4400-b9cc-d90287c1be45.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod1916a38-3622-4400-b9cc-d90287c1be45.selectorLabels" . | nindent 6 }}
