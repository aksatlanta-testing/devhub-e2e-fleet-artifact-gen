apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo061dc157-bf44-4202-8c97-6525e491c8c4.fullname" . }}
  labels:
    {{- include "go-echo061dc157-bf44-4202-8c97-6525e491c8c4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo061dc157-bf44-4202-8c97-6525e491c8c4.selectorLabels" . | nindent 6 }}
