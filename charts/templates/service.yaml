apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobd9db91a-cf8d-4be7-a7ef-5d8ce53fcec2.fullname" . }}
  labels:
    {{- include "go-echobd9db91a-cf8d-4be7-a7ef-5d8ce53fcec2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobd9db91a-cf8d-4be7-a7ef-5d8ce53fcec2.selectorLabels" . | nindent 6 }}
