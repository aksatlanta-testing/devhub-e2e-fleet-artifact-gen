apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob23bf447-61e7-4bc8-aca1-0ca345cc3794.fullname" . }}
  labels:
    {{- include "go-echob23bf447-61e7-4bc8-aca1-0ca345cc3794.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob23bf447-61e7-4bc8-aca1-0ca345cc3794.selectorLabels" . | nindent 6 }}
