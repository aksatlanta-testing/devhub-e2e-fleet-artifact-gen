apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo17b2bc68-8af2-4acf-8df5-69c8bddfbafe.fullname" . }}
  labels:
    {{- include "go-echo17b2bc68-8af2-4acf-8df5-69c8bddfbafe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo17b2bc68-8af2-4acf-8df5-69c8bddfbafe.selectorLabels" . | nindent 6 }}
