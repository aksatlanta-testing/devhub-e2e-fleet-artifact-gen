apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo89676f30-cf6b-4a16-bb17-566198dd9d50.fullname" . }}
  labels:
    {{- include "go-echo89676f30-cf6b-4a16-bb17-566198dd9d50.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo89676f30-cf6b-4a16-bb17-566198dd9d50.selectorLabels" . | nindent 6 }}
