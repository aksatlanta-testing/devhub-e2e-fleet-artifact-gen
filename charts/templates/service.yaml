apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo88f69f22-24f7-45af-8c17-5bdb6d97190a.fullname" . }}
  labels:
    {{- include "go-echo88f69f22-24f7-45af-8c17-5bdb6d97190a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo88f69f22-24f7-45af-8c17-5bdb6d97190a.selectorLabels" . | nindent 6 }}
