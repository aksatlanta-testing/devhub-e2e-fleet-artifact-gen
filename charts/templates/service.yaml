apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1c839872-b1ec-4029-8518-279493d970fb.fullname" . }}
  labels:
    {{- include "go-echo1c839872-b1ec-4029-8518-279493d970fb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1c839872-b1ec-4029-8518-279493d970fb.selectorLabels" . | nindent 6 }}
