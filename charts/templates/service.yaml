apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6c34442f-76e3-420d-830f-8764f71bcca9.fullname" . }}
  labels:
    {{- include "go-echo6c34442f-76e3-420d-830f-8764f71bcca9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6c34442f-76e3-420d-830f-8764f71bcca9.selectorLabels" . | nindent 6 }}
