apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa4e3b6cf-2df8-47c3-9677-135396b6ef4e.fullname" . }}
  labels:
    {{- include "go-echoa4e3b6cf-2df8-47c3-9677-135396b6ef4e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa4e3b6cf-2df8-47c3-9677-135396b6ef4e.selectorLabels" . | nindent 6 }}
