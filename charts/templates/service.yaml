apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo310706bb-0fde-4493-8a3f-bf5132ebd134.fullname" . }}
  labels:
    {{- include "go-echo310706bb-0fde-4493-8a3f-bf5132ebd134.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo310706bb-0fde-4493-8a3f-bf5132ebd134.selectorLabels" . | nindent 6 }}
