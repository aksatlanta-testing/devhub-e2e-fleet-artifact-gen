apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof15ce953-fc4b-4fb2-8ddb-c8df3ff9aeba.fullname" . }}
  labels:
    {{- include "go-echof15ce953-fc4b-4fb2-8ddb-c8df3ff9aeba.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof15ce953-fc4b-4fb2-8ddb-c8df3ff9aeba.selectorLabels" . | nindent 6 }}
