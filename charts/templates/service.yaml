apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9a8b010d-1f86-4075-a758-34ca9786c442.fullname" . }}
  labels:
    {{- include "go-echo9a8b010d-1f86-4075-a758-34ca9786c442.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9a8b010d-1f86-4075-a758-34ca9786c442.selectorLabels" . | nindent 6 }}
