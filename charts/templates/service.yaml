apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo788ed5b2-46a4-4b75-981f-bc455c09a40c.fullname" . }}
  labels:
    {{- include "go-echo788ed5b2-46a4-4b75-981f-bc455c09a40c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo788ed5b2-46a4-4b75-981f-bc455c09a40c.selectorLabels" . | nindent 6 }}
