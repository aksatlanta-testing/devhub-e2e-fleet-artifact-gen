apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc7b225dd-6a6d-42d2-a22c-6a29adbd818c.fullname" . }}
  labels:
    {{- include "go-echoc7b225dd-6a6d-42d2-a22c-6a29adbd818c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc7b225dd-6a6d-42d2-a22c-6a29adbd818c.selectorLabels" . | nindent 6 }}
