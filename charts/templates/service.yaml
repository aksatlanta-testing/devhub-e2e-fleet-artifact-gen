apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4d354b98-bd8d-41f3-8317-6d2b0bc31e04.fullname" . }}
  labels:
    {{- include "go-echo4d354b98-bd8d-41f3-8317-6d2b0bc31e04.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4d354b98-bd8d-41f3-8317-6d2b0bc31e04.selectorLabels" . | nindent 6 }}
