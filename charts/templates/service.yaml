apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc5ce1c55-0a46-4d1d-9bbb-08480e2659c2.fullname" . }}
  labels:
    {{- include "go-echoc5ce1c55-0a46-4d1d-9bbb-08480e2659c2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc5ce1c55-0a46-4d1d-9bbb-08480e2659c2.selectorLabels" . | nindent 6 }}
