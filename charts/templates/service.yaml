apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod5aed0c9-7b0c-4859-adf5-9457968298d8.fullname" . }}
  labels:
    {{- include "go-echod5aed0c9-7b0c-4859-adf5-9457968298d8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod5aed0c9-7b0c-4859-adf5-9457968298d8.selectorLabels" . | nindent 6 }}
