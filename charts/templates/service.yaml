apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo891f3d26-9709-4b99-b128-2e91c114d7b8.fullname" . }}
  labels:
    {{- include "go-echo891f3d26-9709-4b99-b128-2e91c114d7b8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo891f3d26-9709-4b99-b128-2e91c114d7b8.selectorLabels" . | nindent 6 }}
