apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8d1839e3-c70e-4332-912b-ad9456c3c5c0.fullname" . }}
  labels:
    {{- include "go-echo8d1839e3-c70e-4332-912b-ad9456c3c5c0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8d1839e3-c70e-4332-912b-ad9456c3c5c0.selectorLabels" . | nindent 6 }}
