apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo46b96b04-f84f-4ebb-8b97-0ca19c397554.fullname" . }}
  labels:
    {{- include "go-echo46b96b04-f84f-4ebb-8b97-0ca19c397554.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo46b96b04-f84f-4ebb-8b97-0ca19c397554.selectorLabels" . | nindent 6 }}
