apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1abfe48d-fce5-49b2-a36b-ab6b42794bdc.fullname" . }}
  labels:
    {{- include "go-echo1abfe48d-fce5-49b2-a36b-ab6b42794bdc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1abfe48d-fce5-49b2-a36b-ab6b42794bdc.selectorLabels" . | nindent 6 }}
