apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocccf96b2-de90-467b-b401-1a3180eb8a68.fullname" . }}
  labels:
    {{- include "go-echocccf96b2-de90-467b-b401-1a3180eb8a68.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocccf96b2-de90-467b-b401-1a3180eb8a68.selectorLabels" . | nindent 6 }}
