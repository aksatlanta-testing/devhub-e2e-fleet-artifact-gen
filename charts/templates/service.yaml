apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo99d69a9f-d225-40ee-a532-f6ed7a56223b.fullname" . }}
  labels:
    {{- include "go-echo99d69a9f-d225-40ee-a532-f6ed7a56223b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo99d69a9f-d225-40ee-a532-f6ed7a56223b.selectorLabels" . | nindent 6 }}
