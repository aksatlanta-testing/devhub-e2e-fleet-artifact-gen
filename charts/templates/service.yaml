apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe08fd4b5-2207-480a-900a-073c3fea5654.fullname" . }}
  labels:
    {{- include "go-echoe08fd4b5-2207-480a-900a-073c3fea5654.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe08fd4b5-2207-480a-900a-073c3fea5654.selectorLabels" . | nindent 6 }}
