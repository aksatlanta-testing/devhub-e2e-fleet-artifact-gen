apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5c791612-d0f8-4ec7-bff8-e5c0bc5d00cb.fullname" . }}
  labels:
    {{- include "go-echo5c791612-d0f8-4ec7-bff8-e5c0bc5d00cb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5c791612-d0f8-4ec7-bff8-e5c0bc5d00cb.selectorLabels" . | nindent 6 }}
