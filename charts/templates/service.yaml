apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0e281c12-c244-4778-991f-a232921ae65b.fullname" . }}
  labels:
    {{- include "go-echo0e281c12-c244-4778-991f-a232921ae65b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0e281c12-c244-4778-991f-a232921ae65b.selectorLabels" . | nindent 6 }}
