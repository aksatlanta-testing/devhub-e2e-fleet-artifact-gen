apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo690844f9-77da-44bb-ab96-5135f503cebe.fullname" . }}
  labels:
    {{- include "go-echo690844f9-77da-44bb-ab96-5135f503cebe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo690844f9-77da-44bb-ab96-5135f503cebe.selectorLabels" . | nindent 6 }}
