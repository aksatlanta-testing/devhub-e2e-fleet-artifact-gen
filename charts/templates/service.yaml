apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob1a44f04-1b24-4769-9898-dfb36c7e6e72.fullname" . }}
  labels:
    {{- include "go-echob1a44f04-1b24-4769-9898-dfb36c7e6e72.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob1a44f04-1b24-4769-9898-dfb36c7e6e72.selectorLabels" . | nindent 6 }}
