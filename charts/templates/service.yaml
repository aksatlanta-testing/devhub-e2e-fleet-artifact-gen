apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob9f9624a-024b-4adf-bceb-e4444ae6141e.fullname" . }}
  labels:
    {{- include "go-echob9f9624a-024b-4adf-bceb-e4444ae6141e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob9f9624a-024b-4adf-bceb-e4444ae6141e.selectorLabels" . | nindent 6 }}
