apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocc81bee3-e59d-485a-960c-9beb5eb5eb00.fullname" . }}
  labels:
    {{- include "go-echocc81bee3-e59d-485a-960c-9beb5eb5eb00.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocc81bee3-e59d-485a-960c-9beb5eb5eb00.selectorLabels" . | nindent 6 }}
