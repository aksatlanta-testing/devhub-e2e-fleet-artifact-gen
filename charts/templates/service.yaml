apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof4b99f49-3480-41c1-9f92-fdbde05f9c38.fullname" . }}
  labels:
    {{- include "go-echof4b99f49-3480-41c1-9f92-fdbde05f9c38.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof4b99f49-3480-41c1-9f92-fdbde05f9c38.selectorLabels" . | nindent 6 }}
