apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc6746f1f-d4e4-41cb-a917-82e55a0d494b.fullname" . }}
  labels:
    {{- include "go-echoc6746f1f-d4e4-41cb-a917-82e55a0d494b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc6746f1f-d4e4-41cb-a917-82e55a0d494b.selectorLabels" . | nindent 6 }}
