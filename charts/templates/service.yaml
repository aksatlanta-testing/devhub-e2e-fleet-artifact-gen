apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa59138db-304e-43d8-bc8e-d2710dc30ba9.fullname" . }}
  labels:
    {{- include "go-echoa59138db-304e-43d8-bc8e-d2710dc30ba9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa59138db-304e-43d8-bc8e-d2710dc30ba9.selectorLabels" . | nindent 6 }}
