apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo429c418a-c55e-4463-8999-27df9e926627.fullname" . }}
  labels:
    {{- include "go-echo429c418a-c55e-4463-8999-27df9e926627.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo429c418a-c55e-4463-8999-27df9e926627.selectorLabels" . | nindent 6 }}
