apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo40298f59-44af-4ad5-a03d-3f6dd5986c96.fullname" . }}
  labels:
    {{- include "go-echo40298f59-44af-4ad5-a03d-3f6dd5986c96.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo40298f59-44af-4ad5-a03d-3f6dd5986c96.selectorLabels" . | nindent 6 }}
