apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo089423db-103b-4dfe-a1e2-4f965b18be37.fullname" . }}
  labels:
    {{- include "go-echo089423db-103b-4dfe-a1e2-4f965b18be37.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo089423db-103b-4dfe-a1e2-4f965b18be37.selectorLabels" . | nindent 6 }}
