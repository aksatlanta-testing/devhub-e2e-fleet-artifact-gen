apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo22440a8e-eb26-4dac-a8f6-e199b6c446af.fullname" . }}
  labels:
    {{- include "go-echo22440a8e-eb26-4dac-a8f6-e199b6c446af.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo22440a8e-eb26-4dac-a8f6-e199b6c446af.selectorLabels" . | nindent 6 }}
