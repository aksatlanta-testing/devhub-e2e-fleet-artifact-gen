apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo559d618c-2cd8-4b38-9192-2405ee0e43cc.fullname" . }}
  labels:
    {{- include "go-echo559d618c-2cd8-4b38-9192-2405ee0e43cc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo559d618c-2cd8-4b38-9192-2405ee0e43cc.selectorLabels" . | nindent 6 }}
