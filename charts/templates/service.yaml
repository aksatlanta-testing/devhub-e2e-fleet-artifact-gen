apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo76c460b6-7040-456c-8aee-b39c08775973.fullname" . }}
  labels:
    {{- include "go-echo76c460b6-7040-456c-8aee-b39c08775973.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo76c460b6-7040-456c-8aee-b39c08775973.selectorLabels" . | nindent 6 }}
