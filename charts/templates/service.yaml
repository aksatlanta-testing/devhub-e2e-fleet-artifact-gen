apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob6b0d40b-15d0-4791-8312-a9eed4b1b99b.fullname" . }}
  labels:
    {{- include "go-echob6b0d40b-15d0-4791-8312-a9eed4b1b99b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob6b0d40b-15d0-4791-8312-a9eed4b1b99b.selectorLabels" . | nindent 6 }}
