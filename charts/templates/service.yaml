apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoeec55f9d-8e60-4534-8f79-85ee3faad42f.fullname" . }}
  labels:
    {{- include "go-echoeec55f9d-8e60-4534-8f79-85ee3faad42f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoeec55f9d-8e60-4534-8f79-85ee3faad42f.selectorLabels" . | nindent 6 }}
