apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5ce43840-d3ba-417b-ba35-aef1954b5ff0.fullname" . }}
  labels:
    {{- include "go-echo5ce43840-d3ba-417b-ba35-aef1954b5ff0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5ce43840-d3ba-417b-ba35-aef1954b5ff0.selectorLabels" . | nindent 6 }}
