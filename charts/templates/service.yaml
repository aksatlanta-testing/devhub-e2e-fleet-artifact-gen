apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoadf8383a-6d4d-4cba-ba17-e1ff6d784498.fullname" . }}
  labels:
    {{- include "go-echoadf8383a-6d4d-4cba-ba17-e1ff6d784498.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoadf8383a-6d4d-4cba-ba17-e1ff6d784498.selectorLabels" . | nindent 6 }}
