apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo88f68dea-25fc-4222-8eec-600264f472d3.fullname" . }}
  labels:
    {{- include "go-echo88f68dea-25fc-4222-8eec-600264f472d3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo88f68dea-25fc-4222-8eec-600264f472d3.selectorLabels" . | nindent 6 }}
