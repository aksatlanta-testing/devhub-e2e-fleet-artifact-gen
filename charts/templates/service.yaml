apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6fd85811-020a-4734-8552-3fc21332976d.fullname" . }}
  labels:
    {{- include "go-echo6fd85811-020a-4734-8552-3fc21332976d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6fd85811-020a-4734-8552-3fc21332976d.selectorLabels" . | nindent 6 }}
