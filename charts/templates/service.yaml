apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo908e6434-6d98-4ca9-b9c5-bc804fd1e7fc.fullname" . }}
  labels:
    {{- include "go-echo908e6434-6d98-4ca9-b9c5-bc804fd1e7fc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo908e6434-6d98-4ca9-b9c5-bc804fd1e7fc.selectorLabels" . | nindent 6 }}
