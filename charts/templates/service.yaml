apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo93821563-fc02-45a7-8a5d-da52bd79cb6b.fullname" . }}
  labels:
    {{- include "go-echo93821563-fc02-45a7-8a5d-da52bd79cb6b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo93821563-fc02-45a7-8a5d-da52bd79cb6b.selectorLabels" . | nindent 6 }}
