apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobd57c38f-0f03-4a86-b6a7-ac99434bd439.fullname" . }}
  labels:
    {{- include "go-echobd57c38f-0f03-4a86-b6a7-ac99434bd439.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobd57c38f-0f03-4a86-b6a7-ac99434bd439.selectorLabels" . | nindent 6 }}
