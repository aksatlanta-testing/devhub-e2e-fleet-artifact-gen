apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodc8c21f7-93dc-4d09-971d-bf41813355ef.fullname" . }}
  labels:
    {{- include "go-echodc8c21f7-93dc-4d09-971d-bf41813355ef.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodc8c21f7-93dc-4d09-971d-bf41813355ef.selectorLabels" . | nindent 6 }}
