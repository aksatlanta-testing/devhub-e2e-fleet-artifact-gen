apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo821ef16a-7924-466d-a8d3-0493c6f27603.fullname" . }}
  labels:
    {{- include "go-echo821ef16a-7924-466d-a8d3-0493c6f27603.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo821ef16a-7924-466d-a8d3-0493c6f27603.selectorLabels" . | nindent 6 }}
