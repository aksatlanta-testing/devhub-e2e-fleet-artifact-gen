apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo785f1760-c6ed-44f9-b281-c08590fcece2.fullname" . }}
  labels:
    {{- include "go-echo785f1760-c6ed-44f9-b281-c08590fcece2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo785f1760-c6ed-44f9-b281-c08590fcece2.selectorLabels" . | nindent 6 }}
