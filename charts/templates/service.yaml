apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo86149b41-f2e2-406c-8cd1-763325308acc.fullname" . }}
  labels:
    {{- include "go-echo86149b41-f2e2-406c-8cd1-763325308acc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo86149b41-f2e2-406c-8cd1-763325308acc.selectorLabels" . | nindent 6 }}
