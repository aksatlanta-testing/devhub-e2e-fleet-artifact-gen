apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8e6e9d0c-dc7b-4e2c-8579-67cb02b18513.fullname" . }}
  labels:
    {{- include "go-echo8e6e9d0c-dc7b-4e2c-8579-67cb02b18513.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8e6e9d0c-dc7b-4e2c-8579-67cb02b18513.selectorLabels" . | nindent 6 }}
