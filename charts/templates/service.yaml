apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe11712ce-5450-4dc2-b27a-071b06a9a76a.fullname" . }}
  labels:
    {{- include "go-echoe11712ce-5450-4dc2-b27a-071b06a9a76a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe11712ce-5450-4dc2-b27a-071b06a9a76a.selectorLabels" . | nindent 6 }}
