apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3e1cead3-b4a1-4b87-ae0c-d38124decfe0.fullname" . }}
  labels:
    {{- include "go-echo3e1cead3-b4a1-4b87-ae0c-d38124decfe0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3e1cead3-b4a1-4b87-ae0c-d38124decfe0.selectorLabels" . | nindent 6 }}
