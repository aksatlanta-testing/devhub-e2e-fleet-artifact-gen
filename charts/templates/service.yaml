apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4d12fb55-e23f-4f4b-a340-5db98ff60770.fullname" . }}
  labels:
    {{- include "go-echo4d12fb55-e23f-4f4b-a340-5db98ff60770.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4d12fb55-e23f-4f4b-a340-5db98ff60770.selectorLabels" . | nindent 6 }}
