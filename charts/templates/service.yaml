apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo03bb0d06-33c8-4263-a48f-85fd714ffc07.fullname" . }}
  labels:
    {{- include "go-echo03bb0d06-33c8-4263-a48f-85fd714ffc07.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo03bb0d06-33c8-4263-a48f-85fd714ffc07.selectorLabels" . | nindent 6 }}
