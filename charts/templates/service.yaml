apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4ffa1fa8-3eac-485b-ac68-f3d02043a0aa.fullname" . }}
  labels:
    {{- include "go-echo4ffa1fa8-3eac-485b-ac68-f3d02043a0aa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4ffa1fa8-3eac-485b-ac68-f3d02043a0aa.selectorLabels" . | nindent 6 }}
