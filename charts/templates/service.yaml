apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod0950dca-0769-4729-9801-614eea390078.fullname" . }}
  labels:
    {{- include "go-echod0950dca-0769-4729-9801-614eea390078.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod0950dca-0769-4729-9801-614eea390078.selectorLabels" . | nindent 6 }}
