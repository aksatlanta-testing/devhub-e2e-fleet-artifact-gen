apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0c2db3fe-5cda-45a9-8d20-5a499e4ebdb2.fullname" . }}
  labels:
    {{- include "go-echo0c2db3fe-5cda-45a9-8d20-5a499e4ebdb2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0c2db3fe-5cda-45a9-8d20-5a499e4ebdb2.selectorLabels" . | nindent 6 }}
