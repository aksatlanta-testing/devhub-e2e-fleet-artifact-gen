apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc28ecfdd-bbdc-459a-bb59-4ec1708b4047.fullname" . }}
  labels:
    {{- include "go-echoc28ecfdd-bbdc-459a-bb59-4ec1708b4047.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc28ecfdd-bbdc-459a-bb59-4ec1708b4047.selectorLabels" . | nindent 6 }}
