apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9c420333-2cbc-4099-b1a0-8fc32f8f4b6a.fullname" . }}
  labels:
    {{- include "go-echo9c420333-2cbc-4099-b1a0-8fc32f8f4b6a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9c420333-2cbc-4099-b1a0-8fc32f8f4b6a.selectorLabels" . | nindent 6 }}
