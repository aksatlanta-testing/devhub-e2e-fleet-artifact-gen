apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6029c105-9552-462d-a87c-d911938143d6.fullname" . }}
  labels:
    {{- include "go-echo6029c105-9552-462d-a87c-d911938143d6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6029c105-9552-462d-a87c-d911938143d6.selectorLabels" . | nindent 6 }}
