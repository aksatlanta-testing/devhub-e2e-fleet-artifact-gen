apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo584ac305-f336-48d3-b7a8-9b7d2d0e36cb.fullname" . }}
  labels:
    {{- include "go-echo584ac305-f336-48d3-b7a8-9b7d2d0e36cb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo584ac305-f336-48d3-b7a8-9b7d2d0e36cb.selectorLabels" . | nindent 6 }}
