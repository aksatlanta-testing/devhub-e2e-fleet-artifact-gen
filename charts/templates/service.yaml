apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9fadac72-9cef-499e-96b1-73ae9ba13412.fullname" . }}
  labels:
    {{- include "go-echo9fadac72-9cef-499e-96b1-73ae9ba13412.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9fadac72-9cef-499e-96b1-73ae9ba13412.selectorLabels" . | nindent 6 }}
