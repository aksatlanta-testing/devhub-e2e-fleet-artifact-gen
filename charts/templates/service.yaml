apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof18c65a7-9627-4334-be86-953d01abceee.fullname" . }}
  labels:
    {{- include "go-echof18c65a7-9627-4334-be86-953d01abceee.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof18c65a7-9627-4334-be86-953d01abceee.selectorLabels" . | nindent 6 }}
