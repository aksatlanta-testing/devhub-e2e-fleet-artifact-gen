apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2c12c728-2412-4fd3-822f-e8bb9c04ab2b.fullname" . }}
  labels:
    {{- include "go-echo2c12c728-2412-4fd3-822f-e8bb9c04ab2b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2c12c728-2412-4fd3-822f-e8bb9c04ab2b.selectorLabels" . | nindent 6 }}
