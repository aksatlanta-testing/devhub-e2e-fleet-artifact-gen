apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa58da5b3-aa5d-4d19-aba0-d220b88549fc.fullname" . }}
  labels:
    {{- include "go-echoa58da5b3-aa5d-4d19-aba0-d220b88549fc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa58da5b3-aa5d-4d19-aba0-d220b88549fc.selectorLabels" . | nindent 6 }}
