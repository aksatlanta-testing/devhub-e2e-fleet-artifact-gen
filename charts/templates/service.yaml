apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4544670b-841d-49c2-b1f6-3d4f197a5940.fullname" . }}
  labels:
    {{- include "go-echo4544670b-841d-49c2-b1f6-3d4f197a5940.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4544670b-841d-49c2-b1f6-3d4f197a5940.selectorLabels" . | nindent 6 }}
