apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5c8efa70-af76-4bbc-b955-656543126d4b.fullname" . }}
  labels:
    {{- include "go-echo5c8efa70-af76-4bbc-b955-656543126d4b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5c8efa70-af76-4bbc-b955-656543126d4b.selectorLabels" . | nindent 6 }}
