apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodec836fd-2f79-4743-a047-e8a30801befa.fullname" . }}
  labels:
    {{- include "go-echodec836fd-2f79-4743-a047-e8a30801befa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodec836fd-2f79-4743-a047-e8a30801befa.selectorLabels" . | nindent 6 }}
