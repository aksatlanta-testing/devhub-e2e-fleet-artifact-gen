apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe9faf3ab-4cad-4abf-86a9-ab26aba044df.fullname" . }}
  labels:
    {{- include "go-echoe9faf3ab-4cad-4abf-86a9-ab26aba044df.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe9faf3ab-4cad-4abf-86a9-ab26aba044df.selectorLabels" . | nindent 6 }}
