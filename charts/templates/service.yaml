apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa1769421-8502-4675-8fa4-ec8c938d3ec4.fullname" . }}
  labels:
    {{- include "go-echoa1769421-8502-4675-8fa4-ec8c938d3ec4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa1769421-8502-4675-8fa4-ec8c938d3ec4.selectorLabels" . | nindent 6 }}
