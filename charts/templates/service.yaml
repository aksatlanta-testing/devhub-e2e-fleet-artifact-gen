apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa8a4bb1a-2657-4d4b-bc21-b355d14057d3.fullname" . }}
  labels:
    {{- include "go-echoa8a4bb1a-2657-4d4b-bc21-b355d14057d3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa8a4bb1a-2657-4d4b-bc21-b355d14057d3.selectorLabels" . | nindent 6 }}
