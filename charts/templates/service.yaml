apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod0a128d9-a785-480c-ba51-39756885fec0.fullname" . }}
  labels:
    {{- include "go-echod0a128d9-a785-480c-ba51-39756885fec0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod0a128d9-a785-480c-ba51-39756885fec0.selectorLabels" . | nindent 6 }}
