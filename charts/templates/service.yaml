apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6080ec72-aeb1-4d7b-8956-49f8ab3683cb.fullname" . }}
  labels:
    {{- include "go-echo6080ec72-aeb1-4d7b-8956-49f8ab3683cb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6080ec72-aeb1-4d7b-8956-49f8ab3683cb.selectorLabels" . | nindent 6 }}
