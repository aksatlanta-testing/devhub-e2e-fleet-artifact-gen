apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof503c8f5-c2f7-49b7-a446-e212c9dbdc2d.fullname" . }}
  labels:
    {{- include "go-echof503c8f5-c2f7-49b7-a446-e212c9dbdc2d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof503c8f5-c2f7-49b7-a446-e212c9dbdc2d.selectorLabels" . | nindent 6 }}
