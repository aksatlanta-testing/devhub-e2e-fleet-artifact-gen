apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6419c7a7-ac1a-4f3d-922f-f2d586e4dd3b.fullname" . }}
  labels:
    {{- include "go-echo6419c7a7-ac1a-4f3d-922f-f2d586e4dd3b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6419c7a7-ac1a-4f3d-922f-f2d586e4dd3b.selectorLabels" . | nindent 6 }}
