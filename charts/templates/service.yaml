apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo667db551-e868-4a9d-ad69-dc91ddabcec5.fullname" . }}
  labels:
    {{- include "go-echo667db551-e868-4a9d-ad69-dc91ddabcec5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo667db551-e868-4a9d-ad69-dc91ddabcec5.selectorLabels" . | nindent 6 }}
