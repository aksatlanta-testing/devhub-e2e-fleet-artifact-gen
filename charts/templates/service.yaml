apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo206f2280-c2c5-418c-a1c0-b3a9fd07039e.fullname" . }}
  labels:
    {{- include "go-echo206f2280-c2c5-418c-a1c0-b3a9fd07039e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo206f2280-c2c5-418c-a1c0-b3a9fd07039e.selectorLabels" . | nindent 6 }}
