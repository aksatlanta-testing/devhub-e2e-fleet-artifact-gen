apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3cf02811-259c-4464-8c9d-2bbe49a496e8.fullname" . }}
  labels:
    {{- include "go-echo3cf02811-259c-4464-8c9d-2bbe49a496e8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3cf02811-259c-4464-8c9d-2bbe49a496e8.selectorLabels" . | nindent 6 }}
