apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobfe903ae-2322-4d8d-bc7a-e505d6fde421.fullname" . }}
  labels:
    {{- include "go-echobfe903ae-2322-4d8d-bc7a-e505d6fde421.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobfe903ae-2322-4d8d-bc7a-e505d6fde421.selectorLabels" . | nindent 6 }}
