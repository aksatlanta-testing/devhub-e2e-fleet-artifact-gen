apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe8b09bc6-efe5-4015-b48a-e8f7eec5cb29.fullname" . }}
  labels:
    {{- include "go-echoe8b09bc6-efe5-4015-b48a-e8f7eec5cb29.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe8b09bc6-efe5-4015-b48a-e8f7eec5cb29.selectorLabels" . | nindent 6 }}
