apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo729041c8-c4c0-4084-986f-7eab039bc2f4.fullname" . }}
  labels:
    {{- include "go-echo729041c8-c4c0-4084-986f-7eab039bc2f4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo729041c8-c4c0-4084-986f-7eab039bc2f4.selectorLabels" . | nindent 6 }}
