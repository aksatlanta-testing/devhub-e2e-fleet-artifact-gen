apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof0d90b02-ebf5-48da-b1c5-098a121b7912.fullname" . }}
  labels:
    {{- include "go-echof0d90b02-ebf5-48da-b1c5-098a121b7912.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof0d90b02-ebf5-48da-b1c5-098a121b7912.selectorLabels" . | nindent 6 }}
