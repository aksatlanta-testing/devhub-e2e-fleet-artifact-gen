apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5124f865-4b32-49f2-b80d-0dff4f76c025.fullname" . }}
  labels:
    {{- include "go-echo5124f865-4b32-49f2-b80d-0dff4f76c025.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5124f865-4b32-49f2-b80d-0dff4f76c025.selectorLabels" . | nindent 6 }}
