apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobaac7993-b4e2-4f25-8bcb-81669d0cccdb.fullname" . }}
  labels:
    {{- include "go-echobaac7993-b4e2-4f25-8bcb-81669d0cccdb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobaac7993-b4e2-4f25-8bcb-81669d0cccdb.selectorLabels" . | nindent 6 }}
