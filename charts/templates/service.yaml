apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6af22eb8-e782-4b84-9b57-338633f4b5cc.fullname" . }}
  labels:
    {{- include "go-echo6af22eb8-e782-4b84-9b57-338633f4b5cc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6af22eb8-e782-4b84-9b57-338633f4b5cc.selectorLabels" . | nindent 6 }}
