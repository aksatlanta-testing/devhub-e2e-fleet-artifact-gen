apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4615473d-80d1-4967-bb69-f191d38a30c6.fullname" . }}
  labels:
    {{- include "go-echo4615473d-80d1-4967-bb69-f191d38a30c6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4615473d-80d1-4967-bb69-f191d38a30c6.selectorLabels" . | nindent 6 }}
