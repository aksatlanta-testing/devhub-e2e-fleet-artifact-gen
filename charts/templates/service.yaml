apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo332b2fb8-9abf-49b4-86c4-d93b34ee76fb.fullname" . }}
  labels:
    {{- include "go-echo332b2fb8-9abf-49b4-86c4-d93b34ee76fb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo332b2fb8-9abf-49b4-86c4-d93b34ee76fb.selectorLabels" . | nindent 6 }}
