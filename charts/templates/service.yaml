apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo53ae1ff1-f6ec-4058-9849-71358d81ae59.fullname" . }}
  labels:
    {{- include "go-echo53ae1ff1-f6ec-4058-9849-71358d81ae59.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo53ae1ff1-f6ec-4058-9849-71358d81ae59.selectorLabels" . | nindent 6 }}
