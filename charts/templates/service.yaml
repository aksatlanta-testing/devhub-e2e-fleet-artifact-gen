apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2cdafb39-a934-44d4-a91a-97a6b7c18392.fullname" . }}
  labels:
    {{- include "go-echo2cdafb39-a934-44d4-a91a-97a6b7c18392.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2cdafb39-a934-44d4-a91a-97a6b7c18392.selectorLabels" . | nindent 6 }}
