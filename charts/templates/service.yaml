apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe5c82cef-e498-4656-86fb-423d0c433efb.fullname" . }}
  labels:
    {{- include "go-echoe5c82cef-e498-4656-86fb-423d0c433efb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe5c82cef-e498-4656-86fb-423d0c433efb.selectorLabels" . | nindent 6 }}
