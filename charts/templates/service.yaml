apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo03581c9d-87d0-4a17-87cd-4f6d27e4c874.fullname" . }}
  labels:
    {{- include "go-echo03581c9d-87d0-4a17-87cd-4f6d27e4c874.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo03581c9d-87d0-4a17-87cd-4f6d27e4c874.selectorLabels" . | nindent 6 }}
