apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1024400f-e349-4867-b89c-fe1a584f4835.fullname" . }}
  labels:
    {{- include "go-echo1024400f-e349-4867-b89c-fe1a584f4835.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1024400f-e349-4867-b89c-fe1a584f4835.selectorLabels" . | nindent 6 }}
