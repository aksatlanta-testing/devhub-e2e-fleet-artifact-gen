apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo52e1ff4c-b0d4-4746-80d4-982805f3088a.fullname" . }}
  labels:
    {{- include "go-echo52e1ff4c-b0d4-4746-80d4-982805f3088a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo52e1ff4c-b0d4-4746-80d4-982805f3088a.selectorLabels" . | nindent 6 }}
