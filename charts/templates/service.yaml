apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo087321bf-bf9c-42eb-8aff-300d40324d52.fullname" . }}
  labels:
    {{- include "go-echo087321bf-bf9c-42eb-8aff-300d40324d52.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo087321bf-bf9c-42eb-8aff-300d40324d52.selectorLabels" . | nindent 6 }}
