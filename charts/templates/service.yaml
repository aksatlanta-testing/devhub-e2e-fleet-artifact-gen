apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9d0624b8-cd1a-4c1d-8163-d61afcd35bca.fullname" . }}
  labels:
    {{- include "go-echo9d0624b8-cd1a-4c1d-8163-d61afcd35bca.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9d0624b8-cd1a-4c1d-8163-d61afcd35bca.selectorLabels" . | nindent 6 }}
