apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo17e4fe10-a985-45c7-b1fd-01954c17249a.fullname" . }}
  labels:
    {{- include "go-echo17e4fe10-a985-45c7-b1fd-01954c17249a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo17e4fe10-a985-45c7-b1fd-01954c17249a.selectorLabels" . | nindent 6 }}
