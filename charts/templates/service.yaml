apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof422e28a-fc2d-4f96-8496-b4537baa1dae.fullname" . }}
  labels:
    {{- include "go-echof422e28a-fc2d-4f96-8496-b4537baa1dae.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof422e28a-fc2d-4f96-8496-b4537baa1dae.selectorLabels" . | nindent 6 }}
