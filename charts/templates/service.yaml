apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo885342c4-3f36-4cd0-8a66-61efa3bedc60.fullname" . }}
  labels:
    {{- include "go-echo885342c4-3f36-4cd0-8a66-61efa3bedc60.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo885342c4-3f36-4cd0-8a66-61efa3bedc60.selectorLabels" . | nindent 6 }}
