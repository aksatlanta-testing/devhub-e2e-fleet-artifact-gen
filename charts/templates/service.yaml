apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7949155a-bb99-496f-a46e-dadc0c7b4b16.fullname" . }}
  labels:
    {{- include "go-echo7949155a-bb99-496f-a46e-dadc0c7b4b16.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7949155a-bb99-496f-a46e-dadc0c7b4b16.selectorLabels" . | nindent 6 }}
