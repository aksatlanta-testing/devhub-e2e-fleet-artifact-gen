apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3ec4a928-5020-496d-9a19-54013fc9b08e.fullname" . }}
  labels:
    {{- include "go-echo3ec4a928-5020-496d-9a19-54013fc9b08e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3ec4a928-5020-496d-9a19-54013fc9b08e.selectorLabels" . | nindent 6 }}
