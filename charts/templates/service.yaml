apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaf941f8c-3fb8-4f50-9ba0-5df8b22922a9.fullname" . }}
  labels:
    {{- include "go-echoaf941f8c-3fb8-4f50-9ba0-5df8b22922a9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaf941f8c-3fb8-4f50-9ba0-5df8b22922a9.selectorLabels" . | nindent 6 }}
