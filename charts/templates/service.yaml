apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3d5902d0-f341-439a-8cd8-85cdf604116f.fullname" . }}
  labels:
    {{- include "go-echo3d5902d0-f341-439a-8cd8-85cdf604116f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3d5902d0-f341-439a-8cd8-85cdf604116f.selectorLabels" . | nindent 6 }}
