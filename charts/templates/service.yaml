apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod9aca46c-138f-4633-bb5b-0108c956aece.fullname" . }}
  labels:
    {{- include "go-echod9aca46c-138f-4633-bb5b-0108c956aece.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod9aca46c-138f-4633-bb5b-0108c956aece.selectorLabels" . | nindent 6 }}
