apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4c3ea225-d140-4a1e-9d40-ef90499a0391.fullname" . }}
  labels:
    {{- include "go-echo4c3ea225-d140-4a1e-9d40-ef90499a0391.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4c3ea225-d140-4a1e-9d40-ef90499a0391.selectorLabels" . | nindent 6 }}
