apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9e4787e2-3a20-46b3-ad00-0becd0988f22.fullname" . }}
  labels:
    {{- include "go-echo9e4787e2-3a20-46b3-ad00-0becd0988f22.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9e4787e2-3a20-46b3-ad00-0becd0988f22.selectorLabels" . | nindent 6 }}
