apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo14e4c92c-e3b8-4fdc-b177-f1eb600babf1.fullname" . }}
  labels:
    {{- include "go-echo14e4c92c-e3b8-4fdc-b177-f1eb600babf1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo14e4c92c-e3b8-4fdc-b177-f1eb600babf1.selectorLabels" . | nindent 6 }}
