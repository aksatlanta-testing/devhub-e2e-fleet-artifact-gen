apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0cf5dae6-6ad1-496c-8034-90467b4ad203.fullname" . }}
  labels:
    {{- include "go-echo0cf5dae6-6ad1-496c-8034-90467b4ad203.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0cf5dae6-6ad1-496c-8034-90467b4ad203.selectorLabels" . | nindent 6 }}
