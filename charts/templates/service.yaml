apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9d094573-d4db-45f1-8ef7-d536b67b6bbe.fullname" . }}
  labels:
    {{- include "go-echo9d094573-d4db-45f1-8ef7-d536b67b6bbe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9d094573-d4db-45f1-8ef7-d536b67b6bbe.selectorLabels" . | nindent 6 }}
