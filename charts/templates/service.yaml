apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo91158fc0-5fba-484b-8ea0-92366be59d44.fullname" . }}
  labels:
    {{- include "go-echo91158fc0-5fba-484b-8ea0-92366be59d44.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo91158fc0-5fba-484b-8ea0-92366be59d44.selectorLabels" . | nindent 6 }}
