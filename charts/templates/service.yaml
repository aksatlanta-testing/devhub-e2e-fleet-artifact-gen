apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2fc1bbb3-0001-4663-a6c9-ef1ffc571b11.fullname" . }}
  labels:
    {{- include "go-echo2fc1bbb3-0001-4663-a6c9-ef1ffc571b11.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2fc1bbb3-0001-4663-a6c9-ef1ffc571b11.selectorLabels" . | nindent 6 }}
