apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofd10a573-f7ef-45b3-9a2b-090963e5a88d.fullname" . }}
  labels:
    {{- include "go-echofd10a573-f7ef-45b3-9a2b-090963e5a88d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofd10a573-f7ef-45b3-9a2b-090963e5a88d.selectorLabels" . | nindent 6 }}
