apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofb7c206c-1df6-4efc-bf80-9f9d371819be.fullname" . }}
  labels:
    {{- include "go-echofb7c206c-1df6-4efc-bf80-9f9d371819be.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofb7c206c-1df6-4efc-bf80-9f9d371819be.selectorLabels" . | nindent 6 }}
