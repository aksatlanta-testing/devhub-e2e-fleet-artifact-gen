apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc30a9ce5-fb95-4ad7-9b8a-ddb088728464.fullname" . }}
  labels:
    {{- include "go-echoc30a9ce5-fb95-4ad7-9b8a-ddb088728464.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc30a9ce5-fb95-4ad7-9b8a-ddb088728464.selectorLabels" . | nindent 6 }}
