apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo700af5a8-b04b-48d9-a8db-65d97c2e3200.fullname" . }}
  labels:
    {{- include "go-echo700af5a8-b04b-48d9-a8db-65d97c2e3200.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo700af5a8-b04b-48d9-a8db-65d97c2e3200.selectorLabels" . | nindent 6 }}
