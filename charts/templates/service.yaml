apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod8cf0d38-df79-4cd2-aab8-0940273c2a29.fullname" . }}
  labels:
    {{- include "go-echod8cf0d38-df79-4cd2-aab8-0940273c2a29.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod8cf0d38-df79-4cd2-aab8-0940273c2a29.selectorLabels" . | nindent 6 }}
