apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0cc08dd1-711f-4151-b261-23445b4d9634.fullname" . }}
  labels:
    {{- include "go-echo0cc08dd1-711f-4151-b261-23445b4d9634.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0cc08dd1-711f-4151-b261-23445b4d9634.selectorLabels" . | nindent 6 }}
