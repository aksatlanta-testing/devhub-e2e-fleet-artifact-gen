apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob6ff3680-27d4-40b7-9fac-2e2cde439f8e.fullname" . }}
  labels:
    {{- include "go-echob6ff3680-27d4-40b7-9fac-2e2cde439f8e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob6ff3680-27d4-40b7-9fac-2e2cde439f8e.selectorLabels" . | nindent 6 }}
