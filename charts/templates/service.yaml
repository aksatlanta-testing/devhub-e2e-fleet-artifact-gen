apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofe065f4f-5062-4bad-bd44-c0c76b578f0d.fullname" . }}
  labels:
    {{- include "go-echofe065f4f-5062-4bad-bd44-c0c76b578f0d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofe065f4f-5062-4bad-bd44-c0c76b578f0d.selectorLabels" . | nindent 6 }}
