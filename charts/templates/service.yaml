apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7eb3d25d-2e13-4dda-a0b6-b5be0e3daf1d.fullname" . }}
  labels:
    {{- include "go-echo7eb3d25d-2e13-4dda-a0b6-b5be0e3daf1d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7eb3d25d-2e13-4dda-a0b6-b5be0e3daf1d.selectorLabels" . | nindent 6 }}
