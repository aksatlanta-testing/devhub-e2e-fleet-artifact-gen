apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo04cc26ea-5c46-442e-9d77-28f9e8d5737b.fullname" . }}
  labels:
    {{- include "go-echo04cc26ea-5c46-442e-9d77-28f9e8d5737b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo04cc26ea-5c46-442e-9d77-28f9e8d5737b.selectorLabels" . | nindent 6 }}
