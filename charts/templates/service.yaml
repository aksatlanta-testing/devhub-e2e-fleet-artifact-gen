apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4502048a-fce2-408e-a0f7-0d49d7095512.fullname" . }}
  labels:
    {{- include "go-echo4502048a-fce2-408e-a0f7-0d49d7095512.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4502048a-fce2-408e-a0f7-0d49d7095512.selectorLabels" . | nindent 6 }}
