apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2adc19a5-e517-43c1-9759-58d914319bf7.fullname" . }}
  labels:
    {{- include "go-echo2adc19a5-e517-43c1-9759-58d914319bf7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2adc19a5-e517-43c1-9759-58d914319bf7.selectorLabels" . | nindent 6 }}
