apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa019c074-9e86-42ca-a41f-adb15c7608ad.fullname" . }}
  labels:
    {{- include "go-echoa019c074-9e86-42ca-a41f-adb15c7608ad.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa019c074-9e86-42ca-a41f-adb15c7608ad.selectorLabels" . | nindent 6 }}
