apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo95e816b6-20da-4dd6-b1e9-6a722d8f86af.fullname" . }}
  labels:
    {{- include "go-echo95e816b6-20da-4dd6-b1e9-6a722d8f86af.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo95e816b6-20da-4dd6-b1e9-6a722d8f86af.selectorLabels" . | nindent 6 }}
