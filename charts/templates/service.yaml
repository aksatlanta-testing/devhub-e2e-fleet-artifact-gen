apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4251f7f7-32f9-4da3-add6-c55ce68ad1a3.fullname" . }}
  labels:
    {{- include "go-echo4251f7f7-32f9-4da3-add6-c55ce68ad1a3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4251f7f7-32f9-4da3-add6-c55ce68ad1a3.selectorLabels" . | nindent 6 }}
