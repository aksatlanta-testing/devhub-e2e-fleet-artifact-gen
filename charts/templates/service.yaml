apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0f1218b7-9461-4989-976c-f338e05586a1.fullname" . }}
  labels:
    {{- include "go-echo0f1218b7-9461-4989-976c-f338e05586a1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0f1218b7-9461-4989-976c-f338e05586a1.selectorLabels" . | nindent 6 }}
