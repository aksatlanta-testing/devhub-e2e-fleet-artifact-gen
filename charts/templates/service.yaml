apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7ea550fe-f5e6-4420-9d65-16f6d95f2d0f.fullname" . }}
  labels:
    {{- include "go-echo7ea550fe-f5e6-4420-9d65-16f6d95f2d0f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7ea550fe-f5e6-4420-9d65-16f6d95f2d0f.selectorLabels" . | nindent 6 }}
