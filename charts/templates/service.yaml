apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0c5e5d49-8413-4065-be7e-f342b4829e3d.fullname" . }}
  labels:
    {{- include "go-echo0c5e5d49-8413-4065-be7e-f342b4829e3d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0c5e5d49-8413-4065-be7e-f342b4829e3d.selectorLabels" . | nindent 6 }}
