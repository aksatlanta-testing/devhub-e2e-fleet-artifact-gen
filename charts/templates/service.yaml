apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo72831e09-113d-4e8f-8d89-dd4c2d48f6a2.fullname" . }}
  labels:
    {{- include "go-echo72831e09-113d-4e8f-8d89-dd4c2d48f6a2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo72831e09-113d-4e8f-8d89-dd4c2d48f6a2.selectorLabels" . | nindent 6 }}
