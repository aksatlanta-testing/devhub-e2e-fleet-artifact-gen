apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaa97d695-b9ae-4493-a8fd-b942f657ebff.fullname" . }}
  labels:
    {{- include "go-echoaa97d695-b9ae-4493-a8fd-b942f657ebff.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaa97d695-b9ae-4493-a8fd-b942f657ebff.selectorLabels" . | nindent 6 }}
