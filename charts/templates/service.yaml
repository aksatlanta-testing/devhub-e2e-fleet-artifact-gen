apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodaa86bd4-78db-4691-a9f6-72c66a5ccb04.fullname" . }}
  labels:
    {{- include "go-echodaa86bd4-78db-4691-a9f6-72c66a5ccb04.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodaa86bd4-78db-4691-a9f6-72c66a5ccb04.selectorLabels" . | nindent 6 }}
