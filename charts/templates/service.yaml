apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo38c2b998-dd18-4c19-b810-3b213652d1aa.fullname" . }}
  labels:
    {{- include "go-echo38c2b998-dd18-4c19-b810-3b213652d1aa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo38c2b998-dd18-4c19-b810-3b213652d1aa.selectorLabels" . | nindent 6 }}
