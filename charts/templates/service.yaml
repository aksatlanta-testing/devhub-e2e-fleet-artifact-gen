apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1c2480a2-575f-4478-8db1-722926a5baa0.fullname" . }}
  labels:
    {{- include "go-echo1c2480a2-575f-4478-8db1-722926a5baa0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1c2480a2-575f-4478-8db1-722926a5baa0.selectorLabels" . | nindent 6 }}
