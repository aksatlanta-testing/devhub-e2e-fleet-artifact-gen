apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0a5f3cdc-5c87-4c47-b7f0-0dbe64255535.fullname" . }}
  labels:
    {{- include "go-echo0a5f3cdc-5c87-4c47-b7f0-0dbe64255535.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0a5f3cdc-5c87-4c47-b7f0-0dbe64255535.selectorLabels" . | nindent 6 }}
