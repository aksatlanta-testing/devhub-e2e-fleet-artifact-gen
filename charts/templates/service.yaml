apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoba980c85-3b9a-4b5d-86be-506a8768f320.fullname" . }}
  labels:
    {{- include "go-echoba980c85-3b9a-4b5d-86be-506a8768f320.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoba980c85-3b9a-4b5d-86be-506a8768f320.selectorLabels" . | nindent 6 }}
