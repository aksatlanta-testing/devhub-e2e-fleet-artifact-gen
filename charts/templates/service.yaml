apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob60e36f8-a1df-4cb2-8db2-566350fed2f3.fullname" . }}
  labels:
    {{- include "go-echob60e36f8-a1df-4cb2-8db2-566350fed2f3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob60e36f8-a1df-4cb2-8db2-566350fed2f3.selectorLabels" . | nindent 6 }}
