apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5d247b5f-f1af-4607-8294-d735de4a1b0e.fullname" . }}
  labels:
    {{- include "go-echo5d247b5f-f1af-4607-8294-d735de4a1b0e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5d247b5f-f1af-4607-8294-d735de4a1b0e.selectorLabels" . | nindent 6 }}
