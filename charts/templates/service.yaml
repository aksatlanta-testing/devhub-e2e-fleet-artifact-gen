apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3ec15470-8857-48d2-bfd9-605d087cbaeb.fullname" . }}
  labels:
    {{- include "go-echo3ec15470-8857-48d2-bfd9-605d087cbaeb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3ec15470-8857-48d2-bfd9-605d087cbaeb.selectorLabels" . | nindent 6 }}
