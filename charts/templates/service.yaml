apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0e492aaa-54fa-4908-87be-47ec9cf7696d.fullname" . }}
  labels:
    {{- include "go-echo0e492aaa-54fa-4908-87be-47ec9cf7696d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0e492aaa-54fa-4908-87be-47ec9cf7696d.selectorLabels" . | nindent 6 }}
