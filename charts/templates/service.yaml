apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4c36c338-31d4-448a-af9b-38d14cce708f.fullname" . }}
  labels:
    {{- include "go-echo4c36c338-31d4-448a-af9b-38d14cce708f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4c36c338-31d4-448a-af9b-38d14cce708f.selectorLabels" . | nindent 6 }}
