apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo13d95886-d64d-4efd-a48d-01ba756a8665.fullname" . }}
  labels:
    {{- include "go-echo13d95886-d64d-4efd-a48d-01ba756a8665.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo13d95886-d64d-4efd-a48d-01ba756a8665.selectorLabels" . | nindent 6 }}
