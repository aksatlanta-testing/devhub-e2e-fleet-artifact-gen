apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo094e6051-9c4d-4c22-bf41-9110a0503898.fullname" . }}
  labels:
    {{- include "go-echo094e6051-9c4d-4c22-bf41-9110a0503898.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo094e6051-9c4d-4c22-bf41-9110a0503898.selectorLabels" . | nindent 6 }}
