apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7bb493c1-1cfd-48a8-adb3-df73670c3452.fullname" . }}
  labels:
    {{- include "go-echo7bb493c1-1cfd-48a8-adb3-df73670c3452.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7bb493c1-1cfd-48a8-adb3-df73670c3452.selectorLabels" . | nindent 6 }}
