apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob13dc0a3-b4e5-459a-b979-c5e9a05f4b96.fullname" . }}
  labels:
    {{- include "go-echob13dc0a3-b4e5-459a-b979-c5e9a05f4b96.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob13dc0a3-b4e5-459a-b979-c5e9a05f4b96.selectorLabels" . | nindent 6 }}
