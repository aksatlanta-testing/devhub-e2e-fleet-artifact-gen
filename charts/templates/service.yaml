apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof762b6f2-1fbe-4b0e-9419-3fc42f2c9810.fullname" . }}
  labels:
    {{- include "go-echof762b6f2-1fbe-4b0e-9419-3fc42f2c9810.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof762b6f2-1fbe-4b0e-9419-3fc42f2c9810.selectorLabels" . | nindent 6 }}
