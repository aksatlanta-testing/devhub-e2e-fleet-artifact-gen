apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofc44eded-7020-4410-8533-2e0961182414.fullname" . }}
  labels:
    {{- include "go-echofc44eded-7020-4410-8533-2e0961182414.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofc44eded-7020-4410-8533-2e0961182414.selectorLabels" . | nindent 6 }}
