apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo34b67509-1e4c-4b46-a156-f80058e969b4.fullname" . }}
  labels:
    {{- include "go-echo34b67509-1e4c-4b46-a156-f80058e969b4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo34b67509-1e4c-4b46-a156-f80058e969b4.selectorLabels" . | nindent 6 }}
