apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofe2f4081-d3e5-4f01-9c2b-ecae9a3a329a.fullname" . }}
  labels:
    {{- include "go-echofe2f4081-d3e5-4f01-9c2b-ecae9a3a329a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofe2f4081-d3e5-4f01-9c2b-ecae9a3a329a.selectorLabels" . | nindent 6 }}
