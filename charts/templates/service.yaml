apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo951e4b3a-ac09-49b4-a7ad-595515525614.fullname" . }}
  labels:
    {{- include "go-echo951e4b3a-ac09-49b4-a7ad-595515525614.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo951e4b3a-ac09-49b4-a7ad-595515525614.selectorLabels" . | nindent 6 }}
