apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod5eb39fc-ec9f-471d-87c9-735cae7e667a.fullname" . }}
  labels:
    {{- include "go-echod5eb39fc-ec9f-471d-87c9-735cae7e667a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod5eb39fc-ec9f-471d-87c9-735cae7e667a.selectorLabels" . | nindent 6 }}
