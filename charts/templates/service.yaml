apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo49dc2aa7-2593-41b5-83a8-978e256dbe00.fullname" . }}
  labels:
    {{- include "go-echo49dc2aa7-2593-41b5-83a8-978e256dbe00.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo49dc2aa7-2593-41b5-83a8-978e256dbe00.selectorLabels" . | nindent 6 }}
