apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo67fce866-0f27-4d71-b6e9-1c7e7083eb0f.fullname" . }}
  labels:
    {{- include "go-echo67fce866-0f27-4d71-b6e9-1c7e7083eb0f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo67fce866-0f27-4d71-b6e9-1c7e7083eb0f.selectorLabels" . | nindent 6 }}
