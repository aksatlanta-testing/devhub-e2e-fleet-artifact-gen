apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9be6e68b-175e-4551-b102-5914286f7926.fullname" . }}
  labels:
    {{- include "go-echo9be6e68b-175e-4551-b102-5914286f7926.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9be6e68b-175e-4551-b102-5914286f7926.selectorLabels" . | nindent 6 }}
