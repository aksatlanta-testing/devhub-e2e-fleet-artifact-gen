apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoab576248-bc0b-4e1d-be5c-e164d39ca513.fullname" . }}
  labels:
    {{- include "go-echoab576248-bc0b-4e1d-be5c-e164d39ca513.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoab576248-bc0b-4e1d-be5c-e164d39ca513.selectorLabels" . | nindent 6 }}
