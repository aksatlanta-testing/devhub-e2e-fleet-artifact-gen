apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe039850b-0bca-4b4a-bb7e-60b8993d6284.fullname" . }}
  labels:
    {{- include "go-echoe039850b-0bca-4b4a-bb7e-60b8993d6284.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe039850b-0bca-4b4a-bb7e-60b8993d6284.selectorLabels" . | nindent 6 }}
