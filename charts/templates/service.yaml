apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob14eb627-a280-4fde-b718-c76998e7ad0b.fullname" . }}
  labels:
    {{- include "go-echob14eb627-a280-4fde-b718-c76998e7ad0b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob14eb627-a280-4fde-b718-c76998e7ad0b.selectorLabels" . | nindent 6 }}
