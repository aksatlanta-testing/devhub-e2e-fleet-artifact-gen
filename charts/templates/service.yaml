apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofd3e5ffe-7fd0-435a-803e-4c6ee5c58833.fullname" . }}
  labels:
    {{- include "go-echofd3e5ffe-7fd0-435a-803e-4c6ee5c58833.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofd3e5ffe-7fd0-435a-803e-4c6ee5c58833.selectorLabels" . | nindent 6 }}
