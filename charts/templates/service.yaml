apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod84b2b67-e4b4-4017-b485-d58d59d74a24.fullname" . }}
  labels:
    {{- include "go-echod84b2b67-e4b4-4017-b485-d58d59d74a24.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod84b2b67-e4b4-4017-b485-d58d59d74a24.selectorLabels" . | nindent 6 }}
