apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo36356964-d5c6-49cb-be41-c8f4dd5721a2.fullname" . }}
  labels:
    {{- include "go-echo36356964-d5c6-49cb-be41-c8f4dd5721a2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo36356964-d5c6-49cb-be41-c8f4dd5721a2.selectorLabels" . | nindent 6 }}
