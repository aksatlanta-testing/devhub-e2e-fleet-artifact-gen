apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo617e3d34-af89-459e-9263-242e625a20c3.fullname" . }}
  labels:
    {{- include "go-echo617e3d34-af89-459e-9263-242e625a20c3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo617e3d34-af89-459e-9263-242e625a20c3.selectorLabels" . | nindent 6 }}
