apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob98e8094-1439-4741-b0f3-34f7c7e22a7c.fullname" . }}
  labels:
    {{- include "go-echob98e8094-1439-4741-b0f3-34f7c7e22a7c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob98e8094-1439-4741-b0f3-34f7c7e22a7c.selectorLabels" . | nindent 6 }}
