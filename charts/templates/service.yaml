apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3a8b5cd7-0eb7-471d-b100-8ce38d2559e3.fullname" . }}
  labels:
    {{- include "go-echo3a8b5cd7-0eb7-471d-b100-8ce38d2559e3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3a8b5cd7-0eb7-471d-b100-8ce38d2559e3.selectorLabels" . | nindent 6 }}
