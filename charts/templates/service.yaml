apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0616d00d-ac49-4188-aef3-90cda490006c.fullname" . }}
  labels:
    {{- include "go-echo0616d00d-ac49-4188-aef3-90cda490006c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0616d00d-ac49-4188-aef3-90cda490006c.selectorLabels" . | nindent 6 }}
