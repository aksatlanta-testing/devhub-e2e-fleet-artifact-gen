apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo316af5f3-9b42-44be-bc9e-582d822fa02e.fullname" . }}
  labels:
    {{- include "go-echo316af5f3-9b42-44be-bc9e-582d822fa02e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo316af5f3-9b42-44be-bc9e-582d822fa02e.selectorLabels" . | nindent 6 }}
