apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo46c527eb-6597-4c22-be9f-8c2d5946e945.fullname" . }}
  labels:
    {{- include "go-echo46c527eb-6597-4c22-be9f-8c2d5946e945.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo46c527eb-6597-4c22-be9f-8c2d5946e945.selectorLabels" . | nindent 6 }}
