apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1c06c0d3-9a74-4b2e-a5b3-a397b001d340.fullname" . }}
  labels:
    {{- include "go-echo1c06c0d3-9a74-4b2e-a5b3-a397b001d340.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1c06c0d3-9a74-4b2e-a5b3-a397b001d340.selectorLabels" . | nindent 6 }}
