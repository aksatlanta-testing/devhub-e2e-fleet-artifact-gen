apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1ced8439-d97d-41cd-9525-37053fc2ddd2.fullname" . }}
  labels:
    {{- include "go-echo1ced8439-d97d-41cd-9525-37053fc2ddd2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1ced8439-d97d-41cd-9525-37053fc2ddd2.selectorLabels" . | nindent 6 }}
