apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe0bbf4cc-1136-42b5-9cf5-5ae13644d571.fullname" . }}
  labels:
    {{- include "go-echoe0bbf4cc-1136-42b5-9cf5-5ae13644d571.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe0bbf4cc-1136-42b5-9cf5-5ae13644d571.selectorLabels" . | nindent 6 }}
