apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofb35a9be-4a5e-46b5-b30d-a5bca77b1361.fullname" . }}
  labels:
    {{- include "go-echofb35a9be-4a5e-46b5-b30d-a5bca77b1361.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofb35a9be-4a5e-46b5-b30d-a5bca77b1361.selectorLabels" . | nindent 6 }}
