apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5be1ea58-51a4-4644-8665-cef76625f2e6.fullname" . }}
  labels:
    {{- include "go-echo5be1ea58-51a4-4644-8665-cef76625f2e6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5be1ea58-51a4-4644-8665-cef76625f2e6.selectorLabels" . | nindent 6 }}
