apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob919b30e-46d9-4167-8b5a-4f277a5bf32f.fullname" . }}
  labels:
    {{- include "go-echob919b30e-46d9-4167-8b5a-4f277a5bf32f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob919b30e-46d9-4167-8b5a-4f277a5bf32f.selectorLabels" . | nindent 6 }}
