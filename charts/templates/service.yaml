apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0a58368b-3b88-4b9b-84cb-71145695980e.fullname" . }}
  labels:
    {{- include "go-echo0a58368b-3b88-4b9b-84cb-71145695980e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0a58368b-3b88-4b9b-84cb-71145695980e.selectorLabels" . | nindent 6 }}
