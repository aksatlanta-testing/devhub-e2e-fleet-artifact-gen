apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof8fc532e-19eb-46ae-9c69-4c9c183bc66d.fullname" . }}
  labels:
    {{- include "go-echof8fc532e-19eb-46ae-9c69-4c9c183bc66d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof8fc532e-19eb-46ae-9c69-4c9c183bc66d.selectorLabels" . | nindent 6 }}
