apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob2b876ce-af5a-4d4a-930c-a936ef2cbf38.fullname" . }}
  labels:
    {{- include "go-echob2b876ce-af5a-4d4a-930c-a936ef2cbf38.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob2b876ce-af5a-4d4a-930c-a936ef2cbf38.selectorLabels" . | nindent 6 }}
