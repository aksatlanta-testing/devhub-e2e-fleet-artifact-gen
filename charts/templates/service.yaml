apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob42f8e18-d7a3-4e00-9eba-a311bf34d24e.fullname" . }}
  labels:
    {{- include "go-echob42f8e18-d7a3-4e00-9eba-a311bf34d24e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob42f8e18-d7a3-4e00-9eba-a311bf34d24e.selectorLabels" . | nindent 6 }}
