apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo93469b78-d396-472b-b02d-26e180eaff01.fullname" . }}
  labels:
    {{- include "go-echo93469b78-d396-472b-b02d-26e180eaff01.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo93469b78-d396-472b-b02d-26e180eaff01.selectorLabels" . | nindent 6 }}
