apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo661c0525-d0ea-4611-9eed-d8caeb08919c.fullname" . }}
  labels:
    {{- include "go-echo661c0525-d0ea-4611-9eed-d8caeb08919c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo661c0525-d0ea-4611-9eed-d8caeb08919c.selectorLabels" . | nindent 6 }}
