apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof7b2a2c4-b588-4d6f-8e9f-214c63d96601.fullname" . }}
  labels:
    {{- include "go-echof7b2a2c4-b588-4d6f-8e9f-214c63d96601.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof7b2a2c4-b588-4d6f-8e9f-214c63d96601.selectorLabels" . | nindent 6 }}
