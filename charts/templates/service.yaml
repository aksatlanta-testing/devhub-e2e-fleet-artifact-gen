apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo56b35fcf-cf65-471e-a849-527a97b42781.fullname" . }}
  labels:
    {{- include "go-echo56b35fcf-cf65-471e-a849-527a97b42781.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo56b35fcf-cf65-471e-a849-527a97b42781.selectorLabels" . | nindent 6 }}
