apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo83585206-c0dc-49d3-89c6-b92c8c63aa48.fullname" . }}
  labels:
    {{- include "go-echo83585206-c0dc-49d3-89c6-b92c8c63aa48.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo83585206-c0dc-49d3-89c6-b92c8c63aa48.selectorLabels" . | nindent 6 }}
