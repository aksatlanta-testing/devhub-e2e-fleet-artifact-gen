apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoda1ad478-8b95-4f14-941c-b550a69c531b.fullname" . }}
  labels:
    {{- include "go-echoda1ad478-8b95-4f14-941c-b550a69c531b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoda1ad478-8b95-4f14-941c-b550a69c531b.selectorLabels" . | nindent 6 }}
