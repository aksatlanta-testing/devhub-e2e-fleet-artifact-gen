apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4d19adf4-8890-4bcb-b799-eb0d94d5fb13.fullname" . }}
  labels:
    {{- include "go-echo4d19adf4-8890-4bcb-b799-eb0d94d5fb13.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4d19adf4-8890-4bcb-b799-eb0d94d5fb13.selectorLabels" . | nindent 6 }}
