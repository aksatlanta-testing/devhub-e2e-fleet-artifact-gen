apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3938ebb7-692f-4c6a-b1d6-136a08ae3ff9.fullname" . }}
  labels:
    {{- include "go-echo3938ebb7-692f-4c6a-b1d6-136a08ae3ff9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3938ebb7-692f-4c6a-b1d6-136a08ae3ff9.selectorLabels" . | nindent 6 }}
