apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo545f96ca-1db2-487a-acc1-660c04cc4a37.fullname" . }}
  labels:
    {{- include "go-echo545f96ca-1db2-487a-acc1-660c04cc4a37.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo545f96ca-1db2-487a-acc1-660c04cc4a37.selectorLabels" . | nindent 6 }}
