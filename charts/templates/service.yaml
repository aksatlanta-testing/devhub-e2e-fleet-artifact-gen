apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc1678178-63a3-4043-b726-d366dbf4c6f7.fullname" . }}
  labels:
    {{- include "go-echoc1678178-63a3-4043-b726-d366dbf4c6f7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc1678178-63a3-4043-b726-d366dbf4c6f7.selectorLabels" . | nindent 6 }}
