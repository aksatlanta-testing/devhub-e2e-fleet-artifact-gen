apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo996aba4d-3cc4-445d-9326-c7ada7d08226.fullname" . }}
  labels:
    {{- include "go-echo996aba4d-3cc4-445d-9326-c7ada7d08226.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo996aba4d-3cc4-445d-9326-c7ada7d08226.selectorLabels" . | nindent 6 }}
