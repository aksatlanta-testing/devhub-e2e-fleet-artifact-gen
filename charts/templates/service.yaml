apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0903c08d-8a98-4cae-8aff-d9487c5853db.fullname" . }}
  labels:
    {{- include "go-echo0903c08d-8a98-4cae-8aff-d9487c5853db.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0903c08d-8a98-4cae-8aff-d9487c5853db.selectorLabels" . | nindent 6 }}
