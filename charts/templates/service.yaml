apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoed509f0a-87b0-464e-83f0-b4f5edf951bf.fullname" . }}
  labels:
    {{- include "go-echoed509f0a-87b0-464e-83f0-b4f5edf951bf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoed509f0a-87b0-464e-83f0-b4f5edf951bf.selectorLabels" . | nindent 6 }}
