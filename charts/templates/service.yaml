apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo70d8b94b-7042-4469-b5ed-a80d77fa081e.fullname" . }}
  labels:
    {{- include "go-echo70d8b94b-7042-4469-b5ed-a80d77fa081e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo70d8b94b-7042-4469-b5ed-a80d77fa081e.selectorLabels" . | nindent 6 }}
