apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8042f35e-dfae-496e-b2e7-a9cefbade8cc.fullname" . }}
  labels:
    {{- include "go-echo8042f35e-dfae-496e-b2e7-a9cefbade8cc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8042f35e-dfae-496e-b2e7-a9cefbade8cc.selectorLabels" . | nindent 6 }}
