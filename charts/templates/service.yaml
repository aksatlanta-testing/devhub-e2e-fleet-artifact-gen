apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo639288fa-8dc5-4a8e-bea9-639412610575.fullname" . }}
  labels:
    {{- include "go-echo639288fa-8dc5-4a8e-bea9-639412610575.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo639288fa-8dc5-4a8e-bea9-639412610575.selectorLabels" . | nindent 6 }}
