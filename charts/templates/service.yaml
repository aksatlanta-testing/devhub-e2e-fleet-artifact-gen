apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo291315dd-6dcc-4cc4-b23d-37d2a1cc4cdb.fullname" . }}
  labels:
    {{- include "go-echo291315dd-6dcc-4cc4-b23d-37d2a1cc4cdb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo291315dd-6dcc-4cc4-b23d-37d2a1cc4cdb.selectorLabels" . | nindent 6 }}
