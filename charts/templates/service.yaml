apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo44415f23-d7ee-4a33-8e66-b855e1a8b715.fullname" . }}
  labels:
    {{- include "go-echo44415f23-d7ee-4a33-8e66-b855e1a8b715.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo44415f23-d7ee-4a33-8e66-b855e1a8b715.selectorLabels" . | nindent 6 }}
