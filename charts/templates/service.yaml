apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0108456d-bc1c-4889-889b-69c60eb6009e.fullname" . }}
  labels:
    {{- include "go-echo0108456d-bc1c-4889-889b-69c60eb6009e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0108456d-bc1c-4889-889b-69c60eb6009e.selectorLabels" . | nindent 6 }}
