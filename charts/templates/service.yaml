apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa3695902-c62a-4902-852c-57372e18be49.fullname" . }}
  labels:
    {{- include "go-echoa3695902-c62a-4902-852c-57372e18be49.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa3695902-c62a-4902-852c-57372e18be49.selectorLabels" . | nindent 6 }}
