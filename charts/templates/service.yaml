apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9de7fdee-a7f1-458f-9199-3681752849d7.fullname" . }}
  labels:
    {{- include "go-echo9de7fdee-a7f1-458f-9199-3681752849d7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9de7fdee-a7f1-458f-9199-3681752849d7.selectorLabels" . | nindent 6 }}
