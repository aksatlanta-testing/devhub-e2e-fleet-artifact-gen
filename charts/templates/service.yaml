apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoba4c38ca-1ad4-4e13-8dd6-6e105d3ba660.fullname" . }}
  labels:
    {{- include "go-echoba4c38ca-1ad4-4e13-8dd6-6e105d3ba660.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoba4c38ca-1ad4-4e13-8dd6-6e105d3ba660.selectorLabels" . | nindent 6 }}
