apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc68229eb-83fc-4503-b0c3-1db9ad388031.fullname" . }}
  labels:
    {{- include "go-echoc68229eb-83fc-4503-b0c3-1db9ad388031.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc68229eb-83fc-4503-b0c3-1db9ad388031.selectorLabels" . | nindent 6 }}
