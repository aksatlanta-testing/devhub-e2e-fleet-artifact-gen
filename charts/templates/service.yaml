apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo41f0cc66-2d30-44f7-9c7d-4ad48aa752b7.fullname" . }}
  labels:
    {{- include "go-echo41f0cc66-2d30-44f7-9c7d-4ad48aa752b7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo41f0cc66-2d30-44f7-9c7d-4ad48aa752b7.selectorLabels" . | nindent 6 }}
