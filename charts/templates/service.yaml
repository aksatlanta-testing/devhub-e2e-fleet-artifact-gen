apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo54d2d90d-aeca-4c12-9468-c93cfd8ab73b.fullname" . }}
  labels:
    {{- include "go-echo54d2d90d-aeca-4c12-9468-c93cfd8ab73b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo54d2d90d-aeca-4c12-9468-c93cfd8ab73b.selectorLabels" . | nindent 6 }}
