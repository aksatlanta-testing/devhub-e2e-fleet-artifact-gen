apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobcad1790-7af3-4bad-b1cd-813a687fa01d.fullname" . }}
  labels:
    {{- include "go-echobcad1790-7af3-4bad-b1cd-813a687fa01d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobcad1790-7af3-4bad-b1cd-813a687fa01d.selectorLabels" . | nindent 6 }}
