apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo774e8b4b-f892-4aa0-aca1-4259bd06bac9.fullname" . }}
  labels:
    {{- include "go-echo774e8b4b-f892-4aa0-aca1-4259bd06bac9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo774e8b4b-f892-4aa0-aca1-4259bd06bac9.selectorLabels" . | nindent 6 }}
