apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob486d355-2837-4b87-9143-b9aff0609c05.fullname" . }}
  labels:
    {{- include "go-echob486d355-2837-4b87-9143-b9aff0609c05.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob486d355-2837-4b87-9143-b9aff0609c05.selectorLabels" . | nindent 6 }}
