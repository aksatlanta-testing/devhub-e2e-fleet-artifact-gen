apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo797fa471-24d3-41a7-a4df-b0c2455019a5.fullname" . }}
  labels:
    {{- include "go-echo797fa471-24d3-41a7-a4df-b0c2455019a5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo797fa471-24d3-41a7-a4df-b0c2455019a5.selectorLabels" . | nindent 6 }}
