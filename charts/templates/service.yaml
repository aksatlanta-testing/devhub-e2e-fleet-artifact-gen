apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo236d67a3-a458-41e0-932c-4b5e702afd43.fullname" . }}
  labels:
    {{- include "go-echo236d67a3-a458-41e0-932c-4b5e702afd43.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo236d67a3-a458-41e0-932c-4b5e702afd43.selectorLabels" . | nindent 6 }}
