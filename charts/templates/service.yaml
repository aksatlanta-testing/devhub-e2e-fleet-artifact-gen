apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2e0fa05f-759d-45ff-8435-cd44033f1d39.fullname" . }}
  labels:
    {{- include "go-echo2e0fa05f-759d-45ff-8435-cd44033f1d39.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2e0fa05f-759d-45ff-8435-cd44033f1d39.selectorLabels" . | nindent 6 }}
