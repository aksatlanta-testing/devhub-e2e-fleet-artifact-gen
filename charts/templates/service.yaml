apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo15cacafc-b608-4493-9f42-147b04bf1504.fullname" . }}
  labels:
    {{- include "go-echo15cacafc-b608-4493-9f42-147b04bf1504.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo15cacafc-b608-4493-9f42-147b04bf1504.selectorLabels" . | nindent 6 }}
