apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoce07d157-6704-436c-a84f-160eee1eba37.fullname" . }}
  labels:
    {{- include "go-echoce07d157-6704-436c-a84f-160eee1eba37.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoce07d157-6704-436c-a84f-160eee1eba37.selectorLabels" . | nindent 6 }}
