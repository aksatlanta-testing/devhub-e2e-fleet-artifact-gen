apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1df8af40-6316-45e7-ba92-65b42b86da0f.fullname" . }}
  labels:
    {{- include "go-echo1df8af40-6316-45e7-ba92-65b42b86da0f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1df8af40-6316-45e7-ba92-65b42b86da0f.selectorLabels" . | nindent 6 }}
