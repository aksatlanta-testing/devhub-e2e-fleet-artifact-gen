apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8b28b181-d5b1-4188-aaee-67cc5821050d.fullname" . }}
  labels:
    {{- include "go-echo8b28b181-d5b1-4188-aaee-67cc5821050d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8b28b181-d5b1-4188-aaee-67cc5821050d.selectorLabels" . | nindent 6 }}
