apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof9d11610-584c-4ee8-bc2f-37b25b787a6e.fullname" . }}
  labels:
    {{- include "go-echof9d11610-584c-4ee8-bc2f-37b25b787a6e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof9d11610-584c-4ee8-bc2f-37b25b787a6e.selectorLabels" . | nindent 6 }}
