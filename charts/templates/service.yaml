apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc6bde5fa-d3f6-4568-b228-32e2fa42421d.fullname" . }}
  labels:
    {{- include "go-echoc6bde5fa-d3f6-4568-b228-32e2fa42421d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc6bde5fa-d3f6-4568-b228-32e2fa42421d.selectorLabels" . | nindent 6 }}
