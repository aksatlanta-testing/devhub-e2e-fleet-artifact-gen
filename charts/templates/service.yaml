apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe0f7114b-d86f-4efc-88fd-491117619e86.fullname" . }}
  labels:
    {{- include "go-echoe0f7114b-d86f-4efc-88fd-491117619e86.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe0f7114b-d86f-4efc-88fd-491117619e86.selectorLabels" . | nindent 6 }}
