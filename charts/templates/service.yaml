apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoab9e9f06-d95c-42d9-8f67-682a6bc3b680.fullname" . }}
  labels:
    {{- include "go-echoab9e9f06-d95c-42d9-8f67-682a6bc3b680.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoab9e9f06-d95c-42d9-8f67-682a6bc3b680.selectorLabels" . | nindent 6 }}
