apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof74d4607-b685-4ee7-b61f-1505f7296f1e.fullname" . }}
  labels:
    {{- include "go-echof74d4607-b685-4ee7-b61f-1505f7296f1e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof74d4607-b685-4ee7-b61f-1505f7296f1e.selectorLabels" . | nindent 6 }}
