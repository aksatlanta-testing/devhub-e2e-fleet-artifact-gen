apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4a60e04c-3df9-4c55-871b-404508933d81.fullname" . }}
  labels:
    {{- include "go-echo4a60e04c-3df9-4c55-871b-404508933d81.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4a60e04c-3df9-4c55-871b-404508933d81.selectorLabels" . | nindent 6 }}
