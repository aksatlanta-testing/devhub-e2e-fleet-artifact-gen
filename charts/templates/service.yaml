apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof716ab16-b13a-48da-9e5d-462f0f96e235.fullname" . }}
  labels:
    {{- include "go-echof716ab16-b13a-48da-9e5d-462f0f96e235.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof716ab16-b13a-48da-9e5d-462f0f96e235.selectorLabels" . | nindent 6 }}
