apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo455551d0-b90d-4399-a863-38f81c18d900.fullname" . }}
  labels:
    {{- include "go-echo455551d0-b90d-4399-a863-38f81c18d900.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo455551d0-b90d-4399-a863-38f81c18d900.selectorLabels" . | nindent 6 }}
