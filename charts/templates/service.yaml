apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoce2dd34c-fdf7-499f-9a2d-a21d4af06927.fullname" . }}
  labels:
    {{- include "go-echoce2dd34c-fdf7-499f-9a2d-a21d4af06927.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoce2dd34c-fdf7-499f-9a2d-a21d4af06927.selectorLabels" . | nindent 6 }}
