apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo10f20dff-1782-458f-a357-6125dc445e61.fullname" . }}
  labels:
    {{- include "go-echo10f20dff-1782-458f-a357-6125dc445e61.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo10f20dff-1782-458f-a357-6125dc445e61.selectorLabels" . | nindent 6 }}
