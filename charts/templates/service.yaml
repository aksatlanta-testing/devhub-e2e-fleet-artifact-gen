apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9d2a5e4f-cc10-44c7-afe5-4617fb0d2d39.fullname" . }}
  labels:
    {{- include "go-echo9d2a5e4f-cc10-44c7-afe5-4617fb0d2d39.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9d2a5e4f-cc10-44c7-afe5-4617fb0d2d39.selectorLabels" . | nindent 6 }}
