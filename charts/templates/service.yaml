apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc639ad03-c066-42e6-ada6-082e3e4e0bff.fullname" . }}
  labels:
    {{- include "go-echoc639ad03-c066-42e6-ada6-082e3e4e0bff.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc639ad03-c066-42e6-ada6-082e3e4e0bff.selectorLabels" . | nindent 6 }}
