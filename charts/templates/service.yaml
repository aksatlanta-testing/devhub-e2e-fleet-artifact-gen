apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe69edcf9-9322-42dd-86a2-9cf77db575f4.fullname" . }}
  labels:
    {{- include "go-echoe69edcf9-9322-42dd-86a2-9cf77db575f4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe69edcf9-9322-42dd-86a2-9cf77db575f4.selectorLabels" . | nindent 6 }}
