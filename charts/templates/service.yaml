apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoae480856-0a87-40f0-8b50-918e131b43ca.fullname" . }}
  labels:
    {{- include "go-echoae480856-0a87-40f0-8b50-918e131b43ca.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoae480856-0a87-40f0-8b50-918e131b43ca.selectorLabels" . | nindent 6 }}
