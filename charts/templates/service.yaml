apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo356173f9-6283-410f-a4ac-31d7b6358e65.fullname" . }}
  labels:
    {{- include "go-echo356173f9-6283-410f-a4ac-31d7b6358e65.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo356173f9-6283-410f-a4ac-31d7b6358e65.selectorLabels" . | nindent 6 }}
