apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2b033b49-57d7-4e2e-9221-5e45e2ec378e.fullname" . }}
  labels:
    {{- include "go-echo2b033b49-57d7-4e2e-9221-5e45e2ec378e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2b033b49-57d7-4e2e-9221-5e45e2ec378e.selectorLabels" . | nindent 6 }}
