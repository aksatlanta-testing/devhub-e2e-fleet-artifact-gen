apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoda45258b-bdf7-4982-9210-64a5f29009da.fullname" . }}
  labels:
    {{- include "go-echoda45258b-bdf7-4982-9210-64a5f29009da.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoda45258b-bdf7-4982-9210-64a5f29009da.selectorLabels" . | nindent 6 }}
