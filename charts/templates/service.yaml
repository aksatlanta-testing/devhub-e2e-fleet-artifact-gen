apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoce4028c8-a4c8-4b7c-b209-5313e0c7bc84.fullname" . }}
  labels:
    {{- include "go-echoce4028c8-a4c8-4b7c-b209-5313e0c7bc84.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoce4028c8-a4c8-4b7c-b209-5313e0c7bc84.selectorLabels" . | nindent 6 }}
