apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7faf7ca0-4385-4c9f-a0e9-f0663bdff35b.fullname" . }}
  labels:
    {{- include "go-echo7faf7ca0-4385-4c9f-a0e9-f0663bdff35b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7faf7ca0-4385-4c9f-a0e9-f0663bdff35b.selectorLabels" . | nindent 6 }}
