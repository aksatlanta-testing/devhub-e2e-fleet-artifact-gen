apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe8cc750b-a989-4a6e-b4e0-e84cb48094c5.fullname" . }}
  labels:
    {{- include "go-echoe8cc750b-a989-4a6e-b4e0-e84cb48094c5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe8cc750b-a989-4a6e-b4e0-e84cb48094c5.selectorLabels" . | nindent 6 }}
