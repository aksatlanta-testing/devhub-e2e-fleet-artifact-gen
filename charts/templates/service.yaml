apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9ca55dbf-0e65-4b5d-8a77-d9f17ee99aa8.fullname" . }}
  labels:
    {{- include "go-echo9ca55dbf-0e65-4b5d-8a77-d9f17ee99aa8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9ca55dbf-0e65-4b5d-8a77-d9f17ee99aa8.selectorLabels" . | nindent 6 }}
