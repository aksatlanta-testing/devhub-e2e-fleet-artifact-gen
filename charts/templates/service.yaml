apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7caf2f3a-d1fa-4bc0-af41-0d3f9f8f4491.fullname" . }}
  labels:
    {{- include "go-echo7caf2f3a-d1fa-4bc0-af41-0d3f9f8f4491.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7caf2f3a-d1fa-4bc0-af41-0d3f9f8f4491.selectorLabels" . | nindent 6 }}
