apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof583de7f-ac92-4ff8-acf6-05fcafda3e95.fullname" . }}
  labels:
    {{- include "go-echof583de7f-ac92-4ff8-acf6-05fcafda3e95.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof583de7f-ac92-4ff8-acf6-05fcafda3e95.selectorLabels" . | nindent 6 }}
