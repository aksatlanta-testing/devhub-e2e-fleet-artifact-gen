apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc84d9881-d1ba-4f17-a9f6-523e60088c10.fullname" . }}
  labels:
    {{- include "go-echoc84d9881-d1ba-4f17-a9f6-523e60088c10.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc84d9881-d1ba-4f17-a9f6-523e60088c10.selectorLabels" . | nindent 6 }}
