apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof64fc5aa-eb34-40a6-a6d0-f00fdc0e4e3c.fullname" . }}
  labels:
    {{- include "go-echof64fc5aa-eb34-40a6-a6d0-f00fdc0e4e3c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof64fc5aa-eb34-40a6-a6d0-f00fdc0e4e3c.selectorLabels" . | nindent 6 }}
