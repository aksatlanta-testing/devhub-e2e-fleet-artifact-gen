apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo393349c6-2d42-4b30-95b6-2bc65aad382e.fullname" . }}
  labels:
    {{- include "go-echo393349c6-2d42-4b30-95b6-2bc65aad382e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo393349c6-2d42-4b30-95b6-2bc65aad382e.selectorLabels" . | nindent 6 }}
