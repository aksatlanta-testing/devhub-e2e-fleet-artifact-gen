apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0e201852-c2f0-4f4b-82c0-44fc31ef57e9.fullname" . }}
  labels:
    {{- include "go-echo0e201852-c2f0-4f4b-82c0-44fc31ef57e9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0e201852-c2f0-4f4b-82c0-44fc31ef57e9.selectorLabels" . | nindent 6 }}
