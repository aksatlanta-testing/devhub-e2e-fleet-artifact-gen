apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4778a0bc-f698-487a-bbb5-e28bff267ba7.fullname" . }}
  labels:
    {{- include "go-echo4778a0bc-f698-487a-bbb5-e28bff267ba7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4778a0bc-f698-487a-bbb5-e28bff267ba7.selectorLabels" . | nindent 6 }}
