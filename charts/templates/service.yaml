apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo66b47309-a84e-4007-90d1-9a46e4c3b397.fullname" . }}
  labels:
    {{- include "go-echo66b47309-a84e-4007-90d1-9a46e4c3b397.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo66b47309-a84e-4007-90d1-9a46e4c3b397.selectorLabels" . | nindent 6 }}
