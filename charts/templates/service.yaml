apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1880daeb-e901-4f52-8b0a-c30bd46d7309.fullname" . }}
  labels:
    {{- include "go-echo1880daeb-e901-4f52-8b0a-c30bd46d7309.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1880daeb-e901-4f52-8b0a-c30bd46d7309.selectorLabels" . | nindent 6 }}
