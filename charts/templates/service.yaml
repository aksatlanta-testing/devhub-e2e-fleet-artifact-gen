apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaeb21ebd-d921-4129-8947-1ab421a92a53.fullname" . }}
  labels:
    {{- include "go-echoaeb21ebd-d921-4129-8947-1ab421a92a53.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaeb21ebd-d921-4129-8947-1ab421a92a53.selectorLabels" . | nindent 6 }}
