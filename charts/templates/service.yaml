apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe88d80d1-7035-4540-9b81-db7e773c24da.fullname" . }}
  labels:
    {{- include "go-echoe88d80d1-7035-4540-9b81-db7e773c24da.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe88d80d1-7035-4540-9b81-db7e773c24da.selectorLabels" . | nindent 6 }}
