apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8160b03a-9ff4-4224-ae92-11a1b9376613.fullname" . }}
  labels:
    {{- include "go-echo8160b03a-9ff4-4224-ae92-11a1b9376613.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8160b03a-9ff4-4224-ae92-11a1b9376613.selectorLabels" . | nindent 6 }}
