apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo858dcca8-ce54-4841-8c32-aefa0c57476d.fullname" . }}
  labels:
    {{- include "go-echo858dcca8-ce54-4841-8c32-aefa0c57476d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo858dcca8-ce54-4841-8c32-aefa0c57476d.selectorLabels" . | nindent 6 }}
