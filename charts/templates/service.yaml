apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5b82e96f-ab39-4049-8ab1-4cfc9689fe83.fullname" . }}
  labels:
    {{- include "go-echo5b82e96f-ab39-4049-8ab1-4cfc9689fe83.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5b82e96f-ab39-4049-8ab1-4cfc9689fe83.selectorLabels" . | nindent 6 }}
