apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo15aa5c90-3f7b-4721-bb83-ffb42133a320.fullname" . }}
  labels:
    {{- include "go-echo15aa5c90-3f7b-4721-bb83-ffb42133a320.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo15aa5c90-3f7b-4721-bb83-ffb42133a320.selectorLabels" . | nindent 6 }}
