apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo01e5ac18-5328-4ac7-8521-ff95212fc5b2.fullname" . }}
  labels:
    {{- include "go-echo01e5ac18-5328-4ac7-8521-ff95212fc5b2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo01e5ac18-5328-4ac7-8521-ff95212fc5b2.selectorLabels" . | nindent 6 }}
