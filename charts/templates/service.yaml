apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0ff3ab6a-3778-45b7-8691-4f9ea006279a.fullname" . }}
  labels:
    {{- include "go-echo0ff3ab6a-3778-45b7-8691-4f9ea006279a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0ff3ab6a-3778-45b7-8691-4f9ea006279a.selectorLabels" . | nindent 6 }}
