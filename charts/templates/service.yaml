apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3b0f66e7-3981-4ba3-8b48-a1e725134662.fullname" . }}
  labels:
    {{- include "go-echo3b0f66e7-3981-4ba3-8b48-a1e725134662.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3b0f66e7-3981-4ba3-8b48-a1e725134662.selectorLabels" . | nindent 6 }}
