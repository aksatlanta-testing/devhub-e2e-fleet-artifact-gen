apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8d5b30fb-fa45-43aa-a67a-b47e9ebd61fa.fullname" . }}
  labels:
    {{- include "go-echo8d5b30fb-fa45-43aa-a67a-b47e9ebd61fa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8d5b30fb-fa45-43aa-a67a-b47e9ebd61fa.selectorLabels" . | nindent 6 }}
