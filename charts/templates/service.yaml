apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0aaf587a-5b79-437a-a3e9-f723638fbd9f.fullname" . }}
  labels:
    {{- include "go-echo0aaf587a-5b79-437a-a3e9-f723638fbd9f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0aaf587a-5b79-437a-a3e9-f723638fbd9f.selectorLabels" . | nindent 6 }}
