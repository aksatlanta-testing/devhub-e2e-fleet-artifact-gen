apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobd6881ac-1c02-441f-8443-bdaef094c80c.fullname" . }}
  labels:
    {{- include "go-echobd6881ac-1c02-441f-8443-bdaef094c80c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobd6881ac-1c02-441f-8443-bdaef094c80c.selectorLabels" . | nindent 6 }}
