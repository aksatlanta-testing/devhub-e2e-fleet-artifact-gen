apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoec0c2cdb-eb17-4ed0-9550-eeb30121d521.fullname" . }}
  labels:
    {{- include "go-echoec0c2cdb-eb17-4ed0-9550-eeb30121d521.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoec0c2cdb-eb17-4ed0-9550-eeb30121d521.selectorLabels" . | nindent 6 }}
