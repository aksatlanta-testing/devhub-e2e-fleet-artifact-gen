apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo08c7363e-d8ec-44a1-b971-8e8896da624b.fullname" . }}
  labels:
    {{- include "go-echo08c7363e-d8ec-44a1-b971-8e8896da624b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo08c7363e-d8ec-44a1-b971-8e8896da624b.selectorLabels" . | nindent 6 }}
