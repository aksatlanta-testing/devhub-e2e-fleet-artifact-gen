apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc4f0f610-741c-402e-bc17-ff9a6246e394.fullname" . }}
  labels:
    {{- include "go-echoc4f0f610-741c-402e-bc17-ff9a6246e394.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc4f0f610-741c-402e-bc17-ff9a6246e394.selectorLabels" . | nindent 6 }}
