apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5156abdd-994a-4412-9be2-a8423bbe846d.fullname" . }}
  labels:
    {{- include "go-echo5156abdd-994a-4412-9be2-a8423bbe846d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5156abdd-994a-4412-9be2-a8423bbe846d.selectorLabels" . | nindent 6 }}
