apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc02dd608-0f21-42df-836a-4463567020bd.fullname" . }}
  labels:
    {{- include "go-echoc02dd608-0f21-42df-836a-4463567020bd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc02dd608-0f21-42df-836a-4463567020bd.selectorLabels" . | nindent 6 }}
