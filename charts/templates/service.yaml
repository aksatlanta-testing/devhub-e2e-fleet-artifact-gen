apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo46f781e4-6a59-4c9c-bc4f-55accca31157.fullname" . }}
  labels:
    {{- include "go-echo46f781e4-6a59-4c9c-bc4f-55accca31157.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo46f781e4-6a59-4c9c-bc4f-55accca31157.selectorLabels" . | nindent 6 }}
