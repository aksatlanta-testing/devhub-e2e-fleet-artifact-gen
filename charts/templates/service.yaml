apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe2ce16cb-94bf-4ee4-8a3d-13e081037222.fullname" . }}
  labels:
    {{- include "go-echoe2ce16cb-94bf-4ee4-8a3d-13e081037222.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe2ce16cb-94bf-4ee4-8a3d-13e081037222.selectorLabels" . | nindent 6 }}
