apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo96178386-1465-4cb0-b919-d50087448de1.fullname" . }}
  labels:
    {{- include "go-echo96178386-1465-4cb0-b919-d50087448de1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo96178386-1465-4cb0-b919-d50087448de1.selectorLabels" . | nindent 6 }}
