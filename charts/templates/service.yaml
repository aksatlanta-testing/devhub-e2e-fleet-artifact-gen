apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo25694277-f1db-40af-a747-a7643f71650e.fullname" . }}
  labels:
    {{- include "go-echo25694277-f1db-40af-a747-a7643f71650e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo25694277-f1db-40af-a747-a7643f71650e.selectorLabels" . | nindent 6 }}
