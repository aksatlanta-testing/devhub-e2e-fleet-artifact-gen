apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5d13a51f-89c1-444b-bbd8-a53c5ae8eb9f.fullname" . }}
  labels:
    {{- include "go-echo5d13a51f-89c1-444b-bbd8-a53c5ae8eb9f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5d13a51f-89c1-444b-bbd8-a53c5ae8eb9f.selectorLabels" . | nindent 6 }}
