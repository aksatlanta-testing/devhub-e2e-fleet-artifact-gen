apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo760e43a0-6c2a-4090-88e4-f33ffe77e65b.fullname" . }}
  labels:
    {{- include "go-echo760e43a0-6c2a-4090-88e4-f33ffe77e65b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo760e43a0-6c2a-4090-88e4-f33ffe77e65b.selectorLabels" . | nindent 6 }}
