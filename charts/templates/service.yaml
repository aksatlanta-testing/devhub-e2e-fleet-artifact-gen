apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod5ce7dd7-fff7-4bb2-a6f5-991cc926a55f.fullname" . }}
  labels:
    {{- include "go-echod5ce7dd7-fff7-4bb2-a6f5-991cc926a55f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod5ce7dd7-fff7-4bb2-a6f5-991cc926a55f.selectorLabels" . | nindent 6 }}
