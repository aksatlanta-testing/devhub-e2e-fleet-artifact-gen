apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof6eb8faa-2e10-4048-bf71-5f4cc7a00740.fullname" . }}
  labels:
    {{- include "go-echof6eb8faa-2e10-4048-bf71-5f4cc7a00740.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof6eb8faa-2e10-4048-bf71-5f4cc7a00740.selectorLabels" . | nindent 6 }}
