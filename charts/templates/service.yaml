apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo13016ac3-cd86-4646-9019-b1c9eeee0609.fullname" . }}
  labels:
    {{- include "go-echo13016ac3-cd86-4646-9019-b1c9eeee0609.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo13016ac3-cd86-4646-9019-b1c9eeee0609.selectorLabels" . | nindent 6 }}
