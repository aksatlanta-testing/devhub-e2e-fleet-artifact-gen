apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5e8e06dd-dcab-4bb2-8f3c-778680268748.fullname" . }}
  labels:
    {{- include "go-echo5e8e06dd-dcab-4bb2-8f3c-778680268748.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5e8e06dd-dcab-4bb2-8f3c-778680268748.selectorLabels" . | nindent 6 }}
