apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3398e6e4-f159-48cd-9f22-98e7b8b37d64.fullname" . }}
  labels:
    {{- include "go-echo3398e6e4-f159-48cd-9f22-98e7b8b37d64.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3398e6e4-f159-48cd-9f22-98e7b8b37d64.selectorLabels" . | nindent 6 }}
