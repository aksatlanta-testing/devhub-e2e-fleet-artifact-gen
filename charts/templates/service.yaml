apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo12603a37-b245-4a40-989a-3b894f4577b3.fullname" . }}
  labels:
    {{- include "go-echo12603a37-b245-4a40-989a-3b894f4577b3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo12603a37-b245-4a40-989a-3b894f4577b3.selectorLabels" . | nindent 6 }}
