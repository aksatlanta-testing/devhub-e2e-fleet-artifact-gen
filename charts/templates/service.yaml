apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe21daef3-e127-4917-815b-8f1dca746f70.fullname" . }}
  labels:
    {{- include "go-echoe21daef3-e127-4917-815b-8f1dca746f70.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe21daef3-e127-4917-815b-8f1dca746f70.selectorLabels" . | nindent 6 }}
