apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof27f517d-48fc-4f91-8afe-181bec455621.fullname" . }}
  labels:
    {{- include "go-echof27f517d-48fc-4f91-8afe-181bec455621.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof27f517d-48fc-4f91-8afe-181bec455621.selectorLabels" . | nindent 6 }}
