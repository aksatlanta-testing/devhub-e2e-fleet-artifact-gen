apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobefd0212-16b1-46f8-beb0-07b6a42efa28.fullname" . }}
  labels:
    {{- include "go-echobefd0212-16b1-46f8-beb0-07b6a42efa28.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobefd0212-16b1-46f8-beb0-07b6a42efa28.selectorLabels" . | nindent 6 }}
