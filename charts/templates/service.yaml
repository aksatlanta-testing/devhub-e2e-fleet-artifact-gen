apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaeb2de29-47b3-4659-8046-26741ab28881.fullname" . }}
  labels:
    {{- include "go-echoaeb2de29-47b3-4659-8046-26741ab28881.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaeb2de29-47b3-4659-8046-26741ab28881.selectorLabels" . | nindent 6 }}
