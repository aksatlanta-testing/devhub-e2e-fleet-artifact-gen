apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6242ac65-5e5b-458f-9115-ed4ba0f7052a.fullname" . }}
  labels:
    {{- include "go-echo6242ac65-5e5b-458f-9115-ed4ba0f7052a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6242ac65-5e5b-458f-9115-ed4ba0f7052a.selectorLabels" . | nindent 6 }}
