apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echode4b7573-e9be-4f7b-9601-896c8eec0c38.fullname" . }}
  labels:
    {{- include "go-echode4b7573-e9be-4f7b-9601-896c8eec0c38.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echode4b7573-e9be-4f7b-9601-896c8eec0c38.selectorLabels" . | nindent 6 }}
