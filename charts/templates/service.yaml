apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod0bff2ed-a2c1-4a05-8149-c298f51f1dde.fullname" . }}
  labels:
    {{- include "go-echod0bff2ed-a2c1-4a05-8149-c298f51f1dde.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod0bff2ed-a2c1-4a05-8149-c298f51f1dde.selectorLabels" . | nindent 6 }}
