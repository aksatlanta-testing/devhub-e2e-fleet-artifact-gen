apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0b1dbb90-a58f-4819-80b5-f8e0345e4c8b.fullname" . }}
  labels:
    {{- include "go-echo0b1dbb90-a58f-4819-80b5-f8e0345e4c8b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0b1dbb90-a58f-4819-80b5-f8e0345e4c8b.selectorLabels" . | nindent 6 }}
