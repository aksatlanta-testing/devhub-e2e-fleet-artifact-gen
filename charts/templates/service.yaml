apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo41cfd1ae-6028-4b3d-afc8-d4419d740d92.fullname" . }}
  labels:
    {{- include "go-echo41cfd1ae-6028-4b3d-afc8-d4419d740d92.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo41cfd1ae-6028-4b3d-afc8-d4419d740d92.selectorLabels" . | nindent 6 }}
