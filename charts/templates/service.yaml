apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3b14f528-5a3f-4a96-93aa-acdbcb2c4bf0.fullname" . }}
  labels:
    {{- include "go-echo3b14f528-5a3f-4a96-93aa-acdbcb2c4bf0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3b14f528-5a3f-4a96-93aa-acdbcb2c4bf0.selectorLabels" . | nindent 6 }}
