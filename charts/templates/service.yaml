apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc48b6a5c-5cf7-471d-98ac-dde843898a5a.fullname" . }}
  labels:
    {{- include "go-echoc48b6a5c-5cf7-471d-98ac-dde843898a5a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc48b6a5c-5cf7-471d-98ac-dde843898a5a.selectorLabels" . | nindent 6 }}
