apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1fddcb96-07da-48af-9130-9c9153e1a896.fullname" . }}
  labels:
    {{- include "go-echo1fddcb96-07da-48af-9130-9c9153e1a896.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1fddcb96-07da-48af-9130-9c9153e1a896.selectorLabels" . | nindent 6 }}
