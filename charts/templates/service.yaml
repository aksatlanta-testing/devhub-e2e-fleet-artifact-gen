apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo63a9603c-53bb-4e07-b47e-28974e7ecd7e.fullname" . }}
  labels:
    {{- include "go-echo63a9603c-53bb-4e07-b47e-28974e7ecd7e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo63a9603c-53bb-4e07-b47e-28974e7ecd7e.selectorLabels" . | nindent 6 }}
