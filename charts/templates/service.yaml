apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo97fa92f6-48e9-4545-84d9-f7bff4c35db3.fullname" . }}
  labels:
    {{- include "go-echo97fa92f6-48e9-4545-84d9-f7bff4c35db3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo97fa92f6-48e9-4545-84d9-f7bff4c35db3.selectorLabels" . | nindent 6 }}
