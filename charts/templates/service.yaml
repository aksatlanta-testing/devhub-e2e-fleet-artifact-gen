apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod5ac2c91-992f-4c56-9bf0-7fd1e961d57e.fullname" . }}
  labels:
    {{- include "go-echod5ac2c91-992f-4c56-9bf0-7fd1e961d57e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod5ac2c91-992f-4c56-9bf0-7fd1e961d57e.selectorLabels" . | nindent 6 }}
