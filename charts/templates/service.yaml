apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo05425d3c-80ba-4716-a201-129082325232.fullname" . }}
  labels:
    {{- include "go-echo05425d3c-80ba-4716-a201-129082325232.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo05425d3c-80ba-4716-a201-129082325232.selectorLabels" . | nindent 6 }}
