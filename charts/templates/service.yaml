apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5ee34786-054f-4466-ace4-a93cd66a3c4c.fullname" . }}
  labels:
    {{- include "go-echo5ee34786-054f-4466-ace4-a93cd66a3c4c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5ee34786-054f-4466-ace4-a93cd66a3c4c.selectorLabels" . | nindent 6 }}
