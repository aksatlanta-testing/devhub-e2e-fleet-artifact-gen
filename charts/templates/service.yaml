apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobcf5631e-7145-4d25-9669-21c0a5f71380.fullname" . }}
  labels:
    {{- include "go-echobcf5631e-7145-4d25-9669-21c0a5f71380.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobcf5631e-7145-4d25-9669-21c0a5f71380.selectorLabels" . | nindent 6 }}
