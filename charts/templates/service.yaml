apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo723b9679-985d-4a90-8b8a-3e8b80e5a240.fullname" . }}
  labels:
    {{- include "go-echo723b9679-985d-4a90-8b8a-3e8b80e5a240.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo723b9679-985d-4a90-8b8a-3e8b80e5a240.selectorLabels" . | nindent 6 }}
