apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7896b4a5-5af7-42f0-a803-ebc103ebab79.fullname" . }}
  labels:
    {{- include "go-echo7896b4a5-5af7-42f0-a803-ebc103ebab79.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7896b4a5-5af7-42f0-a803-ebc103ebab79.selectorLabels" . | nindent 6 }}
