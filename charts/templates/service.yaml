apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1e552775-c247-454f-b053-602a93079115.fullname" . }}
  labels:
    {{- include "go-echo1e552775-c247-454f-b053-602a93079115.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1e552775-c247-454f-b053-602a93079115.selectorLabels" . | nindent 6 }}
