apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo838c6033-1742-4cc3-aeb1-8c3a1881f787.fullname" . }}
  labels:
    {{- include "go-echo838c6033-1742-4cc3-aeb1-8c3a1881f787.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo838c6033-1742-4cc3-aeb1-8c3a1881f787.selectorLabels" . | nindent 6 }}
