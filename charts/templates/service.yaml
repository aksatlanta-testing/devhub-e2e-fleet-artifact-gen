apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe9dac50d-04e5-4cce-95f4-908d4230c7b5.fullname" . }}
  labels:
    {{- include "go-echoe9dac50d-04e5-4cce-95f4-908d4230c7b5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe9dac50d-04e5-4cce-95f4-908d4230c7b5.selectorLabels" . | nindent 6 }}
