apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc516ff1e-281d-4ca6-8781-ccf8e7c390ce.fullname" . }}
  labels:
    {{- include "go-echoc516ff1e-281d-4ca6-8781-ccf8e7c390ce.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc516ff1e-281d-4ca6-8781-ccf8e7c390ce.selectorLabels" . | nindent 6 }}
