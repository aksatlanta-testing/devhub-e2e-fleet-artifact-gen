apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5f9157cc-b538-440c-a3ee-1e4ab37443b9.fullname" . }}
  labels:
    {{- include "go-echo5f9157cc-b538-440c-a3ee-1e4ab37443b9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5f9157cc-b538-440c-a3ee-1e4ab37443b9.selectorLabels" . | nindent 6 }}
