apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo70e87e09-8ff3-42d6-a9b4-0094b14e3286.fullname" . }}
  labels:
    {{- include "go-echo70e87e09-8ff3-42d6-a9b4-0094b14e3286.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo70e87e09-8ff3-42d6-a9b4-0094b14e3286.selectorLabels" . | nindent 6 }}
