apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa569c9aa-b63a-4201-a59f-462fb5e13576.fullname" . }}
  labels:
    {{- include "go-echoa569c9aa-b63a-4201-a59f-462fb5e13576.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa569c9aa-b63a-4201-a59f-462fb5e13576.selectorLabels" . | nindent 6 }}
