apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0b7c6894-b485-4dcd-9770-f5090edbe0ba.fullname" . }}
  labels:
    {{- include "go-echo0b7c6894-b485-4dcd-9770-f5090edbe0ba.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0b7c6894-b485-4dcd-9770-f5090edbe0ba.selectorLabels" . | nindent 6 }}
