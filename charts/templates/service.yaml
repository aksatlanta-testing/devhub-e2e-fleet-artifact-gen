apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoae82c1c3-f4a4-4faa-9267-6aca30df728d.fullname" . }}
  labels:
    {{- include "go-echoae82c1c3-f4a4-4faa-9267-6aca30df728d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoae82c1c3-f4a4-4faa-9267-6aca30df728d.selectorLabels" . | nindent 6 }}
