apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4eb8e152-8fa0-4893-a78b-664cb784ee70.fullname" . }}
  labels:
    {{- include "go-echo4eb8e152-8fa0-4893-a78b-664cb784ee70.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4eb8e152-8fa0-4893-a78b-664cb784ee70.selectorLabels" . | nindent 6 }}
