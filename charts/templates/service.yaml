apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4d1a989e-208c-49f8-adee-debbf2d61937.fullname" . }}
  labels:
    {{- include "go-echo4d1a989e-208c-49f8-adee-debbf2d61937.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4d1a989e-208c-49f8-adee-debbf2d61937.selectorLabels" . | nindent 6 }}
