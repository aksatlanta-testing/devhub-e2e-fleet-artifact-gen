apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa53f693e-46b6-4b1c-8ad6-e9bb721b07f0.fullname" . }}
  labels:
    {{- include "go-echoa53f693e-46b6-4b1c-8ad6-e9bb721b07f0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa53f693e-46b6-4b1c-8ad6-e9bb721b07f0.selectorLabels" . | nindent 6 }}
