apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1e45bee1-dd02-464e-8ecb-fba15f73310c.fullname" . }}
  labels:
    {{- include "go-echo1e45bee1-dd02-464e-8ecb-fba15f73310c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1e45bee1-dd02-464e-8ecb-fba15f73310c.selectorLabels" . | nindent 6 }}
