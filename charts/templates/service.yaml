apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo182f994a-19c6-421f-b58d-934277990e58.fullname" . }}
  labels:
    {{- include "go-echo182f994a-19c6-421f-b58d-934277990e58.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo182f994a-19c6-421f-b58d-934277990e58.selectorLabels" . | nindent 6 }}
