apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodb1f8415-373b-43ab-bc0e-039822a1c389.fullname" . }}
  labels:
    {{- include "go-echodb1f8415-373b-43ab-bc0e-039822a1c389.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodb1f8415-373b-43ab-bc0e-039822a1c389.selectorLabels" . | nindent 6 }}
