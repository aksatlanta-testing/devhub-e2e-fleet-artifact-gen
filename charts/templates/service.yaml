apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaaae0918-a701-4c10-9de4-d39f80809234.fullname" . }}
  labels:
    {{- include "go-echoaaae0918-a701-4c10-9de4-d39f80809234.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaaae0918-a701-4c10-9de4-d39f80809234.selectorLabels" . | nindent 6 }}
