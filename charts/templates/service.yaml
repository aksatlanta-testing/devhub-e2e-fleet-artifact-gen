apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoebd64a36-5dd8-49b3-af45-ebc79a332da3.fullname" . }}
  labels:
    {{- include "go-echoebd64a36-5dd8-49b3-af45-ebc79a332da3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoebd64a36-5dd8-49b3-af45-ebc79a332da3.selectorLabels" . | nindent 6 }}
