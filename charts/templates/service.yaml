apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo16ce6d36-7a84-4c2c-91bd-9a31f799a5dd.fullname" . }}
  labels:
    {{- include "go-echo16ce6d36-7a84-4c2c-91bd-9a31f799a5dd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo16ce6d36-7a84-4c2c-91bd-9a31f799a5dd.selectorLabels" . | nindent 6 }}
