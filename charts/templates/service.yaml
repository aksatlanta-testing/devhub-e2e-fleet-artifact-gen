apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc15c368c-5f88-4101-91e5-e6a3a6043191.fullname" . }}
  labels:
    {{- include "go-echoc15c368c-5f88-4101-91e5-e6a3a6043191.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc15c368c-5f88-4101-91e5-e6a3a6043191.selectorLabels" . | nindent 6 }}
