apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9216b22f-0f7d-4832-9c0f-a473418d030c.fullname" . }}
  labels:
    {{- include "go-echo9216b22f-0f7d-4832-9c0f-a473418d030c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9216b22f-0f7d-4832-9c0f-a473418d030c.selectorLabels" . | nindent 6 }}
