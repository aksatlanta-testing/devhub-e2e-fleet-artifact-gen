apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0c4b6011-90fc-4ffc-9ec2-16a6b03dce81.fullname" . }}
  labels:
    {{- include "go-echo0c4b6011-90fc-4ffc-9ec2-16a6b03dce81.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0c4b6011-90fc-4ffc-9ec2-16a6b03dce81.selectorLabels" . | nindent 6 }}
