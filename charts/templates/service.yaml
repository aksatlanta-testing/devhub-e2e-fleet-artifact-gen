apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod6e0302f-ac00-4e61-9306-47a73015eb90.fullname" . }}
  labels:
    {{- include "go-echod6e0302f-ac00-4e61-9306-47a73015eb90.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod6e0302f-ac00-4e61-9306-47a73015eb90.selectorLabels" . | nindent 6 }}
