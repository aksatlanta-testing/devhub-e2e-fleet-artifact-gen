apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8df51378-06dc-4510-856e-a3d59f0b07f9.fullname" . }}
  labels:
    {{- include "go-echo8df51378-06dc-4510-856e-a3d59f0b07f9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8df51378-06dc-4510-856e-a3d59f0b07f9.selectorLabels" . | nindent 6 }}
