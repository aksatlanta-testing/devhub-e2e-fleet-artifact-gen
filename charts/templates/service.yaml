apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe2764450-b174-454d-b659-068382233ad6.fullname" . }}
  labels:
    {{- include "go-echoe2764450-b174-454d-b659-068382233ad6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe2764450-b174-454d-b659-068382233ad6.selectorLabels" . | nindent 6 }}
