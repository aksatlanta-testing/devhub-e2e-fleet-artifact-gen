apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod93e200f-3779-4fde-8fe7-bfaf4f2a2ac4.fullname" . }}
  labels:
    {{- include "go-echod93e200f-3779-4fde-8fe7-bfaf4f2a2ac4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod93e200f-3779-4fde-8fe7-bfaf4f2a2ac4.selectorLabels" . | nindent 6 }}
