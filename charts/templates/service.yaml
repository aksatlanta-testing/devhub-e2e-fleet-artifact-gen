apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa4524d8a-3288-4914-b7fd-bcba69b0ab6e.fullname" . }}
  labels:
    {{- include "go-echoa4524d8a-3288-4914-b7fd-bcba69b0ab6e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa4524d8a-3288-4914-b7fd-bcba69b0ab6e.selectorLabels" . | nindent 6 }}
