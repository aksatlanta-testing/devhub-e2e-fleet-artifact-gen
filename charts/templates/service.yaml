apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod8742e13-8e26-413b-ba3b-610ea660a4ef.fullname" . }}
  labels:
    {{- include "go-echod8742e13-8e26-413b-ba3b-610ea660a4ef.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod8742e13-8e26-413b-ba3b-610ea660a4ef.selectorLabels" . | nindent 6 }}
