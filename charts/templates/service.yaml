apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaa619359-1741-4350-b7e9-d02c997872f3.fullname" . }}
  labels:
    {{- include "go-echoaa619359-1741-4350-b7e9-d02c997872f3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaa619359-1741-4350-b7e9-d02c997872f3.selectorLabels" . | nindent 6 }}
