apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo990d65b6-a40e-4ee9-a02c-1d7fa700e439.fullname" . }}
  labels:
    {{- include "go-echo990d65b6-a40e-4ee9-a02c-1d7fa700e439.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo990d65b6-a40e-4ee9-a02c-1d7fa700e439.selectorLabels" . | nindent 6 }}
