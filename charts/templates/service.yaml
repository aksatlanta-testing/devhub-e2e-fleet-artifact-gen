apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo46ad6376-b607-44b2-9d7e-89d9021816f6.fullname" . }}
  labels:
    {{- include "go-echo46ad6376-b607-44b2-9d7e-89d9021816f6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo46ad6376-b607-44b2-9d7e-89d9021816f6.selectorLabels" . | nindent 6 }}
