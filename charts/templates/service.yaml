apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo30835152-05c3-4506-a13a-fc2610bf6a31.fullname" . }}
  labels:
    {{- include "go-echo30835152-05c3-4506-a13a-fc2610bf6a31.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo30835152-05c3-4506-a13a-fc2610bf6a31.selectorLabels" . | nindent 6 }}
