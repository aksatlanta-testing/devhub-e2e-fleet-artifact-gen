apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2b12dba9-83ff-4007-b2dc-963a4c3627aa.fullname" . }}
  labels:
    {{- include "go-echo2b12dba9-83ff-4007-b2dc-963a4c3627aa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2b12dba9-83ff-4007-b2dc-963a4c3627aa.selectorLabels" . | nindent 6 }}
