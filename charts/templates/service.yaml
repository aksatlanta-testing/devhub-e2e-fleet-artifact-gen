apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob8387c3b-448e-4346-ac2f-15fe2b3f12b2.fullname" . }}
  labels:
    {{- include "go-echob8387c3b-448e-4346-ac2f-15fe2b3f12b2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob8387c3b-448e-4346-ac2f-15fe2b3f12b2.selectorLabels" . | nindent 6 }}
