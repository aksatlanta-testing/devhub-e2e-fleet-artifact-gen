apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc0dcf260-bee4-48a0-9dbc-0efdb4d3320f.fullname" . }}
  labels:
    {{- include "go-echoc0dcf260-bee4-48a0-9dbc-0efdb4d3320f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc0dcf260-bee4-48a0-9dbc-0efdb4d3320f.selectorLabels" . | nindent 6 }}
