apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo68f946d0-7879-4cf2-b0f3-f6466c5f8e69.fullname" . }}
  labels:
    {{- include "go-echo68f946d0-7879-4cf2-b0f3-f6466c5f8e69.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo68f946d0-7879-4cf2-b0f3-f6466c5f8e69.selectorLabels" . | nindent 6 }}
