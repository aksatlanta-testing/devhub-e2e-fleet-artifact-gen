apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo97afcb39-b01f-4f21-9f30-e7def80ccae0.fullname" . }}
  labels:
    {{- include "go-echo97afcb39-b01f-4f21-9f30-e7def80ccae0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo97afcb39-b01f-4f21-9f30-e7def80ccae0.selectorLabels" . | nindent 6 }}
