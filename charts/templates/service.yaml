apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3eba5d87-6003-4c67-beaa-e739b32f7a83.fullname" . }}
  labels:
    {{- include "go-echo3eba5d87-6003-4c67-beaa-e739b32f7a83.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3eba5d87-6003-4c67-beaa-e739b32f7a83.selectorLabels" . | nindent 6 }}
