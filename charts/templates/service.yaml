apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe6616c44-294e-4835-a164-6c35bbff3e98.fullname" . }}
  labels:
    {{- include "go-echoe6616c44-294e-4835-a164-6c35bbff3e98.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe6616c44-294e-4835-a164-6c35bbff3e98.selectorLabels" . | nindent 6 }}
