apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof035ec6f-3cf1-428c-9947-dd3fb621fb53.fullname" . }}
  labels:
    {{- include "go-echof035ec6f-3cf1-428c-9947-dd3fb621fb53.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof035ec6f-3cf1-428c-9947-dd3fb621fb53.selectorLabels" . | nindent 6 }}
