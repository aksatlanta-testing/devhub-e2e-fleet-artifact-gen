apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo09f2545e-1240-453b-832a-cbcca62c94af.fullname" . }}
  labels:
    {{- include "go-echo09f2545e-1240-453b-832a-cbcca62c94af.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo09f2545e-1240-453b-832a-cbcca62c94af.selectorLabels" . | nindent 6 }}
