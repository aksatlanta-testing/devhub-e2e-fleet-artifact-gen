apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9e13d94b-23be-4d1f-9dbe-e15074afe0e5.fullname" . }}
  labels:
    {{- include "go-echo9e13d94b-23be-4d1f-9dbe-e15074afe0e5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9e13d94b-23be-4d1f-9dbe-e15074afe0e5.selectorLabels" . | nindent 6 }}
