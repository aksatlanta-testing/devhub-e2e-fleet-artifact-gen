apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2e468dfd-20d3-4b45-b7fd-d1f0f03d0ff3.fullname" . }}
  labels:
    {{- include "go-echo2e468dfd-20d3-4b45-b7fd-d1f0f03d0ff3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2e468dfd-20d3-4b45-b7fd-d1f0f03d0ff3.selectorLabels" . | nindent 6 }}
