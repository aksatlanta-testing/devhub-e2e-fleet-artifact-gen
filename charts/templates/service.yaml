apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo62c3828b-14a7-4b78-b0bc-dee526bf0c39.fullname" . }}
  labels:
    {{- include "go-echo62c3828b-14a7-4b78-b0bc-dee526bf0c39.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo62c3828b-14a7-4b78-b0bc-dee526bf0c39.selectorLabels" . | nindent 6 }}
