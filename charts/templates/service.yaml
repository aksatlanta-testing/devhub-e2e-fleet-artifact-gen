apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1c107dab-9592-4d6e-ab82-0fa0ba4597ed.fullname" . }}
  labels:
    {{- include "go-echo1c107dab-9592-4d6e-ab82-0fa0ba4597ed.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1c107dab-9592-4d6e-ab82-0fa0ba4597ed.selectorLabels" . | nindent 6 }}
