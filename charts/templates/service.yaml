apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe2780abd-872f-447f-b9b8-6b0362e42376.fullname" . }}
  labels:
    {{- include "go-echoe2780abd-872f-447f-b9b8-6b0362e42376.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe2780abd-872f-447f-b9b8-6b0362e42376.selectorLabels" . | nindent 6 }}
