apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7f41931e-c8de-4b09-b7ee-6d24ebe77362.fullname" . }}
  labels:
    {{- include "go-echo7f41931e-c8de-4b09-b7ee-6d24ebe77362.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7f41931e-c8de-4b09-b7ee-6d24ebe77362.selectorLabels" . | nindent 6 }}
