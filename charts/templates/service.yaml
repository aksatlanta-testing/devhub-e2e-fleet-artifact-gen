apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo60061444-577b-4922-a76b-dbaccb654650.fullname" . }}
  labels:
    {{- include "go-echo60061444-577b-4922-a76b-dbaccb654650.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo60061444-577b-4922-a76b-dbaccb654650.selectorLabels" . | nindent 6 }}
