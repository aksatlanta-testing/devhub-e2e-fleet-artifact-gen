apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5eb5d197-49fe-40d2-9d26-5d8713988090.fullname" . }}
  labels:
    {{- include "go-echo5eb5d197-49fe-40d2-9d26-5d8713988090.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5eb5d197-49fe-40d2-9d26-5d8713988090.selectorLabels" . | nindent 6 }}
