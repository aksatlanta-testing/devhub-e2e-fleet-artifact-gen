apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo38d62130-a074-4e32-8bd8-19553a454d72.fullname" . }}
  labels:
    {{- include "go-echo38d62130-a074-4e32-8bd8-19553a454d72.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo38d62130-a074-4e32-8bd8-19553a454d72.selectorLabels" . | nindent 6 }}
