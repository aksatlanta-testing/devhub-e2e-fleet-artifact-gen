apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob2011031-a95d-4d62-9c94-e2b5d0adb24e.fullname" . }}
  labels:
    {{- include "go-echob2011031-a95d-4d62-9c94-e2b5d0adb24e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob2011031-a95d-4d62-9c94-e2b5d0adb24e.selectorLabels" . | nindent 6 }}
