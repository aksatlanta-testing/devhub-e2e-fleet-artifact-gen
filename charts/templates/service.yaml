apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo911b369e-a00e-4cfb-8cb1-ede4938cdd3f.fullname" . }}
  labels:
    {{- include "go-echo911b369e-a00e-4cfb-8cb1-ede4938cdd3f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo911b369e-a00e-4cfb-8cb1-ede4938cdd3f.selectorLabels" . | nindent 6 }}
