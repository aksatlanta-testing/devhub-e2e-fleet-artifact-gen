apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9f28b5dd-0bb7-4376-bd74-48c026cf2314.fullname" . }}
  labels:
    {{- include "go-echo9f28b5dd-0bb7-4376-bd74-48c026cf2314.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9f28b5dd-0bb7-4376-bd74-48c026cf2314.selectorLabels" . | nindent 6 }}
