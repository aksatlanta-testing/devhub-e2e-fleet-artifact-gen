apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3ef653cb-549b-4e58-ac35-ba8598b77c7e.fullname" . }}
  labels:
    {{- include "go-echo3ef653cb-549b-4e58-ac35-ba8598b77c7e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3ef653cb-549b-4e58-ac35-ba8598b77c7e.selectorLabels" . | nindent 6 }}
