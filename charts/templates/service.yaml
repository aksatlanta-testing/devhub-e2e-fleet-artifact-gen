apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1b51b2ef-0499-4771-98d4-9f4ec391b305.fullname" . }}
  labels:
    {{- include "go-echo1b51b2ef-0499-4771-98d4-9f4ec391b305.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1b51b2ef-0499-4771-98d4-9f4ec391b305.selectorLabels" . | nindent 6 }}
