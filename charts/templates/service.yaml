apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaa0c3fd9-c6e9-4bf7-86b1-afc23e73435d.fullname" . }}
  labels:
    {{- include "go-echoaa0c3fd9-c6e9-4bf7-86b1-afc23e73435d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaa0c3fd9-c6e9-4bf7-86b1-afc23e73435d.selectorLabels" . | nindent 6 }}
