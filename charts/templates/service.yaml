apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocdd56d8d-8600-4983-a053-8cab71b2a9be.fullname" . }}
  labels:
    {{- include "go-echocdd56d8d-8600-4983-a053-8cab71b2a9be.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocdd56d8d-8600-4983-a053-8cab71b2a9be.selectorLabels" . | nindent 6 }}
