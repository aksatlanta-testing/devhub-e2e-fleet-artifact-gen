apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3c3a9bfd-5958-42b5-bc6b-5504906d0f65.fullname" . }}
  labels:
    {{- include "go-echo3c3a9bfd-5958-42b5-bc6b-5504906d0f65.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3c3a9bfd-5958-42b5-bc6b-5504906d0f65.selectorLabels" . | nindent 6 }}
