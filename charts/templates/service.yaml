apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa91890fb-928d-42c9-afc8-9a92a6621ff1.fullname" . }}
  labels:
    {{- include "go-echoa91890fb-928d-42c9-afc8-9a92a6621ff1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa91890fb-928d-42c9-afc8-9a92a6621ff1.selectorLabels" . | nindent 6 }}
