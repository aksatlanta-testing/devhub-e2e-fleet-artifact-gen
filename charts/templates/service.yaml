apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo59187984-1e8a-444f-8531-e5afc4987b25.fullname" . }}
  labels:
    {{- include "go-echo59187984-1e8a-444f-8531-e5afc4987b25.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo59187984-1e8a-444f-8531-e5afc4987b25.selectorLabels" . | nindent 6 }}
