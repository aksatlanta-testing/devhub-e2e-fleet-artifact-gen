apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofa772443-6fc9-4b43-87f5-11be4c6fbaeb.fullname" . }}
  labels:
    {{- include "go-echofa772443-6fc9-4b43-87f5-11be4c6fbaeb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofa772443-6fc9-4b43-87f5-11be4c6fbaeb.selectorLabels" . | nindent 6 }}
