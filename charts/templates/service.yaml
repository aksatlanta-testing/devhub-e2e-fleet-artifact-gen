apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo78121acf-6847-425e-81fb-fbb783a4f592.fullname" . }}
  labels:
    {{- include "go-echo78121acf-6847-425e-81fb-fbb783a4f592.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo78121acf-6847-425e-81fb-fbb783a4f592.selectorLabels" . | nindent 6 }}
