apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofd768a06-5d50-409a-8280-dcfc916c8582.fullname" . }}
  labels:
    {{- include "go-echofd768a06-5d50-409a-8280-dcfc916c8582.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofd768a06-5d50-409a-8280-dcfc916c8582.selectorLabels" . | nindent 6 }}
