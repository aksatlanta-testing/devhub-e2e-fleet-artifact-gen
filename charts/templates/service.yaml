apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob12b099e-ad59-479d-b55b-ffb673bbbbeb.fullname" . }}
  labels:
    {{- include "go-echob12b099e-ad59-479d-b55b-ffb673bbbbeb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob12b099e-ad59-479d-b55b-ffb673bbbbeb.selectorLabels" . | nindent 6 }}
