apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod8ed6448-ec5b-45ea-8c8e-8be27f58c089.fullname" . }}
  labels:
    {{- include "go-echod8ed6448-ec5b-45ea-8c8e-8be27f58c089.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod8ed6448-ec5b-45ea-8c8e-8be27f58c089.selectorLabels" . | nindent 6 }}
