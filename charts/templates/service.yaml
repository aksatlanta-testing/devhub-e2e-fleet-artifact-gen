apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa2de71ba-c592-4f74-8219-96daa7306f73.fullname" . }}
  labels:
    {{- include "go-echoa2de71ba-c592-4f74-8219-96daa7306f73.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa2de71ba-c592-4f74-8219-96daa7306f73.selectorLabels" . | nindent 6 }}
