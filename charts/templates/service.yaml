apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6b79e2a6-825c-4751-b8fb-717f18afa6ac.fullname" . }}
  labels:
    {{- include "go-echo6b79e2a6-825c-4751-b8fb-717f18afa6ac.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6b79e2a6-825c-4751-b8fb-717f18afa6ac.selectorLabels" . | nindent 6 }}
