apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2c52c7ec-723e-4d18-a5e3-1264edb39426.fullname" . }}
  labels:
    {{- include "go-echo2c52c7ec-723e-4d18-a5e3-1264edb39426.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2c52c7ec-723e-4d18-a5e3-1264edb39426.selectorLabels" . | nindent 6 }}
