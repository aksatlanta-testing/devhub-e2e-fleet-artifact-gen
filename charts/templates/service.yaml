apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodacd00d9-6ae3-4c77-b88f-bc83b6dd7527.fullname" . }}
  labels:
    {{- include "go-echodacd00d9-6ae3-4c77-b88f-bc83b6dd7527.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodacd00d9-6ae3-4c77-b88f-bc83b6dd7527.selectorLabels" . | nindent 6 }}
