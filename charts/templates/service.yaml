apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo648db827-6076-4936-bdbf-18bb0a1642c4.fullname" . }}
  labels:
    {{- include "go-echo648db827-6076-4936-bdbf-18bb0a1642c4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo648db827-6076-4936-bdbf-18bb0a1642c4.selectorLabels" . | nindent 6 }}
