apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3d6f8cd1-4afc-4402-9573-696e44ba3272.fullname" . }}
  labels:
    {{- include "go-echo3d6f8cd1-4afc-4402-9573-696e44ba3272.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3d6f8cd1-4afc-4402-9573-696e44ba3272.selectorLabels" . | nindent 6 }}
