apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0da81d4e-8c61-4df9-8100-90289e31e08d.fullname" . }}
  labels:
    {{- include "go-echo0da81d4e-8c61-4df9-8100-90289e31e08d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0da81d4e-8c61-4df9-8100-90289e31e08d.selectorLabels" . | nindent 6 }}
