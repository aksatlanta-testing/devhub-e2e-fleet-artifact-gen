apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo88c975fa-5791-49e5-87ae-240c0d03af72.fullname" . }}
  labels:
    {{- include "go-echo88c975fa-5791-49e5-87ae-240c0d03af72.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo88c975fa-5791-49e5-87ae-240c0d03af72.selectorLabels" . | nindent 6 }}
