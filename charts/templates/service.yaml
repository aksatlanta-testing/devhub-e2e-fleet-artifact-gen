apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof1defbd5-656b-499a-adc6-ee1197e6c57a.fullname" . }}
  labels:
    {{- include "go-echof1defbd5-656b-499a-adc6-ee1197e6c57a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof1defbd5-656b-499a-adc6-ee1197e6c57a.selectorLabels" . | nindent 6 }}
