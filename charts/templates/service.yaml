apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoea41f043-2739-4914-a4a5-24954e94623b.fullname" . }}
  labels:
    {{- include "go-echoea41f043-2739-4914-a4a5-24954e94623b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoea41f043-2739-4914-a4a5-24954e94623b.selectorLabels" . | nindent 6 }}
