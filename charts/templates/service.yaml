apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4541b274-9013-41fc-bcee-5d946a72cf6e.fullname" . }}
  labels:
    {{- include "go-echo4541b274-9013-41fc-bcee-5d946a72cf6e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4541b274-9013-41fc-bcee-5d946a72cf6e.selectorLabels" . | nindent 6 }}
