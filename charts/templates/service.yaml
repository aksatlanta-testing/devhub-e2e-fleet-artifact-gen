apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo944c58ab-a82c-452d-a752-1fbeeb4db95e.fullname" . }}
  labels:
    {{- include "go-echo944c58ab-a82c-452d-a752-1fbeeb4db95e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo944c58ab-a82c-452d-a752-1fbeeb4db95e.selectorLabels" . | nindent 6 }}
