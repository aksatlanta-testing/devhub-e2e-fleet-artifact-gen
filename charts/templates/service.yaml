apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoef26d019-78cc-43a9-89d0-ac57810867c5.fullname" . }}
  labels:
    {{- include "go-echoef26d019-78cc-43a9-89d0-ac57810867c5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoef26d019-78cc-43a9-89d0-ac57810867c5.selectorLabels" . | nindent 6 }}
