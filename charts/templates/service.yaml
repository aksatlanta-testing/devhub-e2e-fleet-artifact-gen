apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo180cacae-b37e-4767-a5e9-0f3282060e09.fullname" . }}
  labels:
    {{- include "go-echo180cacae-b37e-4767-a5e9-0f3282060e09.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo180cacae-b37e-4767-a5e9-0f3282060e09.selectorLabels" . | nindent 6 }}
