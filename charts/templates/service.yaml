apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobebd2110-ef7e-471a-bdf9-a11b2c8870e7.fullname" . }}
  labels:
    {{- include "go-echobebd2110-ef7e-471a-bdf9-a11b2c8870e7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobebd2110-ef7e-471a-bdf9-a11b2c8870e7.selectorLabels" . | nindent 6 }}
