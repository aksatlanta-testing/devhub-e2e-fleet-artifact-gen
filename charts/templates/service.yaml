apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0a790479-83cf-4fae-a35e-056b8f9fd43d.fullname" . }}
  labels:
    {{- include "go-echo0a790479-83cf-4fae-a35e-056b8f9fd43d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0a790479-83cf-4fae-a35e-056b8f9fd43d.selectorLabels" . | nindent 6 }}
