apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo53005c38-7c40-44f6-a6a4-1a29fff61968.fullname" . }}
  labels:
    {{- include "go-echo53005c38-7c40-44f6-a6a4-1a29fff61968.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo53005c38-7c40-44f6-a6a4-1a29fff61968.selectorLabels" . | nindent 6 }}
