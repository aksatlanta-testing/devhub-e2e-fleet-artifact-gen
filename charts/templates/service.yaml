apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9a3bf2ad-83a9-401f-a222-0653a7a3b2b1.fullname" . }}
  labels:
    {{- include "go-echo9a3bf2ad-83a9-401f-a222-0653a7a3b2b1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9a3bf2ad-83a9-401f-a222-0653a7a3b2b1.selectorLabels" . | nindent 6 }}
