apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc990ff0c-efed-4ceb-beda-6ae3fd7e3e12.fullname" . }}
  labels:
    {{- include "go-echoc990ff0c-efed-4ceb-beda-6ae3fd7e3e12.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc990ff0c-efed-4ceb-beda-6ae3fd7e3e12.selectorLabels" . | nindent 6 }}
