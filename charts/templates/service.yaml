apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofd170921-5f1a-4ac8-8cd3-71b8f205cabc.fullname" . }}
  labels:
    {{- include "go-echofd170921-5f1a-4ac8-8cd3-71b8f205cabc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofd170921-5f1a-4ac8-8cd3-71b8f205cabc.selectorLabels" . | nindent 6 }}
