apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe4acfb5a-3291-4020-9b85-1cd216a6a8fe.fullname" . }}
  labels:
    {{- include "go-echoe4acfb5a-3291-4020-9b85-1cd216a6a8fe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe4acfb5a-3291-4020-9b85-1cd216a6a8fe.selectorLabels" . | nindent 6 }}
