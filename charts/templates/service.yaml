apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2489db05-cfa1-4384-a77b-bc4c8995b22b.fullname" . }}
  labels:
    {{- include "go-echo2489db05-cfa1-4384-a77b-bc4c8995b22b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2489db05-cfa1-4384-a77b-bc4c8995b22b.selectorLabels" . | nindent 6 }}
