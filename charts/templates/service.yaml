apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0afbb891-4988-4b60-bb1d-524ad85cd701.fullname" . }}
  labels:
    {{- include "go-echo0afbb891-4988-4b60-bb1d-524ad85cd701.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0afbb891-4988-4b60-bb1d-524ad85cd701.selectorLabels" . | nindent 6 }}
