apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo75fd0506-7228-4e16-94a1-c3c4f0d0e886.fullname" . }}
  labels:
    {{- include "go-echo75fd0506-7228-4e16-94a1-c3c4f0d0e886.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo75fd0506-7228-4e16-94a1-c3c4f0d0e886.selectorLabels" . | nindent 6 }}
