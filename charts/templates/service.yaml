apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobe7527ef-8183-4caf-b8e6-d5ed09b0d604.fullname" . }}
  labels:
    {{- include "go-echobe7527ef-8183-4caf-b8e6-d5ed09b0d604.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobe7527ef-8183-4caf-b8e6-d5ed09b0d604.selectorLabels" . | nindent 6 }}
