apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5232fcf6-a614-4382-8863-e7f59e790a03.fullname" . }}
  labels:
    {{- include "go-echo5232fcf6-a614-4382-8863-e7f59e790a03.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5232fcf6-a614-4382-8863-e7f59e790a03.selectorLabels" . | nindent 6 }}
