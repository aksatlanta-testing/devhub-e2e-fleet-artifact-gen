apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5af949ae-6572-4745-9010-e000d9e0f4ce.fullname" . }}
  labels:
    {{- include "go-echo5af949ae-6572-4745-9010-e000d9e0f4ce.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5af949ae-6572-4745-9010-e000d9e0f4ce.selectorLabels" . | nindent 6 }}
