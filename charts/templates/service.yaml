apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2582ac77-a73e-40bf-a8f4-89165230bb3a.fullname" . }}
  labels:
    {{- include "go-echo2582ac77-a73e-40bf-a8f4-89165230bb3a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2582ac77-a73e-40bf-a8f4-89165230bb3a.selectorLabels" . | nindent 6 }}
