apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod1634872-2086-4386-8819-bdfd485b62ab.fullname" . }}
  labels:
    {{- include "go-echod1634872-2086-4386-8819-bdfd485b62ab.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod1634872-2086-4386-8819-bdfd485b62ab.selectorLabels" . | nindent 6 }}
