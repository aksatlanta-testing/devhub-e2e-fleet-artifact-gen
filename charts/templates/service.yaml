apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1610e974-df38-4d04-8e71-ec5e435d0626.fullname" . }}
  labels:
    {{- include "go-echo1610e974-df38-4d04-8e71-ec5e435d0626.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1610e974-df38-4d04-8e71-ec5e435d0626.selectorLabels" . | nindent 6 }}
