apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo240fdebb-1f2e-40a1-ba51-7c70c4f08b88.fullname" . }}
  labels:
    {{- include "go-echo240fdebb-1f2e-40a1-ba51-7c70c4f08b88.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo240fdebb-1f2e-40a1-ba51-7c70c4f08b88.selectorLabels" . | nindent 6 }}
