apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo69c3c824-a01f-4650-9788-e4f75961e8a7.fullname" . }}
  labels:
    {{- include "go-echo69c3c824-a01f-4650-9788-e4f75961e8a7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo69c3c824-a01f-4650-9788-e4f75961e8a7.selectorLabels" . | nindent 6 }}
