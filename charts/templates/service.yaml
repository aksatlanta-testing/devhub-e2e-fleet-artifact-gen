apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe3756908-281b-4fef-9c58-92c71ea7a2b5.fullname" . }}
  labels:
    {{- include "go-echoe3756908-281b-4fef-9c58-92c71ea7a2b5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe3756908-281b-4fef-9c58-92c71ea7a2b5.selectorLabels" . | nindent 6 }}
