apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa981eedf-e48d-4f84-ad28-e948882b1248.fullname" . }}
  labels:
    {{- include "go-echoa981eedf-e48d-4f84-ad28-e948882b1248.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa981eedf-e48d-4f84-ad28-e948882b1248.selectorLabels" . | nindent 6 }}
