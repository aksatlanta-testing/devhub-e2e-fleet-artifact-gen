apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo683b648e-475b-4b0a-9a86-b459fb865d2e.fullname" . }}
  labels:
    {{- include "go-echo683b648e-475b-4b0a-9a86-b459fb865d2e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo683b648e-475b-4b0a-9a86-b459fb865d2e.selectorLabels" . | nindent 6 }}
