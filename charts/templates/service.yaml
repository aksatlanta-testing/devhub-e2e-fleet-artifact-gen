apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo830a0909-5d2d-4480-a76a-b46ddcc82716.fullname" . }}
  labels:
    {{- include "go-echo830a0909-5d2d-4480-a76a-b46ddcc82716.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo830a0909-5d2d-4480-a76a-b46ddcc82716.selectorLabels" . | nindent 6 }}
