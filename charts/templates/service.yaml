apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9c216302-61ac-411b-869b-a332fc74d942.fullname" . }}
  labels:
    {{- include "go-echo9c216302-61ac-411b-869b-a332fc74d942.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9c216302-61ac-411b-869b-a332fc74d942.selectorLabels" . | nindent 6 }}
