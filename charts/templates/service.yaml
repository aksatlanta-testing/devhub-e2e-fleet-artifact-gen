apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod7c60883-7078-4ca0-9007-db6a845000af.fullname" . }}
  labels:
    {{- include "go-echod7c60883-7078-4ca0-9007-db6a845000af.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod7c60883-7078-4ca0-9007-db6a845000af.selectorLabels" . | nindent 6 }}
