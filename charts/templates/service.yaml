apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo963836f5-c1d0-4789-ad0c-bdb80a4e74c6.fullname" . }}
  labels:
    {{- include "go-echo963836f5-c1d0-4789-ad0c-bdb80a4e74c6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo963836f5-c1d0-4789-ad0c-bdb80a4e74c6.selectorLabels" . | nindent 6 }}
