apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobd2709ff-de69-4734-8f16-1b42b15cb2b8.fullname" . }}
  labels:
    {{- include "go-echobd2709ff-de69-4734-8f16-1b42b15cb2b8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobd2709ff-de69-4734-8f16-1b42b15cb2b8.selectorLabels" . | nindent 6 }}
