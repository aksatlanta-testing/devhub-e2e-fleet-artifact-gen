apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7be51d44-bb93-4065-8e89-85ccc46109a8.fullname" . }}
  labels:
    {{- include "go-echo7be51d44-bb93-4065-8e89-85ccc46109a8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7be51d44-bb93-4065-8e89-85ccc46109a8.selectorLabels" . | nindent 6 }}
