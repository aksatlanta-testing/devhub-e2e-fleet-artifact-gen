apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof490ea46-9481-4181-8ec6-3ca8464c0081.fullname" . }}
  labels:
    {{- include "go-echof490ea46-9481-4181-8ec6-3ca8464c0081.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof490ea46-9481-4181-8ec6-3ca8464c0081.selectorLabels" . | nindent 6 }}
