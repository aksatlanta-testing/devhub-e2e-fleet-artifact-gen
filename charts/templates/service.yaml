apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod152265d-dfce-41dc-8119-75a590331592.fullname" . }}
  labels:
    {{- include "go-echod152265d-dfce-41dc-8119-75a590331592.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod152265d-dfce-41dc-8119-75a590331592.selectorLabels" . | nindent 6 }}
