apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7fded122-59c4-4b4b-a61f-b8ea9effec9e.fullname" . }}
  labels:
    {{- include "go-echo7fded122-59c4-4b4b-a61f-b8ea9effec9e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7fded122-59c4-4b4b-a61f-b8ea9effec9e.selectorLabels" . | nindent 6 }}
