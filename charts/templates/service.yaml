apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9ff47d36-0060-440c-916e-83d8722f85c6.fullname" . }}
  labels:
    {{- include "go-echo9ff47d36-0060-440c-916e-83d8722f85c6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9ff47d36-0060-440c-916e-83d8722f85c6.selectorLabels" . | nindent 6 }}
