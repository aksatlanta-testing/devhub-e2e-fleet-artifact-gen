apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo162bd73e-4c27-4532-b7b4-b701d49f43f4.fullname" . }}
  labels:
    {{- include "go-echo162bd73e-4c27-4532-b7b4-b701d49f43f4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo162bd73e-4c27-4532-b7b4-b701d49f43f4.selectorLabels" . | nindent 6 }}
