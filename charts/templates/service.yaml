apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0aca714a-460c-4957-8a1a-e701b498c9c9.fullname" . }}
  labels:
    {{- include "go-echo0aca714a-460c-4957-8a1a-e701b498c9c9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0aca714a-460c-4957-8a1a-e701b498c9c9.selectorLabels" . | nindent 6 }}
