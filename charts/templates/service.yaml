apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo654ea83c-84cd-46cf-80f2-a505a812dec7.fullname" . }}
  labels:
    {{- include "go-echo654ea83c-84cd-46cf-80f2-a505a812dec7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo654ea83c-84cd-46cf-80f2-a505a812dec7.selectorLabels" . | nindent 6 }}
