apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo76e49fb2-815a-40a4-b5be-692515f3bbef.fullname" . }}
  labels:
    {{- include "go-echo76e49fb2-815a-40a4-b5be-692515f3bbef.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo76e49fb2-815a-40a4-b5be-692515f3bbef.selectorLabels" . | nindent 6 }}
