apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9cb4bf08-8160-439b-a1f4-7c5dc955de93.fullname" . }}
  labels:
    {{- include "go-echo9cb4bf08-8160-439b-a1f4-7c5dc955de93.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9cb4bf08-8160-439b-a1f4-7c5dc955de93.selectorLabels" . | nindent 6 }}
