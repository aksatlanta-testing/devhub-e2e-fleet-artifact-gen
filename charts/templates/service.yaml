apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4177bc07-be9e-4696-80fa-8d3b4ae93a0e.fullname" . }}
  labels:
    {{- include "go-echo4177bc07-be9e-4696-80fa-8d3b4ae93a0e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4177bc07-be9e-4696-80fa-8d3b4ae93a0e.selectorLabels" . | nindent 6 }}
