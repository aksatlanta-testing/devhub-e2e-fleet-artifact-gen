apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod859ce14-d219-4c05-a5a3-bccd03768957.fullname" . }}
  labels:
    {{- include "go-echod859ce14-d219-4c05-a5a3-bccd03768957.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod859ce14-d219-4c05-a5a3-bccd03768957.selectorLabels" . | nindent 6 }}
