apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4bb179a6-1670-4be0-8f51-664b7668a0c2.fullname" . }}
  labels:
    {{- include "go-echo4bb179a6-1670-4be0-8f51-664b7668a0c2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4bb179a6-1670-4be0-8f51-664b7668a0c2.selectorLabels" . | nindent 6 }}
