apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo42b35219-cc08-4089-a20f-2a1eb089f170.fullname" . }}
  labels:
    {{- include "go-echo42b35219-cc08-4089-a20f-2a1eb089f170.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo42b35219-cc08-4089-a20f-2a1eb089f170.selectorLabels" . | nindent 6 }}
