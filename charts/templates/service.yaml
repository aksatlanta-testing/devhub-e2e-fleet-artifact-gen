apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo24572a8a-1e74-49be-a928-2b3aee424ca0.fullname" . }}
  labels:
    {{- include "go-echo24572a8a-1e74-49be-a928-2b3aee424ca0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo24572a8a-1e74-49be-a928-2b3aee424ca0.selectorLabels" . | nindent 6 }}
