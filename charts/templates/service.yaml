apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo044f2b87-d473-45a1-95b3-853457185856.fullname" . }}
  labels:
    {{- include "go-echo044f2b87-d473-45a1-95b3-853457185856.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo044f2b87-d473-45a1-95b3-853457185856.selectorLabels" . | nindent 6 }}
