apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo89392761-7b63-4d79-8355-ba85fa9a8302.fullname" . }}
  labels:
    {{- include "go-echo89392761-7b63-4d79-8355-ba85fa9a8302.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo89392761-7b63-4d79-8355-ba85fa9a8302.selectorLabels" . | nindent 6 }}
