apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod6348ae1-e056-4558-b494-afeff51f16b3.fullname" . }}
  labels:
    {{- include "go-echod6348ae1-e056-4558-b494-afeff51f16b3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod6348ae1-e056-4558-b494-afeff51f16b3.selectorLabels" . | nindent 6 }}
