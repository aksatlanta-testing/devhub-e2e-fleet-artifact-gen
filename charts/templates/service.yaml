apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa8802e91-0fcd-48e1-b9b2-9b3bae5a5759.fullname" . }}
  labels:
    {{- include "go-echoa8802e91-0fcd-48e1-b9b2-9b3bae5a5759.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa8802e91-0fcd-48e1-b9b2-9b3bae5a5759.selectorLabels" . | nindent 6 }}
