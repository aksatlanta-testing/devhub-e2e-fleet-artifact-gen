apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo710c05cc-bfce-4704-b641-bbb1c38cb33b.fullname" . }}
  labels:
    {{- include "go-echo710c05cc-bfce-4704-b641-bbb1c38cb33b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo710c05cc-bfce-4704-b641-bbb1c38cb33b.selectorLabels" . | nindent 6 }}
