apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoff1926bd-c272-4ff4-9bc5-1ce4a3fe41c3.fullname" . }}
  labels:
    {{- include "go-echoff1926bd-c272-4ff4-9bc5-1ce4a3fe41c3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoff1926bd-c272-4ff4-9bc5-1ce4a3fe41c3.selectorLabels" . | nindent 6 }}
