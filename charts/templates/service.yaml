apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob3c2e661-30d9-4873-adf5-efbae2bc47a4.fullname" . }}
  labels:
    {{- include "go-echob3c2e661-30d9-4873-adf5-efbae2bc47a4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob3c2e661-30d9-4873-adf5-efbae2bc47a4.selectorLabels" . | nindent 6 }}
