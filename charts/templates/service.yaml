apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc415f002-fee2-4db0-bc2d-1e7b81d19574.fullname" . }}
  labels:
    {{- include "go-echoc415f002-fee2-4db0-bc2d-1e7b81d19574.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc415f002-fee2-4db0-bc2d-1e7b81d19574.selectorLabels" . | nindent 6 }}
