apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa63d0805-21c9-4c05-a728-369401947332.fullname" . }}
  labels:
    {{- include "go-echoa63d0805-21c9-4c05-a728-369401947332.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa63d0805-21c9-4c05-a728-369401947332.selectorLabels" . | nindent 6 }}
