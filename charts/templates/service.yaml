apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoabf99aed-282e-42d7-aa7b-20caaedb24e2.fullname" . }}
  labels:
    {{- include "go-echoabf99aed-282e-42d7-aa7b-20caaedb24e2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoabf99aed-282e-42d7-aa7b-20caaedb24e2.selectorLabels" . | nindent 6 }}
