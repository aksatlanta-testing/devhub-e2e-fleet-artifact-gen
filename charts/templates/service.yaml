apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoddcaf3db-ae23-403a-bb8a-20686da1b9d2.fullname" . }}
  labels:
    {{- include "go-echoddcaf3db-ae23-403a-bb8a-20686da1b9d2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoddcaf3db-ae23-403a-bb8a-20686da1b9d2.selectorLabels" . | nindent 6 }}
