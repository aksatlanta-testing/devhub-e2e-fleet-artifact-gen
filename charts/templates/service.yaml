apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob509accb-c798-4707-ad83-0a5d72f14be6.fullname" . }}
  labels:
    {{- include "go-echob509accb-c798-4707-ad83-0a5d72f14be6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob509accb-c798-4707-ad83-0a5d72f14be6.selectorLabels" . | nindent 6 }}
