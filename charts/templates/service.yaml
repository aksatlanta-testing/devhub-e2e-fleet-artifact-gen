apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc9e315c2-a86a-40a3-8e86-6b09654aeea0.fullname" . }}
  labels:
    {{- include "go-echoc9e315c2-a86a-40a3-8e86-6b09654aeea0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc9e315c2-a86a-40a3-8e86-6b09654aeea0.selectorLabels" . | nindent 6 }}
