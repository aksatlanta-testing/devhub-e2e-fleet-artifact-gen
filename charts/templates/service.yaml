apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob209fd86-17c5-414d-bd6a-944d22a3c46a.fullname" . }}
  labels:
    {{- include "go-echob209fd86-17c5-414d-bd6a-944d22a3c46a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob209fd86-17c5-414d-bd6a-944d22a3c46a.selectorLabels" . | nindent 6 }}
