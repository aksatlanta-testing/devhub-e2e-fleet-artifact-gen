apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1a2b2179-037a-47bb-aab4-c667311e3cef.fullname" . }}
  labels:
    {{- include "go-echo1a2b2179-037a-47bb-aab4-c667311e3cef.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1a2b2179-037a-47bb-aab4-c667311e3cef.selectorLabels" . | nindent 6 }}
