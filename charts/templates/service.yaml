apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0594fb7e-dc0e-4d6d-a58a-d067aeaf39ef.fullname" . }}
  labels:
    {{- include "go-echo0594fb7e-dc0e-4d6d-a58a-d067aeaf39ef.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0594fb7e-dc0e-4d6d-a58a-d067aeaf39ef.selectorLabels" . | nindent 6 }}
