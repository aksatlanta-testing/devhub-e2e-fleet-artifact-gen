apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe7cfea99-cc4e-4cb9-88a2-272d1d1e7aba.fullname" . }}
  labels:
    {{- include "go-echoe7cfea99-cc4e-4cb9-88a2-272d1d1e7aba.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe7cfea99-cc4e-4cb9-88a2-272d1d1e7aba.selectorLabels" . | nindent 6 }}
