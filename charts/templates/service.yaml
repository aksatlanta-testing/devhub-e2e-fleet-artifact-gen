apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo030096b0-c5c3-46d4-876f-3283c080bbf9.fullname" . }}
  labels:
    {{- include "go-echo030096b0-c5c3-46d4-876f-3283c080bbf9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo030096b0-c5c3-46d4-876f-3283c080bbf9.selectorLabels" . | nindent 6 }}
