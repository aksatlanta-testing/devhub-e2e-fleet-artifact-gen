  labels:
    {{- include "go-echo77a7940f-d211-44c0-8932-014785640496.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
