apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6eab7034-38e4-4a93-b6fc-4823e10dd4b5.fullname" . }}
  labels:
    {{- include "go-echo6eab7034-38e4-4a93-b6fc-4823e10dd4b5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6eab7034-38e4-4a93-b6fc-4823e10dd4b5.selectorLabels" . | nindent 6 }}
