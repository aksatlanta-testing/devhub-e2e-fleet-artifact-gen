apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa68382ae-7476-48a6-b787-b50183cf3736.fullname" . }}
  labels:
    {{- include "go-echoa68382ae-7476-48a6-b787-b50183cf3736.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa68382ae-7476-48a6-b787-b50183cf3736.selectorLabels" . | nindent 6 }}
