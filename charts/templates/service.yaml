apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo52337e79-59f3-44d4-ac8e-d2f1e80a3d49.fullname" . }}
  labels:
    {{- include "go-echo52337e79-59f3-44d4-ac8e-d2f1e80a3d49.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo52337e79-59f3-44d4-ac8e-d2f1e80a3d49.selectorLabels" . | nindent 6 }}
