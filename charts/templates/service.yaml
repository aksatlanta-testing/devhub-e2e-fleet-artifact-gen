apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5232f815-b510-454d-84a2-703b58bfd868.fullname" . }}
  labels:
    {{- include "go-echo5232f815-b510-454d-84a2-703b58bfd868.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5232f815-b510-454d-84a2-703b58bfd868.selectorLabels" . | nindent 6 }}
