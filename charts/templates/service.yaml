apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1f79fd82-9f6e-4e7e-870b-7361d832e278.fullname" . }}
  labels:
    {{- include "go-echo1f79fd82-9f6e-4e7e-870b-7361d832e278.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1f79fd82-9f6e-4e7e-870b-7361d832e278.selectorLabels" . | nindent 6 }}
