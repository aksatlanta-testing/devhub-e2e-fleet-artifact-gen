apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocec3cc6a-712a-481d-be12-183d353f5c19.fullname" . }}
  labels:
    {{- include "go-echocec3cc6a-712a-481d-be12-183d353f5c19.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocec3cc6a-712a-481d-be12-183d353f5c19.selectorLabels" . | nindent 6 }}
