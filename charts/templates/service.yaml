apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo57d67cd2-3ea1-48e5-9c5b-c49543398a57.fullname" . }}
  labels:
    {{- include "go-echo57d67cd2-3ea1-48e5-9c5b-c49543398a57.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo57d67cd2-3ea1-48e5-9c5b-c49543398a57.selectorLabels" . | nindent 6 }}
