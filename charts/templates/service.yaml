apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo733e7246-3724-4e92-9700-4fb22ade1f5d.fullname" . }}
  labels:
    {{- include "go-echo733e7246-3724-4e92-9700-4fb22ade1f5d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo733e7246-3724-4e92-9700-4fb22ade1f5d.selectorLabels" . | nindent 6 }}
