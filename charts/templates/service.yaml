apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoeaf6129f-303b-48e2-8708-eefb930e0f12.fullname" . }}
  labels:
    {{- include "go-echoeaf6129f-303b-48e2-8708-eefb930e0f12.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoeaf6129f-303b-48e2-8708-eefb930e0f12.selectorLabels" . | nindent 6 }}
