apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa6f16643-4da3-48d4-adb9-ca7d78ecaa08.fullname" . }}
  labels:
    {{- include "go-echoa6f16643-4da3-48d4-adb9-ca7d78ecaa08.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa6f16643-4da3-48d4-adb9-ca7d78ecaa08.selectorLabels" . | nindent 6 }}
