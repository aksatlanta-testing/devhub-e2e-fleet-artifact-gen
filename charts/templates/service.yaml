apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo131b7439-ac61-4e94-96ce-2438c27d6ba7.fullname" . }}
  labels:
    {{- include "go-echo131b7439-ac61-4e94-96ce-2438c27d6ba7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo131b7439-ac61-4e94-96ce-2438c27d6ba7.selectorLabels" . | nindent 6 }}
