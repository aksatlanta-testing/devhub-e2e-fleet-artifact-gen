apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2b8bec73-ceb4-444d-b998-389e2b215baa.fullname" . }}
  labels:
    {{- include "go-echo2b8bec73-ceb4-444d-b998-389e2b215baa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2b8bec73-ceb4-444d-b998-389e2b215baa.selectorLabels" . | nindent 6 }}
