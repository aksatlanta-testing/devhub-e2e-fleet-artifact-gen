apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2975558a-0cde-4ca7-ac8e-5f04c43b5837.fullname" . }}
  labels:
    {{- include "go-echo2975558a-0cde-4ca7-ac8e-5f04c43b5837.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2975558a-0cde-4ca7-ac8e-5f04c43b5837.selectorLabels" . | nindent 6 }}
