apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob9aea2d6-52f8-4ed8-a307-88baabebaef4.fullname" . }}
  labels:
    {{- include "go-echob9aea2d6-52f8-4ed8-a307-88baabebaef4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob9aea2d6-52f8-4ed8-a307-88baabebaef4.selectorLabels" . | nindent 6 }}
