apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0e5211ee-ff04-4005-a5a3-effebb0b7357.fullname" . }}
  labels:
    {{- include "go-echo0e5211ee-ff04-4005-a5a3-effebb0b7357.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0e5211ee-ff04-4005-a5a3-effebb0b7357.selectorLabels" . | nindent 6 }}
