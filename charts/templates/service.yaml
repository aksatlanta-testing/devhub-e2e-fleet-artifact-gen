apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo84971746-3a17-4b4e-9ae9-3b5e848bb868.fullname" . }}
  labels:
    {{- include "go-echo84971746-3a17-4b4e-9ae9-3b5e848bb868.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo84971746-3a17-4b4e-9ae9-3b5e848bb868.selectorLabels" . | nindent 6 }}
