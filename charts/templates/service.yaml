apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6bd4eada-2e60-4b43-8c95-84c1f10e98f0.fullname" . }}
  labels:
    {{- include "go-echo6bd4eada-2e60-4b43-8c95-84c1f10e98f0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6bd4eada-2e60-4b43-8c95-84c1f10e98f0.selectorLabels" . | nindent 6 }}
