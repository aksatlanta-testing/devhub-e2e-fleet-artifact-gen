apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod1f9def5-5765-4706-8931-f0ee8ae01f82.fullname" . }}
  labels:
    {{- include "go-echod1f9def5-5765-4706-8931-f0ee8ae01f82.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod1f9def5-5765-4706-8931-f0ee8ae01f82.selectorLabels" . | nindent 6 }}
