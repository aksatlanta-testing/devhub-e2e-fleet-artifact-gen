apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo89cad0ba-8230-4de4-9137-b5c871cb735a.fullname" . }}
  labels:
    {{- include "go-echo89cad0ba-8230-4de4-9137-b5c871cb735a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo89cad0ba-8230-4de4-9137-b5c871cb735a.selectorLabels" . | nindent 6 }}
