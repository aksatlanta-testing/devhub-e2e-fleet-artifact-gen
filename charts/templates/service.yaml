apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocb052c14-65df-428f-bd11-4a5a9aace67a.fullname" . }}
  labels:
    {{- include "go-echocb052c14-65df-428f-bd11-4a5a9aace67a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocb052c14-65df-428f-bd11-4a5a9aace67a.selectorLabels" . | nindent 6 }}
