apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo13f520ff-8fef-4aed-b566-d2b1536e4fb9.fullname" . }}
  labels:
    {{- include "go-echo13f520ff-8fef-4aed-b566-d2b1536e4fb9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo13f520ff-8fef-4aed-b566-d2b1536e4fb9.selectorLabels" . | nindent 6 }}
