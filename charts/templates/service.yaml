apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo50a1f37d-9a00-4b8d-8a54-e42be856746f.fullname" . }}
  labels:
    {{- include "go-echo50a1f37d-9a00-4b8d-8a54-e42be856746f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo50a1f37d-9a00-4b8d-8a54-e42be856746f.selectorLabels" . | nindent 6 }}
