apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4644f9fb-a138-4456-a837-92497f1379a8.fullname" . }}
  labels:
    {{- include "go-echo4644f9fb-a138-4456-a837-92497f1379a8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4644f9fb-a138-4456-a837-92497f1379a8.selectorLabels" . | nindent 6 }}
