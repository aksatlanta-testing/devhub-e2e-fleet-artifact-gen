apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoba14dea1-fe87-4032-a50a-43323cf04f33.fullname" . }}
  labels:
    {{- include "go-echoba14dea1-fe87-4032-a50a-43323cf04f33.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoba14dea1-fe87-4032-a50a-43323cf04f33.selectorLabels" . | nindent 6 }}
