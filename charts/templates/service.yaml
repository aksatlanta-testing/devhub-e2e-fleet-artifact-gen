apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo57c6092f-2043-42a1-8326-18dadb18589c.fullname" . }}
  labels:
    {{- include "go-echo57c6092f-2043-42a1-8326-18dadb18589c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo57c6092f-2043-42a1-8326-18dadb18589c.selectorLabels" . | nindent 6 }}
