apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1c979e74-bb14-4b03-9ebd-451ab1473ea1.fullname" . }}
  labels:
    {{- include "go-echo1c979e74-bb14-4b03-9ebd-451ab1473ea1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1c979e74-bb14-4b03-9ebd-451ab1473ea1.selectorLabels" . | nindent 6 }}
