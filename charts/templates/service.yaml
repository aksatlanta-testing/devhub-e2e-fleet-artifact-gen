apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocdf55af9-6f4c-41ae-917b-c1a3cec4c634.fullname" . }}
  labels:
    {{- include "go-echocdf55af9-6f4c-41ae-917b-c1a3cec4c634.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocdf55af9-6f4c-41ae-917b-c1a3cec4c634.selectorLabels" . | nindent 6 }}
