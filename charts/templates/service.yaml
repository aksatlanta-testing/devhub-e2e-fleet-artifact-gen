apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe103ace3-0487-4c01-9669-818b6b0de69a.fullname" . }}
  labels:
    {{- include "go-echoe103ace3-0487-4c01-9669-818b6b0de69a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe103ace3-0487-4c01-9669-818b6b0de69a.selectorLabels" . | nindent 6 }}
