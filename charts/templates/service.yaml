apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob617af1f-0e26-4646-bc0c-7f460c8ddaf3.fullname" . }}
  labels:
    {{- include "go-echob617af1f-0e26-4646-bc0c-7f460c8ddaf3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob617af1f-0e26-4646-bc0c-7f460c8ddaf3.selectorLabels" . | nindent 6 }}
