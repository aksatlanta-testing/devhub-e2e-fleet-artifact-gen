apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo218346ee-915f-4eeb-abb2-c8f509066175.fullname" . }}
  labels:
    {{- include "go-echo218346ee-915f-4eeb-abb2-c8f509066175.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo218346ee-915f-4eeb-abb2-c8f509066175.selectorLabels" . | nindent 6 }}
