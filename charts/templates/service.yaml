apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9f38c668-62f0-4600-8cc2-3b700d688f47.fullname" . }}
  labels:
    {{- include "go-echo9f38c668-62f0-4600-8cc2-3b700d688f47.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9f38c668-62f0-4600-8cc2-3b700d688f47.selectorLabels" . | nindent 6 }}
