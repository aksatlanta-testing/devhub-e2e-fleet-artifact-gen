apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7bc45dfb-8bd0-46a9-8945-688b9d801f6a.fullname" . }}
  labels:
    {{- include "go-echo7bc45dfb-8bd0-46a9-8945-688b9d801f6a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7bc45dfb-8bd0-46a9-8945-688b9d801f6a.selectorLabels" . | nindent 6 }}
