apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaae75c48-cb91-4374-90a8-ee23b019ba75.fullname" . }}
  labels:
    {{- include "go-echoaae75c48-cb91-4374-90a8-ee23b019ba75.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaae75c48-cb91-4374-90a8-ee23b019ba75.selectorLabels" . | nindent 6 }}
