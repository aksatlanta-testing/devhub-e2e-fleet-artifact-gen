apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoef8d6d3d-9503-489f-ac02-d026213ff9f4.fullname" . }}
  labels:
    {{- include "go-echoef8d6d3d-9503-489f-ac02-d026213ff9f4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoef8d6d3d-9503-489f-ac02-d026213ff9f4.selectorLabels" . | nindent 6 }}
