apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo82814a91-d48b-41a8-8978-1ce085a290b0.fullname" . }}
  labels:
    {{- include "go-echo82814a91-d48b-41a8-8978-1ce085a290b0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo82814a91-d48b-41a8-8978-1ce085a290b0.selectorLabels" . | nindent 6 }}
