apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo78e5776a-422c-4a12-8968-693fd2b2ec3b.fullname" . }}
  labels:
    {{- include "go-echo78e5776a-422c-4a12-8968-693fd2b2ec3b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo78e5776a-422c-4a12-8968-693fd2b2ec3b.selectorLabels" . | nindent 6 }}
