apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocc1e3799-727c-40b5-9257-d46d5a11e1be.fullname" . }}
  labels:
    {{- include "go-echocc1e3799-727c-40b5-9257-d46d5a11e1be.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocc1e3799-727c-40b5-9257-d46d5a11e1be.selectorLabels" . | nindent 6 }}
