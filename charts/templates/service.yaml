apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3ac88df5-aa13-46c8-b96a-7907d3744d64.fullname" . }}
  labels:
    {{- include "go-echo3ac88df5-aa13-46c8-b96a-7907d3744d64.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3ac88df5-aa13-46c8-b96a-7907d3744d64.selectorLabels" . | nindent 6 }}
