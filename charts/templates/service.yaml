apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodbad89d7-7864-4fa2-8328-a3e00eaa86d1.fullname" . }}
  labels:
    {{- include "go-echodbad89d7-7864-4fa2-8328-a3e00eaa86d1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodbad89d7-7864-4fa2-8328-a3e00eaa86d1.selectorLabels" . | nindent 6 }}
