apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2e9bb44e-cf3f-473e-adfb-f54ba9b608c4.fullname" . }}
  labels:
    {{- include "go-echo2e9bb44e-cf3f-473e-adfb-f54ba9b608c4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2e9bb44e-cf3f-473e-adfb-f54ba9b608c4.selectorLabels" . | nindent 6 }}
