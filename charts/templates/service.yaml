apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe93da8df-96f7-4b41-92c5-f1d41077870b.fullname" . }}
  labels:
    {{- include "go-echoe93da8df-96f7-4b41-92c5-f1d41077870b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe93da8df-96f7-4b41-92c5-f1d41077870b.selectorLabels" . | nindent 6 }}
