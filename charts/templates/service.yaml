apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9fff8ac5-cc01-4962-a3fe-fa0013f9ead3.fullname" . }}
  labels:
    {{- include "go-echo9fff8ac5-cc01-4962-a3fe-fa0013f9ead3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9fff8ac5-cc01-4962-a3fe-fa0013f9ead3.selectorLabels" . | nindent 6 }}
