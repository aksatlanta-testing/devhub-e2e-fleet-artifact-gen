apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod80963b1-9637-4bb6-886b-0374f2dadb98.fullname" . }}
  labels:
    {{- include "go-echod80963b1-9637-4bb6-886b-0374f2dadb98.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod80963b1-9637-4bb6-886b-0374f2dadb98.selectorLabels" . | nindent 6 }}
