apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8b19d33b-e44f-4af5-bfe9-f9e765ad5a20.fullname" . }}
  labels:
    {{- include "go-echo8b19d33b-e44f-4af5-bfe9-f9e765ad5a20.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8b19d33b-e44f-4af5-bfe9-f9e765ad5a20.selectorLabels" . | nindent 6 }}
