apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8d5ea02a-3557-4193-bf51-c835bf34609b.fullname" . }}
  labels:
    {{- include "go-echo8d5ea02a-3557-4193-bf51-c835bf34609b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8d5ea02a-3557-4193-bf51-c835bf34609b.selectorLabels" . | nindent 6 }}
