apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoac223d62-9fab-4e41-8706-83f140cc0de1.fullname" . }}
  labels:
    {{- include "go-echoac223d62-9fab-4e41-8706-83f140cc0de1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoac223d62-9fab-4e41-8706-83f140cc0de1.selectorLabels" . | nindent 6 }}
