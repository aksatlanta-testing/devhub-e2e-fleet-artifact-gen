apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo613b8f27-3e5c-43fb-ba93-ccdf90352135.fullname" . }}
  labels:
    {{- include "go-echo613b8f27-3e5c-43fb-ba93-ccdf90352135.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo613b8f27-3e5c-43fb-ba93-ccdf90352135.selectorLabels" . | nindent 6 }}
