apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0e24ef53-3f9f-4610-9776-fd5bd8c13fac.fullname" . }}
  labels:
    {{- include "go-echo0e24ef53-3f9f-4610-9776-fd5bd8c13fac.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0e24ef53-3f9f-4610-9776-fd5bd8c13fac.selectorLabels" . | nindent 6 }}
