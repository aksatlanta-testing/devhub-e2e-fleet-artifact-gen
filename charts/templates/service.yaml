apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0bc93076-f0ae-45bf-ac2b-27cd06cb54e6.fullname" . }}
  labels:
    {{- include "go-echo0bc93076-f0ae-45bf-ac2b-27cd06cb54e6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0bc93076-f0ae-45bf-ac2b-27cd06cb54e6.selectorLabels" . | nindent 6 }}
