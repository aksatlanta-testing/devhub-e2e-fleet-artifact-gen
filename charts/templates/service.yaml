apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo346de8e4-f4fc-4dc4-803b-b4ede45eecd5.fullname" . }}
  labels:
    {{- include "go-echo346de8e4-f4fc-4dc4-803b-b4ede45eecd5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo346de8e4-f4fc-4dc4-803b-b4ede45eecd5.selectorLabels" . | nindent 6 }}
