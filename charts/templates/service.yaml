apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9dcb1a12-fadf-4b70-9f54-0f8cb85d78d1.fullname" . }}
  labels:
    {{- include "go-echo9dcb1a12-fadf-4b70-9f54-0f8cb85d78d1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9dcb1a12-fadf-4b70-9f54-0f8cb85d78d1.selectorLabels" . | nindent 6 }}
