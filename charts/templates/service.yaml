apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob0b73258-03dd-4d12-9555-866a3d1c5f3c.fullname" . }}
  labels:
    {{- include "go-echob0b73258-03dd-4d12-9555-866a3d1c5f3c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob0b73258-03dd-4d12-9555-866a3d1c5f3c.selectorLabels" . | nindent 6 }}
