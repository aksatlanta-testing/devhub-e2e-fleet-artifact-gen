apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo12fc1622-2957-4fd2-ab84-bb30a901ef42.fullname" . }}
  labels:
    {{- include "go-echo12fc1622-2957-4fd2-ab84-bb30a901ef42.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo12fc1622-2957-4fd2-ab84-bb30a901ef42.selectorLabels" . | nindent 6 }}
