apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe9436c4e-0676-41d6-af2f-16e9d2fe2d3e.fullname" . }}
  labels:
    {{- include "go-echoe9436c4e-0676-41d6-af2f-16e9d2fe2d3e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe9436c4e-0676-41d6-af2f-16e9d2fe2d3e.selectorLabels" . | nindent 6 }}
