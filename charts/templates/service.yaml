apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo316788e6-64fe-48ec-b4f5-fd69f558df71.fullname" . }}
  labels:
    {{- include "go-echo316788e6-64fe-48ec-b4f5-fd69f558df71.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo316788e6-64fe-48ec-b4f5-fd69f558df71.selectorLabels" . | nindent 6 }}
