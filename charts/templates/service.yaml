apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1183e04d-45e6-43d8-85ba-f1aa4a289b8f.fullname" . }}
  labels:
    {{- include "go-echo1183e04d-45e6-43d8-85ba-f1aa4a289b8f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1183e04d-45e6-43d8-85ba-f1aa4a289b8f.selectorLabels" . | nindent 6 }}
