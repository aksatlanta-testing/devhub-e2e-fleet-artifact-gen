apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocefd21a6-fd6e-4a39-adce-11d76489a9ab.fullname" . }}
  labels:
    {{- include "go-echocefd21a6-fd6e-4a39-adce-11d76489a9ab.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocefd21a6-fd6e-4a39-adce-11d76489a9ab.selectorLabels" . | nindent 6 }}
