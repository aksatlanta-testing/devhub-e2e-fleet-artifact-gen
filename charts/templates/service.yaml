apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1e338ce7-7a48-42d0-b741-003c8b3032d8.fullname" . }}
  labels:
    {{- include "go-echo1e338ce7-7a48-42d0-b741-003c8b3032d8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1e338ce7-7a48-42d0-b741-003c8b3032d8.selectorLabels" . | nindent 6 }}
