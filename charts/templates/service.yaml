apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe1f8a8bf-6dd3-49bc-ac0d-a4ad3b57d6c0.fullname" . }}
  labels:
    {{- include "go-echoe1f8a8bf-6dd3-49bc-ac0d-a4ad3b57d6c0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe1f8a8bf-6dd3-49bc-ac0d-a4ad3b57d6c0.selectorLabels" . | nindent 6 }}
