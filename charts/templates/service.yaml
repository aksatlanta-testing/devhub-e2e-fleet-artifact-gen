apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo22de6d27-1bb9-4e52-b792-7d93c3f2061a.fullname" . }}
  labels:
    {{- include "go-echo22de6d27-1bb9-4e52-b792-7d93c3f2061a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo22de6d27-1bb9-4e52-b792-7d93c3f2061a.selectorLabels" . | nindent 6 }}
