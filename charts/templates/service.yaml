apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8a28c597-53b8-406d-b02d-beb9dc1809c0.fullname" . }}
  labels:
    {{- include "go-echo8a28c597-53b8-406d-b02d-beb9dc1809c0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8a28c597-53b8-406d-b02d-beb9dc1809c0.selectorLabels" . | nindent 6 }}
