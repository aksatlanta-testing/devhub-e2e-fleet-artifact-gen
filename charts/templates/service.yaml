apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo767b21e9-541d-4c19-ad4d-2f1ed1398e9a.fullname" . }}
  labels:
    {{- include "go-echo767b21e9-541d-4c19-ad4d-2f1ed1398e9a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo767b21e9-541d-4c19-ad4d-2f1ed1398e9a.selectorLabels" . | nindent 6 }}
