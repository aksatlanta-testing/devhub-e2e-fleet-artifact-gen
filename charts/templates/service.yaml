apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofc0da1fd-4ab5-4af2-adac-fdb1cbb110d3.fullname" . }}
  labels:
    {{- include "go-echofc0da1fd-4ab5-4af2-adac-fdb1cbb110d3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofc0da1fd-4ab5-4af2-adac-fdb1cbb110d3.selectorLabels" . | nindent 6 }}
