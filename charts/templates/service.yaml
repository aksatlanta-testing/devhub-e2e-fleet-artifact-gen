apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa7aeb1ec-3b01-4984-aeb7-f69c9db6d769.fullname" . }}
  labels:
    {{- include "go-echoa7aeb1ec-3b01-4984-aeb7-f69c9db6d769.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa7aeb1ec-3b01-4984-aeb7-f69c9db6d769.selectorLabels" . | nindent 6 }}
