apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1683789c-1058-430a-bd82-cb5120b8c97d.fullname" . }}
  labels:
    {{- include "go-echo1683789c-1058-430a-bd82-cb5120b8c97d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1683789c-1058-430a-bd82-cb5120b8c97d.selectorLabels" . | nindent 6 }}
