apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod9563c78-81ad-4cbe-b3cc-ac846a60d8c9.fullname" . }}
  labels:
    {{- include "go-echod9563c78-81ad-4cbe-b3cc-ac846a60d8c9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod9563c78-81ad-4cbe-b3cc-ac846a60d8c9.selectorLabels" . | nindent 6 }}
