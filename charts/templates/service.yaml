apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa3ff46c6-1f54-4dde-979e-a2856b3223b0.fullname" . }}
  labels:
    {{- include "go-echoa3ff46c6-1f54-4dde-979e-a2856b3223b0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa3ff46c6-1f54-4dde-979e-a2856b3223b0.selectorLabels" . | nindent 6 }}
