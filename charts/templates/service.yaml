apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobfbed6e9-8ed5-47a1-8a6e-cefa33dda253.fullname" . }}
  labels:
    {{- include "go-echobfbed6e9-8ed5-47a1-8a6e-cefa33dda253.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobfbed6e9-8ed5-47a1-8a6e-cefa33dda253.selectorLabels" . | nindent 6 }}
