apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo876b03e7-fe50-4d64-a061-8b8c05167a93.fullname" . }}
  labels:
    {{- include "go-echo876b03e7-fe50-4d64-a061-8b8c05167a93.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo876b03e7-fe50-4d64-a061-8b8c05167a93.selectorLabels" . | nindent 6 }}
