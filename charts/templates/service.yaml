apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaf74717d-0058-4228-a45d-c217f4118a46.fullname" . }}
  labels:
    {{- include "go-echoaf74717d-0058-4228-a45d-c217f4118a46.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaf74717d-0058-4228-a45d-c217f4118a46.selectorLabels" . | nindent 6 }}
