apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3b9f82c1-e978-4138-9770-e173fd197fec.fullname" . }}
  labels:
    {{- include "go-echo3b9f82c1-e978-4138-9770-e173fd197fec.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3b9f82c1-e978-4138-9770-e173fd197fec.selectorLabels" . | nindent 6 }}
