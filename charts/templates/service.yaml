apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoadfe622f-a8f4-4f5a-b20f-8d213e9b1f72.fullname" . }}
  labels:
    {{- include "go-echoadfe622f-a8f4-4f5a-b20f-8d213e9b1f72.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoadfe622f-a8f4-4f5a-b20f-8d213e9b1f72.selectorLabels" . | nindent 6 }}
