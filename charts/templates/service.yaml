apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoab660b48-8d38-4cbc-b3fd-aa663ddd7a5b.fullname" . }}
  labels:
    {{- include "go-echoab660b48-8d38-4cbc-b3fd-aa663ddd7a5b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoab660b48-8d38-4cbc-b3fd-aa663ddd7a5b.selectorLabels" . | nindent 6 }}
