apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo666a7747-bacc-4bb5-b479-ac273398b549.fullname" . }}
  labels:
    {{- include "go-echo666a7747-bacc-4bb5-b479-ac273398b549.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo666a7747-bacc-4bb5-b479-ac273398b549.selectorLabels" . | nindent 6 }}
