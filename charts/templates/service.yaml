apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2b6018a5-379f-48d7-af1b-6bfd5f5c3dbc.fullname" . }}
  labels:
    {{- include "go-echo2b6018a5-379f-48d7-af1b-6bfd5f5c3dbc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2b6018a5-379f-48d7-af1b-6bfd5f5c3dbc.selectorLabels" . | nindent 6 }}
