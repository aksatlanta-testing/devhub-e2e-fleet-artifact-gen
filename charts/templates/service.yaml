apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoec01581d-3885-434e-8f4c-e19082e593e2.fullname" . }}
  labels:
    {{- include "go-echoec01581d-3885-434e-8f4c-e19082e593e2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoec01581d-3885-434e-8f4c-e19082e593e2.selectorLabels" . | nindent 6 }}
