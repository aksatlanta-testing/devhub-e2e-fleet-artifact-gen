apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocc5e866f-2954-4c93-9211-fdd76ff89ced.fullname" . }}
  labels:
    {{- include "go-echocc5e866f-2954-4c93-9211-fdd76ff89ced.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocc5e866f-2954-4c93-9211-fdd76ff89ced.selectorLabels" . | nindent 6 }}
