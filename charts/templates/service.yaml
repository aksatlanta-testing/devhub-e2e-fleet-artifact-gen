apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoae48b9a5-e98e-4891-af93-c1c68125b61d.fullname" . }}
  labels:
    {{- include "go-echoae48b9a5-e98e-4891-af93-c1c68125b61d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoae48b9a5-e98e-4891-af93-c1c68125b61d.selectorLabels" . | nindent 6 }}
