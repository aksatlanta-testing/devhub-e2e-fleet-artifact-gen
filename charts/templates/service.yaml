apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo983297ac-e2ea-47ca-b292-1620df1b56a6.fullname" . }}
  labels:
    {{- include "go-echo983297ac-e2ea-47ca-b292-1620df1b56a6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo983297ac-e2ea-47ca-b292-1620df1b56a6.selectorLabels" . | nindent 6 }}
