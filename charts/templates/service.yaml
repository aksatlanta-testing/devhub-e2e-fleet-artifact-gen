apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9750f812-e890-4e07-9560-541e9c2d3a5c.fullname" . }}
  labels:
    {{- include "go-echo9750f812-e890-4e07-9560-541e9c2d3a5c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9750f812-e890-4e07-9560-541e9c2d3a5c.selectorLabels" . | nindent 6 }}
