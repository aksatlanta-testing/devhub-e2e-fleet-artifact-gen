apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe12abfa6-3607-48d1-acb1-2d35168da259.fullname" . }}
  labels:
    {{- include "go-echoe12abfa6-3607-48d1-acb1-2d35168da259.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe12abfa6-3607-48d1-acb1-2d35168da259.selectorLabels" . | nindent 6 }}
