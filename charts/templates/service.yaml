apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8765ab7a-8f05-4ed3-b763-b7cb5f6bfe54.fullname" . }}
  labels:
    {{- include "go-echo8765ab7a-8f05-4ed3-b763-b7cb5f6bfe54.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8765ab7a-8f05-4ed3-b763-b7cb5f6bfe54.selectorLabels" . | nindent 6 }}
