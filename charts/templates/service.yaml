apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa289122c-aa9b-4474-a2a2-2ca5c428a307.fullname" . }}
  labels:
    {{- include "go-echoa289122c-aa9b-4474-a2a2-2ca5c428a307.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa289122c-aa9b-4474-a2a2-2ca5c428a307.selectorLabels" . | nindent 6 }}
