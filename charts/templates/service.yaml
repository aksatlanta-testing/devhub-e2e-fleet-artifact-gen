apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc51611a8-61f3-4631-9e7f-c56fe8f1e565.fullname" . }}
  labels:
    {{- include "go-echoc51611a8-61f3-4631-9e7f-c56fe8f1e565.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc51611a8-61f3-4631-9e7f-c56fe8f1e565.selectorLabels" . | nindent 6 }}
