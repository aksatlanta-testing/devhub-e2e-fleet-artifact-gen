apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod42d2a85-7f45-4cd2-a756-3bb48a0e4458.fullname" . }}
  labels:
    {{- include "go-echod42d2a85-7f45-4cd2-a756-3bb48a0e4458.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod42d2a85-7f45-4cd2-a756-3bb48a0e4458.selectorLabels" . | nindent 6 }}
