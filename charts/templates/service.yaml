apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob39642ec-0329-48ad-84e2-f485afba8de7.fullname" . }}
  labels:
    {{- include "go-echob39642ec-0329-48ad-84e2-f485afba8de7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob39642ec-0329-48ad-84e2-f485afba8de7.selectorLabels" . | nindent 6 }}
