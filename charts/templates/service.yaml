apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofc1cd314-3af7-4e3c-99ca-c0d116b90661.fullname" . }}
  labels:
    {{- include "go-echofc1cd314-3af7-4e3c-99ca-c0d116b90661.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofc1cd314-3af7-4e3c-99ca-c0d116b90661.selectorLabels" . | nindent 6 }}
