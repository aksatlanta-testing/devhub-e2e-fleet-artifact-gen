apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo149aad2f-f9e4-47f0-b364-c5ea769b1e9e.fullname" . }}
  labels:
    {{- include "go-echo149aad2f-f9e4-47f0-b364-c5ea769b1e9e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo149aad2f-f9e4-47f0-b364-c5ea769b1e9e.selectorLabels" . | nindent 6 }}
