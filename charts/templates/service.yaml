apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo099b86f4-6f6f-4c91-beae-802bf14f0bd6.fullname" . }}
  labels:
    {{- include "go-echo099b86f4-6f6f-4c91-beae-802bf14f0bd6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo099b86f4-6f6f-4c91-beae-802bf14f0bd6.selectorLabels" . | nindent 6 }}
