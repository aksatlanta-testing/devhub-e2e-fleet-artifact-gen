apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe9bd23f5-6c9c-4b82-9c8f-49ad11c8400d.fullname" . }}
  labels:
    {{- include "go-echoe9bd23f5-6c9c-4b82-9c8f-49ad11c8400d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe9bd23f5-6c9c-4b82-9c8f-49ad11c8400d.selectorLabels" . | nindent 6 }}
