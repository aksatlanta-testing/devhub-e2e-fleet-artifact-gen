apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4b192d99-b204-4ba4-9ccc-c4e1fb3c98ad.fullname" . }}
  labels:
    {{- include "go-echo4b192d99-b204-4ba4-9ccc-c4e1fb3c98ad.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4b192d99-b204-4ba4-9ccc-c4e1fb3c98ad.selectorLabels" . | nindent 6 }}
