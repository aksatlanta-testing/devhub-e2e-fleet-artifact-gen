apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob5192aaa-89e9-43e5-abed-ba03c59799c8.fullname" . }}
  labels:
    {{- include "go-echob5192aaa-89e9-43e5-abed-ba03c59799c8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob5192aaa-89e9-43e5-abed-ba03c59799c8.selectorLabels" . | nindent 6 }}
