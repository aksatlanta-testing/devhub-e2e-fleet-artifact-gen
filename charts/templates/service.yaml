apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod5a2e757-9d1b-433f-be1e-37e084729578.fullname" . }}
  labels:
    {{- include "go-echod5a2e757-9d1b-433f-be1e-37e084729578.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod5a2e757-9d1b-433f-be1e-37e084729578.selectorLabels" . | nindent 6 }}
