apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoda2420b4-418a-4672-866c-af97e9a9aa51.fullname" . }}
  labels:
    {{- include "go-echoda2420b4-418a-4672-866c-af97e9a9aa51.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoda2420b4-418a-4672-866c-af97e9a9aa51.selectorLabels" . | nindent 6 }}
