apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4c54ae9d-e680-4085-93ad-fe124f6cae1c.fullname" . }}
  labels:
    {{- include "go-echo4c54ae9d-e680-4085-93ad-fe124f6cae1c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4c54ae9d-e680-4085-93ad-fe124f6cae1c.selectorLabels" . | nindent 6 }}
