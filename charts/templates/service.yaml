apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc520a223-a52b-4a9f-b7ad-908794aa943c.fullname" . }}
  labels:
    {{- include "go-echoc520a223-a52b-4a9f-b7ad-908794aa943c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc520a223-a52b-4a9f-b7ad-908794aa943c.selectorLabels" . | nindent 6 }}
