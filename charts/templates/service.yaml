apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob40c9ce7-eed8-4b50-b59a-50ad72a9b480.fullname" . }}
  labels:
    {{- include "go-echob40c9ce7-eed8-4b50-b59a-50ad72a9b480.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob40c9ce7-eed8-4b50-b59a-50ad72a9b480.selectorLabels" . | nindent 6 }}
