apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof5c65a31-8f5e-47d3-9fe9-0f85a0f685ff.fullname" . }}
  labels:
    {{- include "go-echof5c65a31-8f5e-47d3-9fe9-0f85a0f685ff.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof5c65a31-8f5e-47d3-9fe9-0f85a0f685ff.selectorLabels" . | nindent 6 }}
