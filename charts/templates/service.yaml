apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9142fe1b-0ed3-4791-a6b2-64865bc1b6eb.fullname" . }}
  labels:
    {{- include "go-echo9142fe1b-0ed3-4791-a6b2-64865bc1b6eb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9142fe1b-0ed3-4791-a6b2-64865bc1b6eb.selectorLabels" . | nindent 6 }}
