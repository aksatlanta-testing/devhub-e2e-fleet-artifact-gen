apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe485f6f3-1da6-46cd-98cc-b3a5e22d7179.fullname" . }}
  labels:
    {{- include "go-echoe485f6f3-1da6-46cd-98cc-b3a5e22d7179.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe485f6f3-1da6-46cd-98cc-b3a5e22d7179.selectorLabels" . | nindent 6 }}
