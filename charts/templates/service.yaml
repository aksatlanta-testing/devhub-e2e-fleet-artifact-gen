apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8bc9fd23-48fc-4c53-9436-e9ba74cd8b76.fullname" . }}
  labels:
    {{- include "go-echo8bc9fd23-48fc-4c53-9436-e9ba74cd8b76.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8bc9fd23-48fc-4c53-9436-e9ba74cd8b76.selectorLabels" . | nindent 6 }}
