apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod3abed28-59e4-45fa-b70a-ecf3eafee757.fullname" . }}
  labels:
    {{- include "go-echod3abed28-59e4-45fa-b70a-ecf3eafee757.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod3abed28-59e4-45fa-b70a-ecf3eafee757.selectorLabels" . | nindent 6 }}
