apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4f9f69ab-d232-47a3-b144-dde09b555435.fullname" . }}
  labels:
    {{- include "go-echo4f9f69ab-d232-47a3-b144-dde09b555435.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4f9f69ab-d232-47a3-b144-dde09b555435.selectorLabels" . | nindent 6 }}
