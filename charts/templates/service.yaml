apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2e8b5184-cc76-4762-84a6-a0d86f15b79c.fullname" . }}
  labels:
    {{- include "go-echo2e8b5184-cc76-4762-84a6-a0d86f15b79c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2e8b5184-cc76-4762-84a6-a0d86f15b79c.selectorLabels" . | nindent 6 }}
