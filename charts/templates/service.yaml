apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo18df7680-c369-4d94-844e-443fb9d8c9d3.fullname" . }}
  labels:
    {{- include "go-echo18df7680-c369-4d94-844e-443fb9d8c9d3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo18df7680-c369-4d94-844e-443fb9d8c9d3.selectorLabels" . | nindent 6 }}
