apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofb9951b2-4b93-42e0-8c87-cb68e509db28.fullname" . }}
  labels:
    {{- include "go-echofb9951b2-4b93-42e0-8c87-cb68e509db28.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofb9951b2-4b93-42e0-8c87-cb68e509db28.selectorLabels" . | nindent 6 }}
