apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaf162639-582b-41fc-b007-6e939eff4c40.fullname" . }}
  labels:
    {{- include "go-echoaf162639-582b-41fc-b007-6e939eff4c40.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaf162639-582b-41fc-b007-6e939eff4c40.selectorLabels" . | nindent 6 }}
