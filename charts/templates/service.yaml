apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo42f28470-9ade-4846-b225-dd657c2a4d2f.fullname" . }}
  labels:
    {{- include "go-echo42f28470-9ade-4846-b225-dd657c2a4d2f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo42f28470-9ade-4846-b225-dd657c2a4d2f.selectorLabels" . | nindent 6 }}
