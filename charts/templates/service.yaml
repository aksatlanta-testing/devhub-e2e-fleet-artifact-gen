apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4040d5d0-37d6-4630-b65d-38816caa641c.fullname" . }}
  labels:
    {{- include "go-echo4040d5d0-37d6-4630-b65d-38816caa641c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4040d5d0-37d6-4630-b65d-38816caa641c.selectorLabels" . | nindent 6 }}
