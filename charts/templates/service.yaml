apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc82e8c6d-2861-4aa2-8157-413b2763e01a.fullname" . }}
  labels:
    {{- include "go-echoc82e8c6d-2861-4aa2-8157-413b2763e01a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc82e8c6d-2861-4aa2-8157-413b2763e01a.selectorLabels" . | nindent 6 }}
