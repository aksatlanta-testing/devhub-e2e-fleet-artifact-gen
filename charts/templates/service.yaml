apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo958bc414-3c05-404d-8dea-64b7ea2e1f05.fullname" . }}
  labels:
    {{- include "go-echo958bc414-3c05-404d-8dea-64b7ea2e1f05.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo958bc414-3c05-404d-8dea-64b7ea2e1f05.selectorLabels" . | nindent 6 }}
