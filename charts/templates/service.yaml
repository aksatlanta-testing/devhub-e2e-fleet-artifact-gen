apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo529c20c1-afe2-49a5-96fd-1178989dd474.fullname" . }}
  labels:
    {{- include "go-echo529c20c1-afe2-49a5-96fd-1178989dd474.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo529c20c1-afe2-49a5-96fd-1178989dd474.selectorLabels" . | nindent 6 }}
