apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo89d7b594-cf5e-4e07-b7c1-85903e639a31.fullname" . }}
  labels:
    {{- include "go-echo89d7b594-cf5e-4e07-b7c1-85903e639a31.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo89d7b594-cf5e-4e07-b7c1-85903e639a31.selectorLabels" . | nindent 6 }}
