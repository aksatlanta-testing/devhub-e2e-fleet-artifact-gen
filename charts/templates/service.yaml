apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof3a5924c-8a92-4487-85a6-66649fe3b1a3.fullname" . }}
  labels:
    {{- include "go-echof3a5924c-8a92-4487-85a6-66649fe3b1a3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof3a5924c-8a92-4487-85a6-66649fe3b1a3.selectorLabels" . | nindent 6 }}
