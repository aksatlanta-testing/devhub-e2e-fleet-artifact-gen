apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8b88fbe8-b81c-4bee-a447-1ca9febe6008.fullname" . }}
  labels:
    {{- include "go-echo8b88fbe8-b81c-4bee-a447-1ca9febe6008.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8b88fbe8-b81c-4bee-a447-1ca9febe6008.selectorLabels" . | nindent 6 }}
