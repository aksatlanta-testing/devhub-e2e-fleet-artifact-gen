apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof006135e-91e5-43da-8118-baf01e3bf925.fullname" . }}
  labels:
    {{- include "go-echof006135e-91e5-43da-8118-baf01e3bf925.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof006135e-91e5-43da-8118-baf01e3bf925.selectorLabels" . | nindent 6 }}
