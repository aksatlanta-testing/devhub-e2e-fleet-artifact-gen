apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo601f2876-3723-401d-a281-bca181313e0c.fullname" . }}
  labels:
    {{- include "go-echo601f2876-3723-401d-a281-bca181313e0c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo601f2876-3723-401d-a281-bca181313e0c.selectorLabels" . | nindent 6 }}
