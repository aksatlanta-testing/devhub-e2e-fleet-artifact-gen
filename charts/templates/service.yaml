apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo48118aa2-ee5e-4549-be78-27dd947f0121.fullname" . }}
  labels:
    {{- include "go-echo48118aa2-ee5e-4549-be78-27dd947f0121.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo48118aa2-ee5e-4549-be78-27dd947f0121.selectorLabels" . | nindent 6 }}
