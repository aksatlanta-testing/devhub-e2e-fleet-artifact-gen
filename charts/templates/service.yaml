apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof3166cf5-74ee-4d40-9ffc-fb2d67ad86c0.fullname" . }}
  labels:
    {{- include "go-echof3166cf5-74ee-4d40-9ffc-fb2d67ad86c0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof3166cf5-74ee-4d40-9ffc-fb2d67ad86c0.selectorLabels" . | nindent 6 }}
