apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo93d6e65c-70e0-400c-8089-3a4048a0341b.fullname" . }}
  labels:
    {{- include "go-echo93d6e65c-70e0-400c-8089-3a4048a0341b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo93d6e65c-70e0-400c-8089-3a4048a0341b.selectorLabels" . | nindent 6 }}
