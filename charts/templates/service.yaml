apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7fd7acb4-2653-4cf1-b77a-7435d26a8bdd.fullname" . }}
  labels:
    {{- include "go-echo7fd7acb4-2653-4cf1-b77a-7435d26a8bdd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7fd7acb4-2653-4cf1-b77a-7435d26a8bdd.selectorLabels" . | nindent 6 }}
