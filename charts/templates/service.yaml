apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe025510f-1898-4892-a8d1-a2b5e75780c6.fullname" . }}
  labels:
    {{- include "go-echoe025510f-1898-4892-a8d1-a2b5e75780c6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe025510f-1898-4892-a8d1-a2b5e75780c6.selectorLabels" . | nindent 6 }}
