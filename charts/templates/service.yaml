apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6038ba73-ce58-48a2-b413-6fd30711d8e7.fullname" . }}
  labels:
    {{- include "go-echo6038ba73-ce58-48a2-b413-6fd30711d8e7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6038ba73-ce58-48a2-b413-6fd30711d8e7.selectorLabels" . | nindent 6 }}
