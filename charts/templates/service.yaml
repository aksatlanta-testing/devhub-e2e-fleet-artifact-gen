apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0fea94d7-279b-4b32-8e8c-4f6dfc3ed8e6.fullname" . }}
  labels:
    {{- include "go-echo0fea94d7-279b-4b32-8e8c-4f6dfc3ed8e6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0fea94d7-279b-4b32-8e8c-4f6dfc3ed8e6.selectorLabels" . | nindent 6 }}
