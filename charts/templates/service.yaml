apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe937db63-bc12-4c3c-994d-464373d18aee.fullname" . }}
  labels:
    {{- include "go-echoe937db63-bc12-4c3c-994d-464373d18aee.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe937db63-bc12-4c3c-994d-464373d18aee.selectorLabels" . | nindent 6 }}
