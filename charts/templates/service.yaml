apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof3eeca2e-0f26-4cab-a382-2333a5a43b49.fullname" . }}
  labels:
    {{- include "go-echof3eeca2e-0f26-4cab-a382-2333a5a43b49.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof3eeca2e-0f26-4cab-a382-2333a5a43b49.selectorLabels" . | nindent 6 }}
