apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe499692d-2946-445f-b91c-3ad8c8edfe04.fullname" . }}
  labels:
    {{- include "go-echoe499692d-2946-445f-b91c-3ad8c8edfe04.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe499692d-2946-445f-b91c-3ad8c8edfe04.selectorLabels" . | nindent 6 }}
