apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5670e01d-9fd0-4332-9d75-f383f5b9d6c1.fullname" . }}
  labels:
    {{- include "go-echo5670e01d-9fd0-4332-9d75-f383f5b9d6c1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5670e01d-9fd0-4332-9d75-f383f5b9d6c1.selectorLabels" . | nindent 6 }}
