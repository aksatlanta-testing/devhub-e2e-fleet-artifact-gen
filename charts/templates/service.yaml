apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo44f26be0-4e98-44ed-ad89-9240fd72d03e.fullname" . }}
  labels:
    {{- include "go-echo44f26be0-4e98-44ed-ad89-9240fd72d03e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo44f26be0-4e98-44ed-ad89-9240fd72d03e.selectorLabels" . | nindent 6 }}
