apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo65875a24-672f-40fd-a9de-3579b1b55c01.fullname" . }}
  labels:
    {{- include "go-echo65875a24-672f-40fd-a9de-3579b1b55c01.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo65875a24-672f-40fd-a9de-3579b1b55c01.selectorLabels" . | nindent 6 }}
