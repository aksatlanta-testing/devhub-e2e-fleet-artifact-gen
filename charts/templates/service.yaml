apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo95077ae0-e393-4433-a02e-e4875ab31b87.fullname" . }}
  labels:
    {{- include "go-echo95077ae0-e393-4433-a02e-e4875ab31b87.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo95077ae0-e393-4433-a02e-e4875ab31b87.selectorLabels" . | nindent 6 }}
