apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoba6c5804-a2d5-487d-8dcb-0438120d6cfa.fullname" . }}
  labels:
    {{- include "go-echoba6c5804-a2d5-487d-8dcb-0438120d6cfa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoba6c5804-a2d5-487d-8dcb-0438120d6cfa.selectorLabels" . | nindent 6 }}
