apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod8d66ca2-2b83-4076-9375-dca4c1920fe9.fullname" . }}
  labels:
    {{- include "go-echod8d66ca2-2b83-4076-9375-dca4c1920fe9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod8d66ca2-2b83-4076-9375-dca4c1920fe9.selectorLabels" . | nindent 6 }}
