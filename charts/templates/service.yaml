apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo75cbd567-3fd4-472c-b298-24cdcc5bc289.fullname" . }}
  labels:
    {{- include "go-echo75cbd567-3fd4-472c-b298-24cdcc5bc289.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo75cbd567-3fd4-472c-b298-24cdcc5bc289.selectorLabels" . | nindent 6 }}
