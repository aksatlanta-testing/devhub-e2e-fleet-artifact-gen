apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8907407d-3fc7-48cd-af44-90e0f2c800fa.fullname" . }}
  labels:
    {{- include "go-echo8907407d-3fc7-48cd-af44-90e0f2c800fa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8907407d-3fc7-48cd-af44-90e0f2c800fa.selectorLabels" . | nindent 6 }}
