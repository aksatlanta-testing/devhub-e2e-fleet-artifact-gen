apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo75e7f886-8e83-48a7-bb97-fc2075226dd8.fullname" . }}
  labels:
    {{- include "go-echo75e7f886-8e83-48a7-bb97-fc2075226dd8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo75e7f886-8e83-48a7-bb97-fc2075226dd8.selectorLabels" . | nindent 6 }}
