apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc0296f38-83f9-4c82-b1ce-6f5a2c8d7370.fullname" . }}
  labels:
    {{- include "go-echoc0296f38-83f9-4c82-b1ce-6f5a2c8d7370.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc0296f38-83f9-4c82-b1ce-6f5a2c8d7370.selectorLabels" . | nindent 6 }}
