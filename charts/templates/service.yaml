apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7b90cc7d-dad7-4144-87c4-365bb8b49df9.fullname" . }}
  labels:
    {{- include "go-echo7b90cc7d-dad7-4144-87c4-365bb8b49df9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7b90cc7d-dad7-4144-87c4-365bb8b49df9.selectorLabels" . | nindent 6 }}
