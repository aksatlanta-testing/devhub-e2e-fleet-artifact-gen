apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc8651b18-1afc-4694-888c-95cb4d7c1297.fullname" . }}
  labels:
    {{- include "go-echoc8651b18-1afc-4694-888c-95cb4d7c1297.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc8651b18-1afc-4694-888c-95cb4d7c1297.selectorLabels" . | nindent 6 }}
