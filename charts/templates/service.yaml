apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2892817d-0f01-4d7c-89da-87f59eb76a0f.fullname" . }}
  labels:
    {{- include "go-echo2892817d-0f01-4d7c-89da-87f59eb76a0f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2892817d-0f01-4d7c-89da-87f59eb76a0f.selectorLabels" . | nindent 6 }}
