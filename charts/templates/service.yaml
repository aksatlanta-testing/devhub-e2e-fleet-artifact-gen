apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob80d70a4-4971-4ca9-a5df-e2ff1dbd8e3d.fullname" . }}
  labels:
    {{- include "go-echob80d70a4-4971-4ca9-a5df-e2ff1dbd8e3d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob80d70a4-4971-4ca9-a5df-e2ff1dbd8e3d.selectorLabels" . | nindent 6 }}
