apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc7ed70c3-4781-4281-86d3-7208bcd387fd.fullname" . }}
  labels:
    {{- include "go-echoc7ed70c3-4781-4281-86d3-7208bcd387fd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc7ed70c3-4781-4281-86d3-7208bcd387fd.selectorLabels" . | nindent 6 }}
