apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofd12210e-d633-41ea-a17b-b00059df6052.fullname" . }}
  labels:
    {{- include "go-echofd12210e-d633-41ea-a17b-b00059df6052.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofd12210e-d633-41ea-a17b-b00059df6052.selectorLabels" . | nindent 6 }}
