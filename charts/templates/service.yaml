apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo78460fab-f937-4b51-8d28-49108a11e519.fullname" . }}
  labels:
    {{- include "go-echo78460fab-f937-4b51-8d28-49108a11e519.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo78460fab-f937-4b51-8d28-49108a11e519.selectorLabels" . | nindent 6 }}
