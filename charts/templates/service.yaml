apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo57184bbd-ba03-4bde-98d4-a74838783ae1.fullname" . }}
  labels:
    {{- include "go-echo57184bbd-ba03-4bde-98d4-a74838783ae1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo57184bbd-ba03-4bde-98d4-a74838783ae1.selectorLabels" . | nindent 6 }}
