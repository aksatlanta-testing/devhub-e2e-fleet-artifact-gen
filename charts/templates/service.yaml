apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo33d9937b-75cd-4fa1-881c-f9c17ae9c717.fullname" . }}
  labels:
    {{- include "go-echo33d9937b-75cd-4fa1-881c-f9c17ae9c717.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo33d9937b-75cd-4fa1-881c-f9c17ae9c717.selectorLabels" . | nindent 6 }}
