apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo58a48b32-f297-4f5e-a29a-2e0fdff57e04.fullname" . }}
  labels:
    {{- include "go-echo58a48b32-f297-4f5e-a29a-2e0fdff57e04.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo58a48b32-f297-4f5e-a29a-2e0fdff57e04.selectorLabels" . | nindent 6 }}
