apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo635aa48f-5926-4298-a94c-997728f73d87.fullname" . }}
  labels:
    {{- include "go-echo635aa48f-5926-4298-a94c-997728f73d87.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo635aa48f-5926-4298-a94c-997728f73d87.selectorLabels" . | nindent 6 }}
