apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof9704d10-15de-4aeb-909a-e449c4b3aa09.fullname" . }}
  labels:
    {{- include "go-echof9704d10-15de-4aeb-909a-e449c4b3aa09.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof9704d10-15de-4aeb-909a-e449c4b3aa09.selectorLabels" . | nindent 6 }}
