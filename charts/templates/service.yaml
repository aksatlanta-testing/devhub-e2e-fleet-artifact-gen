apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof61a5a71-9c5e-440f-bd2f-6de7c3a2d7ae.fullname" . }}
  labels:
    {{- include "go-echof61a5a71-9c5e-440f-bd2f-6de7c3a2d7ae.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof61a5a71-9c5e-440f-bd2f-6de7c3a2d7ae.selectorLabels" . | nindent 6 }}
