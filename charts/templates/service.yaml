apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoeae7d631-dc3e-4252-bacc-4c55a0460ee9.fullname" . }}
  labels:
    {{- include "go-echoeae7d631-dc3e-4252-bacc-4c55a0460ee9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoeae7d631-dc3e-4252-bacc-4c55a0460ee9.selectorLabels" . | nindent 6 }}
