apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo698ba61d-9a56-4130-aa44-ee1e3f1d7349.fullname" . }}
  labels:
    {{- include "go-echo698ba61d-9a56-4130-aa44-ee1e3f1d7349.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo698ba61d-9a56-4130-aa44-ee1e3f1d7349.selectorLabels" . | nindent 6 }}
