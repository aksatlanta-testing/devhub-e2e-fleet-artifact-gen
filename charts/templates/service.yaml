apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1119262a-ccf5-41a9-910d-6af03ce9c8a6.fullname" . }}
  labels:
    {{- include "go-echo1119262a-ccf5-41a9-910d-6af03ce9c8a6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1119262a-ccf5-41a9-910d-6af03ce9c8a6.selectorLabels" . | nindent 6 }}
