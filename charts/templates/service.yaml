apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo952a986f-3879-4d76-a722-fe43c8ad8da6.fullname" . }}
  labels:
    {{- include "go-echo952a986f-3879-4d76-a722-fe43c8ad8da6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo952a986f-3879-4d76-a722-fe43c8ad8da6.selectorLabels" . | nindent 6 }}
