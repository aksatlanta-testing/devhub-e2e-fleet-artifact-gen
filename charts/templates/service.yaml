apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9d93c10a-ba87-4ae6-aa1b-ee8b33ed2196.fullname" . }}
  labels:
    {{- include "go-echo9d93c10a-ba87-4ae6-aa1b-ee8b33ed2196.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9d93c10a-ba87-4ae6-aa1b-ee8b33ed2196.selectorLabels" . | nindent 6 }}
