apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo19add9ea-33ec-48df-8d33-73b83c8e6f8c.fullname" . }}
  labels:
    {{- include "go-echo19add9ea-33ec-48df-8d33-73b83c8e6f8c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo19add9ea-33ec-48df-8d33-73b83c8e6f8c.selectorLabels" . | nindent 6 }}
