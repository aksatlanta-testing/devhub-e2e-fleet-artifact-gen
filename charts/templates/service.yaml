apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo75acb4e5-400c-4607-a2e9-1679644b6359.fullname" . }}
  labels:
    {{- include "go-echo75acb4e5-400c-4607-a2e9-1679644b6359.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo75acb4e5-400c-4607-a2e9-1679644b6359.selectorLabels" . | nindent 6 }}
