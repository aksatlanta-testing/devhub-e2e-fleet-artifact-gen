apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo751df199-f1c2-48f4-867a-6fe59bc9fe7f.fullname" . }}
  labels:
    {{- include "go-echo751df199-f1c2-48f4-867a-6fe59bc9fe7f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo751df199-f1c2-48f4-867a-6fe59bc9fe7f.selectorLabels" . | nindent 6 }}
