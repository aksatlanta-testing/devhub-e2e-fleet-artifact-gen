apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo50c101c1-3c10-4190-a661-34ea2d65bf21.fullname" . }}
  labels:
    {{- include "go-echo50c101c1-3c10-4190-a661-34ea2d65bf21.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo50c101c1-3c10-4190-a661-34ea2d65bf21.selectorLabels" . | nindent 6 }}
