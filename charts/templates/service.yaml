apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo26cdd1c0-0668-4773-b8ae-c911487d762d.fullname" . }}
  labels:
    {{- include "go-echo26cdd1c0-0668-4773-b8ae-c911487d762d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo26cdd1c0-0668-4773-b8ae-c911487d762d.selectorLabels" . | nindent 6 }}
