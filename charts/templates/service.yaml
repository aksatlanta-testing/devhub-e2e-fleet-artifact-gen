apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4c71416f-93a6-4379-97f2-ddc7c57ab62c.fullname" . }}
  labels:
    {{- include "go-echo4c71416f-93a6-4379-97f2-ddc7c57ab62c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4c71416f-93a6-4379-97f2-ddc7c57ab62c.selectorLabels" . | nindent 6 }}
