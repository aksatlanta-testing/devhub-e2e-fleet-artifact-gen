apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5796d7c3-ba8d-4a5d-9c8f-710c4396bc5a.fullname" . }}
  labels:
    {{- include "go-echo5796d7c3-ba8d-4a5d-9c8f-710c4396bc5a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5796d7c3-ba8d-4a5d-9c8f-710c4396bc5a.selectorLabels" . | nindent 6 }}
