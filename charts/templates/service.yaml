apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoad4c6574-68d3-4a0c-9b45-b56b6612bee0.fullname" . }}
  labels:
    {{- include "go-echoad4c6574-68d3-4a0c-9b45-b56b6612bee0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoad4c6574-68d3-4a0c-9b45-b56b6612bee0.selectorLabels" . | nindent 6 }}
