apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4634ac74-1907-43a8-ad95-7b150d388825.fullname" . }}
  labels:
    {{- include "go-echo4634ac74-1907-43a8-ad95-7b150d388825.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
