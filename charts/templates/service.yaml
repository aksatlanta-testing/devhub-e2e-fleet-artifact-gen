apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5e3f0c69-c606-4d7f-a9b4-03d22accc19e.fullname" . }}
  labels:
    {{- include "go-echo5e3f0c69-c606-4d7f-a9b4-03d22accc19e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5e3f0c69-c606-4d7f-a9b4-03d22accc19e.selectorLabels" . | nindent 6 }}
