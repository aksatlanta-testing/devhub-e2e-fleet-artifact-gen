apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc74431d3-0790-4195-9fb4-8e0175aa8120.fullname" . }}
  labels:
    {{- include "go-echoc74431d3-0790-4195-9fb4-8e0175aa8120.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc74431d3-0790-4195-9fb4-8e0175aa8120.selectorLabels" . | nindent 6 }}
