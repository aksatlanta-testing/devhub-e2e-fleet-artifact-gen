apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2f93572c-1dfc-493b-b5f2-1551f4b96fa7.fullname" . }}
  labels:
    {{- include "go-echo2f93572c-1dfc-493b-b5f2-1551f4b96fa7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2f93572c-1dfc-493b-b5f2-1551f4b96fa7.selectorLabels" . | nindent 6 }}
