apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo09d58879-8450-4ff7-abfc-924ac21a2e2d.fullname" . }}
  labels:
    {{- include "go-echo09d58879-8450-4ff7-abfc-924ac21a2e2d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo09d58879-8450-4ff7-abfc-924ac21a2e2d.selectorLabels" . | nindent 6 }}
