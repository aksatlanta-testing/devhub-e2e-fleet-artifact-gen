apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo23c46b12-2491-4a6e-9dc6-908d77e9ae58.fullname" . }}
  labels:
    {{- include "go-echo23c46b12-2491-4a6e-9dc6-908d77e9ae58.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo23c46b12-2491-4a6e-9dc6-908d77e9ae58.selectorLabels" . | nindent 6 }}
