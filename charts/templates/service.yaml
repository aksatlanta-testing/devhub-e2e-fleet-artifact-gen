apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6a0c8de5-d7e8-49ba-b1e7-cf6160e906d3.fullname" . }}
  labels:
    {{- include "go-echo6a0c8de5-d7e8-49ba-b1e7-cf6160e906d3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6a0c8de5-d7e8-49ba-b1e7-cf6160e906d3.selectorLabels" . | nindent 6 }}
