apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc65d02fb-0929-4d78-9d08-c2975f65573f.fullname" . }}
  labels:
    {{- include "go-echoc65d02fb-0929-4d78-9d08-c2975f65573f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc65d02fb-0929-4d78-9d08-c2975f65573f.selectorLabels" . | nindent 6 }}
