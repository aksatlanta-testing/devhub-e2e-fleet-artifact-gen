apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1a111873-587c-41b5-b7ad-d01e9cb56630.fullname" . }}
  labels:
    {{- include "go-echo1a111873-587c-41b5-b7ad-d01e9cb56630.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1a111873-587c-41b5-b7ad-d01e9cb56630.selectorLabels" . | nindent 6 }}
