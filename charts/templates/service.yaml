apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6bcb55a0-f821-4cf8-8d94-ab63e04ac46f.fullname" . }}
  labels:
    {{- include "go-echo6bcb55a0-f821-4cf8-8d94-ab63e04ac46f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6bcb55a0-f821-4cf8-8d94-ab63e04ac46f.selectorLabels" . | nindent 6 }}
