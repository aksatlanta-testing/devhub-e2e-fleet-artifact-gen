apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo927867e3-7da1-4432-a1bd-59b7e67ce111.fullname" . }}
  labels:
    {{- include "go-echo927867e3-7da1-4432-a1bd-59b7e67ce111.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo927867e3-7da1-4432-a1bd-59b7e67ce111.selectorLabels" . | nindent 6 }}
