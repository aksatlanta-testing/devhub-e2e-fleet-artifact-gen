apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo986e520f-4dab-4771-af91-16ab1744b5f9.fullname" . }}
  labels:
    {{- include "go-echo986e520f-4dab-4771-af91-16ab1744b5f9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo986e520f-4dab-4771-af91-16ab1744b5f9.selectorLabels" . | nindent 6 }}
