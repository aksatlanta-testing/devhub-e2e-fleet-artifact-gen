apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9ca7b862-72c2-4574-b0cb-83a5f14ec52c.fullname" . }}
  labels:
    {{- include "go-echo9ca7b862-72c2-4574-b0cb-83a5f14ec52c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9ca7b862-72c2-4574-b0cb-83a5f14ec52c.selectorLabels" . | nindent 6 }}
