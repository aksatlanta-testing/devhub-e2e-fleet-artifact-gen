apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo96495a63-2489-423a-b3ed-ca52afb1a125.fullname" . }}
  labels:
    {{- include "go-echo96495a63-2489-423a-b3ed-ca52afb1a125.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo96495a63-2489-423a-b3ed-ca52afb1a125.selectorLabels" . | nindent 6 }}
