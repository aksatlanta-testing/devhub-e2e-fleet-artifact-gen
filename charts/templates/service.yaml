apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoea32905f-009a-4f74-a554-0d7991522e76.fullname" . }}
  labels:
    {{- include "go-echoea32905f-009a-4f74-a554-0d7991522e76.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoea32905f-009a-4f74-a554-0d7991522e76.selectorLabels" . | nindent 6 }}
