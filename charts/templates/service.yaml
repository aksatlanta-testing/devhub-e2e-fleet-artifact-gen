apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0b0fa9de-0ac7-46e7-9bb9-a1b8d39a41f2.fullname" . }}
  labels:
    {{- include "go-echo0b0fa9de-0ac7-46e7-9bb9-a1b8d39a41f2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0b0fa9de-0ac7-46e7-9bb9-a1b8d39a41f2.selectorLabels" . | nindent 6 }}
