apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe0e20bd1-cb11-4670-83df-9eeefc727b4e.fullname" . }}
  labels:
    {{- include "go-echoe0e20bd1-cb11-4670-83df-9eeefc727b4e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe0e20bd1-cb11-4670-83df-9eeefc727b4e.selectorLabels" . | nindent 6 }}
