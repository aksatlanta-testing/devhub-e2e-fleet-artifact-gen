apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa54bfa49-149a-4b74-8af3-e4a501a72b1b.fullname" . }}
  labels:
    {{- include "go-echoa54bfa49-149a-4b74-8af3-e4a501a72b1b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa54bfa49-149a-4b74-8af3-e4a501a72b1b.selectorLabels" . | nindent 6 }}
