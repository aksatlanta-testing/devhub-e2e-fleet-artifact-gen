apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobf38120f-bf02-4c55-9b10-86fa033ea342.fullname" . }}
  labels:
    {{- include "go-echobf38120f-bf02-4c55-9b10-86fa033ea342.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobf38120f-bf02-4c55-9b10-86fa033ea342.selectorLabels" . | nindent 6 }}
