apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe6b11c84-7fe3-4e4e-b1d1-ecd2e495be5d.fullname" . }}
  labels:
    {{- include "go-echoe6b11c84-7fe3-4e4e-b1d1-ecd2e495be5d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe6b11c84-7fe3-4e4e-b1d1-ecd2e495be5d.selectorLabels" . | nindent 6 }}
