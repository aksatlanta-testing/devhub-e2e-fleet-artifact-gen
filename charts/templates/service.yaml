apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1d5a211c-08db-42b4-97dd-3481aaa1449e.fullname" . }}
  labels:
    {{- include "go-echo1d5a211c-08db-42b4-97dd-3481aaa1449e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1d5a211c-08db-42b4-97dd-3481aaa1449e.selectorLabels" . | nindent 6 }}
