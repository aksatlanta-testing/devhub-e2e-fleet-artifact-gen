apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3147df79-3191-43b2-8b18-e30b67800764.fullname" . }}
  labels:
    {{- include "go-echo3147df79-3191-43b2-8b18-e30b67800764.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3147df79-3191-43b2-8b18-e30b67800764.selectorLabels" . | nindent 6 }}
