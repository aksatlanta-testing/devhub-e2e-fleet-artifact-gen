apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0dc4876d-c994-48f7-ba51-f36b2151a413.fullname" . }}
  labels:
    {{- include "go-echo0dc4876d-c994-48f7-ba51-f36b2151a413.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0dc4876d-c994-48f7-ba51-f36b2151a413.selectorLabels" . | nindent 6 }}
