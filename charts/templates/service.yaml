apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoad743243-bac0-4078-85ff-cd27dc0045f8.fullname" . }}
  labels:
    {{- include "go-echoad743243-bac0-4078-85ff-cd27dc0045f8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoad743243-bac0-4078-85ff-cd27dc0045f8.selectorLabels" . | nindent 6 }}
