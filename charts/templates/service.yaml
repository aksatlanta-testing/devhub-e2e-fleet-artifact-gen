apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo05c38a74-5fcb-4eaf-8e1e-339e7c22d12b.fullname" . }}
  labels:
    {{- include "go-echo05c38a74-5fcb-4eaf-8e1e-339e7c22d12b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo05c38a74-5fcb-4eaf-8e1e-339e7c22d12b.selectorLabels" . | nindent 6 }}
