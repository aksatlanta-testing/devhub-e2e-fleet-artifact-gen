apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo50fcd186-6322-4152-827a-c8deae11fa95.fullname" . }}
  labels:
    {{- include "go-echo50fcd186-6322-4152-827a-c8deae11fa95.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo50fcd186-6322-4152-827a-c8deae11fa95.selectorLabels" . | nindent 6 }}
