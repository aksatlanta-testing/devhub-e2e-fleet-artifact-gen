apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo38023b26-42f0-4856-abac-cd6353080ac5.fullname" . }}
  labels:
    {{- include "go-echo38023b26-42f0-4856-abac-cd6353080ac5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo38023b26-42f0-4856-abac-cd6353080ac5.selectorLabels" . | nindent 6 }}
