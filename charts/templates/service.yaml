apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaf6b1ea6-da6f-40c7-a1b9-0a5c0c1433bc.fullname" . }}
  labels:
    {{- include "go-echoaf6b1ea6-da6f-40c7-a1b9-0a5c0c1433bc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaf6b1ea6-da6f-40c7-a1b9-0a5c0c1433bc.selectorLabels" . | nindent 6 }}
