apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa92e2536-d586-47e3-a3b5-7ac12dcd3d28.fullname" . }}
  labels:
    {{- include "go-echoa92e2536-d586-47e3-a3b5-7ac12dcd3d28.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa92e2536-d586-47e3-a3b5-7ac12dcd3d28.selectorLabels" . | nindent 6 }}
