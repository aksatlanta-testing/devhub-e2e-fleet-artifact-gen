apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1a5799d7-e850-4ae7-8806-f9a65c67eecf.fullname" . }}
  labels:
    {{- include "go-echo1a5799d7-e850-4ae7-8806-f9a65c67eecf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1a5799d7-e850-4ae7-8806-f9a65c67eecf.selectorLabels" . | nindent 6 }}
