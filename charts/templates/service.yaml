apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa9c38e3e-2b99-4c7d-8487-1ff0d40422ca.fullname" . }}
  labels:
    {{- include "go-echoa9c38e3e-2b99-4c7d-8487-1ff0d40422ca.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa9c38e3e-2b99-4c7d-8487-1ff0d40422ca.selectorLabels" . | nindent 6 }}
