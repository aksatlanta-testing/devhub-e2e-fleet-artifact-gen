apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9e3749a2-4ef0-401e-bae9-2418bb13411c.fullname" . }}
  labels:
    {{- include "go-echo9e3749a2-4ef0-401e-bae9-2418bb13411c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9e3749a2-4ef0-401e-bae9-2418bb13411c.selectorLabels" . | nindent 6 }}
