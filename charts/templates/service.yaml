apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo633f865d-ab45-411b-865c-6d54660790a3.fullname" . }}
  labels:
    {{- include "go-echo633f865d-ab45-411b-865c-6d54660790a3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo633f865d-ab45-411b-865c-6d54660790a3.selectorLabels" . | nindent 6 }}
