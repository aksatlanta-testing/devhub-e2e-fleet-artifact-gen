apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echode177d6c-ac77-4c6a-a03c-f35425387603.fullname" . }}
  labels:
    {{- include "go-echode177d6c-ac77-4c6a-a03c-f35425387603.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echode177d6c-ac77-4c6a-a03c-f35425387603.selectorLabels" . | nindent 6 }}
