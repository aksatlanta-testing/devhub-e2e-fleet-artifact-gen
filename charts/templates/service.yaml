apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa2604167-026c-4eb4-88a7-8d902b4a89a2.fullname" . }}
  labels:
    {{- include "go-echoa2604167-026c-4eb4-88a7-8d902b4a89a2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa2604167-026c-4eb4-88a7-8d902b4a89a2.selectorLabels" . | nindent 6 }}
