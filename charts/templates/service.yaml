apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa595a7f3-07f4-4ebf-bed7-7b7b544a0ca0.fullname" . }}
  labels:
    {{- include "go-echoa595a7f3-07f4-4ebf-bed7-7b7b544a0ca0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa595a7f3-07f4-4ebf-bed7-7b7b544a0ca0.selectorLabels" . | nindent 6 }}
