apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe0ef4b83-91e3-434d-9de9-ff24325082b9.fullname" . }}
  labels:
    {{- include "go-echoe0ef4b83-91e3-434d-9de9-ff24325082b9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe0ef4b83-91e3-434d-9de9-ff24325082b9.selectorLabels" . | nindent 6 }}
