apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo992ede2a-dd42-4dfd-abb0-0abd183cef0b.fullname" . }}
  labels:
    {{- include "go-echo992ede2a-dd42-4dfd-abb0-0abd183cef0b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo992ede2a-dd42-4dfd-abb0-0abd183cef0b.selectorLabels" . | nindent 6 }}
