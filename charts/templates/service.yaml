apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo32428d32-60f2-4ff5-984f-f93201a9efe8.fullname" . }}
  labels:
    {{- include "go-echo32428d32-60f2-4ff5-984f-f93201a9efe8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo32428d32-60f2-4ff5-984f-f93201a9efe8.selectorLabels" . | nindent 6 }}
