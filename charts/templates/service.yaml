apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6ff86033-188e-4550-8e1f-0d94bffe41af.fullname" . }}
  labels:
    {{- include "go-echo6ff86033-188e-4550-8e1f-0d94bffe41af.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6ff86033-188e-4550-8e1f-0d94bffe41af.selectorLabels" . | nindent 6 }}
