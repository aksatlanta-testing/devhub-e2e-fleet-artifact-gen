apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo177f7dff-5430-49ef-b845-3dce66ec023a.fullname" . }}
  labels:
    {{- include "go-echo177f7dff-5430-49ef-b845-3dce66ec023a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo177f7dff-5430-49ef-b845-3dce66ec023a.selectorLabels" . | nindent 6 }}
