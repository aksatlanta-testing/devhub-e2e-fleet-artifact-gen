apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod598d9db-fa1d-45ae-9f76-0f07d4520eed.fullname" . }}
  labels:
    {{- include "go-echod598d9db-fa1d-45ae-9f76-0f07d4520eed.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod598d9db-fa1d-45ae-9f76-0f07d4520eed.selectorLabels" . | nindent 6 }}
