apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof3a47417-32ef-4778-8c0b-99d5440016e8.fullname" . }}
  labels:
    {{- include "go-echof3a47417-32ef-4778-8c0b-99d5440016e8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof3a47417-32ef-4778-8c0b-99d5440016e8.selectorLabels" . | nindent 6 }}
