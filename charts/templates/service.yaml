apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoea2690ae-b9dd-4bb4-a27d-a72bbe5599bb.fullname" . }}
  labels:
    {{- include "go-echoea2690ae-b9dd-4bb4-a27d-a72bbe5599bb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoea2690ae-b9dd-4bb4-a27d-a72bbe5599bb.selectorLabels" . | nindent 6 }}
