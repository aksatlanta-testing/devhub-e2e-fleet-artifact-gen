apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof9e03a08-7d9e-4969-9962-fc21ae8c1f01.fullname" . }}
  labels:
    {{- include "go-echof9e03a08-7d9e-4969-9962-fc21ae8c1f01.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof9e03a08-7d9e-4969-9962-fc21ae8c1f01.selectorLabels" . | nindent 6 }}
