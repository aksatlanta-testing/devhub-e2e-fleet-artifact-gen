apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo20d3694e-af9e-4529-af15-79d1dc4acfde.fullname" . }}
  labels:
    {{- include "go-echo20d3694e-af9e-4529-af15-79d1dc4acfde.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo20d3694e-af9e-4529-af15-79d1dc4acfde.selectorLabels" . | nindent 6 }}
