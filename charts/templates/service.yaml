apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod358f8b4-fee4-40be-9583-2374c735026e.fullname" . }}
  labels:
    {{- include "go-echod358f8b4-fee4-40be-9583-2374c735026e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod358f8b4-fee4-40be-9583-2374c735026e.selectorLabels" . | nindent 6 }}
