apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa79d93a4-59fd-49d8-9634-4ae75aa36a45.fullname" . }}
  labels:
    {{- include "go-echoa79d93a4-59fd-49d8-9634-4ae75aa36a45.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa79d93a4-59fd-49d8-9634-4ae75aa36a45.selectorLabels" . | nindent 6 }}
