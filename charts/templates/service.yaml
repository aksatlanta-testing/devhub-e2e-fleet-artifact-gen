apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo09a0fda1-19d6-410a-93c8-d80057d6b3d3.fullname" . }}
  labels:
    {{- include "go-echo09a0fda1-19d6-410a-93c8-d80057d6b3d3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo09a0fda1-19d6-410a-93c8-d80057d6b3d3.selectorLabels" . | nindent 6 }}
