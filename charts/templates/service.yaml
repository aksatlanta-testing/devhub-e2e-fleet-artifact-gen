apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof0475dcd-69d9-4866-bf1a-b09934153eba.fullname" . }}
  labels:
    {{- include "go-echof0475dcd-69d9-4866-bf1a-b09934153eba.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof0475dcd-69d9-4866-bf1a-b09934153eba.selectorLabels" . | nindent 6 }}
