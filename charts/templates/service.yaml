apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo940c6f41-a94d-444b-8f35-19eac9cd3681.fullname" . }}
  labels:
    {{- include "go-echo940c6f41-a94d-444b-8f35-19eac9cd3681.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo940c6f41-a94d-444b-8f35-19eac9cd3681.selectorLabels" . | nindent 6 }}
