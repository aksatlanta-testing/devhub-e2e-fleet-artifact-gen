apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo213e8adc-a104-4293-ac89-04e6cbd6176d.fullname" . }}
  labels:
    {{- include "go-echo213e8adc-a104-4293-ac89-04e6cbd6176d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo213e8adc-a104-4293-ac89-04e6cbd6176d.selectorLabels" . | nindent 6 }}
