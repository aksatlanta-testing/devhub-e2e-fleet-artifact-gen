apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo15230c96-4f90-4d6f-86a7-cc147935b1ff.fullname" . }}
  labels:
    {{- include "go-echo15230c96-4f90-4d6f-86a7-cc147935b1ff.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo15230c96-4f90-4d6f-86a7-cc147935b1ff.selectorLabels" . | nindent 6 }}
