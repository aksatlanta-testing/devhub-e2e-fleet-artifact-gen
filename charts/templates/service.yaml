apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo93c6cac1-5fd4-48cd-810b-47f65f9bd9fb.fullname" . }}
  labels:
    {{- include "go-echo93c6cac1-5fd4-48cd-810b-47f65f9bd9fb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo93c6cac1-5fd4-48cd-810b-47f65f9bd9fb.selectorLabels" . | nindent 6 }}
