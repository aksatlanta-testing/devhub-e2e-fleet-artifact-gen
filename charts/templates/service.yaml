apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6d52ec42-d6f0-476a-970e-502eeb437cdb.fullname" . }}
  labels:
    {{- include "go-echo6d52ec42-d6f0-476a-970e-502eeb437cdb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6d52ec42-d6f0-476a-970e-502eeb437cdb.selectorLabels" . | nindent 6 }}
