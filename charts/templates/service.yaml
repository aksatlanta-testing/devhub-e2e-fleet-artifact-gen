apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo00105313-41f2-4dea-8fb1-2ffd072bc54d.fullname" . }}
  labels:
    {{- include "go-echo00105313-41f2-4dea-8fb1-2ffd072bc54d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo00105313-41f2-4dea-8fb1-2ffd072bc54d.selectorLabels" . | nindent 6 }}
