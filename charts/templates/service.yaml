apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo19f382d0-88bc-41a8-9141-52b3ce934be1.fullname" . }}
  labels:
    {{- include "go-echo19f382d0-88bc-41a8-9141-52b3ce934be1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo19f382d0-88bc-41a8-9141-52b3ce934be1.selectorLabels" . | nindent 6 }}
