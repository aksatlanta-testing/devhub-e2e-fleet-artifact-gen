apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo58d67b86-521e-4c4c-a78c-24f36a5649cf.fullname" . }}
  labels:
    {{- include "go-echo58d67b86-521e-4c4c-a78c-24f36a5649cf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo58d67b86-521e-4c4c-a78c-24f36a5649cf.selectorLabels" . | nindent 6 }}
