apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5da5c166-69ac-4060-bf4f-d257ef522e9b.fullname" . }}
  labels:
    {{- include "go-echo5da5c166-69ac-4060-bf4f-d257ef522e9b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5da5c166-69ac-4060-bf4f-d257ef522e9b.selectorLabels" . | nindent 6 }}
