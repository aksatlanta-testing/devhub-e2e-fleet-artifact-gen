apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5680d75c-8bfc-4a71-bc3e-63ab15c746ce.fullname" . }}
  labels:
    {{- include "go-echo5680d75c-8bfc-4a71-bc3e-63ab15c746ce.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5680d75c-8bfc-4a71-bc3e-63ab15c746ce.selectorLabels" . | nindent 6 }}
