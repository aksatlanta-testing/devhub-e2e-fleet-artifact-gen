apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3873c3e9-1297-4f3a-8f01-230af004270a.fullname" . }}
  labels:
    {{- include "go-echo3873c3e9-1297-4f3a-8f01-230af004270a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3873c3e9-1297-4f3a-8f01-230af004270a.selectorLabels" . | nindent 6 }}
